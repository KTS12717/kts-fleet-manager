const KTSLogo = ({ size = 64 }) => (
  <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    {/* Outer tire ring - thin wall */}
    <circle cx="50" cy="50" r="47" stroke="#333" strokeWidth="2.5" fill="none" />
    <circle cx="50" cy="50" r="42" stroke="#555" strokeWidth="1" fill="none" />
    {/* Tire tread marks around outside */}
    {[0,30,60,90,120,150,180,210,240,270,300,330].map(deg => (
      <line key={deg} x1={50 + 44 * Math.cos(deg * Math.PI/180)} y1={50 + 44 * Math.sin(deg * Math.PI/180)}
        x2={50 + 48 * Math.cos(deg * Math.PI/180)} y2={50 + 48 * Math.sin(deg * Math.PI/180)}
        stroke="#444" strokeWidth="2" strokeLinecap="round" />
    ))}
    {/* Inner compass circle */}
    <circle cx="50" cy="50" r="36" stroke={COLORS.accent} strokeWidth="1.5" fill="white" />
    <circle cx="50" cy="50" r="32" stroke={COLORS.border} strokeWidth="0.5" fill="none" />
    {/* Compass cardinal ticks */}
    {[0,90,180,270].map(deg => (
      <line key={`major${deg}`} x1={50 + 28 * Math.cos(deg * Math.PI/180)} y1={50 + 28 * Math.sin(deg * Math.PI/180)}
        x2={50 + 34 * Math.cos(deg * Math.PI/180)} y2={50 + 34 * Math.sin(deg * Math.PI/180)}

// ============ LIVE CAMERA COMPONENT ============
const LiveCamera = ({ onCapture, onClose }) => {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [ready, setReady] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    let mounted = true;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } }, audio: false })
      .then(stream => {
        if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play();
        }
        setReady(true);
      })
      .catch(err => {
        if (mounted) setError("Camera access denied. Please allow camera permissions and try again.");
      });
    return () => { mounted = false; if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const takeSnapshot = () => {
    if (!videoRef.current) return;
    const canvas = document.createElement("canvas");
    canvas.width = videoRef.current.videoWidth;
    canvas.height = videoRef.current.videoHeight;
    canvas.getContext("2d").drawImage(videoRef.current, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onCapture(dataUrl);
  };

  const handleClose = () => {
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onClose();
  };

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000", zIndex: 300, display: "flex", flexDirection: "column" }}>
      {error ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 32 }}>
          <div style={{ textAlign: "center" }}>
            <p style={{ color: "#fff", fontSize: 16, marginBottom: 16 }}>{error}</p>
            <Btn onClick={handleClose} color={COLORS.red}>Close</Btn>
          </div>
        </div>
      ) : (
        <>
          <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
            <video ref={videoRef} autoPlay playsInline muted
              style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            {!ready && (
              <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", color: "#fff" }}>
                Loading camera...
              </div>
            )}
          </div>
          <div style={{ padding: 20, display: "flex", justifyContent: "center", gap: 24, background: "#111" }}>
            <button onClick={handleClose}
              style={{ width: 52, height: 52, borderRadius: 26, background: COLORS.red, border: "none", color: "#fff", fontSize: 20, cursor: "pointer" }}>✕</button>
            <button onClick={takeSnapshot} disabled={!ready}
              style={{
                width: 72, height: 72, borderRadius: 36, background: ready ? "#fff" : "#555",
                border: `4px solid ${ready ? COLORS.accent : "#333"}`, cursor: ready ? "pointer" : "not-allowed",
                boxShadow: ready ? "0 0 0 4px rgba(16,185,129,0.3)" : "none",
              }} />
            <div style={{ width: 52 }} /> {/* spacer */}
          </div>
        </>
      )}
    </div>
  );
};

// ============ SIGNATURE PAD ============
const SignaturePad = ({ onSave, label = "Driver Signature" }) => {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasDrawn, setHasDrawn] = useState(false);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  };

  const startDraw = (e) => {
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    setDrawing(true);
    setHasDrawn(true);
  };

  const draw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#111";
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };

  const stopDraw = () => setDrawing(false);

  const clearSig = () => {
    const ctx = canvasRef.current.getContext("2d");
    ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
    setHasDrawn(false);
  };

  const saveSig = () => {
    if (!hasDrawn) return alert("Please sign first");
    onSave(canvasRef.current.toDataURL("image/png"));
  };

  return (
    <Card style={{ marginTop: 12 }}>
      <h4 style={{ color: COLORS.text, fontSize: 14, margin: "0 0 8px", fontWeight: 700 }}>✍️ {label}</h4>
      <p style={{ color: COLORS.textDim, fontSize: 11, margin: "0 0 8px" }}>Sign with your finger below</p>
      <div style={{ border: `2px solid ${COLORS.border}`, borderRadius: 8, overflow: "hidden", touchAction: "none", background: "#fff" }}>
        <canvas ref={canvasRef} width={320} height={120}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          style={{ width: "100%", height: 120, display: "block", cursor: "crosshair" }} />
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <Btn small outline onClick={clearSig} color={COLORS.textMuted}>Clear</Btn>
        <Btn small onClick={saveSig} disabled={!hasDrawn}>Save Signature</Btn>
      </div>
    </Card>
  );
};

    setItemData(p => ({ ...p, [id]: { ...p[id], [field]: value } }));
  };

  const handleCapture = (dataUrl) => {
    if (cameraOpen) {
      updateItem(cameraOpen, "photo", dataUrl);
      setCameraOpen(null);
    }
  };

  const allComplete = INSPECTION_ITEMS.every(item => {
    const data = itemData[item.id];

    if (item.type === "photo" && !data.photo) return false;

    if (item.type === "dropdown" && !data.dropdown) return false;
    return true;

    if (selectedRouteId) driverRoute = routes.find(r => r.id === selectedRouteId);
  } else {
    driverRoute = routes.find(r => r.driver === user.name);
  }

  const [period, setPeriod] = useState("am");
  const [startOdo, setStartOdo] = useState("");
  const [endOdo, setEndOdo] = useState("");
  const [clientStatus, setClientStatus] = useState({});
  const [absentClients, setAbsentClients] = useState({}); // { clientName: true } = went to address but client absent
  const [baseStarted, setBaseStarted] = useState({});
  const [timestamps, setTimestamps] = useState({});
  const [amSubmitted, setAmSubmitted] = useState(false);
  const [pmSubmitted, setPmSubmitted] = useState(false);
  const [showPmSummary, setShowPmSummary] = useState(false);
  const [inspectionDone, setInspectionDone] = useState(false);
  const [activeView, setActiveView] = useState("log"); // "log" or "inspection"
  const [loginTime] = useState(new Date());
  const [flashInspection, setFlashInspection] = useState(false);
  const [amSignature, setAmSignature] = useState(null);
  const [pmSignature, setPmSignature] = useState(null);

  const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

  // Flash inspection warning after 1 hour if not done
  useEffect(() => {
    const checkFlash = () => {
      if (!inspectionDone) {
        const elapsed = (new Date() - loginTime) / 1000 / 60;
        setFlashInspection(elapsed >= 60);
      } else {
        setFlashInspection(false);
      }
    };
    checkFlash();
    const interval = setInterval(checkFlash, 30000);
    return () => clearInterval(interval);
  }, [inspectionDone, loginTime]);

  // Manager route selection screen
  if (isManager && !selectedRouteId) {
    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }}>
        <div style={{ maxWidth: 500, margin: "0 auto" }}>
          <h2 style={{ color: COLORS.text, margin: "0 0 4px", fontSize: 20 }}>Select Route to Cover</h2>
          <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 16px" }}>
            {user.name} — Manager Override
          </p>
          {routes.map(route => (
            <Card key={route.id} onClick={() => { setSelectedRouteId(route.id); setOverrideName(user.name); }}
              style={{ marginBottom: 8, cursor: "pointer" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <h3 style={{ color: COLORS.text, margin: 0, fontSize: 15 }}>{route.name}</h3>
                  <p style={{ color: COLORS.textDim, fontSize: 12, margin: "2px 0 0" }}>
                    Assigned: {route.driver} · {route.clients.filter(c => c.active).length} clients
                  </p>
                </div>
                <Badge>{route.vehicleId}</Badge>
              </div>
            </Card>
          ))}
        </div>
      </div>
    );
  }

  if (!driverRoute) return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Card><p style={{ color: COLORS.text }}>No route assigned to you today.</p></Card>
    </div>
  );

  const displayDriver = overrideName || driverRoute.driver;
  const stops = period === "am" ? driverRoute.amStops : driverRoute.pmStops;
  const activeStops = stops.filter(s => {
    if (s.type === "base") return true;
    if (s.inactive) return false;
    return s.clients.some(c => {
      const cl = driverRoute.clients.find(x => x.name === c);
      return cl && cl.active;
    });
  });

  const handleBaseToggle = (stopId) => {
    setBaseStarted(p => ({ ...p, [stopId]: !p[stopId] }));
    if (!timestamps[stopId]) setTimestamps(p => ({ ...p, [stopId]: new Date().toLocaleTimeString() }));
  };

  const handleClientToggle = (clientName) => {
    setClientStatus(p => ({ ...p, [`${period}_${clientName}`]: !p[`${period}_${clientName}`] }));
    if (!timestamps[`${period}_${clientName}`]) setTimestamps(p => ({ ...p, [`${period}_${clientName}`]: new Date().toLocaleTimeString() }));
  };

  const handleAbsentToggle = (clientName) => {
    setAbsentClients(p => ({ ...p, [clientName]: !p[clientName] }));
  };

  // Get all unique active clients for the route
  const allActiveClients = driverRoute.clients.filter(c => c.active);

  const handleSubmitAM = () => {
    if (!startOdo) return alert("Starting odometer is required");
    if (!amSignature) return alert("Signature is required for AM route");
    setAmSubmitted(true);
    if (onSubmit) onSubmit({ period: "am", startOdo, endOdo, clientStatus, absentClients, timestamps, route: driverRoute.name, driver: displayDriver, signature: amSignature, date: today });
  };

  const handleSubmitPM = () => {
    if (!endOdo) return alert("Ending odometer is required");
    if (!pmSignature) return alert("Signature is required for PM route");
    setShowPmSummary(true);
  };

  const confirmPmSubmit = () => {
    setPmSubmitted(true);
    setShowPmSummary(false);
    if (onSubmit) onSubmit({ period: "pm", startOdo, endOdo, clientStatus, absentClients, timestamps, route: driverRoute.name, driver: displayDriver, signature: pmSignature, date: today });
  };

  const isSubmitted = period === "am" ? amSubmitted : pmSubmitted;

  // Render the route log
  const renderLog = () => (
    <div>
      {/* Odometer */}
      <Card style={{ marginBottom: 12, borderLeft: `4px solid ${!startOdo ? COLORS.red : COLORS.accent}` }}>
        <h3 style={{ color: COLORS.text, fontSize: 14, margin: "0 0 8px", fontWeight: 700 }}>Odometer</h3>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}>
            <Input label="Start *" type="number" value={startOdo} onChange={e => setStartOdo(e.target.value)} placeholder="Required" />
          </div>
          <div style={{ flex: 1 }}>
            <Input label="End *" type="number" value={endOdo} onChange={e => setEndOdo(e.target.value)} placeholder="After PM" />
          </div>
        </div>
      </Card>

      {/* AM / PM tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <Btn onClick={() => setPeriod("am")} color={period === "am" ? COLORS.accent : COLORS.border} style={{ flex: 1 }}>
          ☀️ AM {amSubmitted && "✅"}
        </Btn>
        <Btn onClick={() => setPeriod("pm")} color={period === "pm" ? COLORS.blue : COLORS.border} style={{ flex: 1 }}>
          🌙 PM {pmSubmitted && "✅"}
        </Btn>
      </div>

      {isSubmitted ? (
        <Card style={{ textAlign: "center", padding: 24 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
          <h3 style={{ color: COLORS.text, fontSize: 16 }}>{period.toUpperCase()} Route Submitted</h3>
        </Card>
      ) : (
        <>
          {activeStops.map((stop, idx) => (
            <Card key={stop.id} style={{ marginBottom: 8, borderLeft: `3px solid ${stop.type === "base" ? COLORS.accent : stop.dropoff ? COLORS.red : COLORS.blue}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: COLORS.textMuted }}>#{idx + 1}</span>
                    {stop.label && <Badge color={stop.type === "base" ? COLORS.accent : COLORS.yellow}>{stop.label}</Badge>}
                    {stop.dropoff && <Badge color={COLORS.red}>Drop-off</Badge>}
                    {stop.time && <span style={{ color: COLORS.yellow, fontSize: 12, fontWeight: 700 }}>{stop.time}</span>}
                  </div>
                  <p style={{ color: COLORS.text, fontSize: 13, margin: "2px 0 0", lineHeight: 1.4 }}>{stop.address}</p>
                  <MapsLink address={stop.address} label="Navigate" />
                  {timestamps[stop.id] && <span style={{ color: COLORS.textMuted, fontSize: 11, display: "block", marginTop: 2 }}>⏱ {timestamps[stop.id]}</span>}
                </div>
                {stop.type === "base" && (
                  <Btn small onClick={() => handleBaseToggle(stop.id)}
                    color={baseStarted[stop.id] ? COLORS.accent : COLORS.border}>
                    {baseStarted[stop.id] ? "✓ Done" : "Start"}
                  </Btn>
                )}
              </div>
              {stop.clients?.length > 0 && (
                <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${COLORS.border}` }}>
                  {stop.clients.map(cl => {
                    const client = driverRoute.clients.find(c => c.name === cl);
                    if (client && !client.active) return null;
                    const key = `${period}_${cl}`;
                    const isAbsent = absentClients[cl];
                    return (
                      <div key={cl} style={{ padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div style={{ flex: 1 }}>
                            <span style={{ color: COLORS.text, fontSize: 13, fontWeight: 600 }}>{cl}</span>
                            {isAbsent && <Badge color={COLORS.red}>Absent</Badge>}
                            {client?.address && (
                              <div style={{ marginTop: 2 }}>
                                <span style={{ color: COLORS.textMuted, fontSize: 11 }}>{client.address}</span>
                                <MapsLink address={client.address} label="Home" />
                              </div>
                            )}
                            {/* Day program address from the dropoff stop */}
                            {!stop.dropoff && (() => {
                              const dropStop = (period === "am" ? driverRoute.amStops : driverRoute.pmStops).find(s => s.dropoff && s.clients.includes(cl));
                              return dropStop ? (
                                <div style={{ marginTop: 2 }}>
                                  <span style={{ color: COLORS.textDim, fontSize: 11 }}>→ {dropStop.label || dropStop.address}</span>
                                  <MapsLink address={dropStop.address} label="Program" />
                                </div>
                              ) : null;
                            })()}
                            {timestamps[key] && <span style={{ color: COLORS.textMuted, fontSize: 10, display: "block", marginTop: 2 }}>⏱ {timestamps[key]}</span>}
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "flex-end" }}>
                            <Toggle on={!!clientStatus[key]} onChange={() => handleClientToggle(cl)} />
                            {clientStatus[key] === false || !clientStatus[key] ? (
                              <button onClick={() => handleAbsentToggle(cl)} style={{
                                background: isAbsent ? COLORS.red + "22" : "transparent", border: `1px solid ${isAbsent ? COLORS.red : COLORS.border}`,
                                borderRadius: 4, padding: "2px 6px", fontSize: 10, color: isAbsent ? COLORS.red : COLORS.textMuted, cursor: "pointer",
                              }}>
                                {isAbsent ? "Absent ✓" : "Mark Absent"}
                              </button>
                            ) : null}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
          ))}

          <Card style={{ marginTop: 12, background: COLORS.cardHover }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ color: COLORS.textDim, fontSize: 13 }}>Est. Route Miles</span>
              <span style={{ color: COLORS.text, fontSize: 16, fontWeight: 700 }}>
                {period === "am" ? driverRoute.amMiles : driverRoute.pmMiles} mi
              </span>
            </div>
          </Card>

          {/* Signature for current period */}
          {(() => {
            const sig = period === "am" ? amSignature : pmSignature;
            const setSig = period === "am" ? setAmSignature : setPmSignature;
            return sig ? (
              <Card style={{ marginTop: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <h4 style={{ color: COLORS.accent, fontSize: 14, margin: 0 }}>✍️ Signed</h4>
                  <Btn small outline onClick={() => setSig(null)} color={COLORS.textMuted}>Redo</Btn>
                </div>
                <img src={sig} alt="sig" style={{ width: "100%", height: 60, objectFit: "contain", border: `1px solid ${COLORS.border}`, borderRadius: 6 }} />
              </Card>
            ) : (
              <SignaturePad label={`Driver Signature — ${period.toUpperCase()} Route`} onSave={setSig} />
            );
          })()}

          <Btn onClick={period === "am" ? handleSubmitAM : handleSubmitPM}
            disabled={period === "am" ? (!startOdo || !amSignature) : (!endOdo || !pmSignature)}
            color={period === "am" ? COLORS.accent : COLORS.blue}
            style={{ width: "100%", marginTop: 12, padding: "14px 0", fontSize: 16 }}>
            Submit {period.toUpperCase()} Route Log
          </Btn>
        </>
      )}

      {/* PM Summary Modal */}
      {showPmSummary && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16, overflow: "auto" }}>
          <Card style={{ width: "100%", maxWidth: 420, maxHeight: "85vh", overflow: "auto" }}>
            <h3 style={{ color: COLORS.text, margin: "0 0 4px", fontSize: 16 }}>📋 Daily Summary — {driverRoute.name}</h3>
            <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 4px" }}>{today} · Driver: {displayDriver}</p>
            <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 16px" }}>Odometer: {startOdo} → {endOdo} ({endOdo && startOdo ? endOdo - startOdo : "—"} mi)</p>

            <h4 style={{ color: COLORS.accent, fontSize: 13, margin: "0 0 8px" }}>✅ Clients Who Went Today</h4>
            {allActiveClients.filter(c => clientStatus[`am_${c.name}`] || clientStatus[`pm_${c.name}`]).length === 0 ? (
              <p style={{ color: COLORS.textMuted, fontSize: 12, marginBottom: 12 }}>No clients marked as picked up.</p>
            ) : (
              allActiveClients.filter(c => clientStatus[`am_${c.name}`] || clientStatus[`pm_${c.name}`]).map(c => (
                <div key={c.name} style={{ padding: "6px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                  <span style={{ color: COLORS.text, fontSize: 13 }}>{c.name}</span>
                  <span style={{ color: COLORS.accent, fontSize: 11, marginLeft: 8 }}>✓ Present</span>
                </div>
              ))
            )}

            <h4 style={{ color: COLORS.red, fontSize: 13, margin: "16px 0 8px" }}>❌ Absent Clients (driver went to address)</h4>
            {allActiveClients.filter(c => absentClients[c.name]).length === 0 ? (
              <p style={{ color: COLORS.textMuted, fontSize: 12, marginBottom: 12 }}>No absent clients.</p>
            ) : (
              allActiveClients.filter(c => absentClients[c.name]).map(c => (
                <div key={c.name} style={{ padding: "6px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                  <span style={{ color: COLORS.text, fontSize: 13 }}>{c.name}</span>
                  <Badge color={COLORS.red}>Absent — Mileage counted</Badge>
                </div>
              ))
            )}

            <h4 style={{ color: COLORS.textMuted, fontSize: 13, margin: "16px 0 8px" }}>⚪ Not On Route Today</h4>
            {allActiveClients.filter(c => !clientStatus[`am_${c.name}`] && !clientStatus[`pm_${c.name}`] && !absentClients[c.name]).map(c => (
              <div key={c.name} style={{ padding: "6px 0", borderBottom: `1px solid ${COLORS.border}`, opacity: 0.5 }}>
                <span style={{ color: COLORS.text, fontSize: 13 }}>{c.name}</span>
              </div>
            ))}

            <div style={{ display: "flex", gap: 8, marginTop: 20 }}>
              <Btn onClick={confirmPmSubmit} color={COLORS.accent} style={{ flex: 1 }}>Confirm & Submit</Btn>
              <Btn outline onClick={() => setShowPmSummary(false)} style={{ flex: 1 }}>Go Back</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );

  // MAIN DRIVER DASHBOARD
  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }}>
      <div style={{ maxWidth: 500, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
          <h2 style={{ color: COLORS.text, margin: 0, fontSize: 20 }}>📋 {driverRoute.name}</h2>
          <Badge>{displayDriver}</Badge>
        </div>
        <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 12px" }}>
          {today}
          {isManager && <span style={{ color: COLORS.yellow, marginLeft: 8 }}> (Manager Override)</span>}
        </p>

        {/* Two widget buttons */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <Btn onClick={() => setActiveView("log")}
            color={activeView === "log" ? COLORS.accent : COLORS.border}
            style={{ flex: 1, padding: "16px 8px", display: "flex", flexDirection: "column", alignItems: "center" }}>
            <span style={{ fontSize: 20, marginBottom: 4 }}>📋</span>
            <span style={{ fontSize: 13 }}>Mileage Log</span>
          </Btn>
          <Btn onClick={() => setActiveView("inspection")}
            color={activeView === "inspection" ? COLORS.yellow : flashInspection ? "transparent" : COLORS.border}
            style={{
              flex: 1, padding: "16px 8px", display: "flex", flexDirection: "column", alignItems: "center",
              ...(flashInspection && !inspectionDone ? {
                animation: "flashRed 1s infinite",
                border: `2px solid ${COLORS.red}`,
                background: COLORS.red + "15",
              } : {}),
            }}>
            <span style={{ fontSize: 20, marginBottom: 4 }}>{inspectionDone ? "✅" : "🔍"}</span>
            <span style={{ fontSize: 13 }}>{inspectionDone ? "Inspection ✓" : "Inspection"}</span>
            {flashInspection && !inspectionDone && <span style={{ fontSize: 10, color: COLORS.red, fontWeight: 700 }}>OVERDUE</span>}
          </Btn>
        </div>

        {/* Flash animation style */}
        {flashInspection && !inspectionDone && (
          <style>{`@keyframes flashRed { 0%,100% { border-color: ${COLORS.red}; background: ${COLORS.red}15; } 50% { border-color: ${COLORS.red}88; background: ${COLORS.red}30; } }`}</style>
        )}

        {activeView === "log" ? renderLog() : (
          <VehicleInspection embedded user={user} onComplete={(data) => { setInspectionDone(true); setActiveView("log"); if (onInspectionComplete) onInspectionComplete(data); }} />
        )}
      </div>
    </div>
  );
};

// ============ ADMIN / MANAGER DASHBOARD ============
const AdminDashboard = ({ user, routes, setRoutes, users, setUsers, logs }) => {
  const [tab, setTab] = useState("routes");
  const [selectedRoute, setSelectedRoute] = useState(null);
  const [editPeriod, setEditPeriod] = useState("am");

  // Add Client form state
  const [showAddClient, setShowAddClient] = useState(false);
  const [newClient, setNewClient] = useState({ name: "", address: "", uci: "", routeId: "" });

  // Add Driver form state
  const [showAddDriver, setShowAddDriver] = useState(false);
  const [newDriver, setNewDriver] = useState({ name: "", username: "", password: "", role: "driver" });

  // Add Stop form state
  const [showAddStop, setShowAddStop] = useState(false);
  const [newStop, setNewStop] = useState({ type: "pickup", label: "", address: "", time: "", clients: "", dropoff: false });

  // Edit user state
  const [showEditUser, setShowEditUser] = useState(false);
  const [editUser, setEditUser] = useState(null);

  // Edit client/participant state
  const [editClientData, setEditClientData] = useState(null); // { routeId, client }

  // Client filter state
  const [clientFilterRoute, setClientFilterRoute] = useState('all');

  // Client status modal state
  const [clientModal, setClientModal] = useState(null); // { routeId, clientName }
  const [returnDate, setReturnDate] = useState("");

  // Stop status modal state
  const [stopModal, setStopModal] = useState(null); // { routeId, period, stopId, clients }
  const [stopReturnDate, setStopReturnDate] = useState("");

  // Sequence change confirmation (once per AM, once per PM per route)
  const [seqConfirmed, setSeqConfirmed] = useState({}); // { "routeId_am": true, "routeId_pm": true }

  // Pending (unsaved) stop order changes — { "routeId_am": [...stops], "routeId_pm": [...stops] }
  const [pendingStops, setPendingStops] = useState({});
  // Confirm-save modal state
  const [saveConfirm, setSaveConfirm] = useState(null); // { routeId, period }

  // Master participants modal state
  const [archiveConfirm, setArchiveConfirm] = useState(null); // { participant, affectedRoutes }
  const [archiveDone, setArchiveDone] = useState(null);       // { name, affectedRoutes }

  // Driver reassignment
  const allDriversAndManagers = users.filter(u => u.role === "driver" || u.role === "manager" || u.role === "admin");
  const handleReassignDriver = (routeId, newDriverName) => {
    if (!confirm(`Reassign this route to ${newDriverName}?`)) return;
    setRoutes(prev => prev.map(r => r.id === routeId ? { ...r, driver: newDriverName } : r));
  };

  const tabs = [
    { id: "routes", label: "Routes", icon: "🗺️" },
    { id: "clients", label: "Clients", icon: "👥" },
    { id: "participants", label: "Participants", icon: "📋" },
    { id: "schedule", label: "Schedule", icon: "📅" },
    { id: "mileage", label: "Mileage", icon: "📊" },
    { id: "logs", label: "Logs", icon: "📋" },
    { id: "inspect", label: "Inspections", icon: "🔍" },
    { id: "users", label: "Users", icon: "🔑" },
    { id: "reports", label: "Reports", icon: "📥" },
  ];

  // When toggling client OFF → show modal; when toggling ON → just activate
  const handleClientToggle = (routeId, clientName) => {
    const route = routes.find(r => r.id === routeId);
    const client = route?.clients.find(c => c.name === clientName);
    if (!client) return;
    if (!client.active || client.status === "archived" || client.status === "inactive") {
      // Reactivate
      setRoutes(prev => prev.map(r => {
        if (r.id !== routeId) return r;
        return { ...r, clients: r.clients.map(c => c.name === clientName ? { ...c, active: true, status: "active", returnDate: "" } : c) };
      }));
    } else {
      // Show modal for deactivation options
      setClientModal({ routeId, clientName });
      setReturnDate("");
    }
  };

  // Client status actions from modal
  const handleClientInactiveWithDate = () => {
    if (!returnDate) return alert("Please enter a return date");
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "inactive", returnDate } : c) };
    }));
    setClientModal(null);
    setReturnDate("");
  };

  const handleClientInactiveNoDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "inactive", returnDate: "" } : c) };
    }));
    setClientModal(null);
  };

  const handleClientArchive = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "archived", returnDate: "" } : c) };
    }));
    setClientModal(null);
  };

  // Swap stop positions in LOCAL draft (not saved yet)
  const handleSequenceChange = (routeId, period, fromIndex, newSeqNum) => {
    const toIndex = newSeqNum - 1;
    const key = `${routeId}_${period}`;
    const route = routes.find(r => r.id === routeId);
    if (!route) return;
    const stopsKey = period === "am" ? "amStops" : "pmStops";
    // Use pending draft if exists, otherwise use live stops
    const currentStops = pendingStops[key] ? [...pendingStops[key]] : [...route[stopsKey]];
    if (toIndex < 0 || toIndex >= currentStops.length || toIndex === fromIndex) return;
    const [moved] = currentStops.splice(fromIndex, 1);
    currentStops.splice(toIndex, 0, moved);
    setPendingStops(prev => ({ ...prev, [key]: currentStops }));
  };

  // Save pending sequence changes after confirmation
  const handleSavePendingStops = (routeId, period) => {
    const key = `${routeId}_${period}`;
    if (!pendingStops[key]) return;
    const stopsKey = period === "am" ? "amStops" : "pmStops";
    setRoutes(prev => prev.map(r => r.id !== routeId ? r : { ...r, [stopsKey]: pendingStops[key] }));
    setPendingStops(prev => { const n = {...prev}; delete n[key]; return n; });
    setSaveConfirm(null);
  };

  const handleDiscardPendingStops = (routeId, period) => {
    const key = `${routeId}_${period}`;
    setPendingStops(prev => { const n = {...prev}; delete n[key]; return n; });
    setSaveConfirm(null);
  };

  // Toggle stop active/inactive — show modal when deactivating
  const handleStopToggle = (routeId, period, stop) => {
    if (stop.inactive) {
      // Reactivate
      setRoutes(prev => prev.map(r => {
        if (r.id !== routeId) return r;
        const key = period === "am" ? "amStops" : "pmStops";
        return { ...r, [key]: r[key].map(s => s.id === stop.id ? { ...s, inactive: false, stopStatus: "active", stopReturnDate: "" } : s) };
      }));
    } else {
      // Show modal
      setStopModal({ routeId, period, stopId: stop.id, label: stop.label || stop.address, clients: stop.clients });
      setStopReturnDate("");
    }
  };

  const handleStopInactiveWithDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "inactive", stopReturnDate } : s) };
    }));
    setStopModal(null);
  };

  const handleStopInactiveNoDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "inactive", stopReturnDate: "" } : s) };
    }));
    setStopModal(null);
  };

  const handleStopArchive = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "archived", stopReturnDate: "" } : s) };
    }));
    setStopModal(null);
  };

  // Add a new client to a route
  const handleAddClient = () => {
    if (!newClient.name || !newClient.address || !newClient.routeId) return alert("Name, address, and route are required");
    setRoutes(prev => prev.map(r => {
      if (r.id !== newClient.routeId) return r;
      return { ...r, clients: [...r.clients, { name: newClient.name, address: newClient.address, uci: newClient.uci, active: true, status: "active" }] };
    }));
    setNewClient({ name: "", address: "", uci: "", routeId: "" });
    setShowAddClient(false);
  };

  // Remove client from route
  const handleRemoveClient = (routeId, clientName) => {
    if (!confirm(`Remove ${clientName} from route? This will also remove them from all stops.`)) return;
    setRoutes(prev => prev.map(r => {
      if (r.id !== routeId) return r;
      return {
        ...r,
        clients: r.clients.filter(c => c.name !== clientName),
        amStops: r.amStops.map(s => ({ ...s, clients: s.clients.filter(c => c !== clientName) })).filter(s => s.type === "base" || s.clients.length > 0),
        pmStops: r.pmStops.map(s => ({ ...s, clients: s.clients.filter(c => c !== clientName) })).filter(s => s.type === "base" || s.clients.length > 0),
      };
    }));
  };

  // Add a new driver
  const handleAddDriver = () => {
    if (!newDriver.name || !newDriver.username || !newDriver.password) return alert("All fields are required");
    if (users.find(u => u.username === newDriver.username)) return alert("Username already exists");
    setUsers(prev => [...prev, { id: `usr_${Date.now()}`, ...newDriver }]);
    setNewDriver({ name: "", username: "", password: "", role: "driver" });
    setShowAddDriver(false);
  };

  // Remove driver
  const handleRemoveUser = (userId) => {
    const u = users.find(x => x.id === userId);
    if (u.role === "admin" && users.filter(x => x.role === "admin").length <= 1) return alert("Cannot remove the last admin");
    if (!confirm(`Remove user ${u.name}?`)) return;
    setUsers(prev => prev.filter(x => x.id !== userId));
  };

  // Add a new stop to route
  const handleAddStop = () => {
    if (!newStop.address) return alert("Address is required");
    const clientList = newStop.clients ? newStop.clients.split(",").map(c => c.trim()).filter(Boolean) : [];
    const stopId = `s_${Date.now()}`;
    const stopObj = {
      id: stopId, type: newStop.type, address: newStop.address, time: newStop.time,
      clients: clientList, label: newStop.label || "", dropoff: newStop.type === "dropoff",
    };
    setRoutes(prev => prev.map(r => {
      if (r.id !== selectedRoute) return r;
      const key = editPeriod === "am" ? "amStops" : "pmStops";
      const stops = [...r[key]];
      // Insert before last base stop
      const lastBaseIdx = stops.length - 1;
      stops.splice(lastBaseIdx, 0, stopObj);
      return { ...r, [key]: stops };
    }));
    setNewStop({ type: "pickup", label: "", address: "", time: "", clients: "", dropoff: false });
    setShowAddStop(false);
  };

  const totalClients = routes.reduce((sum, r) => sum + r.clients.length, 0);
  const activeClients = routes.reduce((sum, r) => sum + r.clients.filter(c => c.active).length, 0);

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <h1 style={{ color: COLORS.text, margin: 0, fontSize: 22, fontWeight: 800, display: "flex", alignItems: "center", gap: 8 }}><KTSLogoSmall /> KTS Dashboard</h1>
            <p style={{ color: COLORS.textDim, fontSize: 12, margin: "2px 0 0" }}>
              {user.name} · <Badge color={user.role === "admin" ? COLORS.red : COLORS.yellow}>{user.role}</Badge>
            </p>
          </div>
          <div style={{ textAlign: "right" }}>
            <p style={{ color: COLORS.textDim, fontSize: 11, margin: 0 }}>{new Date().toLocaleDateString()}</p>
          </div>
        </div>

        {/* Summary Cards */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 8, marginBottom: 16 }}>
          {[
            { label: "Routes", value: routes.length, color: COLORS.accent },
            { label: "Active Clients", value: `${activeClients}/${totalClients}`, color: COLORS.blue },
            { label: "Drivers", value: users.filter(u => u.role === "driver").length, color: COLORS.yellow },
            { label: "Today Miles", value: routes.reduce((s, r) => s + r.amMiles + r.pmMiles, 0).toFixed(0), color: COLORS.accentLight },
          ].map(s => (
            <Card key={s.label} style={{ textAlign: "center", padding: 12 }}>
              <p style={{ color: s.color, fontSize: 22, fontWeight: 800, margin: 0 }}>{s.value}</p>
              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "2px 0 0" }}>{s.label}</p>
            </Card>
          ))}
        </div>

        <TabBar tabs={tabs} active={tab} onChange={setTab} />

        <div style={{ marginTop: 16 }}>
          {/* ROUTES TAB */}
          {tab === "routes" && (
            <div>
              {!selectedRoute ? (
                routes.map(route => (
                  <Card key={route.id} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ flex: 1, cursor: "pointer" }} onClick={() => setSelectedRoute(route.id)}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <h3 style={{ color: COLORS.text, margin: 0, fontSize: 16 }}>{route.name}</h3>
                        </div>
                        <p style={{ color: COLORS.textDim, fontSize: 12, margin: "4px 0 0" }}>
                          {route.clients.filter(c => c.active).length} active clients · Vehicle: {route.vehicleId}
                        </p>
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                        <select value={route.driver} onChange={(e) => handleReassignDriver(route.id, e.target.value)}
                          onClick={(e) => e.stopPropagation()}
                          style={{ padding: "4px 24px 4px 8px", fontSize: 12, fontWeight: 600, borderRadius: 6,
                            border: `1px solid ${COLORS.accent}`, background: COLORS.accent + "15", color: COLORS.accent,
                            cursor: "pointer", maxWidth: 140 }}>
                          {allDriversAndManagers.map(u => (
                            <option key={u.id} value={u.name}>{u.name}</option>
                          ))}
                        </select>
                        <p style={{ color: COLORS.accent, fontSize: 13, fontWeight: 700, margin: 0 }}>
                          {(route.amMiles + route.pmMiles).toFixed(1)} mi
                        </p>
                      </div>
                    </div>
                  </Card>
                ))
              ) : (
                (() => {
                  const route = routes.find(r => r.id === selectedRoute);
                  const renderStops = (stops, period, color) => {
                    const pendingKey = `${route.id}_${period}`;
                    const displayStops = pendingStops[pendingKey] || stops;
                    const hasPending = !!pendingStops[pendingKey];
                    return (
                    <div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", margin:"14px 0 10px" }}>
                        <h4 style={{ color, fontSize:14, margin:0, fontWeight:800 }}>
                          {period==="am" ? "☀️ AM Route" : "🌙 PM Route"}
                          {hasPending && <span style={{ color:COLORS.yellow, fontSize:11, marginLeft:8, fontWeight:600 }}>● Unsaved changes</span>}
                        </h4>
                        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                          <span style={{ color:COLORS.textMuted, fontSize:11 }}>{displayStops.length} stops</span>
                          <Btn small color={color} onClick={()=>{ setEditPeriod(period); setShowAddStop(true); }}>+ Add Stop</Btn>
                        </div>
                      </div>
                      {displayStops.map((s, i) => {
                        const clientsWithPrograms = (s.clients||[]).map(cName => {
                          const cl = route.clients.find(c=>c.name===cName);
                          return { name:cName, dayProgram:cl?.dayProgram||'', dropoffAddress:cl?.dropoffAddress||'' };
                        });
                        return (
                          <div key={s.id} style={{
                            marginBottom:6, opacity:s.inactive?0.45:1,
                            background:s.inactive?'#fff8f8':s.type==="base"?'#f0fdf4':COLORS.card,
                            borderRadius:10,
                            border:`1px solid ${s.inactive?COLORS.red+'44':s.type==="base"?color+'44':COLORS.border}`,
                            overflow:'hidden',
                          }}>
                            <div style={{ display:"flex", alignItems:"stretch" }}>
                              {/* Sequence Number */}
                              <div style={{ minWidth:48, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                                background:s.type==="base"?color:s.dropoff?'#fef2f2':'#eff6ff', padding:"10px 4px", gap:4 }}>
                                <select value={i+1}
                                  onChange={e=>handleSequenceChange(route.id, period, i, parseInt(e.target.value))}
                                  style={{ width:36, height:36, textAlign:"center", textAlignLast:"center",
                                    fontSize:15, fontWeight:800,
                                    background:s.type==="base"?'rgba(255,255,255,0.3)':'white',
                                    border:`2px solid ${s.type==="base"?'rgba(255,255,255,0.5)':color}`,
                                    borderRadius:8, color:s.type==="base"?'#fff':color,
                                    cursor:"pointer", appearance:"none", WebkitAppearance:"none" }}>
                                  {displayStops.map((_,idx)=><option key={idx} value={idx+1}>{idx+1}</option>)}
                                </select>
                                <span style={{ fontSize:9, color:s.type==="base"?'rgba(255,255,255,0.8)':COLORS.textMuted, textTransform:"uppercase" }}>order</span>
                              </div>
                              {/* Stop Content */}
                              <div style={{ flex:1, padding:"10px 10px 10px 12px", minWidth:0 }}>
                                <div style={{ display:"flex", alignItems:"center", gap:5, flexWrap:"wrap", marginBottom:4 }}>
                                  {s.type==="base" && <Badge color={color}>🏠 Base</Badge>}
                                  {s.dropoff && <Badge color={COLORS.red}>⬇ Drop-off</Badge>}
                                  {!s.dropoff && s.type!=="base" && <Badge color={COLORS.blue}>⬆ Pickup</Badge>}
                                  {s.label && <Badge color={COLORS.yellow}>{s.label}</Badge>}
                                  {s.time && <span style={{ color:COLORS.yellow, fontSize:12, fontWeight:700 }}>🕐 {s.time}</span>}
                                  {s.inactive && <Badge color={COLORS.red}>Inactive</Badge>}
                                  {s.stopReturnDate && <span style={{ color:COLORS.yellow, fontSize:11 }}>📅 Returns {s.stopReturnDate}</span>}
                                </div>
                                <p style={{ color:COLORS.text, fontSize:13, margin:"2px 0", fontWeight:600, lineHeight:1.3 }}>{s.address}</p>
                                {s.clients?.length>0 && (
                                  <div style={{ marginTop:6 }}>
                                    {clientsWithPrograms.map(cp=>(
                                      <div key={cp.name} style={{ marginBottom:4, padding:"5px 8px",
                                        background:s.dropoff?'#fef2f2':'#eff6ff', borderRadius:6,
                                        borderLeft:`3px solid ${s.dropoff?COLORS.red:COLORS.blue}` }}>
                                        <p style={{ color:COLORS.text, fontSize:12, fontWeight:600, margin:0 }}>{s.dropoff?'⬇':'⬆'} {cp.name}</p>
                                        {!s.dropoff && cp.dayProgram && <p style={{ color:COLORS.accent, fontSize:11, margin:"2px 0 0" }}>📍 Drop-off: <strong>{cp.dayProgram}</strong> — {cp.dropoffAddress}</p>}
                                        {s.dropoff && (()=>{ const cl=route.clients.find(c=>c.name===cp.name); return cl?.address?<p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>🏠 Home: {cl.address}</p>:null; })()}
                                      </div>
                                    ))}
                                  </div>
                                )}
                              </div>
                              {/* Toggle */}
                              {s.type!=="base" && (
                                <div style={{ display:"flex", alignItems:"center", padding:"0 10px", flexShrink:0 }}>
                                  <Toggle on={!s.inactive} onChange={()=>handleStopToggle(route.id, period, s)} />
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      {/* Save/Discard bar */}
                      <div style={{ marginTop:10, padding:"10px 0", borderTop:`1px dashed ${COLORS.border}` }}>
                        {hasPending ? (
                          <div style={{ display:"flex", gap:8 }}>
                            <Btn onClick={()=>setSaveConfirm({routeId:route.id, period})}
                              style={{ flex:1, fontWeight:700 }}>💾 Save {period.toUpperCase()} Order</Btn>
                            <Btn outline onClick={()=>handleDiscardPendingStops(route.id, period)} style={{ flex:1 }}>✕ Discard</Btn>
                          </div>
                        ) : (
                          <p style={{ color:COLORS.textMuted, fontSize:11, textAlign:"center", margin:0 }}>
                            ✓ {period.toUpperCase()} order saved — change a number above to reorder
                          </p>
                        )}
                      </div>
                    </div>
                    );
                  };


                  return (
                    <div>
                      <Btn small outline onClick={() => setSelectedRoute(null)} style={{ marginBottom: 12 }}>← Back to Routes</Btn>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                        <h3 style={{ color: COLORS.text, margin: 0 }}>{route.name}</h3>
                        <span style={{ color: COLORS.textMuted }}>—</span>
                        <select value={route.driver} onChange={(e) => handleReassignDriver(route.id, e.target.value)}
                          style={{ padding: "4px 24px 4px 8px", fontSize: 13, fontWeight: 600, borderRadius: 6,
                            border: `1px solid ${COLORS.accent}`, background: COLORS.accent + "15", color: COLORS.accent, cursor: "pointer" }}>
                          {allDriversAndManagers.map(u => (
                            <option key={u.id} value={u.name}>{u.name}</option>
                          ))}
                        </select>
                      </div>
                      <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 8px" }}>Vehicle: {route.vehicleId} · Change a sequence number, then hit Save to apply.</p>

                      {renderStops(route.amStops, "am", COLORS.accent)}
                      {renderStops(route.pmStops, "pm", COLORS.blue)}

                      {/* Save Order Confirmation Modal */}
                      {saveConfirm && saveConfirm.routeId === route.id && (
                        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                          <Card style={{ width:"100%", maxWidth:380 }}>
                            <h3 style={{ color: COLORS.text, margin:"0 0 8px" }}>💾 Confirm Sequence Change</h3>
                            <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 6px" }}>
                              You are updating the <strong>{saveConfirm.period.toUpperCase()} route</strong> stop order for:
                            </p>
                            <p style={{ color: COLORS.accent, fontWeight:700, fontSize:14, margin:"0 0 16px" }}>{route.name}</p>
                            <p style={{ color: COLORS.textMuted, fontSize:12, margin:"0 0 20px" }}>
                              This will permanently change the pickup/drop-off sequence. Drivers will see the new order immediately.
                            </p>
                            <div style={{ display:"flex", gap:8 }}>
                              <Btn onClick={() => handleSavePendingStops(route.id, saveConfirm.period)}
                                style={{ flex:1, background: COLORS.accent, color:'#fff', fontWeight:700 }}>
                                ✓ Proceed
                              </Btn>
                              <Btn outline onClick={() => setSaveConfirm(null)} style={{ flex:1 }}>Cancel</Btn>
                            </div>
                          </Card>
                        </div>
                      )}

                      {/* Add Stop Modal */}
                      {showAddStop && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                          <Card style={{ width: "100%", maxWidth: 420 }}>
                            <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>Add Stop to {editPeriod.toUpperCase()} Route</h3>
                            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                              <Btn small onClick={() => setNewStop(p => ({ ...p, type: "pickup", dropoff: false }))}
                                color={newStop.type === "pickup" ? COLORS.blue : COLORS.border}>Pickup</Btn>
                              <Btn small onClick={() => setNewStop(p => ({ ...p, type: "dropoff", dropoff: true }))}
                                color={newStop.type === "dropoff" ? COLORS.red : COLORS.border}>Drop-off</Btn>
                            </div>
                            <Input label="Label (e.g. PCS, CVTC)" value={newStop.label} onChange={e => setNewStop(p => ({ ...p, label: e.target.value }))} placeholder="Optional label" />
                            <Input label="Address *" value={newStop.address} onChange={e => setNewStop(p => ({ ...p, address: e.target.value }))} placeholder="Full address" />
                            <Input label="Time" value={newStop.time} onChange={e => setNewStop(p => ({ ...p, time: e.target.value }))} placeholder="e.g. 8:00 AM" />
                            <Input label="Clients (comma separated)" value={newStop.clients} onChange={e => setNewStop(p => ({ ...p, clients: e.target.value }))} placeholder="e.g. John Smith, Jane Doe" />
                            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                              <Btn onClick={handleAddStop} style={{ flex: 1 }}>Add Stop</Btn>
                              <Btn outline onClick={() => setShowAddStop(false)} style={{ flex: 1 }}>Cancel</Btn>
                            </div>
                          </Card>
                        </div>
                      )}

                      {/* Stop Status Modal */}
                      {stopModal && stopModal.routeId === route.id && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                          <Card style={{ width: "100%", maxWidth: 420 }}>
                            <h3 style={{ color: COLORS.text, margin: "0 0 6px" }}>Remove Stop from Route</h3>
                            <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 4px" }}>{stopModal.label}</p>
                            {stopModal.clients?.length > 0 && <p style={{ color: COLORS.textMuted, fontSize: 12, margin: "0 0 16px" }}>Clients: {stopModal.clients.join(", ")}</p>}
                            <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 16px" }}>Is there a return date?</p>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.yellow}44`, padding: 14 }}>
                              <p style={{ color: COLORS.yellow, fontSize: 13, fontWeight: 700, margin: "0 0 8px" }}>📅 Yes — Set a return date</p>
                              <input type="date" value={stopReturnDate} onChange={e => setStopReturnDate(e.target.value)}
                                style={{ width: "100%", padding: "10px 12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                                  borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box", marginBottom: 8 }} />
                              <Btn onClick={handleStopInactiveWithDate} color={COLORS.yellow} disabled={!stopReturnDate}
                                style={{ width: "100%" }}>Set Return Date & Deactivate</Btn>
                            </Card>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.blue}44`, padding: 14 }}>
                              <p style={{ color: COLORS.blue, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>⏸ No return date — Temporarily off route</p>
                              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Stop stays on route list but is skipped until reactivated.</p>
                              <Btn onClick={handleStopInactiveNoDate} color={COLORS.blue} style={{ width: "100%" }}>Deactivate Without Date</Btn>
                            </Card>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.red}44`, padding: 14 }}>
                              <p style={{ color: COLORS.red, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>📦 Deactivate & Archive</p>
                              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Stop is fully deactivated and archived. Can be reactivated later.</p>
                              <Btn onClick={handleStopArchive} color={COLORS.red} style={{ width: "100%" }}>Archive Stop</Btn>
                            </Card>

                            <Btn outline onClick={() => setStopModal(null)} style={{ width: "100%", marginTop: 4 }}>Cancel</Btn>
                          </Card>
                        </div>
                      )}
                    </div>
                  );
                })()
              )}
            </div>
          )}

          {/* CLIENTS / PARTICIPANTS TAB */}
          {tab === "clients" && (
            <div>
              {/* Route filter */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  <p style={{ color: COLORS.textDim, fontSize:12, margin:0, fontWeight:600 }}>FILTER:</p>
                  {[{id:'all',name:'All Routes'}, ...routes].map(r => (
                    <button key={r.id||'all'} onClick={() => setClientFilterRoute(r.id||'all')}
                      style={{ padding:"4px 10px", borderRadius:20, border:`1px solid ${clientFilterRoute===(r.id||'all') ? COLORS.accent : COLORS.border}`,
                        background: clientFilterRoute===(r.id||'all') ? COLORS.accent : 'transparent',
                        color: clientFilterRoute===(r.id||'all') ? '#fff' : COLORS.textMuted,
                        fontSize:11, cursor:"pointer", fontWeight:600 }}>
                      {r.name}
                    </button>
                  ))}
                </div>
                <Btn small onClick={() => setShowAddClient(true)}>+ Add Participant</Btn>
              </div>

              {/* Stats bar */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:16 }}>
                {[
                  { label:"Total", value: routes.reduce((s,r)=>s+r.clients.length,0), color: COLORS.accent },
                  { label:"Active", value: routes.reduce((s,r)=>s+r.clients.filter(c=>c.active&&c.status!=='archived').length,0), color:"#166534" },
                  { label:"Inactive/Archived", value: routes.reduce((s,r)=>s+r.clients.filter(c=>!c.active||c.status==='archived').length,0), color: COLORS.red },
                ].map(s => (
                  <Card key={s.label} style={{ textAlign:"center", padding:10 }}>
                    <p style={{ color:s.color, fontSize:18, fontWeight:800, margin:0 }}>{s.value}</p>
                    <p style={{ color: COLORS.textMuted, fontSize:10, margin:"2px 0 0" }}>{s.label}</p>
                  </Card>
                ))}
              </div>

              {routes.filter(r => clientFilterRoute === 'all' || r.id === clientFilterRoute).map(route => (
                <Card key={route.id} style={{ marginBottom:14 }}>
                  {/* Route header with driver */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, paddingBottom:8, borderBottom:`2px solid ${COLORS.accent}33` }}>
                    <div>
                      <h3 style={{ color: COLORS.accent, margin:0, fontSize:15, fontWeight:700 }}>{route.name}</h3>
                      <p style={{ color: COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>Driver: {route.driver} · {route.clients.filter(c=>c.active&&c.status!=='archived').length} active participants</p>
                    </div>
                    <Btn small onClick={() => { setNewClient(p=>({...p, routeId:route.id})); setShowAddClient(true); }}>+ Add</Btn>
                  </div>

                  {/* Active participants */}
                  {route.clients.filter(c => c.status !== "archived").length === 0 && (
                    <p style={{ color: COLORS.textMuted, fontSize:12, textAlign:"center", padding:"12px 0" }}>No participants on this route</p>
                  )}
                  {route.clients.filter(c => c.status !== "archived").map(client => (
                    <div key={client.name} style={{
                      display:"flex", alignItems:"center", justifyContent:"space-between",
                      padding:"10px 0", borderBottom:`1px solid ${COLORS.border}`,
                      opacity: client.active ? 1 : 0.55,
                      background: !client.active ? '#fff8f0' : 'transparent',
                      borderRadius: !client.active ? 6 : 0,
                    }}>
                      <div style={{ flex:1, minWidth:0, paddingRight:8 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                          <p style={{ color: COLORS.text, margin:0, fontSize:14, fontWeight:600 }}>{client.name}</p>
                          {client.status === "inactive" && <Badge color={COLORS.yellow}>Inactive</Badge>}
                          {!client.active && client.returnDate && <Badge color={COLORS.yellow}>Returns {client.returnDate}</Badge>}
                        </div>
                        <p style={{ color: COLORS.textMuted, margin:"2px 0 0", fontSize:11 }}>🏠 {client.address}</p>
                        {client.dayProgram ? (
                          <p style={{ color: COLORS.accent, margin:"2px 0 0", fontSize:11, fontWeight:600 }}>
                            📍 {client.dayProgram}{client.dropoffAddress ? ` — ${client.dropoffAddress}` : ''}
                          </p>
                        ) : (
                          <p style={{ color: COLORS.textMuted, margin:"2px 0 0", fontSize:10, fontStyle:"italic" }}>No day program — tap ✏️ to add</p>
                        )}
                        {client.uci && <p style={{ color: COLORS.textDim, margin:0, fontSize:10 }}>UCI: {client.uci}</p>}
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                        <button onClick={() => setEditClientData({ routeId: route.id, client: {...client} })}
                          title="Edit participant"
                          style={{ background:"none", border:`1px solid ${COLORS.border}`, color: COLORS.textMuted, cursor:"pointer", fontSize:12, padding:"4px 8px", borderRadius:6 }}>✏️</button>
                        <Toggle on={client.active && client.status !== 'archived'} onChange={() => handleClientToggle(route.id, client.name)} />
                        <button
                          onClick={() => { if (window.confirm(`Permanently remove ${client.name} from ${route.name}?`)) handleRemoveClient(route.id, client.name); }}
                          title="Remove participant"
                          style={{ background:"none", border:"none", color: COLORS.red, cursor:"pointer", fontSize:16, padding:"4px 6px", borderRadius:6,
                            lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                      </div>
                    </div>
                  ))}

                  {/* Archived section */}
                  {route.clients.filter(c => c.status === "archived").length > 0 && (
                    <details style={{ marginTop:8 }}>
                      <summary style={{ color: COLORS.textMuted, fontSize:12, cursor:"pointer", padding:"6px 0", userSelect:"none" }}>
                        📦 {route.clients.filter(c=>c.status==="archived").length} archived participant{route.clients.filter(c=>c.status==="archived").length>1?"s":""}
                      </summary>
                      {route.clients.filter(c => c.status === "archived").map(client => (
                        <div key={client.name} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${COLORS.border}`, opacity:0.45 }}>
                          <div>
                            <p style={{ color: COLORS.text, margin:0, fontSize:13 }}>{client.name}</p>
                            <Badge color={COLORS.red}>Archived</Badge>
                          </div>
                          <div style={{ display:"flex", gap:8 }}>
                            <Btn small color={COLORS.accent} onClick={() => setRoutes(prev => prev.map(r => r.id!==route.id?r:{...r,clients:r.clients.map(c=>c.name===client.name?{...c,active:true,status:"active",returnDate:""}:c)}))}>
                              Reactivate
                            </Btn>
                            <button onClick={() => { if(window.confirm(`Delete ${client.name}?`)) handleRemoveClient(route.id,client.name); }}
                              style={{ background:"none", border:"none", color:COLORS.red, cursor:"pointer", fontSize:14 }}>✕</button>
                          </div>
                        </div>
                      ))}
                    </details>
                  )}
                </Card>
              ))}

              {/* Client Status Modal */}
              {clientModal && (
                <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                  <Card style={{ width:"100%", maxWidth:420 }}>
                    <h3 style={{ color: COLORS.text, margin:"0 0 4px" }}>Remove from Route</h3>
                    <p style={{ color: COLORS.accent, fontWeight:700, margin:"0 0 4px" }}>{clientModal.clientName}</p>
                    <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 16px" }}>Select why this participant is being removed from the route:</p>
                    <Card style={{ marginBottom:10, border:`1px solid ${COLORS.yellow}55`, padding:14 }}>
                      <p style={{ color: COLORS.yellow, fontSize:13, fontWeight:700, margin:"0 0 8px" }}>📅 Set a Return Date</p>
                      <input type="date" value={returnDate} onChange={e => setReturnDate(e.target.value)}
                        style={{ width:"100%", padding:"10px 12px", background: COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:14, boxSizing:"border-box", marginBottom:8 }} />
                      <Btn onClick={handleClientInactiveWithDate} color={COLORS.yellow} disabled={!returnDate} style={{ width:"100%" }}>Deactivate with Return Date</Btn>
                    </Card>
                    <Card style={{ marginBottom:10, border:`1px solid ${COLORS.blue}55`, padding:14 }}>
                      <p style={{ color: COLORS.blue, fontSize:13, fontWeight:700, margin:"0 0 6px" }}>⏸ Temporarily Off Route</p>
                      <p style={{ color: COLORS.textMuted, fontSize:11, margin:"0 0 8px" }}>Stays on roster, no return date set.</p>
                      <Btn onClick={handleClientInactiveNoDate} color={COLORS.blue} style={{ width:"100%" }}>Deactivate — No Date</Btn>
                    </Card>
                    <Card style={{ marginBottom:10, border:`1px solid ${COLORS.red}55`, padding:14 }}>
                      <p style={{ color: COLORS.red, fontSize:13, fontWeight:700, margin:"0 0 6px" }}>📦 Archive Participant</p>
                      <p style={{ color: COLORS.textMuted, fontSize:11, margin:"0 0 8px" }}>Fully removed from route. Can be reactivated later.</p>
                      <Btn onClick={handleClientArchive} color={COLORS.red} style={{ width:"100%" }}>Archive</Btn>
                    </Card>
                    <Btn outline onClick={() => setClientModal(null)} style={{ width:"100%", marginTop:4 }}>Cancel</Btn>
                  </Card>
                </div>
              )}

              {/* Add Participant Modal */}
              {showAddClient && (
                <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                  <Card style={{ width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }}>
                    <h3 style={{ color: COLORS.text, margin:"0 0 16px" }}>Add New Participant</h3>
                    <Input label="Full Name *" value={newClient.name} onChange={e => setNewClient(p=>({...p,name:e.target.value}))} placeholder="e.g. Smith, John" />
                    <Input label="Home Address *" value={newClient.address} onChange={e => setNewClient(p=>({...p,address:e.target.value}))} placeholder="Participant's home address" />
                    <div style={{ background:"#eff6ff", borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
                      <p style={{ color: COLORS.blue, fontSize:12, fontWeight:700, margin:"0 0 8px" }}>📍 Day Program / Work Site</p>
                      <Input label="Program Name (e.g. PCS, CVTC, Galt Act)" value={newClient.dayProgram||''} onChange={e => setNewClient(p=>({...p,dayProgram:e.target.value}))} placeholder="e.g. PCS" />
                      <Input label="Program Address" value={newClient.dropoffAddress||''} onChange={e => setNewClient(p=>({...p,dropoffAddress:e.target.value}))} placeholder="Drop-off address" />
                    </div>
                    <Input label="UCI Number" value={newClient.uci} onChange={e => setNewClient(p=>({...p,uci:e.target.value}))} placeholder="Optional" />
                    <div style={{ marginBottom:12 }}>
                      <label style={{ display:"block", color: COLORS.textDim, fontSize:12, marginBottom:4, fontWeight:600 }}>Assign to Route *</label>
                      <select value={newClient.routeId} onChange={e => setNewClient(p=>({...p,routeId:e.target.value}))}
                        style={{ width:"100%", padding:"10px 12px", background: COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:14 }}>
                        <option value="">Select route...</option>
                        {routes.map(r => <option key={r.id} value={r.id}>{r.name} — Driver: {r.driver}</option>)}
                      </select>
                    </div>
                    <div style={{ display:"flex", gap:8, marginTop:8 }}>
                      <Btn onClick={handleAddClient} style={{ flex:1 }}>Add Participant</Btn>
                      <Btn outline onClick={() => setShowAddClient(false)} style={{ flex:1 }}>Cancel</Btn>
                    </div>
                  </Card>
                </div>
              )}

              {/* Edit Participant Modal */}
              {editClientData && (
                <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                  <Card style={{ width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }}>
                    <h3 style={{ color: COLORS.text, margin:"0 0 16px" }}>✏️ Edit Participant</h3>
                    <Input label="Full Name" value={editClientData.client.name}
                      onChange={e => setEditClientData(p=>({...p, client:{...p.client, name:e.target.value}}))} />
                    <Input label="Home Address" value={editClientData.client.address}
                      onChange={e => setEditClientData(p=>({...p, client:{...p.client, address:e.target.value}}))} />
                    <div style={{ background:"#eff6ff", borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
                      <p style={{ color: COLORS.blue, fontSize:12, fontWeight:700, margin:"0 0 8px" }}>📍 Day Program / Work Site Drop-off</p>
                      <Input label="Program Name (e.g. PCS, CVTC, Galt Act)" value={editClientData.client.dayProgram||''}
                        onChange={e => setEditClientData(p=>({...p, client:{...p.client, dayProgram:e.target.value}}))}
                        placeholder="e.g. PCS" />
                      <Input label="Program Drop-off Address" value={editClientData.client.dropoffAddress||''}
                        onChange={e => setEditClientData(p=>({...p, client:{...p.client, dropoffAddress:e.target.value}}))}
                        placeholder="Full drop-off address" />
                    </div>
                    <Input label="UCI Number" value={editClientData.client.uci||''}
                      onChange={e => setEditClientData(p=>({...p, client:{...p.client, uci:e.target.value}}))}
                      placeholder="Optional" />
                    <div style={{ marginBottom:12 }}>
                      <label style={{ display:"block", color: COLORS.textDim, fontSize:12, marginBottom:4, fontWeight:600 }}>Move to Different Route</label>
                      <select value={editClientData.routeId}
                        onChange={e => setEditClientData(p=>({...p, routeId:e.target.value}))}
                        style={{ width:"100%", padding:"10px 12px", background: COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:14 }}>
                        {routes.map(r => <option key={r.id} value={r.id}>{r.name} — {r.driver}</option>)}
                      </select>
                    </div>
                    <div style={{ display:"flex", gap:8, marginTop:8 }}>
                      <Btn onClick={() => {
                        const { routeId, client } = editClientData;
                        const origRouteId = routes.find(r => r.clients.some(c => c.name === client.name))?.id;
                        setRoutes(prev => prev.map(r => {
                          if (origRouteId && r.id === origRouteId && r.id !== routeId)
                            return { ...r, clients: r.clients.filter(c => c.name !== client.name) };
                          if (r.id === routeId) {
                            const exists = r.clients.some(c => c.name === client.name);
                            if (exists) return { ...r, clients: r.clients.map(c => c.name === client.name ? client : c) };
                            return { ...r, clients: [...r.clients, client] };
                          }
                          return r;
                        }));
                        setEditClientData(null);
                      }} style={{ flex:1 }}>Save Changes</Btn>
                      <Btn outline onClick={() => setEditClientData(null)} style={{ flex:1 }}>Cancel</Btn>
                    </div>
                  </Card>
                </div>
              )}
            </div>
          )}

          {/* MASTER PARTICIPANTS TAB */}
          {tab === "participants" && (() => {
            // Build master list — deduplicated, with all routes they appear on
            const masterMap = {};
            routes.forEach(route => {
              (route.clients || []).forEach(cl => {
                if (!masterMap[cl.name]) {
                  masterMap[cl.name] = { ...cl, routes: [] };
                }
                masterMap[cl.name].routes.push({ id: route.id, name: route.name, driver: route.driver, status: cl.status });
              });
            });
            const masterList = Object.values(masterMap).sort((a,b) => {
              const la = a.name.split(', ')[0] || a.name;
              const lb = b.name.split(', ')[0] || b.name;
              return la.localeCompare(lb);
            });
            const activeList = masterList.filter(p => !p.routes.every(r => r.status === 'archived'));
            const archivedList = masterList.filter(p => p.routes.every(r => r.status === 'archived'));

            return (
              <div>
                {/* Header */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <div>
                    <h3 style={{ color: COLORS.text, margin:0 }}>Master Participant List</h3>
                    <p style={{ color: COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>{activeList.length} active · {archivedList.length} archived</p>
                  </div>
                  <Btn small onClick={() => setShowAddClient(true)}>+ Add Participant</Btn>
                </div>

                <p style={{ color: COLORS.textDim, fontSize:11, margin:"0 0 12px", background:"#fffbeb", padding:"8px 10px", borderRadius:8, borderLeft:`3px solid ${COLORS.yellow}` }}>
                  ⚠️ Archiving a participant here removes them from <strong>all routes</strong>.
                </p>

                {/* Active participants */}
                {activeList.map(p => (
                  <Card key={p.name} style={{ marginBottom:8 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <p style={{ color: COLORS.text, margin:0, fontSize:14, fontWeight:700 }}>{p.name}</p>
                        <p style={{ color: COLORS.textMuted, margin:"2px 0 0", fontSize:11 }}>🏠 {p.address}</p>
                        {p.dayProgram && <p style={{ color: COLORS.accent, margin:"2px 0 0", fontSize:11 }}>📍 {p.dayProgram} — {p.dropoffAddress}</p>}
                        {p.uci && <p style={{ color: COLORS.textDim, margin:"2px 0 0", fontSize:10 }}>UCI: {p.uci}</p>}
                        {/* Show which routes */}
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:5 }}>
                          {p.routes.map(r => (
                            <span key={r.id} style={{
                              fontSize:10, padding:"2px 7px", borderRadius:10, fontWeight:600,
