const KTSLogo = ({ size = 64 }) => (
  <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    {/* Outer tire ring - thin wall */}
    <circle cx="50" cy="50" r="47" stroke="#333" strokeWidth="2.5" fill="none" />
    <circle cx="50" cy="50" r="42" stroke="#555" strokeWidth="1" fill="none" />
    {/* Tire tread marks around outside */}
    {[0,30,60,90,120,150,180,210,240,270,300,330].map(deg => (
      <line key={deg} x1={50 + 44 * Math.cos(deg * Math.PI/180)} y1={50 + 44 * Math.sin(deg * Math.PI/180)}
        x2={50 + 48 * Math.cos(deg * Math.PI/180)} y2={50 + 48 * Math.sin(deg * Math.PI/180)}
        stroke="#444" strokeWidth="2" strokeLinecap="round" />
    ))}
    {/* Inner compass circle */}
    <circle cx="50" cy="50" r="36" stroke={COLORS.accent} strokeWidth="1.5" fill="white" />
    <circle cx="50" cy="50" r="32" stroke={COLORS.border} strokeWidth="0.5" fill="none" />
    {/* Compass cardinal ticks */}
    {[0,90,180,270].map(deg => (
      <line key={`major${deg}`} x1={50 + 28 * Math.cos(deg * Math.PI/180)} y1={50 + 28 * Math.sin(deg * Math.PI/180)}
        x2={50 + 34 * Math.cos(deg * Math.PI/180)} y2={50 + 34 * Math.sin(deg * Math.PI/180)}
        stroke={COLORS.accent} strokeWidth="2" strokeLinecap="round" />
    ))}
    {/* Compass minor ticks */}
    {[45,135,225,315].map(deg => (
      <line key={`minor${deg}`} x1={50 + 30 * Math.cos(deg * Math.PI/180)} y1={50 + 30 * Math.sin(deg * Math.PI/180)}
        x2={50 + 34 * Math.cos(deg * Math.PI/180)} y2={50 + 34 * Math.sin(deg * Math.PI/180)}
        stroke="#bbb" strokeWidth="1" strokeLinecap="round" />
    ))}
    {/* N/S/E/W labels */}
    <text x="50" y="24" textAnchor="middle" fontSize="8" fontWeight="800" fill={COLORS.red}>N</text>
    <text x="50" y="82" textAnchor="middle" fontSize="7" fontWeight="600" fill="#888">S</text>
    <text x="80" y="53" textAnchor="middle" fontSize="7" fontWeight="600" fill="#888">E</text>
    <text x="20" y="53" textAnchor="middle" fontSize="7" fontWeight="600" fill="#888">W</text>
    {/* Compass needle - North (red) */}
    <polygon points="50,22 46,50 54,50" fill={COLORS.red} opacity="0.9" />
    {/* Compass needle - South (dark) */}
    <polygon points="50,78 46,50 54,50" fill="#333" opacity="0.7" />
    {/* Center hub */}
    <circle cx="50" cy="50" r="4" fill={COLORS.accent} />
    <circle cx="50" cy="50" r="2" fill="white" />
    {/* Rim spokes */}
    {[0,60,120,180,240,300].map(deg => (
      <line key={`spoke${deg}`} x1={50 + 5 * Math.cos(deg * Math.PI/180)} y1={50 + 5 * Math.sin(deg * Math.PI/180)}
        x2={50 + 36 * Math.cos(deg * Math.PI/180)} y2={50 + 36 * Math.sin(deg * Math.PI/180)}
        stroke={COLORS.border} strokeWidth="0.4" />
    ))}
  </svg>
);

// ============ LIVE CAMERA COMPONENT ============
const LiveCamera = ({ onCapture, onClose }) => {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [ready, setReady] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    let mounted = true;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } }, audio: false })
      .then(stream => {
        if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play();
        }
        setReady(true);
      })
      .catch(err => {
        if (mounted) setError("Camera access denied. Please allow camera permissions and try again.");
      });
    return () => { mounted = false; if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const takeSnapshot = () => {
    if (!videoRef.current) return;
    const canvas = document.createElement("canvas");
    canvas.width = videoRef.current.videoWidth;
    canvas.height = videoRef.current.videoHeight;
    canvas.getContext("2d").drawImage(videoRef.current, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onCapture(dataUrl);
  };

  const handleClose = () => {
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onClose();
  };

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000", zIndex: 300, display: "flex", flexDirection: "column" }}>
      {error ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 32 }}>
          <div style={{ textAlign: "center" }}>
            <p style={{ color: "#fff", fontSize: 16, marginBottom: 16 }}>{error}</p>
            <Btn onClick={handleClose} color={COLORS.red}>Close</Btn>
          </div>
        </div>
      ) : (
        <>
          <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
            <video ref={videoRef} autoPlay playsInline muted
              style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            {!ready && (
              <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", color: "#fff" }}>
                Loading camera...
              </div>
            )}
          </div>
          <div style={{ padding: 20, display: "flex", justifyContent: "center", gap: 24, background: "#111" }}>
            <button onClick={handleClose}
              style={{ width: 52, height: 52, borderRadius: 26, background: COLORS.red, border: "none", color: "#fff", fontSize: 20, cursor: "pointer" }}>✕</button>
            <button onClick={takeSnapshot} disabled={!ready}
              style={{
                width: 72, height: 72, borderRadius: 36, background: ready ? "#fff" : "#555",
                border: `4px solid ${ready ? COLORS.accent : "#333"}`, cursor: ready ? "pointer" : "not-allowed",
                boxShadow: ready ? "0 0 0 4px rgba(16,185,129,0.3)" : "none",
              }} />
            <div style={{ width: 52 }} /> {/* spacer */}
          </div>
        </>
      )}
    </div>
  );
};

// ============ DRIVER ROUTE LOG ============
const DriverRouteLog = ({ user, routes, onSubmit }) => {
  const driverRoute = routes.find(r => r.driver === user.name);
  const [period, setPeriod] = useState("am");
  const [startOdo, setStartOdo] = useState("");
  const [endOdo, setEndOdo] = useState("");
  const [stopStatus, setStopStatus] = useState({});
  const [clientStatus, setClientStatus] = useState({});
  const [baseStarted, setBaseStarted] = useState({});
  const [timestamps, setTimestamps] = useState({});
  const [amSubmitted, setAmSubmitted] = useState(false);
  const [pmSubmitted, setPmSubmitted] = useState(false);
  const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

  if (!driverRoute) return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Card><p style={{ color: COLORS.text }}>No route assigned to you today.</p></Card>
    </div>
  );

  const stops = period === "am" ? driverRoute.amStops : driverRoute.pmStops;
  const activeStops = stops.filter(s => {
    if (s.type === "base") return true;
    return s.clients.some(c => {
      const cl = driverRoute.clients.find(x => x.name === c);
      return cl && cl.active;
    });
  });

  const handleBaseToggle = (stopId) => {
    const now = new Date();
    setBaseStarted(p => ({ ...p, [stopId]: !p[stopId] }));
    if (!timestamps[stopId]) setTimestamps(p => ({ ...p, [stopId]: now.toLocaleTimeString() }));
  };

  const handleClientToggle = (clientName) => {
    setClientStatus(p => ({ ...p, [`${period}_${clientName}`]: !p[`${period}_${clientName}`] }));
    const now = new Date();
    if (!timestamps[`${period}_${clientName}`]) setTimestamps(p => ({ ...p, [`${period}_${clientName}`]: now.toLocaleTimeString() }));
  };

  const handleSubmitLog = () => {
    if (period === "am" && !startOdo) return alert("Starting odometer is required");
    if (period === "pm" && !endOdo) return alert("Ending odometer is required");
    if (period === "am") setAmSubmitted(true);
    else setPmSubmitted(true);
    if (onSubmit) onSubmit({ period, startOdo, endOdo, stopStatus, clientStatus, timestamps, route: driverRoute.name, date: today });
  };

  const isSubmitted = period === "am" ? amSubmitted : pmSubmitted;

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }}>
      <div style={{ maxWidth: 500, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
          <h2 style={{ color: COLORS.text, margin: 0, fontSize: 20 }}>📋 {driverRoute.name}</h2>
          <Badge>{driverRoute.driver}</Badge>
        </div>
        <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 12px" }}>{today}</p>

        {/* Odometer - FIRST thing driver inputs */}
        <Card style={{ marginBottom: 16, borderLeft: `4px solid ${!startOdo ? COLORS.red : COLORS.accent}` }}>
          <h3 style={{ color: COLORS.text, fontSize: 15, margin: "0 0 4px", fontWeight: 700 }}>Odometer Reading</h3>
          <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 10px" }}>Enter odometer before starting your route</p>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <Input label="Starting Odometer *" type="number" value={startOdo} onChange={e => setStartOdo(e.target.value)}
                placeholder="Required" />
            </div>
            <div style={{ flex: 1 }}>
              <Input label="Ending Odometer *" type="number" value={endOdo} onChange={e => setEndOdo(e.target.value)}
                placeholder="After PM route" />
            </div>
          </div>
        </Card>

        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <Btn onClick={() => setPeriod("am")} color={period === "am" ? COLORS.accent : COLORS.border}
            style={{ flex: 1 }}>
            ☀️ AM Route {amSubmitted && "✅"}
          </Btn>
          <Btn onClick={() => setPeriod("pm")} color={period === "pm" ? COLORS.blue : COLORS.border}
            style={{ flex: 1 }}>
            🌙 PM Route {pmSubmitted && "✅"}
          </Btn>
        </div>

        {isSubmitted ? (
          <Card style={{ textAlign: "center", padding: 32 }}>
            <div style={{ fontSize: 48, marginBottom: 8 }}>✅</div>
            <h3 style={{ color: COLORS.text }}>
              {period.toUpperCase()} Route Submitted
            </h3>
            <p style={{ color: COLORS.textDim, fontSize: 13 }}>
              Miles: {period === "am" ? driverRoute.amMiles : driverRoute.pmMiles}
            </p>
          </Card>
        ) : (
          <>
            {activeStops.map((stop, idx) => (
              <Card key={stop.id} style={{ marginBottom: 8, borderLeft: `3px solid ${stop.type === "base" ? COLORS.accent : stop.dropoff ? COLORS.red : COLORS.blue}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: COLORS.textMuted }}>#{idx + 1}</span>
                      {stop.label && <Badge color={stop.type === "base" ? COLORS.accent : COLORS.yellow}>{stop.label}</Badge>}
                      {stop.dropoff && <Badge color={COLORS.red}>Drop-off</Badge>}
                      {stop.time && <span style={{ color: COLORS.yellow, fontSize: 12, fontWeight: 700 }}>{stop.time}</span>}
                    </div>
                    <p style={{ color: COLORS.text, fontSize: 13, margin: "4px 0 0", lineHeight: 1.4 }}>{stop.address}</p>
                    {timestamps[stop.id] && <span style={{ color: COLORS.textMuted, fontSize: 11 }}>⏱ {timestamps[stop.id]}</span>}
                  </div>
                  {stop.type === "base" && (
                    <Btn small onClick={() => handleBaseToggle(stop.id)}
                      color={baseStarted[stop.id] ? COLORS.accent : COLORS.border}>
                      {baseStarted[stop.id] ? "✓ Done" : "Start"}
                    </Btn>
                  )}
                </div>
                {stop.clients?.length > 0 && (
                  <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${COLORS.border}` }}>
                    {stop.clients.map(cl => {
                      const client = driverRoute.clients.find(c => c.name === cl);
                      if (client && !client.active) return null;
                      const key = `${period}_${cl}`;
                      return (
                        <div key={cl} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 0" }}>
                          <div>
                            <span style={{ color: COLORS.text, fontSize: 13 }}>{cl}</span>
                            {timestamps[key] && <span style={{ color: COLORS.textMuted, fontSize: 11, marginLeft: 8 }}>⏱ {timestamps[key]}</span>}
                          </div>
                          <Toggle on={!!clientStatus[key]} onChange={() => handleClientToggle(cl)} />
                        </div>
                      );
                    })}
                  </div>
                )}
              </Card>
            ))}

            <Card style={{ marginTop: 12, background: COLORS.cardHover }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ color: COLORS.textDim, fontSize: 13 }}>Est. Route Miles</span>
                <span style={{ color: COLORS.text, fontSize: 16, fontWeight: 700 }}>
                  {period === "am" ? driverRoute.amMiles : driverRoute.pmMiles} mi
                </span>
              </div>
            </Card>

            <Btn onClick={handleSubmitLog}
              disabled={period === "am" ? !startOdo : !endOdo}
              color={period === "am" ? COLORS.accent : COLORS.blue}
              style={{ width: "100%", marginTop: 12, padding: "14px 0", fontSize: 16 }}>
              Submit {period.toUpperCase()} Route Log
            </Btn>
          </>
        )}
      </div>
    </div>
  );
};

  // Add Client form state
  const [showAddClient, setShowAddClient] = useState(false);
  const [newClient, setNewClient] = useState({ name: "", address: "", uci: "", routeId: "" });

  // Add Driver form state
  const [showAddDriver, setShowAddDriver] = useState(false);
  const [newDriver, setNewDriver] = useState({ name: "", username: "", password: "", role: "driver" });

  // Add Stop form state
  const [showAddStop, setShowAddStop] = useState(false);
  const [newStop, setNewStop] = useState({ type: "pickup", label: "", address: "", time: "", clients: "", dropoff: false });

  // Client status modal state
  const [clientModal, setClientModal] = useState(null); // { routeId, clientName }
  const [returnDate, setReturnDate] = useState("");

  // Stop status modal state
  const [stopModal, setStopModal] = useState(null); // { routeId, period, stopId, clients }
  const [stopReturnDate, setStopReturnDate] = useState("");

  // Sequence change confirmation (once per AM, once per PM per route)
  const [seqConfirmed, setSeqConfirmed] = useState({}); // { "routeId_am": true, "routeId_pm": true }

  const tabs = [
    { id: "routes", label: "Routes", icon: "🗺️" },
    { id: "clients", label: "Clients", icon: "👥" },
    { id: "schedule", label: "Schedule", icon: "📅" },
    { id: "mileage", label: "Mileage", icon: "📊" },
    { id: "logs", label: "Logs", icon: "📋" },
    { id: "inspect", label: "Inspections", icon: "🔍" },
    { id: "users", label: "Users", icon: "🔑" },
  ];

  // When toggling client OFF → show modal; when toggling ON → just activate
  const handleClientToggle = (routeId, clientName) => {
    const route = routes.find(r => r.id === routeId);
    const client = route?.clients.find(c => c.name === clientName);
    if (!client) return;
    if (!client.active || client.status === "archived" || client.status === "inactive") {
      // Reactivate
      setRoutes(prev => prev.map(r => {
        if (r.id !== routeId) return r;
        return { ...r, clients: r.clients.map(c => c.name === clientName ? { ...c, active: true, status: "active", returnDate: "" } : c) };
      }));
    } else {
      // Show modal for deactivation options
      setClientModal({ routeId, clientName });
      setReturnDate("");
    }
  };

  // Client status actions from modal
  const handleClientInactiveWithDate = () => {
    if (!returnDate) return alert("Please enter a return date");
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "inactive", returnDate } : c) };
    }));
    setClientModal(null);
    setReturnDate("");
  };

  const handleClientInactiveNoDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "inactive", returnDate: "" } : c) };
    }));
    setClientModal(null);
  };

  const handleClientArchive = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "archived", returnDate: "" } : c) };
    }));
    setClientModal(null);
  };

  // Swap stop positions by sequence number
  const handleSequenceChange = (routeId, period, fromIndex, newSeqNum) => {
    const toIndex = newSeqNum - 1;
    const key = period === "am" ? "amStops" : "pmStops";
    const route = routes.find(r => r.id === routeId);
    if (!route) return;
    const stops = route[key];
    if (toIndex < 0 || toIndex >= stops.length || toIndex === fromIndex) return;

    const confirmKey = `${routeId}_${period}`;
    if (!seqConfirmed[confirmKey]) {
      if (!confirm("Confirm you want to change the sequence?")) return;
      setSeqConfirmed(prev => ({ ...prev, [confirmKey]: true }));
    }

    setRoutes(prev => prev.map(r => {
      if (r.id !== routeId) return r;
      const arr = [...r[key]];
      const [moved] = arr.splice(fromIndex, 1);
      arr.splice(toIndex, 0, moved);
      return { ...r, [key]: arr };
    }));
  };

  // Toggle stop active/inactive — show modal when deactivating
  const handleStopToggle = (routeId, period, stop) => {
    if (stop.inactive) {
      // Reactivate
      setRoutes(prev => prev.map(r => {
        if (r.id !== routeId) return r;
        const key = period === "am" ? "amStops" : "pmStops";
        return { ...r, [key]: r[key].map(s => s.id === stop.id ? { ...s, inactive: false, stopStatus: "active", stopReturnDate: "" } : s) };
      }));
    } else {
      // Show modal
      setStopModal({ routeId, period, stopId: stop.id, label: stop.label || stop.address, clients: stop.clients });
      setStopReturnDate("");
    }
  };

  const handleStopInactiveWithDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "inactive", stopReturnDate } : s) };
    }));
    setStopModal(null);
  };

  const handleStopInactiveNoDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "inactive", stopReturnDate: "" } : s) };
    }));
    setStopModal(null);
  };

  const handleStopArchive = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "archived", stopReturnDate: "" } : s) };
    }));
    setStopModal(null);
  };

  // Add a new client to a route
  const handleAddClient = () => {
    if (!newClient.name || !newClient.address || !newClient.routeId) return alert("Name, address, and route are required");
    setRoutes(prev => prev.map(r => {
      if (r.id !== newClient.routeId) return r;
      return { ...r, clients: [...r.clients, { name: newClient.name, address: newClient.address, uci: newClient.uci, active: true, status: "active" }] };
    }));
    setNewClient({ name: "", address: "", uci: "", routeId: "" });
    setShowAddClient(false);
  };

  // Remove client from route
  const handleRemoveClient = (routeId, clientName) => {
    if (!confirm(`Remove ${clientName} from route? This will also remove them from all stops.`)) return;
    setRoutes(prev => prev.map(r => {
      if (r.id !== routeId) return r;
      return {
        ...r,
        clients: r.clients.filter(c => c.name !== clientName),
        amStops: r.amStops.map(s => ({ ...s, clients: s.clients.filter(c => c !== clientName) })).filter(s => s.type === "base" || s.clients.length > 0),
        pmStops: r.pmStops.map(s => ({ ...s, clients: s.clients.filter(c => c !== clientName) })).filter(s => s.type === "base" || s.clients.length > 0),
      };
    }));
  };

  // Add a new driver
  const handleAddDriver = () => {
    if (!newDriver.name || !newDriver.username || !newDriver.password) return alert("All fields are required");
    if (users.find(u => u.username === newDriver.username)) return alert("Username already exists");
    setUsers(prev => [...prev, { id: `usr_${Date.now()}`, ...newDriver }]);
    setNewDriver({ name: "", username: "", password: "", role: "driver" });
    setShowAddDriver(false);
  };

  // Remove driver
  const handleRemoveUser = (userId) => {
    const u = users.find(x => x.id === userId);
    if (u.role === "admin" && users.filter(x => x.role === "admin").length <= 1) return alert("Cannot remove the last admin");
    if (!confirm(`Remove user ${u.name}?`)) return;
    setUsers(prev => prev.filter(x => x.id !== userId));
  };

  // Add a new stop to route
  const handleAddStop = () => {
    if (!newStop.address) return alert("Address is required");
    const clientList = newStop.clients ? newStop.clients.split(",").map(c => c.trim()).filter(Boolean) : [];
    const stopId = `s_${Date.now()}`;
    const stopObj = {
      id: stopId, type: newStop.type, address: newStop.address, time: newStop.time,
      clients: clientList, label: newStop.label || "", dropoff: newStop.type === "dropoff",
    };
    setRoutes(prev => prev.map(r => {
      if (r.id !== selectedRoute) return r;
      const key = editPeriod === "am" ? "amStops" : "pmStops";
      const stops = [...r[key]];
      // Insert before last base stop
      const lastBaseIdx = stops.length - 1;
      stops.splice(lastBaseIdx, 0, stopObj);
      return { ...r, [key]: stops };
    }));
    setNewStop({ type: "pickup", label: "", address: "", time: "", clients: "", dropoff: false });
    setShowAddStop(false);
  };

  const totalClients = routes.reduce((sum, r) => sum + r.clients.length, 0);
  const activeClients = routes.reduce((sum, r) => sum + r.clients.filter(c => c.active).length, 0);

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <h1 style={{ color: COLORS.text, margin: 0, fontSize: 22, fontWeight: 800, display: "flex", alignItems: "center", gap: 8 }}><KTSLogoSmall /> KTS Dashboard</h1>
            <p style={{ color: COLORS.textDim, fontSize: 12, margin: "2px 0 0" }}>
              {user.name} · <Badge color={user.role === "admin" ? COLORS.red : COLORS.yellow}>{user.role}</Badge>
            </p>
          </div>
          <div style={{ textAlign: "right" }}>
            <p style={{ color: COLORS.textDim, fontSize: 11, margin: 0 }}>{new Date().toLocaleDateString()}</p>
          </div>
        </div>

        {/* Summary Cards */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 8, marginBottom: 16 }}>
          {[
            { label: "Routes", value: routes.length, color: COLORS.accent },
            { label: "Active Clients", value: `${activeClients}/${totalClients}`, color: COLORS.blue },
            { label: "Drivers", value: users.filter(u => u.role === "driver").length, color: COLORS.yellow },
            { label: "Today Miles", value: routes.reduce((s, r) => s + r.amMiles + r.pmMiles, 0).toFixed(0), color: COLORS.accentLight },
          ].map(s => (
            <Card key={s.label} style={{ textAlign: "center", padding: 12 }}>
              <p style={{ color: s.color, fontSize: 22, fontWeight: 800, margin: 0 }}>{s.value}</p>
              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "2px 0 0" }}>{s.label}</p>
            </Card>
          ))}
        </div>

        <TabBar tabs={tabs} active={tab} onChange={setTab} />

        <div style={{ marginTop: 16 }}>
          {/* ROUTES TAB */}
          {tab === "routes" && (
            <div>
              {!selectedRoute ? (
                routes.map(route => (
                  <Card key={route.id} onClick={() => setSelectedRoute(route.id)}
                    style={{ marginBottom: 8, cursor: "pointer", transition: "border-color 0.2s" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <h3 style={{ color: COLORS.text, margin: 0, fontSize: 16 }}>{route.name}</h3>
                          <Badge>{route.driver}</Badge>
                        </div>
                        <p style={{ color: COLORS.textDim, fontSize: 12, margin: "4px 0 0" }}>
                          {route.clients.filter(c => c.active).length} active clients · Vehicle: {route.vehicleId}
                        </p>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <p style={{ color: COLORS.accent, fontSize: 14, fontWeight: 700, margin: 0 }}>
                          {(route.amMiles + route.pmMiles).toFixed(1)} mi
                        </p>
                        <p style={{ color: COLORS.textMuted, fontSize: 11, margin: 0 }}>AM: {route.amMiles} / PM: {route.pmMiles}</p>
                      </div>
                    </div>
                  </Card>
                ))
              ) : (
                (() => {
                  const route = routes.find(r => r.id === selectedRoute);
                  const renderStops = (stops, period, color) => (
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "12px 0 8px" }}>
                        <h4 style={{ color, fontSize: 14, margin: 0 }}>
                          {period === "am" ? "☀️ AM Route" : "🌙 PM Route"}
                        </h4>
                        <Btn small color={color} onClick={() => { setEditPeriod(period); setShowAddStop(true); }}>+ Add Stop</Btn>
                      </div>
                      {stops.map((s, i) => (
                        <div key={s.id} style={{
                          padding: "10px 12px", borderLeft: `3px solid ${s.inactive ? COLORS.red : s.type === "base" ? color : COLORS.border}`,
                          marginBottom: 4, display: "flex", alignItems: "center", gap: 10,
                          background: s.inactive ? COLORS.bg : COLORS.card, borderRadius: "0 8px 8px 0",
                          opacity: s.inactive ? 0.5 : 1, boxShadow: "0 1px 2px rgba(0,0,0,0.05)",
                        }}>
                          {/* Sequence Number */}
                          <div style={{ minWidth: 42, flexShrink: 0 }}>
                            <select
                              value={i + 1}
                              onChange={(e) => handleSequenceChange(route.id, period, i, parseInt(e.target.value))}
                              style={{
                                width: 42, height: 36, textAlign: "center", fontSize: 14, fontWeight: 700,
                                background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 6,
                                color: COLORS.text, cursor: "pointer", appearance: "none", WebkitAppearance: "none",
                                paddingLeft: 12,
                              }}>
                              {stops.map((_, idx) => (
                                <option key={idx} value={idx + 1}>{idx + 1}</option>
                              ))}
                            </select>
                          </div>
                          {/* Stop Info */}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                              {s.label && <Badge color={COLORS.yellow}>{s.label}</Badge>}
                              {s.dropoff && <Badge color={COLORS.red}>Drop-off</Badge>}
                              {!s.dropoff && s.type !== "base" && <Badge color={COLORS.blue}>Pickup</Badge>}
                              {s.type === "base" && <Badge color={color}>Base</Badge>}
                              {s.time && <span style={{ color: COLORS.yellow, fontSize: 12, fontWeight: 700 }}>{s.time}</span>}
                              {s.stopReturnDate && <span style={{ color: COLORS.yellow, fontSize: 11 }}>📅 {s.stopReturnDate}</span>}
                            </div>
                            <p style={{ color: COLORS.text, fontSize: 12, margin: "3px 0 0", lineHeight: 1.3, wordBreak: "break-word" }}>{s.address}</p>
                            {s.clients?.length > 0 && <p style={{ color: COLORS.textDim, fontSize: 11, margin: "2px 0 0" }}>
                              {s.clients.join(", ")}
                            </p>}
                          </div>
                          {/* Active/Inactive Toggle */}
                          {s.type !== "base" && (
                            <div style={{ flexShrink: 0 }}>
                              <Toggle on={!s.inactive} onChange={() => handleStopToggle(route.id, period, s)} />
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  );

                  return (
                    <div>
                      <Btn small outline onClick={() => setSelectedRoute(null)} style={{ marginBottom: 12 }}>← Back to Routes</Btn>
                      <h3 style={{ color: COLORS.text, margin: "0 0 4px" }}>{route.name} — {route.driver}</h3>
                      <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 8px" }}>Vehicle: {route.vehicleId} · Drag stops with ▲▼ arrows to reorder</p>

                      {renderStops(route.amStops, "am", COLORS.accent)}
                      {renderStops(route.pmStops, "pm", COLORS.blue)}

                      {/* Add Stop Modal */}
                      {showAddStop && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                          <Card style={{ width: "100%", maxWidth: 420 }}>
                            <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>Add Stop to {editPeriod.toUpperCase()} Route</h3>
                            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                              <Btn small onClick={() => setNewStop(p => ({ ...p, type: "pickup", dropoff: false }))}
                                color={newStop.type === "pickup" ? COLORS.blue : COLORS.border}>Pickup</Btn>
                              <Btn small onClick={() => setNewStop(p => ({ ...p, type: "dropoff", dropoff: true }))}
                                color={newStop.type === "dropoff" ? COLORS.red : COLORS.border}>Drop-off</Btn>
                            </div>
                            <Input label="Label (e.g. PCS, CVTC)" value={newStop.label} onChange={e => setNewStop(p => ({ ...p, label: e.target.value }))} placeholder="Optional label" />
                            <Input label="Address *" value={newStop.address} onChange={e => setNewStop(p => ({ ...p, address: e.target.value }))} placeholder="Full address" />
                            <Input label="Time" value={newStop.time} onChange={e => setNewStop(p => ({ ...p, time: e.target.value }))} placeholder="e.g. 8:00 AM" />
                            <Input label="Clients (comma separated)" value={newStop.clients} onChange={e => setNewStop(p => ({ ...p, clients: e.target.value }))} placeholder="e.g. John Smith, Jane Doe" />
                            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                              <Btn onClick={handleAddStop} style={{ flex: 1 }}>Add Stop</Btn>
                              <Btn outline onClick={() => setShowAddStop(false)} style={{ flex: 1 }}>Cancel</Btn>
                            </div>
                          </Card>
                        </div>
                      )}

                      {/* Stop Status Modal */}
                      {stopModal && stopModal.routeId === route.id && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                          <Card style={{ width: "100%", maxWidth: 420 }}>
                            <h3 style={{ color: COLORS.text, margin: "0 0 6px" }}>Remove Stop from Route</h3>
                            <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 4px" }}>{stopModal.label}</p>
                            {stopModal.clients?.length > 0 && <p style={{ color: COLORS.textMuted, fontSize: 12, margin: "0 0 16px" }}>Clients: {stopModal.clients.join(", ")}</p>}
                            <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 16px" }}>Is there a return date?</p>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.yellow}44`, padding: 14 }}>
                              <p style={{ color: COLORS.yellow, fontSize: 13, fontWeight: 700, margin: "0 0 8px" }}>📅 Yes — Set a return date</p>
                              <input type="date" value={stopReturnDate} onChange={e => setStopReturnDate(e.target.value)}
                                style={{ width: "100%", padding: "10px 12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                                  borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box", marginBottom: 8 }} />
                              <Btn onClick={handleStopInactiveWithDate} color={COLORS.yellow} disabled={!stopReturnDate}
                                style={{ width: "100%" }}>Set Return Date & Deactivate</Btn>
                            </Card>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.blue}44`, padding: 14 }}>
                              <p style={{ color: COLORS.blue, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>⏸ No return date — Temporarily off route</p>
                              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Stop stays on route list but is skipped until reactivated.</p>
                              <Btn onClick={handleStopInactiveNoDate} color={COLORS.blue} style={{ width: "100%" }}>Deactivate Without Date</Btn>
                            </Card>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.red}44`, padding: 14 }}>
                              <p style={{ color: COLORS.red, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>📦 Deactivate & Archive</p>
                              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Stop is fully deactivated and archived. Can be reactivated later.</p>
                              <Btn onClick={handleStopArchive} color={COLORS.red} style={{ width: "100%" }}>Archive Stop</Btn>
                            </Card>

                            <Btn outline onClick={() => setStopModal(null)} style={{ width: "100%", marginTop: 4 }}>Cancel</Btn>
                          </Card>
                        </div>
                      )}
                    </div>
                  );
                })()
              )}
            </div>
          )}

          {/* CLIENTS TAB with toggle */}
          {tab === "clients" && (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <p style={{ color: COLORS.textDim, fontSize: 13, margin: 0 }}>
                  Toggle clients on/off routes. Red = removed from route.
                </p>
                <Btn small onClick={() => setShowAddClient(true)}>+ Add Client</Btn>
              </div>

              {/* Show archived clients count */}
              {(() => {
                const archived = routes.flatMap(r => r.clients.filter(c => c.status === "archived"));
                if (archived.length > 0) return (
                  <Card style={{ marginBottom: 12, borderColor: COLORS.textMuted + "44", padding: 12 }}>
                    <p style={{ color: COLORS.textMuted, fontSize: 12, margin: 0 }}>📦 {archived.length} archived client{archived.length > 1 ? "s" : ""} hidden</p>
                  </Card>
                );
                return null;
              })()}

              {routes.filter(r => r.clients.length > 0).map(route => (
                <Card key={route.id} style={{ marginBottom: 12 }}>
                  <h3 style={{ color: COLORS.accent, margin: "0 0 8px", fontSize: 15 }}>{route.name} — {route.driver}</h3>
                  {route.clients.filter(c => c.status !== "archived").map(client => (
                    <div key={client.name} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "10px 0", borderBottom: `1px solid ${COLORS.border}`,
                      opacity: client.active ? 1 : 0.6,
                    }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <p style={{ color: COLORS.text, margin: 0, fontSize: 14 }}>{client.name}</p>
                          {client.status === "inactive" && <Badge color={COLORS.yellow}>Inactive</Badge>}
                        </div>
                        <p style={{ color: COLORS.textMuted, margin: 0, fontSize: 11 }}>{client.address}</p>
                        {client.uci && <p style={{ color: COLORS.textMuted, margin: 0, fontSize: 10 }}>UCI: {client.uci}</p>}
                        {client.returnDate && <p style={{ color: COLORS.yellow, margin: "2px 0 0", fontSize: 11 }}>📅 Returns: {client.returnDate}</p>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                        <Toggle on={client.active} onChange={() => handleClientToggle(route.id, client.name)} />
                        <button onClick={() => handleRemoveClient(route.id, client.name)}
                          style={{ background: "none", border: "none", color: COLORS.red, cursor: "pointer", fontSize: 14, padding: 4 }}>✕</button>
                      </div>
                    </div>
                  ))}

                  {/* Show archived clients for this route */}
                  {route.clients.filter(c => c.status === "archived").length > 0 && (
                    <details style={{ marginTop: 8 }}>
                      <summary style={{ color: COLORS.textMuted, fontSize: 12, cursor: "pointer", padding: "4px 0" }}>
                        📦 {route.clients.filter(c => c.status === "archived").length} archived
                      </summary>
                      {route.clients.filter(c => c.status === "archived").map(client => (
                        <div key={client.name} style={{
                          display: "flex", alignItems: "center", justifyContent: "space-between",
                          padding: "8px 0", borderBottom: `1px solid ${COLORS.border}`, opacity: 0.4,
                        }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              <p style={{ color: COLORS.text, margin: 0, fontSize: 14 }}>{client.name}</p>
                              <Badge color={COLORS.red}>Archived</Badge>
                            </div>
                            <p style={{ color: COLORS.textMuted, margin: 0, fontSize: 11 }}>{client.address}</p>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                            <Btn small color={COLORS.accent} onClick={() => {
                              setRoutes(prev => prev.map(r => {
                                if (r.id !== route.id) return r;
                                return { ...r, clients: r.clients.map(c => c.name === client.name ? { ...c, active: true, status: "active", returnDate: "" } : c) };
                              }));
                            }}>Reactivate</Btn>
                          </div>
                        </div>
                      ))}
                    </details>
                  )}
                </Card>
              ))}

              {/* Client Status Modal */}
              {clientModal && (
                <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.4)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                  <Card style={{ width: "100%", maxWidth: 420 }}>
                    <h3 style={{ color: COLORS.text, margin: "0 0 6px" }}>Remove {clientModal.clientName} from Route</h3>
                    <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 20px" }}>Is there a return date?</p>

                    {/* Option 1: Return date */}
                    <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.yellow}44`, padding: 14 }}>
                      <p style={{ color: COLORS.yellow, fontSize: 13, fontWeight: 700, margin: "0 0 8px" }}>📅 Yes — Set a return date</p>
                      <input type="date" value={returnDate} onChange={e => setReturnDate(e.target.value)}
                        style={{ width: "100%", padding: "10px 12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                          borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box", marginBottom: 8 }} />
                      <Btn onClick={handleClientInactiveWithDate} color={COLORS.yellow} disabled={!returnDate}
                        style={{ width: "100%" }}>Set Return Date & Deactivate</Btn>
                    </Card>

                    {/* Option 2: No return date, still on roster */}
                    <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.blue}44`, padding: 14 }}>
                      <p style={{ color: COLORS.blue, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>⏸ No return date — Temporarily off route</p>
                      <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Client stays on roster but removed from daily route until reactivated.</p>
                      <Btn onClick={handleClientInactiveNoDate} color={COLORS.blue} style={{ width: "100%" }}>Deactivate Without Date</Btn>
                    </Card>

                    {/* Option 3: Archive */}
                    <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.red}44`, padding: 14 }}>
                      <p style={{ color: COLORS.red, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>📦 Deactivate & Archive</p>
                      <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Client is fully deactivated and moved to archive. Can be reactivated later.</p>
                      <Btn onClick={handleClientArchive} color={COLORS.red} style={{ width: "100%" }}>Archive Client</Btn>
                    </Card>

                    <Btn outline onClick={() => setClientModal(null)} style={{ width: "100%", marginTop: 4 }}>Cancel</Btn>
                  </Card>
                </div>
              )}

              {/* Add Client Modal */}
              {showAddClient && (
                <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.4)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                  <Card style={{ width: "100%", maxWidth: 420 }}>
                    <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>Add New Client</h3>
                    <Input label="Client Name *" value={newClient.name} onChange={e => setNewClient(p => ({ ...p, name: e.target.value }))} placeholder="Full name" />
                    <Input label="Address *" value={newClient.address} onChange={e => setNewClient(p => ({ ...p, address: e.target.value }))} placeholder="Full address" />
                    <Input label="UCI Number" value={newClient.uci} onChange={e => setNewClient(p => ({ ...p, uci: e.target.value }))} placeholder="Optional" />
                    <div style={{ marginBottom: 12 }}>
                      <label style={{ display: "block", color: COLORS.textDim, fontSize: 12, marginBottom: 4, fontWeight: 600 }}>Assign to Route *</label>
                      <select value={newClient.routeId} onChange={e => setNewClient(p => ({ ...p, routeId: e.target.value }))}
                        style={{ width: "100%", padding: "10px 12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                          borderRadius: 8, color: COLORS.text, fontSize: 14 }}>
                        <option value="">Select route...</option>
                        {routes.map(r => <option key={r.id} value={r.id}>{r.name} — {r.driver}</option>)}
                      </select>
                    </div>
                    <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                      <Btn onClick={handleAddClient} style={{ flex: 1 }}>Add Client</Btn>
                      <Btn outline onClick={() => setShowAddClient(false)} style={{ flex: 1 }}>Cancel</Btn>
                    </div>
                  </Card>
                </div>
              )}
            </div>
          )}

          {/* SCHEDULE TAB */}
          {tab === "schedule" && (
            <div>
              <h3 style={{ color: COLORS.text, margin: "0 0 12px" }}>Daily Route Schedule</h3>
              {routes.map(route => (
                <Card key={route.id} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <h4 style={{ color: COLORS.accent, margin: 0 }}>{route.name}</h4>
                    <Badge>{route.driver}</Badge>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    <div style={{ padding: 8, background: COLORS.bg, borderRadius: 8 }}>
                      <p style={{ color: COLORS.accent, fontSize: 12, fontWeight: 700, margin: "0 0 4px" }}>☀️ AM — {route.amMiles} mi</p>
                      <p style={{ color: COLORS.textDim, fontSize: 11, margin: 0 }}>
                        {route.amStops.flatMap(s => s.clients).filter(Boolean).length > 0
                          ? [...new Set(route.amStops.flatMap(s => s.clients))].join(", ")
                          : "No clients"}
                      </p>
                    </div>
                    <div style={{ padding: 8, background: COLORS.bg, borderRadius: 8 }}>
                      <p style={{ color: COLORS.blue, fontSize: 12, fontWeight: 700, margin: "0 0 4px" }}>🌙 PM — {route.pmMiles} mi</p>
                      <p style={{ color: COLORS.textDim, fontSize: 11, margin: 0 }}>
                        {route.pmStops.flatMap(s => s.clients).filter(Boolean).length > 0
                          ? [...new Set(route.pmStops.flatMap(s => s.clients))].join(", ")
                          : "No clients"}
                      </p>
                    </div>
                  </div>
                </Card>
              ))}
            </div>
          )}

          {/* MILEAGE TAB */}
          {tab === "mileage" && (
            <div>
              <h3 style={{ color: COLORS.text, margin: "0 0 12px" }}>Mileage Breakdown</h3>
              <Card style={{ marginBottom: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, textAlign: "center" }}>
                  <div><p style={{ color: COLORS.accent, fontSize: 20, fontWeight: 800, margin: 0 }}>
                    {routes.reduce((s, r) => s + r.amMiles, 0).toFixed(1)}</p><p style={{ color: COLORS.textMuted, fontSize: 11 }}>AM Total</p></div>
                  <div><p style={{ color: COLORS.blue, fontSize: 20, fontWeight: 800, margin: 0 }}>
                    {routes.reduce((s, r) => s + r.pmMiles, 0).toFixed(1)}</p><p style={{ color: COLORS.textMuted, fontSize: 11 }}>PM Total</p></div>
                  <div><p style={{ color: COLORS.yellow, fontSize: 20, fontWeight: 800, margin: 0 }}>
                    {routes.reduce((s, r) => s + r.amMiles + r.pmMiles, 0).toFixed(1)}</p><p style={{ color: COLORS.textMuted, fontSize: 11 }}>Daily Total</p></div>
                </div>
              </Card>
              <Card style={{ marginBottom: 12, padding: 0 }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead>
                    <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                      {["Route", "AM Mi", "PM Mi", "Total"].map(h => (
                        <th key={h} style={{ padding: "10px 8px", color: COLORS.textDim, fontSize: 11, textAlign: "left", fontWeight: 600 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {routes.map(r => (
                      <tr key={r.id} style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                        <td style={{ padding: "8px", color: COLORS.text, fontSize: 13 }}>{r.name}</td>
                        <td style={{ padding: "8px", color: COLORS.accent, fontSize: 13 }}>{r.amMiles}</td>
                        <td style={{ padding: "8px", color: COLORS.blue, fontSize: 13 }}>{r.pmMiles}</td>
                        <td style={{ padding: "8px", color: COLORS.yellow, fontSize: 13, fontWeight: 700 }}>{(r.amMiles + r.pmMiles).toFixed(1)}</td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{ background: COLORS.cardHover }}>
                      <td style={{ padding: "10px 8px", color: COLORS.text, fontSize: 13, fontWeight: 700 }}>TOTAL</td>
                      <td style={{ padding: "10px 8px", color: COLORS.accent, fontWeight: 700 }}>{routes.reduce((s, r) => s + r.amMiles, 0).toFixed(1)}</td>
                      <td style={{ padding: "10px 8px", color: COLORS.blue, fontWeight: 700 }}>{routes.reduce((s, r) => s + r.pmMiles, 0).toFixed(1)}</td>
                      <td style={{ padding: "10px 8px", color: COLORS.yellow, fontWeight: 700 }}>{routes.reduce((s, r) => s + r.amMiles + r.pmMiles, 0).toFixed(1)}</td>
                    </tr>
                  </tfoot>
                </table>
              </Card>
            </div>
          )}

          {/* LOGS TAB */}
          {tab === "logs" && (
            <div>
              <h3 style={{ color: COLORS.text, margin: "0 0 12px" }}>Submitted Driver Logs</h3>
              {logs.length === 0 ? (
                <Card><p style={{ color: COLORS.textDim, textAlign: "center" }}>No logs submitted yet today.</p></Card>
              ) : (
                logs.map((log, i) => (
                  <Card key={i} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <div>
                        <Badge color={log.period === "am" ? COLORS.accent : COLORS.blue}>{log.period}</Badge>
                        <span style={{ color: COLORS.text, fontSize: 14, marginLeft: 8 }}>{log.route}</span>
                      </div>
                      <span style={{ color: COLORS.textDim, fontSize: 12 }}>{log.date}</span>
                    </div>
                    <p style={{ color: COLORS.textDim, fontSize: 12, margin: "4px 0 0" }}>
                      Odo: {log.startOdo || log.endOdo || "N/A"}
                    </p>
                  </Card>
                ))
              )}
            </div>
          )}

          {/* INSPECTIONS TAB */}
          {tab === "inspect" && (
            <div>
              <h3 style={{ color: COLORS.text, margin: "0 0 12px" }}>Vehicle Inspections</h3>
              <Card><p style={{ color: COLORS.textDim, textAlign: "center" }}>Inspection reports will appear here after driver submissions.</p></Card>
            </div>
          )}

          {/* USERS TAB */}
          {tab === "users" && (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h3 style={{ color: COLORS.text, margin: 0 }}>User Accounts</h3>
                <Btn small onClick={() => setShowAddDriver(true)}>+ Add User</Btn>
              </div>
              {users.map(u => (
                <Card key={u.id} style={{ marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <p style={{ color: COLORS.text, margin: 0, fontSize: 14 }}>{u.name}</p>
                      <p style={{ color: COLORS.textMuted, margin: 0, fontSize: 12 }}>@{u.username}</p>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <Badge color={u.role === "admin" ? COLORS.red : u.role === "manager" ? COLORS.yellow : COLORS.accent}>{u.role}</Badge>
                      <button onClick={() => handleRemoveUser(u.id)}
                        style={{ background: "none", border: "none", color: COLORS.red, cursor: "pointer", fontSize: 14, padding: 4 }}>✕</button>
                    </div>
                  </div>
                </Card>
              ))}

              {/* Add User Modal */}
              {showAddDriver && (
                <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.4)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                  <Card style={{ width: "100%", maxWidth: 420 }}>
                    <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>Add New User</h3>
                    <Input label="Full Name *" value={newDriver.name} onChange={e => setNewDriver(p => ({ ...p, name: e.target.value }))} placeholder="e.g. John Smith" />
                    <Input label="Username *" value={newDriver.username} onChange={e => setNewDriver(p => ({ ...p, username: e.target.value }))} placeholder="Login username" />
                    <Input label="Password *" type="password" value={newDriver.password} onChange={e => setNewDriver(p => ({ ...p, password: e.target.value }))} placeholder="Login password" />
                    <div style={{ marginBottom: 12 }}>
                      <label style={{ display: "block", color: COLORS.textDim, fontSize: 12, marginBottom: 4, fontWeight: 600 }}>Role *</label>
                      <select value={newDriver.role} onChange={e => setNewDriver(p => ({ ...p, role: e.target.value }))}
                        style={{ width: "100%", padding: "10px 12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                          borderRadius: 8, color: COLORS.text, fontSize: 14 }}>
                        <option value="driver">Driver</option>
                        <option value="manager">Manager</option>
                        {user.role === "admin" && <option value="admin">System Admin</option>}
                      </select>
                    </div>
                    <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                      <Btn onClick={handleAddDriver} style={{ flex: 1 }}>Add User</Btn>
                      <Btn outline onClick={() => setShowAddDriver(false)} style={{ flex: 1 }}>Cancel</Btn>
                    </div>
                  </Card>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ============ MAIN APP ============
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [routes, setRoutes] = useState(ROUTES_DEFAULT);
  const [users, setUsers] = useState(USERS_DEFAULT);
  const [inspectionDone, setInspectionDone] = useState(false);
  const [logs, setLogs] = useState([]);

  const handleLogin = (user) => {
    setCurrentUser(user);
    if (user.role === "driver") setInspectionDone(false);
    else setInspectionDone(true);
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setInspectionDone(false);
  };

  const handleInspectionComplete = (data) => {
    setInspectionDone(true);
  };

  const handleLogSubmit = (data) => {
    setLogs(prev => [...prev, data]);
  };

  if (!currentUser) return <LoginScreen onLogin={handleLogin} users={users} />;

  // Bottom nav
  const BottomNav = () => (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0, background: COLORS.card,
      borderTop: `1px solid ${COLORS.border}`, padding: "8px 16px", display: "flex",
      justifyContent: "space-around", zIndex: 100,
    }}>
      <button onClick={handleLogout} style={{
        background: "none", border: "none", color: COLORS.textMuted, fontSize: 11, cursor: "pointer",
        display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
      }}>
        <span style={{ fontSize: 18 }}>🚪</span>Logout
      </button>
    </div>
  );

  // Driver flow: Inspection → Route Log
  if (currentUser.role === "driver") {
    if (!inspectionDone) {
      return <VehicleInspection user={currentUser} onComplete={handleInspectionComplete} />;
    }
    return (
      <>
        <DriverRouteLog user={currentUser} routes={routes} onSubmit={handleLogSubmit} />
        <BottomNav />
      </>
    );
  }

  // Admin / Manager
  return (
    <>
      <AdminDashboard user={currentUser} routes={routes} setRoutes={setRoutes} users={users} setUsers={setUsers} logs={logs} />
      <BottomNav />
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
