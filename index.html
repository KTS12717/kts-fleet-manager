  for(let c=4;c<=11;c++) setC2(1,c,'',{fill:GRAY,font:F(10)});
  // ROW 3
  setC2(2,0,'*Purpose: Log daily trips provided to each rider.',{font:F(10),alignment:{...LFT,wrapText:true}});
  // ROWS 4–10 instructions
  const instrLines=[
    ['*Instructions: Track attendance as follows:'],
    ['','','','','','','0 = Absent','','Reported by home'],
    ['','','','','','','1 = One Way'],
    ['','','','','','','2 = Round Trip'],
    ['','','','','','','NS = No Show','','No Contact/Notice'],
    ['','','','','','','C = Cancellation','','Cancelled at the door'],
    ['','','','','','','X = Vendor Cancellation','','Vendor Cancelled'],
  ];
  instrLines.forEach((cols,ri)=>{ cols.forEach((v,ci)=>{ if(v) setC2(3+ri,ci,v,{font:F(10)}); }); });
  // ROW 11 headers
  ['#','First Name','Last Name','UCI','Route / Vehicle ID','Service Days'].forEach((h,ci)=>{
    setC2(10,ci,h,{font:F(11,true),fill:GRAY,alignment:CTR});
  });
  allDays.forEach((d,di)=>{ setC2(10,6+di,d.getDate(),{font:F(11,true),fill:GRAY,alignment:CTR}); });
  ['Total Trips','No Shows','Cancellations','Vendor CXL'].forEach((h,hi)=>{
    setC2(10,6+allDays.length+hi,h,{font:F(11,true),fill:GRAY,alignment:CTR});
  });

  // DATA ROWS
  allClients.forEach((cl,idx)=>{
    const row=11+idx;
    setC2(row,0,idx+1,{font:F(11),alignment:CTR});
    setC2(row,1,cl.firstName,{font:F(11)});
    setC2(row,2,cl.lastName, {font:F(11)});
    setC2(row,3,cl.uci||'',  {font:F(11)});
    setC2(row,4,cl.vehicleId||cl.routeName,{font:F(11)});
    setC2(row,5,'',          {font:F(11)});
    allDays.forEach((d,di)=>{
      const dateStr=d.toISOString().slice(0,10);
      const cell=ws2[E(row,6+di)]||{};
      if(isWE2(d)){ setC2(row,6+di,'',{fill:GRAY,font:F(11),alignment:CTR}); return; }
      const calCode=(()=>{ const a=(absences||[]).find(a=>a.clientName===cl.name&&dateStr>=a.startDate&&dateStr<=(a.endDate||a.startDate)); return a?(a.type==='sick'?'NS':'C'):null; })();
      if(calCode){ setC2(row,6+di,calCode,{fill:YELLOW,font:F(11),alignment:CTR}); return; }
      const dayLogs=logs.filter(l=>l.date===dateStr&&(l.routeId===cl.routeId||l.routeName===cl.routeName));
      let code='';
      if(dayLogs.length>0){
        const aL=dayLogs.find(l=>l.period==='AM'), pL=dayLogs.find(l=>l.period==='PM');
        const aP=aL?.clientStatuses?.[cl.name]==='present', pP=pL?.clientStatuses?.[cl.name]==='present';
        const ns=aL?.clientStatuses?.[cl.name]==='noshow'||pL?.clientStatuses?.[cl.name]==='noshow';
        const c2=aL?.clientStatuses?.[cl.name]==='cancelled'||pL?.clientStatuses?.[cl.name]==='cancelled';
        if(aP&&pP) code=2; else if(aP||pP) code=1; else if(ns) code='NS'; else if(c2) code='C'; else code=0;
      }
      setC2(row,6+di,code===''?null:code,{fill:YELLOW,font:F(11),alignment:CTR});
    });
    const r=row+1;
    const sc=colLetter(7), ec=colLetter(6+allDays.length);
    const rng=`${sc}${r}:${ec}${r}`;
    setF2(row,6+allDays.length,   `SUMPRODUCT((${rng}=2)*2+(${rng}=1)*1)`,{font:F(11),alignment:CTR});
    setF2(row,6+allDays.length+1, `COUNTIF(${rng},"NS")`,  {font:F(11),alignment:CTR});
    setF2(row,6+allDays.length+2, `COUNTIF(${rng},"C")`,   {font:F(11),alignment:CTR});
    setF2(row,6+allDays.length+3, `COUNTIF(${rng},"X")`,   {font:F(11),alignment:CTR});
  });

  ws2['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:11+allClients.length,c:6+allDays.length+4}});
  ws2['!cols'] = [{wch:5},{wch:16.14},{wch:19.14},{wch:12},{wch:17.86},{wch:16.86},{wch:11.43},...allDays.map(()=>({wch:5.5})),{wch:16.14},{wch:12.57},{wch:12.86},{wch:12.86},{wch:12.57}];
  const ar_rh = {0:27,1:20.25,2:15.75,3:16.5,4:16.5,5:15.75,6:15.75,7:15.75,8:15.75,9:16.5,10:18.75};
  for(let r=11;r<11+allClients.length;r++) ar_rh[r]=16.5;
  ws2['!rows'] = [];
  Object.entries(ar_rh).forEach(([r,h])=>{ ws2['!rows'][parseInt(r)]={hpt:h}; });
  ws2['!merges'] = [
    {s:{r:1,c:0},e:{r:1,c:2}},   // A2:C2
    {s:{r:1,c:3},e:{r:1,c:11}},  // D2:L2
    {s:{r:2,c:0},e:{r:2,c:21}},  // A3:V3
    {s:{r:6,c:6},e:{r:6,c:7}},   // G7:H7 (instructions merge)
    {s:{r:7,c:6},e:{r:7,c:7}},   // G8:H8
    {s:{r:8,c:6},e:{r:8,c:7}},   // G9:H9
  ];

  XLSX.utils.book_append_sheet(wb, ws2, 'Daily Attendance Report');

  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array', cellStyles:true});
  return new Blob([wbout], {type:'application/octet-stream'});
}


function generateHV0713Blob(logs, monthYear, showFinancials = false, absences = []) {
  return generatePriorityTrackerBlob(logs, monthYear, showFinancials, absences);
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

// ============ MAIN APP ============
const DATA_VERSION = "v2026-03-22-h"; // bump this to force reset stale localStorage

function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [routes, setRoutes] = useState(() => {
    try {
      if (localStorage.getItem('kts_data_version') !== DATA_VERSION) return ROUTES_DEFAULT;
      const s = localStorage.getItem('kts_routes');
      return s ? JSON.parse(s) : ROUTES_DEFAULT;
    } catch(e) { return ROUTES_DEFAULT; }
  });
  const [users, setUsers] = useState(() => {
    try {
      if (localStorage.getItem('kts_data_version') !== DATA_VERSION) return USERS_DEFAULT;
      const s = localStorage.getItem('kts_users');
      return s ? JSON.parse(s) : USERS_DEFAULT;
    } catch(e) { return USERS_DEFAULT; }
  });
  const [logs, setLogs] = useState(() => {
    try { const s = localStorage.getItem('kts_logs'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [inspections, setInspections] = useState(() => {
    try { const s = localStorage.getItem('kts_inspections'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [absences, setAbsences] = useState(() => {
    try { const s = localStorage.getItem('kts_absences'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [timeOffRequests, setTimeOffRequests] = useState(() => {
    try { const s = localStorage.getItem('kts_timeoff'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [vehicleServices, setVehicleServices] = useState(() => {
    try { const s = localStorage.getItem('kts_vehicle_services'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [appMode, setAppMode] = useState("dashboard");

  // Password change state
  const [showChangePw, setShowChangePw] = useState(false);
  const [pwForm, setPwForm] = useState({ current: '', newPw: '', confirm: '' });
  const [pwError, setPwError] = useState('');
  const [pwSuccess, setPwSuccess] = useState(false);

  // Persist to localStorage
  useEffect(() => {
    try {
      localStorage.setItem('kts_data_version', DATA_VERSION);
      localStorage.setItem('kts_routes', JSON.stringify(routes));
    } catch(e) {}
  }, [routes]);
  useEffect(() => { try { localStorage.setItem('kts_users', JSON.stringify(users)); } catch(e) {} }, [users]);
  useEffect(() => { try { localStorage.setItem('kts_logs', JSON.stringify(logs)); } catch(e) {} }, [logs]);
  useEffect(() => { try { localStorage.setItem('kts_inspections', JSON.stringify(inspections)); } catch(e) {} }, [inspections]);
  useEffect(() => { try { localStorage.setItem('kts_absences', JSON.stringify(absences)); } catch(e) {} }, [absences]);
  useEffect(() => { try { localStorage.setItem('kts_timeoff', JSON.stringify(timeOffRequests)); } catch(e) {} }, [timeOffRequests]);
  useEffect(() => { try { localStorage.setItem('kts_vehicle_services', JSON.stringify(vehicleServices)); } catch(e) {} }, [vehicleServices]);

  // Auto-download previous month when a new month starts
  useEffect(() => {
    if (!currentUser || !['admin','admin_assistant','manager'].includes(currentUser.role)) return;
    const now = new Date();
    const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    try {
      const lastAutoDownload = localStorage.getItem('kts_last_auto_download');
      if (lastAutoDownload && lastAutoDownload !== currentMonthKey) {
        const prevMonthLogs = logs.filter(l => l.date && l.date.startsWith(lastAutoDownload));
        if (prevMonthLogs.length > 0) {
          const [py, pm] = lastAutoDownload.split('-').map(Number);
          const monthName = new Date(py, pm-1, 1).toLocaleString('en-US',{month:'long',year:'numeric'});
          const isAdminUser = currentUser.role === 'admin';
          setTimeout(() => {
            if (window.confirm(`📅 New month detected! Auto-download ${monthName} reports now?`)) {
              const ktsBlob = generateKTSTrackerBlob(prevMonthLogs, routes, lastAutoDownload, isAdminUser, absences);
              if (ktsBlob) downloadBlob(ktsBlob, `KTS_Client_Tracker_${monthName.replace(' ','_')}.xlsx`);
              const ptBlob = generatePriorityTrackerBlob(prevMonthLogs, lastAutoDownload, isAdminUser, absences);
              if (ptBlob) downloadBlob(ptBlob, `Priority_Transportation_${monthName.replace(' ','_')}.xlsx`);
            }
          }, 1500);
        }
      }
      localStorage.setItem('kts_last_auto_download', currentMonthKey);
    } catch(e) {}
  }, [currentUser]);

  // ── Friday + Daily Reminder for absences and time-off ──────────────────
  useEffect(() => {
    if (!currentUser || !['admin','admin_assistant','manager'].includes(currentUser.role)) return;
    const now = new Date();
    const today = now.toISOString().slice(0,10);
    const dayOfWeek = now.getDay(); // 5 = Friday
    const dismissKey = `kts_reminder_dismissed_${today}`;
    if (localStorage.getItem(dismissKey)) return;

    // Collect upcoming absences for next 7 days
    const nextWeekDates = [];
    for (let i = 0; i <= 7; i++) {
      const d = new Date(now); d.setDate(d.getDate() + i);
      nextWeekDates.push(d.toISOString().slice(0,10));
    }

    setTimeout(() => {
      try {
        const stored = JSON.parse(localStorage.getItem('kts_absences') || '[]');
        const storedTO = JSON.parse(localStorage.getItem('kts_timeoff') || '[]');

        const upcomingAbsences = stored.filter(a =>
          nextWeekDates.some(d => d >= a.startDate && d <= (a.endDate || a.startDate))
        );
        const upcomingTimeOff = storedTO.filter(r =>
          r.status !== 'denied' && nextWeekDates.some(d => d >= r.startDate && d <= (r.endDate || r.startDate))
        );

        if (upcomingAbsences.length === 0 && upcomingTimeOff.length === 0) return;

        const isFriday = dayOfWeek === 5;
        const prefix = isFriday ? "📅 Weekly Preview — Next 7 Days\n\n" : "🔔 Daily Reminder\n\n";
        let msg = prefix;

        if (upcomingAbsences.length > 0) {
          msg += `PARTICIPANT ABSENCES (${upcomingAbsences.length}):\n`;
          upcomingAbsences.forEach(a => {
            const dateRange = a.endDate && a.endDate !== a.startDate ? `${a.startDate} → ${a.endDate}` : a.startDate;
            msg += `  • ${a.clientName}: ${dateRange} (${a.reason || a.type})\n`;
          });
          msg += "\n";
        }
        if (upcomingTimeOff.length > 0) {
          msg += `DRIVER TIME-OFF (${upcomingTimeOff.length}):\n`;
          upcomingTimeOff.forEach(r => {
            const dateRange = r.endDate && r.endDate !== r.startDate ? `${r.startDate} → ${r.endDate}` : r.startDate;
            msg += `  • ${r.driverName}: ${dateRange} — ${r.status.toUpperCase()}\n`;
          });
        }

        msg += "\nView Calendar tab for details.";
        if (window.confirm(msg + "\n\nDismiss for today?")) {
          localStorage.setItem(dismissKey, '1');
        }
      } catch(e) {}
    }, 2500);
  }, [currentUser]);

  const handleLogin = (user) => {
    setCurrentUser(user);
    if (user.role === "driver") setAppMode("field");
    else setAppMode("dashboard");
  };
  const handleLogout = () => { setCurrentUser(null); setAppMode("dashboard"); };
  const handleLogSubmit = (data) => {
    setLogs(prev => [...prev, { ...data, date: data.date || new Date().toISOString().slice(0,10), submittedAt: new Date().toISOString() }]);
  };
  const handleInspectionComplete = (data) => setInspections(prev => [...prev, data]);

  const handleChangePassword = () => {
    setPwError('');
    setPwSuccess(false);
    if (!pwForm.current || !pwForm.newPw || !pwForm.confirm) { setPwError('All fields are required.'); return; }
    const userRecord = users.find(u => u.id === currentUser.id);
    if (!userRecord || userRecord.password !== pwForm.current) { setPwError('Current password is incorrect.'); return; }
    if (pwForm.newPw.length < 6) { setPwError('New password must be at least 6 characters.'); return; }
    if (pwForm.newPw !== pwForm.confirm) { setPwError('New passwords do not match.'); return; }
    setUsers(prev => prev.map(u => u.id === currentUser.id ? { ...u, password: pwForm.newPw } : u));
    setPwSuccess(true);
    setPwForm({ current: '', newPw: '', confirm: '' });
    setTimeout(() => { setShowChangePw(false); setPwSuccess(false); }, 1500);
  };

  if (!currentUser) return <LoginScreen onLogin={handleLogin} users={users} />;

  const isAdminOrMgr = ['admin','admin_assistant','manager'].includes(currentUser.role);

  // Password change modal — available to everyone
  const ChangePasswordModal = () => (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:500,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <Card style={{ width:"100%", maxWidth:380 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <h3 style={{ color: COLORS.text, margin:0 }}>🔑 Change Password</h3>
          <button onClick={() => { setShowChangePw(false); setPwForm({current:'',newPw:'',confirm:''}); setPwError(''); setPwSuccess(false); }}
            style={{ background:"none", border:"none", color: COLORS.textMuted, fontSize:20, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
        <p style={{ color: COLORS.textDim, fontSize:12, margin:"0 0 14px" }}>Logged in as: <strong>{currentUser.name}</strong> (@{currentUser.username})</p>
        {pwSuccess ? (
          <div style={{ textAlign:"center", padding:"20px 0" }}>
            <p style={{ fontSize:32, margin:"0 0 8px" }}>✅</p>
            <p style={{ color:"#166534", fontWeight:700, fontSize:15, margin:0 }}>Password updated!</p>
          </div>
        ) : (
          <>
            <Input label="Current Password *" type="password" value={pwForm.current}
              onChange={e => setPwForm(p=>({...p,current:e.target.value}))} placeholder="Enter current password" />
            <Input label="New Password *" type="password" value={pwForm.newPw}
              onChange={e => setPwForm(p=>({...p,newPw:e.target.value}))} placeholder="At least 6 characters" />
            <Input label="Confirm New Password *" type="password" value={pwForm.confirm}
              onChange={e => setPwForm(p=>({...p,confirm:e.target.value}))} placeholder="Repeat new password" />
            {pwError && <p style={{ color: COLORS.red, fontSize:12, margin:"0 0 10px", background:"#fff0f0", padding:"8px 10px", borderRadius:6 }}>{pwError}</p>}
            <Btn onClick={handleChangePassword} style={{ width:"100%" }}>Update Password</Btn>
          </>
        )}
      </Card>
    </div>
  );

  // Bottom nav
  const BottomNav = () => (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0, background: COLORS.card,
      borderTop: `1px solid ${COLORS.border}`, padding: "6px 12px", display: "flex",
      justifyContent: "space-around", zIndex: 100, boxShadow: "0 -2px 8px rgba(0,0,0,0.06)",
    }}>
      {isAdminOrMgr && (
        <button onClick={() => setAppMode("dashboard")} style={{
          background: "none", border: "none", color: appMode === "dashboard" ? COLORS.accent : COLORS.textMuted,
          fontSize: 11, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          fontWeight: appMode === "dashboard" ? 700 : 400,
        }}>
          <span style={{ fontSize: 18 }}>📊</span>Dashboard
        </button>
      )}
      {isAdminOrMgr && (
        <button onClick={() => setAppMode("field")} style={{
          background: "none", border: "none", color: appMode === "field" ? COLORS.accent : COLORS.textMuted,
          fontSize: 11, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          fontWeight: appMode === "field" ? 700 : 400,
        }}>
          <span style={{ fontSize: 18 }}>🚐</span>Field Mode
        </button>
      )}
      <button onClick={() => { setShowChangePw(true); setPwForm({current:'',newPw:'',confirm:''}); setPwError(''); }} style={{
        background: "none", border: "none", color: COLORS.textMuted, fontSize: 11, cursor: "pointer",
        display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
      }}>
        <span style={{ fontSize: 18 }}>🔑</span>Password
      </button>
      <button onClick={handleLogout} style={{
        background: "none", border: "none", color: COLORS.textMuted, fontSize: 11, cursor: "pointer",
        display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
      }}>
        <span style={{ fontSize: 18 }}>🚪</span>Logout
      </button>
    </div>
  );

  if (currentUser.role === "driver") {
    return (
      <>
        <DriverDashboard user={currentUser} routes={routes} onSubmit={handleLogSubmit} onInspectionComplete={handleInspectionComplete} absences={absences} vehicleServices={vehicleServices} />
        <BottomNav />
        {showChangePw && <ChangePasswordModal />}
      </>
    );
  }

  if (currentUser.role === "va") {
    return (
      <>
        <VendorDashboard user={currentUser} routes={routes} logs={logs} inspections={inspections} vehicleServices={vehicleServices} absences={absences} />
        <BottomNav />
        {showChangePw && <ChangePasswordModal />}
      </>
    );
  }

  return (
    <>
      {appMode === "dashboard" ? (
        <AdminDashboard user={currentUser} routes={routes} setRoutes={setRoutes} users={users} setUsers={setUsers} logs={logs}
          absences={absences} setAbsences={setAbsences}
          timeOffRequests={timeOffRequests} setTimeOffRequests={setTimeOffRequests}
          vehicleServices={vehicleServices} setVehicleServices={setVehicleServices} />
      ) : (
        <DriverDashboard user={currentUser} routes={routes} onSubmit={handleLogSubmit} onInspectionComplete={handleInspectionComplete} absences={absences} vehicleServices={vehicleServices} />
      )}
      <BottomNav />
      {showChangePw && <ChangePasswordModal />}
    </>
  );
}

  <script>
    // Wait for Babel to be ready, then compile and run the app source
    function runApp() {
      try {
        var src = document.getElementById('app-source').textContent;
        var compiled = Babel.transform(src, { presets: ['react'] }).code;
        var script = document.createElement('script');
        script.textContent = compiled;
        document.body.appendChild(script);
      } catch(e) {
        document.getElementById('loading').innerHTML = '<p style="color:red;padding:20px">Compile error: ' + e.message + '</p>';
      }
    }
    function waitForBabel(attempts) {
      if (typeof Babel !== 'undefined' && typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
        runApp();
      } else if (attempts > 0) {
        setTimeout(function() { waitForBabel(attempts - 1); }, 200);
      } else {
        document.getElementById('loading').innerHTML = '<p style="color:red;padding:20px;text-align:center">Failed to load required libraries. Check your internet connection and refresh.</p>';
      }
    }
    waitForBabel(50); // try for up to 10 seconds
  </script>
