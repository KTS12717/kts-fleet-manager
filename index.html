// ── Service History sub-panel ──
function ServiceHistoryPanel({ vehicle, vehicleServices, setVehicleServices, rows, currentMileage, canEdit, currentUser }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const blank = { scheduleKey:SERVICE_SCHEDULES[0].key, customServiceName:'', date:new Date().toISOString().slice(0,10), mileageAtService:String(currentMileage || vehicle.initialMileage || ''), notes:'' };
  const [form, setForm] = useState(blank);
  // Persistent, alphabetized custom service types (shared w/ VehicleServiceTab via localStorage)
  const [customServiceTypes, setCustomServiceTypes] = useState(loadCustomServiceTypes);
  useEffect(() => { saveCustomServiceTypes(customServiceTypes); }, [customServiceTypes]);
  const serviceTypeOptions = buildServiceTypeOptions(customServiceTypes);
  // In-app modal for entering a new custom service name (window.prompt doesn't work in iOS PWA mode)
  const [customModal, setCustomModal] = useState({ open:false, input:'' });
  const openCustomModal = () => setCustomModal({ open:true, input:'' });
  const confirmCustomModal = () => {
    const name = String(customModal.input || '').trim();
    if (!name) return;
    // Add to persistent list (alphabetized), avoiding duplicates (case-insensitive)
    setCustomServiceTypes(prev => {
      const existing = prev.find(n => n.toLowerCase() === name.toLowerCase());
      if (existing) return prev;
      return [...prev, name].sort((a,b) => a.localeCompare(b, undefined, { sensitivity:'base' }));
    });
    setForm(p => ({ ...p, scheduleKey:`custom:${name}`, customServiceName:name }));
    setCustomModal({ open:false, input:'' });
  };
  const cancelCustomModal = () => setCustomModal({ open:false, input:'' });

  // In-app delete confirm (window.confirm fails in iOS PWA mode)
  const [deleteModal, setDeleteModal] = useState({ open:false, id:null, label:'' });
  const openDeleteModal = (row) => setDeleteModal({
    open:true,
    id:row.id,
    label:`${row.serviceTask || 'Service entry'} — ${row.date || ''}${row.meterLabel ? ` · ${row.meterLabel}` : ''}`,
  });
  const cancelDeleteModal = () => setDeleteModal({ open:false, id:null, label:'' });
  const confirmDelete = () => {
    const id = deleteModal.id;
    if (!id) { cancelDeleteModal(); return; }
    setVehicleServices(prev => prev.filter(s => s.id !== id));
    cancelDeleteModal();
  };

  const openAdd = () => { setEditingId(null); setForm({ ...blank, mileageAtService:String(currentMileage || vehicle.initialMileage || '') }); setShowAdd(true); };
  const openEdit = (row) => {
    setEditingId(row.id);
    setForm({
      scheduleKey: row.scheduleKey || SERVICE_SCHEDULES[0].key,
      customServiceName: row.scheduleKey && String(row.scheduleKey).startsWith('custom:') ? String(row.scheduleKey).replace(/^custom:/, '') : '',
      date: row.date || new Date().toISOString().slice(0,10),
      mileageAtService: String(row.mileageAtService || ''),
      notes: row.notes || '',
    });
    setShowAdd(true);
  };

  const save = () => {
    if (!form.date) return alert('Service date is required');
    if (!String(form.mileageAtService).trim()) return alert('Mileage is required');
    const schedule = SERVICE_SCHEDULES.find(s => s.key === form.scheduleKey);
    const customName = String(form.customServiceName || '').trim();
    const resolvedServiceName = schedule?.serviceName || customName || String(form.scheduleKey || '').replace(/^custom:/, '').trim();
    const resolvedScheduleKey = schedule?.key || `custom:${resolvedServiceName}`;
    if (!resolvedServiceName) return alert('Select or enter a service type');
    const payload = {
      id: editingId || `svc_${Date.now()}`,
      serviceType:'history',
      vehicleId: vehicle.id,
      vehicleNumber: vehicle.vehicleNumber,
      vehicleName: vehicle.vehicleNumber,
      vin: vehicle.vin || '',
      scheduleKey: resolvedScheduleKey,
      type: resolvedServiceName,
      date: form.date,
      mileageAtService: form.mileageAtService,
      notes: form.notes || '',
      createdBy: editingId ? undefined : currentUser.name,
      createdAt: editingId ? undefined : new Date().toISOString(),
      updatedBy: editingId ? currentUser.name : undefined,
      updatedAt: editingId ? new Date().toISOString() : undefined,
    };
    setVehicleServices(prev => editingId
      ? prev.map(s => s.id === editingId ? { ...s, ...payload } : s)
      : [...prev, payload]);
    setShowAdd(false);
    setEditingId(null);
    setForm(blank);
  };

  // ── Fleetio import ──
  const [importState, setImportState] = useState({ open:false, rows:[], fileName:'', errors:[] });

  // Simple CSV line parser that handles quoted fields containing commas and newlines
  const parseCSV = (text) => {
    const rows = [];
    let cur = [];
    let field = '';
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inQuotes) {
        if (ch === '"') {
          if (text[i+1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += ch;
        }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { cur.push(field); field = ''; }
        else if (ch === '\r') { /* skip */ }
        else if (ch === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
        else { field += ch; }
      }
    }
    if (field.length > 0 || cur.length > 0) { cur.push(field); rows.push(cur); }
    return rows.filter(r => r.some(c => String(c).trim() !== ''));
  };

  // Find a column index case-insensitively, matching any of the provided aliases
  const findCol = (header, aliases) => {
    const norm = s => String(s || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '');
    const normHeader = header.map(norm);
    for (const alias of aliases) {
      const idx = normHeader.indexOf(norm(alias));
      if (idx !== -1) return idx;
    }
    return -1;
  };

  // Convert "04/10/2026", "2026-04-10", "4/10/26" → "YYYY-MM-DD"
  const parseDate = (s) => {
    if (!s) return '';
    const str = String(s).trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(str)) return str.slice(0, 10);
    const m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (m) {
      let [, mo, d, y] = m;
      if (y.length === 2) y = (Number(y) > 50 ? '19' : '20') + y;
      return `${y}-${String(mo).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }
    // Fallback via Date
    const dt = new Date(str);
    if (!Number.isNaN(dt.getTime())) return dt.toISOString().slice(0, 10);
    return '';
  };

  // Strip "92,087 mi" → "92087"
  const parseMileage = (s) => {
    if (!s && s !== 0) return '';
    return String(s).replace(/[^\d.]/g, '');
  };

  const processParsedRows = (rawRows, fileName) => {
    if (rawRows.length < 2) {
      alert('File appears to be empty or missing a header row.');
      return;
    }
    const header = rawRows[0].map(h => String(h).trim());
    const dateIdx    = findCol(header, ['Completion Date','Actual Completion Date','Date Completed','Service Date','Date']);
    const meterIdx   = findCol(header, ['Meter','Meter Entry','Mileage','Odometer']);
    const tasksIdx   = findCol(header, ['Service Tasks','Service Task','Services Performed','Tasks','Service']);
    const notesIdx   = findCol(header, ['Notes','Comments','Description','Memo']);
    const vendorIdx  = findCol(header, ['Vendor','Shop','Service Provider','Performed By']);
    const workOrdIdx = findCol(header, ['Work Order','WO','WO #','Work Order #']);

    if (dateIdx === -1 && tasksIdx === -1) {
      alert('Could not find "Completion Date" or "Service Tasks" columns. Please export the Service History report from Fleetio.');
      return;
    }

    const parsed = [];
    const errors = [];
    for (let i = 1; i < rawRows.length; i++) {
      const row = rawRows[i];
      const dateStr = dateIdx >= 0 ? parseDate(row[dateIdx]) : '';
      const meterStr = meterIdx >= 0 ? parseMileage(row[meterIdx]) : '';
      const tasksStr = tasksIdx >= 0 ? String(row[tasksIdx] || '').trim() : '';
      const notesStr = notesIdx >= 0 ? String(row[notesIdx] || '').trim() : '';
      const vendorStr = vendorIdx >= 0 ? String(row[vendorIdx] || '').trim() : '';
      const workOrdStr = workOrdIdx >= 0 ? String(row[workOrdIdx] || '').trim() : '';

      if (!dateStr && !tasksStr) continue; // skip blank rows

      if (!dateStr) { errors.push(`Row ${i+1}: could not parse date "${row[dateIdx] || ''}"`); continue; }
      if (!tasksStr) { errors.push(`Row ${i+1}: no service task`); continue; }

      // Fleetio often lists multiple tasks separated by newlines; turn into " + "
      const serviceName = tasksStr.split(/\r?\n/).map(t => t.trim()).filter(Boolean).join(' + ');

      parsed.push({
        date: dateStr,
        mileageAtService: meterStr,
        type: serviceName,
        scheduleKey: `custom:${serviceName}`,
        notes: [notesStr, vendorStr ? `Vendor: ${vendorStr}` : '', workOrdStr ? `WO: ${workOrdStr}` : ''].filter(Boolean).join(' · '),
      });
    }

    setImportState({ open:true, rows:parsed, fileName, errors });
  };

  const handleImportFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const ext = String(file.name).toLowerCase().split('.').pop();
    if (ext === 'csv' || ext === 'txt') {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = String(reader.result || '');
          const rawRows = parseCSV(text);
          processParsedRows(rawRows, file.name);
        } catch (err) {
          alert('Failed to read CSV file: ' + err.message);
        }
      };
      reader.readAsText(file);
    } else if (ext === 'xlsx' || ext === 'xls') {
      if (typeof XLSX === 'undefined') {
        alert('Spreadsheet library did not load. Try exporting as CSV from Fleetio instead.');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const wb = XLSX.read(new Uint8Array(reader.result), { type:'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rawRows = XLSX.utils.sheet_to_json(sheet, { header:1, raw:false, defval:'' });
          processParsedRows(rawRows, file.name);
        } catch (err) {
          alert('Failed to read Excel file: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      alert('Unsupported file type. Please upload a .csv, .xlsx, or .xls file.');
    }
    e.target.value = '';
  };

  const confirmImport = () => {
    if (!importState.rows.length) { setImportState({ open:false, rows:[], fileName:'', errors:[] }); return; }
    const newEntries = importState.rows.map((r, idx) => ({
      id: `svc_fleetio_${Date.now()}_${idx}`,
      serviceType: 'history',
      vehicleId: vehicle.id,
      vehicleNumber: vehicle.vehicleNumber,
      vehicleName: vehicle.vehicleNumber,
      vin: vehicle.vin || '',
      scheduleKey: r.scheduleKey,
      type: r.type,
      date: r.date,
      mileageAtService: r.mileageAtService,
      notes: r.notes || '',
      source: 'fleetio',
      importedFrom: importState.fileName,
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    }));
    setVehicleServices(prev => [...prev, ...newEntries]);
    alert(`Imported ${newEntries.length} service entries from ${importState.fileName}.`);
    setImportState({ open:false, rows:[], fileName:'', errors:[] });
  };

  const cancelImport = () => setImportState({ open:false, rows:[], fileName:'', errors:[] });


  return (
    <Card>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, flexWrap:'wrap', gap:8 }}>
        <h4 style={{ color:COLORS.text, margin:0 }}>🔧 Service History</h4>
        {canEdit && (
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            <label style={{ padding:'8px 12px', border:`1px solid ${COLORS.accent}`, borderRadius:8, color:COLORS.accent, background:'#fff', cursor:'pointer', fontSize:12, fontWeight:700, display:'inline-flex', alignItems:'center', gap:6 }}>
              📤 Import from Fleetio
              <input type='file' accept='.csv,.xlsx,.xls' onChange={handleImportFile} style={{ display:'none' }} />
            </label>
            <Btn small onClick={openAdd}>+ Add Service</Btn>
          </div>
        )}
      </div>
      {importState.open && canEdit && (
        <div style={{ position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999, padding:16 }}>
          <div style={{ background:'#fff', borderRadius:12, padding:20, maxWidth:720, width:'100%', maxHeight:'85vh', overflow:'auto' }}>
            <h3 style={{ color:COLORS.text, margin:'0 0 8px' }}>📤 Import from Fleetio</h3>
            <p style={{ color:COLORS.textMuted, fontSize:13, margin:'0 0 12px' }}>
              File: <strong>{importState.fileName}</strong> · {importState.rows.length} service entries ready to import to vehicle <strong>{vehicle.vehicleNumber}</strong>
              {importState.errors.length > 0 && <> · <span style={{ color:COLORS.red }}>{importState.errors.length} row{importState.errors.length === 1 ? '' : 's'} skipped</span></>}
            </p>
            {importState.rows.length === 0 ? (
              <div style={{ padding:12, background:'#fef2f2', border:`1px solid ${COLORS.red}44`, borderRadius:8, color:COLORS.red, fontSize:13 }}>
                No valid rows found. Make sure the file contains columns for <strong>Completion Date</strong> and <strong>Service Tasks</strong>.
              </div>
            ) : (
              <div style={{ border:`1px solid ${COLORS.border}`, borderRadius:8, overflow:'auto', maxHeight:'45vh' }}>
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                  <thead style={{ position:'sticky', top:0, background:'#f8fafc', zIndex:1 }}>
                    <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
                      <th style={{ textAlign:'left', padding:'8px', color:COLORS.textDim }}>Date</th>
                      <th style={{ textAlign:'left', padding:'8px', color:COLORS.textDim }}>Mileage</th>
                      <th style={{ textAlign:'left', padding:'8px', color:COLORS.textDim }}>Service</th>
                      <th style={{ textAlign:'left', padding:'8px', color:COLORS.textDim }}>Notes</th>
                    </tr>
                  </thead>
                  <tbody>
                    {importState.rows.slice(0, 200).map((r, i) => (
                      <tr key={i} style={{ borderBottom:`1px solid ${COLORS.border}` }}>
                        <td style={{ padding:'6px 8px', color:COLORS.text }}>{r.date}</td>
                        <td style={{ padding:'6px 8px', color:COLORS.text }}>{r.mileageAtService ? Number(r.mileageAtService).toLocaleString() + ' mi' : '—'}</td>
                        <td style={{ padding:'6px 8px', color:COLORS.text, fontWeight:600 }}>{r.type}</td>
                        <td style={{ padding:'6px 8px', color:COLORS.textMuted }}>{r.notes || '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {importState.rows.length > 200 && (
                  <p style={{ padding:'8px 12px', color:COLORS.textMuted, fontSize:11, margin:0, background:'#f8fafc' }}>Showing first 200 of {importState.rows.length} rows. All will be imported.</p>
                )}
              </div>
            )}
            {importState.errors.length > 0 && (
              <details style={{ marginTop:10 }}>
                <summary style={{ color:COLORS.red, fontSize:12, cursor:'pointer', fontWeight:600 }}>{importState.errors.length} row{importState.errors.length === 1 ? '' : 's'} had issues and were skipped</summary>
                <ul style={{ color:COLORS.red, fontSize:11, margin:'6px 0 0 18px' }}>
                  {importState.errors.slice(0, 20).map((e, i) => <li key={i}>{e}</li>)}
                  {importState.errors.length > 20 && <li>… and {importState.errors.length - 20} more</li>}
                </ul>
              </details>
            )}
            <div style={{ display:'flex', gap:8, marginTop:14, justifyContent:'flex-end' }}>
              <Btn small outline onClick={cancelImport}>Cancel</Btn>
              {importState.rows.length > 0 && <Btn small onClick={confirmImport}>Import {importState.rows.length} entries</Btn>}
            </div>
          </div>
        </div>
      )}
      {customModal.open && (
        <div style={{ position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999, padding:16 }}>
          <div style={{ background:'#fff', borderRadius:12, padding:20, maxWidth:420, width:'100%' }}>
            <h3 style={{ color:COLORS.text, margin:'0 0 8px' }}>New Service Type</h3>
            <p style={{ color:COLORS.textMuted, fontSize:13, margin:'0 0 12px' }}>
              Enter a name for the new service type. It will be saved and available for all future service entries.
            </p>
            <input
              type='text'
              autoFocus
              value={customModal.input}
              onChange={e => setCustomModal(p => ({ ...p, input:e.target.value }))}
              onKeyDown={e => { if (e.key === 'Enter') confirmCustomModal(); if (e.key === 'Escape') cancelCustomModal(); }}
              placeholder='e.g. Coolant flush'
              style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text, fontSize:14, marginBottom:14 }}
            />
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <Btn small outline onClick={cancelCustomModal}>Cancel</Btn>
              <Btn small onClick={confirmCustomModal} disabled={!String(customModal.input).trim()}>Save</Btn>
            </div>
          </div>
        </div>
      )}
      {deleteModal.open && canEdit && (
        <div style={{ position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999, padding:16 }}>
          <div style={{ background:'#fff', borderRadius:12, padding:20, maxWidth:460, width:'100%' }}>
            <h3 style={{ color:COLORS.red, margin:'0 0 8px' }}>⚠️ Delete Service Entry?</h3>
            <p style={{ color:COLORS.text, fontSize:13, margin:'0 0 10px' }}>
              You are about to permanently delete this service entry:
            </p>
            <div style={{ padding:'10px 12px', background:'#fef2f2', border:`1px solid ${COLORS.red}44`, borderRadius:8, marginBottom:12 }}>
              <div style={{ color:COLORS.text, fontSize:14, fontWeight:700 }}>{deleteModal.label}</div>
              <div style={{ color:COLORS.textMuted, fontSize:11, marginTop:4 }}>Vehicle #{vehicle.vehicleNumber}</div>
            </div>
            <p style={{ color:COLORS.textMuted, fontSize:12, margin:'0 0 14px' }}>
              This action cannot be undone. Service reminders for this vehicle will recalculate from the most recent remaining entry.
            </p>
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <Btn small outline onClick={cancelDeleteModal}>Cancel</Btn>
              <Btn small color={COLORS.red} onClick={confirmDelete}>Delete entry</Btn>
            </div>
          </div>
        </div>
      )}
      {showAdd && canEdit && (
        <div style={{ background:'#f8fafc', border:`1px solid ${COLORS.border}`, borderRadius:10, padding:12, marginBottom:12 }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:10 }}>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Service Type</label>
              <select value={form.scheduleKey} onChange={e => {
                const val = e.target.value;
                if (val === '__other__') {
                  openCustomModal();
                } else {
                  setForm(p => ({ ...p, scheduleKey:val, customServiceName: String(val).startsWith('custom:') ? String(val).replace(/^custom:/, '') : '' }));
                }
              }} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }}>
                {serviceTypeOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Date</label>
              <input type='date' value={form.date} onChange={e=>setForm(p=>({...p, date:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Mileage</label>
              <input type='number' value={form.mileageAtService} onChange={e=>setForm(p=>({...p, mileageAtService:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div style={{ gridColumn:'1 / -1' }}>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Notes</label>
              <textarea value={form.notes} onChange={e=>setForm(p=>({...p, notes:e.target.value}))} rows={2} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text, resize:'vertical' }} />
            </div>
          </div>
          <div style={{ display:'flex', gap:8, marginTop:10 }}>
            <Btn small onClick={save}>{editingId ? 'Save Changes' : 'Save Entry'}</Btn>
            <Btn small outline onClick={() => { setShowAdd(false); setEditingId(null); setForm(blank); }}>Cancel</Btn>
          </div>
        </div>
      )}
      <div style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
              <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Date</th>
              <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Mileage</th>
              <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Service</th>
              <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Notes</th>
              {canEdit && <th style={{ padding:'10px 8px' }}></th>}
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 ? (
              <tr><td colSpan={canEdit ? 5 : 4} style={{ padding:'12px 8px', color:COLORS.textMuted }}>No service history recorded.</td></tr>
            ) : rows.map(item => (
              <tr key={item.id} style={{ borderBottom:`1px solid ${COLORS.border}`, background: item.source === 'fleetio' ? '#f8fafc' : 'transparent' }}>
                <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.date}</td>
                <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.meterLabel}</td>
                <td style={{ padding:'10px 8px', color:COLORS.text, fontWeight:700 }}>
                  {item.serviceTask}
                  {item.source === 'fleetio' && <span style={{ marginLeft:6, fontSize:10, fontWeight:700, color:'#1d4ed8', background:'#dbeafe', padding:'1px 6px', borderRadius:8 }}>Fleetio</span>}
                </td>
                <td style={{ padding:'10px 8px', color:COLORS.textMuted, fontSize:12 }}>{item.notes || '—'}</td>
                {canEdit && (
                  <td style={{ padding:'10px 8px', textAlign:'right', whiteSpace:'nowrap' }}>
                    <button onClick={() => openEdit(item)} title='Edit' style={{ background:'none', border:`1px solid ${COLORS.border}`, borderRadius:6, color:COLORS.textMuted, padding:'3px 8px', cursor:'pointer', marginRight:4, fontSize:12 }}>✏️</button>
                    <button onClick={() => openDeleteModal(item)} title='Delete this service entry' style={{ background:'none', border:`1px solid ${COLORS.red}44`, borderRadius:6, color:COLORS.red, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✕ Delete</button>
                  </td>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

// ── Inspection History sub-panel ──
function InspectionHistoryPanel({ vehicle, inspections, setInspections, routes, canEdit, currentUser }) {
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({ date:'', notes:'', override:false });

  const openEdit = (insp) => {
    setEditingId(insp.id || insp.submittedAt);
    setEditForm({ date: insp.date || '', notes: insp.notes || '', override: !!insp.override });
  };
  const saveEdit = () => {
    setInspections(prev => prev.map(i => {
      const key = i.id || i.submittedAt;
      if (key !== editingId) return i;
      return { ...i, date:editForm.date, notes:editForm.notes, override:editForm.override, updatedBy:currentUser.name, updatedAt:new Date().toISOString() };
    }));
    setEditingId(null);
  };
  const remove = (insp) => {
    if (!window.confirm('Delete this inspection record?')) return;
    const key = insp.id || insp.submittedAt;
    setInspections(prev => prev.filter(i => (i.id || i.submittedAt) !== key));
  };

  return (
    <Card>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
        <h4 style={{ color:COLORS.text, margin:0 }}>🔍 Inspection History</h4>
        <p style={{ color:COLORS.textMuted, fontSize:12, margin:0 }}>{inspections.length} record{inspections.length === 1 ? '' : 's'}</p>
      </div>
      {inspections.length === 0 ? (
        <p style={{ color:COLORS.textMuted, fontSize:13, margin:0 }}>No inspections recorded for this vehicle yet.</p>
      ) : (
        [...inspections].sort((a,b) => String(b.date || b.submittedAt || '').localeCompare(String(a.date || a.submittedAt || ''))).map((insp, idx) => {
          const key = insp.id || insp.submittedAt || idx;
          const isEditing = editingId === key;
          const failedItems = Object.entries(insp.items || {}).filter(([,v]) => v === 'fail');
          return (
            <div key={key} style={{ border:`1px solid ${COLORS.border}`, borderLeft:`3px solid ${insp.override ? COLORS.red : (failedItems.length ? COLORS.yellow : '#166534')}`, borderRadius:8, padding:12, marginBottom:8 }}>
              {isEditing ? (
                <div>
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:10 }}>
                    <div>
                      <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Date</label>
                      <input type='date' value={editForm.date} onChange={e=>setEditForm(p=>({...p, date:e.target.value}))} style={{ width:'100%', padding:'8px 10px', border:`1px solid ${COLORS.border}`, borderRadius:6, color:COLORS.text }} />
                    </div>
                    <div>
                      <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Override Flag</label>
                      <select value={editForm.override ? 'yes' : 'no'} onChange={e=>setEditForm(p=>({...p, override:e.target.value === 'yes'}))} style={{ width:'100%', padding:'8px 10px', border:`1px solid ${COLORS.border}`, borderRadius:6, color:COLORS.text }}>
                        <option value='no'>No — completed normally</option>
                        <option value='yes'>Yes — bypass used</option>
                      </select>
                    </div>
                    <div style={{ gridColumn:'1 / -1' }}>
                      <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Notes</label>
                      <textarea rows={2} value={editForm.notes} onChange={e=>setEditForm(p=>({...p, notes:e.target.value}))} style={{ width:'100%', padding:'8px 10px', border:`1px solid ${COLORS.border}`, borderRadius:6, color:COLORS.text, resize:'vertical' }} />
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:8, marginTop:10 }}>
                    <Btn small onClick={saveEdit}>Save</Btn>
                    <Btn small outline onClick={() => setEditingId(null)}>Cancel</Btn>
                  </div>
                </div>
              ) : (
                <div style={{ display:'flex', justifyContent:'space-between', gap:10, alignItems:'flex-start', flexWrap:'wrap' }}>
                  <div style={{ flex:1, minWidth:200 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:4 }}>
                      <span style={{ color:COLORS.text, fontWeight:700, fontSize:14 }}>{insp.date || String(insp.submittedAt || '').slice(0,10) || 'Unknown date'}</span>
                      <span style={{ background:'#f1f5f9', color:COLORS.textMuted, fontSize:11, padding:'2px 8px', borderRadius:10 }}>{insp.driver || 'Unknown driver'}</span>
                      {insp.override && <span style={{ background:'#fee2e2', color:COLORS.red, fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>⚠️ Override</span>}
                      {failedItems.length > 0 && <span style={{ background:'#fef9c3', color:'#92400e', fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>{failedItems.length} failure{failedItems.length === 1 ? '' : 's'}</span>}
                      {failedItems.length === 0 && !insp.override && <span style={{ background:'#dcfce7', color:'#166534', fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>✓ Passed</span>}
                    </div>
                    {insp.items && (
                      <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginTop:4 }}>
                        {Object.entries(insp.items).map(([k,v]) => (
                          <span key={k} style={{ fontSize:10, padding:'2px 7px', borderRadius:10, fontWeight:600,
                            background: v==='pass'?'#dcfce7':v==='fail'?'#fee2e2':'#fef3c7',
                            color: v==='pass'?'#166534':v==='fail'?COLORS.red:'#92400e' }}>{k}: {v}</span>
                        ))}
                      </div>
                    )}
                    {insp.notes && <p style={{ color:COLORS.textMuted, fontSize:12, margin:'6px 0 0', fontStyle:'italic' }}>{insp.notes}</p>}
                  </div>
                  {canEdit && (
                    <div style={{ display:'flex', gap:4 }}>
                      <button onClick={() => openEdit(insp)} style={{ background:'none', border:`1px solid ${COLORS.border}`, borderRadius:6, color:COLORS.textMuted, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✏️</button>
                      <button onClick={() => remove(insp)} style={{ background:'none', border:`1px solid ${COLORS.red}44`, borderRadius:6, color:COLORS.red, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✕</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })
      )}
    </Card>
  );
}

// ── Warranty sub-panel ──
function WarrantyPanel({ vehicle, warranties, setVehicleWarranties, canEdit, currentUser }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const blank = { title:'', vendor:'', startDate:'', expirationDate:'', notes:'', docName:'', docData:'', docType:'' };
  const [form, setForm] = useState(blank);

  const openAdd = () => { setEditingId(null); setForm(blank); setShowAdd(true); };
  const openEdit = (w) => {
    setEditingId(w.id);
    setForm({ title:w.title||'', vendor:w.vendor||'', startDate:w.startDate||'', expirationDate:w.expirationDate||'', notes:w.notes||'', docName:w.docName||'', docData:w.docData||'', docType:w.docType||'' });
    setShowAdd(true);
  };
  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('File is larger than 2 MB. Please use a smaller file.'); e.target.value = ''; return; }
    const reader = new FileReader();
    reader.onload = () => {
      setForm(p => ({ ...p, docName:file.name, docType:file.type, docData:String(reader.result || '') }));
    };
    reader.readAsDataURL(file);
  };
  const clearFile = () => setForm(p => ({ ...p, docName:'', docData:'', docType:'' }));

  const save = () => {
    if (!String(form.title).trim()) return alert('Warranty title is required');
    const payload = {
      id: editingId || `war_${Date.now()}`,
      vehicleNumber: vehicle.vehicleNumber,
      title: String(form.title).trim(),
      vendor: String(form.vendor || '').trim(),
      startDate: form.startDate || '',
      expirationDate: form.expirationDate || '',
      notes: form.notes || '',
      docName: form.docName || '',
      docType: form.docType || '',
      docData: form.docData || '',
      createdBy: editingId ? undefined : currentUser.name,
      createdAt: editingId ? undefined : new Date().toISOString(),
      updatedBy: editingId ? currentUser.name : undefined,
      updatedAt: editingId ? new Date().toISOString() : undefined,
    };
    setVehicleWarranties(prev => editingId
      ? prev.map(w => w.id === editingId ? { ...w, ...payload } : w)
      : [...prev, payload]);
    setShowAdd(false);
    setEditingId(null);
    setForm(blank);
  };
  const remove = (id) => {
    if (!window.confirm('Delete this warranty record and its attached document?')) return;
    setVehicleWarranties(prev => prev.filter(w => w.id !== id));
  };

  const today = new Date().toISOString().slice(0,10);

  return (
    <Card>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, flexWrap:'wrap', gap:8 }}>
        <h4 style={{ color:COLORS.text, margin:0 }}>📄 Warranties</h4>
        {canEdit && <Btn small onClick={openAdd}>+ Add Warranty</Btn>}
      </div>
      {showAdd && canEdit && (
        <div style={{ background:'#f8fafc', border:`1px solid ${COLORS.border}`, borderRadius:10, padding:12, marginBottom:12 }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:10 }}>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Title *</label>
              <input value={form.title} onChange={e=>setForm(p=>({...p, title:e.target.value}))} placeholder='e.g. Bumper-to-bumper' style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Vendor / Provider</label>
              <input value={form.vendor} onChange={e=>setForm(p=>({...p, vendor:e.target.value}))} placeholder='e.g. Toyota' style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Start Date</label>
              <input type='date' value={form.startDate} onChange={e=>setForm(p=>({...p, startDate:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Expiration Date</label>
              <input type='date' value={form.expirationDate} onChange={e=>setForm(p=>({...p, expirationDate:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div style={{ gridColumn:'1 / -1' }}>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Notes</label>
              <textarea rows={2} value={form.notes} onChange={e=>setForm(p=>({...p, notes:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text, resize:'vertical' }} />
            </div>
            <div style={{ gridColumn:'1 / -1' }}>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Document (PDF or image, max 2 MB)</label>
              {form.docName ? (
                <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', background:'#fff', border:`1px solid ${COLORS.border}`, borderRadius:8 }}>
                  <span style={{ fontSize:20 }}>📎</span>
                  <span style={{ flex:1, color:COLORS.text, fontSize:13 }}>{form.docName}</span>
                  <button onClick={clearFile} style={{ background:'none', border:`1px solid ${COLORS.red}44`, borderRadius:6, color:COLORS.red, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>Remove</button>
                </div>
              ) : (
                <input type='file' accept='application/pdf,image/*' onChange={handleFile} style={{ width:'100%', padding:'8px', color:COLORS.text }} />
              )}
            </div>
          </div>
          <div style={{ display:'flex', gap:8, marginTop:10 }}>
            <Btn small onClick={save}>{editingId ? 'Save Changes' : 'Save Warranty'}</Btn>
            <Btn small outline onClick={() => { setShowAdd(false); setEditingId(null); setForm(blank); }}>Cancel</Btn>
          </div>
        </div>
      )}
      {warranties.length === 0 ? (
        <p style={{ color:COLORS.textMuted, fontSize:13, margin:0 }}>No warranties recorded.</p>
      ) : (
        warranties.map(w => {
          const expired = w.expirationDate && w.expirationDate < today;
          return (
            <div key={w.id} style={{ border:`1px solid ${COLORS.border}`, borderLeft:`3px solid ${expired ? COLORS.red : '#166534'}`, borderRadius:8, padding:12, marginBottom:8 }}>
              <div style={{ display:'flex', justifyContent:'space-between', gap:10, alignItems:'flex-start', flexWrap:'wrap' }}>
                <div style={{ flex:1, minWidth:200 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:4 }}>
                    <span style={{ color:COLORS.text, fontWeight:700, fontSize:14 }}>{w.title}</span>
                    {w.vendor && <span style={{ color:COLORS.textMuted, fontSize:12 }}>· {w.vendor}</span>}
                    {expired
                      ? <span style={{ background:'#fee2e2', color:COLORS.red, fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>Expired</span>
                      : w.expirationDate && <span style={{ background:'#dcfce7', color:'#166534', fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>Active</span>}
                  </div>
                  <div style={{ color:COLORS.textMuted, fontSize:12 }}>
                    {w.startDate && <>From {w.startDate}</>}{w.startDate && w.expirationDate && ' · '}{w.expirationDate && <>Expires {w.expirationDate}</>}
                  </div>
                  {w.notes && <p style={{ color:COLORS.textMuted, fontSize:12, margin:'6px 0 0' }}>{w.notes}</p>}
                  {w.docData && (
                    <div style={{ marginTop:6 }}>
                      <a href={w.docData} download={w.docName || 'warranty'} style={{ display:'inline-flex', alignItems:'center', gap:6, color:COLORS.accent, fontSize:12, textDecoration:'none', padding:'4px 8px', border:`1px solid ${COLORS.accent}44`, borderRadius:6 }}>
                        📎 {w.docName || 'Download document'}
                      </a>
                    </div>
                  )}
                </div>
                {canEdit && (
                  <div style={{ display:'flex', gap:4 }}>
                    <button onClick={() => openEdit(w)} style={{ background:'none', border:`1px solid ${COLORS.border}`, borderRadius:6, color:COLORS.textMuted, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✏️</button>
                    <button onClick={() => remove(w.id)} style={{ background:'none', border:`1px solid ${COLORS.red}44`, borderRadius:6, color:COLORS.red, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✕</button>
                  </div>
                )}
              </div>
            </div>
          );
        })
      )}
    </Card>
  );
}

// ── Issues sub-panel ──
function IssuesPanel({ vehicle, vehicleServices, setVehicleServices, rows, currentMileage, canEdit, currentUser }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const blank = { issueTitle:'', issuePriority:'Standard', issueStatus:'Open', date:new Date().toISOString().slice(0,10), mileageAtService:String(currentMileage || vehicle.initialMileage || ''), notes:'' };
  const [form, setForm] = useState(blank);

  // In-app delete confirm (window.confirm fails in iOS PWA mode)
  const [deleteModal, setDeleteModal] = useState({ open:false, id:null, label:'' });
  const openDeleteModal = (row) => setDeleteModal({
    open:true,
    id:row.id,
    label:`${row.issueTitle || row.type || 'Issue'} — ${row.date || ''}`,
  });
  const cancelDeleteModal = () => setDeleteModal({ open:false, id:null, label:'' });
  const confirmDelete = () => {
    const id = deleteModal.id;
    if (!id) { cancelDeleteModal(); return; }
    setVehicleServices(prev => prev.filter(s => s.id !== id));
    cancelDeleteModal();
  };

  const openAdd = () => { setEditingId(null); setForm({ ...blank, mileageAtService:String(currentMileage || vehicle.initialMileage || '') }); setShowAdd(true); };
  const openEdit = (row) => {
    setEditingId(row.id);
    setForm({
      issueTitle: row.issueTitle || row.type || '',
      issuePriority: row.issuePriority || 'Standard',
      issueStatus: row.issueStatus || 'Open',
      date: row.date || new Date().toISOString().slice(0,10),
      mileageAtService: String(row.mileageAtService || ''),
      notes: row.notes || '',
    });
    setShowAdd(true);
  };

  const save = () => {
    if (!String(form.issueTitle).trim()) return alert('Issue title is required');
    if (!form.date) return alert('Date is required');
    const payload = {
      id: editingId || `iss_${Date.now()}`,
      serviceType:'issue',
      vehicleId: vehicle.id,
      vehicleNumber: vehicle.vehicleNumber,
      vehicleName: vehicle.vehicleNumber,
      vin: vehicle.vin || '',
      type: String(form.issueTitle).trim(),
      issueTitle: String(form.issueTitle).trim(),
      issuePriority: form.issuePriority,
      issueStatus: form.issueStatus,
      date: form.date,
      mileageAtService: form.mileageAtService,
      notes: form.notes || '',
      createdBy: editingId ? undefined : currentUser.name,
      createdAt: editingId ? undefined : new Date().toISOString(),
      updatedBy: editingId ? currentUser.name : undefined,
      updatedAt: editingId ? new Date().toISOString() : undefined,
    };
    setVehicleServices(prev => editingId
      ? prev.map(s => s.id === editingId ? { ...s, ...payload } : s)
      : [...prev, payload]);
    setShowAdd(false);
    setEditingId(null);
    setForm(blank);
  };

  return (
    <Card>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, flexWrap:'wrap', gap:8 }}>
        <h4 style={{ color:COLORS.text, margin:0 }}>⚠️ Issues</h4>
        {canEdit && <Btn small onClick={openAdd}>+ Report Issue</Btn>}
      </div>
      {deleteModal.open && canEdit && (
        <div style={{ position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999, padding:16 }}>
          <div style={{ background:'#fff', borderRadius:12, padding:20, maxWidth:460, width:'100%' }}>
            <h3 style={{ color:COLORS.red, margin:'0 0 8px' }}>⚠️ Delete Issue?</h3>
            <p style={{ color:COLORS.text, fontSize:13, margin:'0 0 10px' }}>
              You are about to permanently delete this issue:
            </p>
            <div style={{ padding:'10px 12px', background:'#fef2f2', border:`1px solid ${COLORS.red}44`, borderRadius:8, marginBottom:12 }}>
              <div style={{ color:COLORS.text, fontSize:14, fontWeight:700 }}>{deleteModal.label}</div>
              <div style={{ color:COLORS.textMuted, fontSize:11, marginTop:4 }}>Vehicle #{vehicle.vehicleNumber}</div>
            </div>
            <p style={{ color:COLORS.textMuted, fontSize:12, margin:'0 0 14px' }}>
              This action cannot be undone.
            </p>
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <Btn small outline onClick={cancelDeleteModal}>Cancel</Btn>
              <Btn small color={COLORS.red} onClick={confirmDelete}>Delete issue</Btn>
            </div>
          </div>
        </div>
      )}
      {showAdd && canEdit && (
        <div style={{ background:'#f8fafc', border:`1px solid ${COLORS.border}`, borderRadius:10, padding:12, marginBottom:12 }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:10 }}>
            <div style={{ gridColumn:'1 / -1' }}>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Issue Title *</label>
              <input value={form.issueTitle} onChange={e=>setForm(p=>({...p, issueTitle:e.target.value}))} placeholder='Brief description' style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Priority</label>
              <select value={form.issuePriority} onChange={e=>setForm(p=>({...p, issuePriority:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }}>
                <option value='Low'>Low</option>
                <option value='Standard'>Standard</option>
                <option value='High'>High</option>
                <option value='Urgent'>Urgent</option>
              </select>
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Status</label>
              <select value={form.issueStatus} onChange={e=>setForm(p=>({...p, issueStatus:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }}>
                <option value='Open'>Open</option>
                <option value='In Progress'>In Progress</option>
                <option value='Resolved'>Resolved</option>
              </select>
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Date</label>
              <input type='date' value={form.date} onChange={e=>setForm(p=>({...p, date:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Mileage</label>
              <input type='number' value={form.mileageAtService} onChange={e=>setForm(p=>({...p, mileageAtService:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text }} />
            </div>
            <div style={{ gridColumn:'1 / -1' }}>
              <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Notes</label>
              <textarea rows={2} value={form.notes} onChange={e=>setForm(p=>({...p, notes:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:'#fff', color:COLORS.text, resize:'vertical' }} />
            </div>
          </div>
          <div style={{ display:'flex', gap:8, marginTop:10 }}>
            <Btn small onClick={save}>{editingId ? 'Save Changes' : 'Save Issue'}</Btn>
            <Btn small outline onClick={() => { setShowAdd(false); setEditingId(null); setForm(blank); }}>Cancel</Btn>
          </div>
        </div>
      )}
      {rows.length === 0 ? (
        <p style={{ color:COLORS.textMuted, fontSize:13, margin:0 }}>No issues recorded.</p>
      ) : (
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
                <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Date</th>
                <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Mileage</th>
                <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Issue</th>
                <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Priority</th>
                <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Status</th>
                <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Notes</th>
                {canEdit && <th style={{ padding:'10px 8px' }}></th>}
              </tr>
            </thead>
            <tbody>
              {rows.map(item => (
                <tr key={item.id} style={{ borderBottom:`1px solid ${COLORS.border}`, background: item.issueStatus === 'Resolved' ? '#f0fdf4' : 'transparent' }}>
                  <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.date}</td>
                  <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.meterLabel}</td>
                  <td style={{ padding:'10px 8px', color:COLORS.text, fontWeight:700 }}>{item.issueTitle}</td>
                  <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.issuePriority}</td>
                  <td style={{ padding:'10px 8px' }}>
                    <span style={{ background: item.issueStatus === 'Resolved' ? '#dcfce7' : item.issueStatus === 'Open' ? '#fee2e2' : '#fef9c3',
                      color: item.issueStatus === 'Resolved' ? '#166534' : item.issueStatus === 'Open' ? COLORS.red : '#92400e',
                      fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>
                      {item.issueStatus || 'Open'}
                    </span>
                  </td>
                  <td style={{ padding:'10px 8px', color:COLORS.textMuted, fontSize:12 }}>{item.notes || '—'}</td>
                  {canEdit && (
                    <td style={{ padding:'10px 8px', textAlign:'right', whiteSpace:'nowrap' }}>
                      <button onClick={() => openEdit(item)} title='Edit' style={{ background:'none', border:`1px solid ${COLORS.border}`, borderRadius:6, color:COLORS.textMuted, padding:'3px 8px', cursor:'pointer', marginRight:4, fontSize:12 }}>✏️</button>
                      <button onClick={() => openDeleteModal(item)} title='Delete this issue' style={{ background:'none', border:`1px solid ${COLORS.red}44`, borderRadius:6, color:COLORS.red, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✕ Delete</button>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </Card>
  );
}

function VehicleServiceTab({ routes, logs, vehicleRegistry, vehicleServices, setVehicleServices, vehicleWarranties = [], setVehicleWarranties = () => {}, openVehicleProfile = () => {}, currentUser }) {
  // Only system admin and manager can add/edit service entries. admin_assistant and drivers = read-only.
  const canEdit = ['admin','manager'].includes(currentUser.role);
  const [selectedVehicle, setSelectedVehicle] = useState('all');
  const [entryMode, setEntryMode] = useState('service'); // 'service' | 'issue' | 'warranty'
  const [showAddMenu, setShowAddMenu] = useState(false);
  const entryFormRef = React.useRef(null);
  const addMenuRef = React.useRef(null);
  const [customServiceTypes, setCustomServiceTypes] = useState(loadCustomServiceTypes);
  // In-app modal for entering a new custom service name (window.prompt doesn't work in iOS PWA mode)
  const [customModal, setCustomModal] = useState({ open:false, input:'' });
  const [form, setForm] = useState({ vehicleNumber:'', scheduleKey:SERVICE_SCHEDULES[0].key, customServiceName:'', date:new Date().toISOString().slice(0,10), mileageAtService:'', notes:'', issueTitle:'', issuePriority:'Standard', issueStatus:'Open' });
  const blankWarranty = { vehicleNumber:'', title:'', vendor:'', startDate:'', expirationDate:'', notes:'', docName:'', docData:'', docType:'' };
  const [warrantyForm, setWarrantyForm] = useState(blankWarranty);

  // Close the add-menu when user clicks outside of it
  React.useEffect(() => {
    if (!showAddMenu) return;
    const handleClickOutside = (e) => {
      if (addMenuRef.current && !addMenuRef.current.contains(e.target)) {
        setShowAddMenu(false);
      }
    };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, [showAddMenu]);

  // Switch the entry mode (service / issue / warranty) and scroll to the form
  const openMode = (mode, vehicle) => {
    setEntryMode(mode);
    setShowAddMenu(false);
    if (mode === 'warranty') {
      setWarrantyForm({ ...blankWarranty, vehicleNumber: vehicle?.vehicleNumber || warrantyForm.vehicleNumber || '' });
    } else if (vehicle) {
      setForm(prev => ({
        ...prev,
        vehicleNumber: vehicle.vehicleNumber,
        date: new Date().toISOString().slice(0,10),
        mileageAtService: '',
        notes: '',
      }));
    }
    setTimeout(() => {
      if (entryFormRef.current) entryFormRef.current.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 50);
  };

  // Helper: pre-fill the entry form for a specific vehicle (and optionally a specific service task), then scroll to it.
  const logServiceForVehicle = (vehicle, scheduleKey) => {
    setEntryMode('service');
    setForm(prev => ({
      ...prev,
      vehicleNumber: vehicle.vehicleNumber,
      scheduleKey: scheduleKey || prev.scheduleKey || SERVICE_SCHEDULES[0].key,
      customServiceName: scheduleKey && String(scheduleKey).startsWith('custom:') ? String(scheduleKey).replace(/^custom:/, '') : '',
      date: new Date().toISOString().slice(0,10),
      mileageAtService: '',
      notes: '',
    }));
    setTimeout(() => {
      if (entryFormRef.current) entryFormRef.current.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 50);
  };

  const handleWarrantyFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('File is larger than 2 MB. Please use a smaller file.'); e.target.value = ''; return; }
    const reader = new FileReader();
    reader.onload = () => {
      setWarrantyForm(p => ({ ...p, docName:file.name, docType:file.type, docData:String(reader.result || '') }));
    };
    reader.readAsDataURL(file);
  };

  const saveWarranty = () => {
    if (!warrantyForm.vehicleNumber) return alert('Select a vehicle');
    if (!String(warrantyForm.title).trim()) return alert('Warranty title is required');
    const payload = {
      id: `war_${Date.now()}`,
      vehicleNumber: warrantyForm.vehicleNumber,
      title: String(warrantyForm.title).trim(),
      vendor: String(warrantyForm.vendor || '').trim(),
      startDate: warrantyForm.startDate || '',
      expirationDate: warrantyForm.expirationDate || '',
      notes: warrantyForm.notes || '',
      docName: warrantyForm.docName || '',
      docType: warrantyForm.docType || '',
      docData: warrantyForm.docData || '',
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    setVehicleWarranties(prev => [...prev, payload]);
    alert(`Warranty saved for vehicle ${warrantyForm.vehicleNumber}.`);
    setWarrantyForm(blankWarranty);
  };

  const reminderGroups = getVehicleReminderGroups({ vehicleRegistry, vehicleServices, routes, logs });
  // Hide vehicles where nothing is overdue AND nothing is due within 500 mi or 7 days.
  // (A row is "near due" if it's Overdue, OR it's within 500 mi remaining, OR within 7 days.)
  const actionableGroups = reminderGroups.filter(group => {
    const todayStr = new Date().toISOString().slice(0,10);
    return group.rows.some(row => {
      if (row.status === 'Overdue') return true;
      const milesLeft = Number(row.nextDueMileage || 0) - Number(group.currentMileage || 0);
      if (milesLeft <= 500) return true;
      const days = daysUntil(row.nextDueDate);
      if (days !== null && days !== undefined && days <= 7) return true;
      return false;
    });
  });
  const filteredGroups = selectedVehicle === 'all' ? actionableGroups : actionableGroups.filter(g => normalizeVehicleNumber(g.vehicle.vehicleNumber) === normalizeVehicleNumber(selectedVehicle));
  const filteredHistory = getServiceHistoryTableRows(vehicleServices, selectedVehicle);
  const filteredIssues = getIssueHistoryTableRows(vehicleServices, selectedVehicle);
  const selectedVehicleRecord = vehicleRegistry.find(v => normalizeVehicleNumber(v.vehicleNumber) === normalizeVehicleNumber(form.vehicleNumber));
  const routeBasedMileage = form.vehicleNumber ? getCurrentVehicleMileage(selectedVehicleRecord, routes, logs) : '';
  const serviceTypeOptions = buildServiceTypeOptions(customServiceTypes);

  useEffect(() => { saveCustomServiceTypes(customServiceTypes); }, [customServiceTypes]);

  useEffect(() => {
    if (!form.vehicleNumber) return;
    setForm(prev => {
      if (String(prev.mileageAtService || '').trim()) return prev;
      return { ...prev, mileageAtService: String(routeBasedMileage || '') };
    });
  }, [form.vehicleNumber, routeBasedMileage]);

  // In-app modal handlers (replaces window.prompt which doesn't work in iOS PWA mode)
  const openCustomModal = () => setCustomModal({ open:true, input:'' });
  const cancelCustomModal = () => setCustomModal({ open:false, input:'' });
  const confirmCustomModal = () => {
    const name = String(customModal.input || '').trim();
    if (!name) return;
    setCustomServiceTypes(prev => {
      const existing = prev.find(n => n.toLowerCase() === name.toLowerCase());
      if (existing) return prev;
      return [...prev, name].sort((a,b) => a.localeCompare(b, undefined, { sensitivity:'base' }));
    });
    setForm(prev => ({ ...prev, scheduleKey: `custom:${name}`, customServiceName: name }));
    setCustomModal({ open:false, input:'' });
  };

  const handleServiceTypeChange = (value) => {
    if (value === '__other__') {
      openCustomModal();
      return;
    }
    if (String(value).startsWith('custom:')) {
      const customName = String(value).replace(/^custom:/, '');
      setForm(prev => ({ ...prev, scheduleKey: value, customServiceName: customName }));
      return;
    }
    setForm(prev => ({ ...prev, scheduleKey: value, customServiceName: '' }));
  };

  const saveService = () => {
    const vehicle = vehicleRegistry.find(v => normalizeVehicleNumber(v.vehicleNumber) === normalizeVehicleNumber(form.vehicleNumber));
    if (!vehicle) return alert('Select a vehicle');
    if (!form.date) return alert('Service date is required');
    if (!String(form.mileageAtService).trim()) return alert('Mileage at service is required');
    const schedule = SERVICE_SCHEDULES.find(s => s.key === form.scheduleKey);
    const customServiceName = String(form.customServiceName || '').trim();
    const resolvedServiceName = schedule?.serviceName || customServiceName || String(form.scheduleKey || '').replace(/^custom:/, '').trim();
    const resolvedScheduleKey = schedule?.key || `custom:${resolvedServiceName}`;
    if (!resolvedServiceName) return alert('Select a service type');
    if (!schedule && resolvedServiceName) {
      setCustomServiceTypes(prev => prev.includes(resolvedServiceName) ? prev : [...prev, resolvedServiceName].sort((a,b) => a.localeCompare(b)));
    }
    const entry = {
      id:`svc_${Date.now()}`,
      serviceType:'history',
      vehicleId: vehicle.id,
      vehicleNumber: vehicle.vehicleNumber,
      vehicleName: vehicle.vehicleNumber,
      vin: vehicle.vin || '',
      scheduleKey: resolvedScheduleKey,
      type: resolvedServiceName,
      date: form.date,
      mileageAtService: form.mileageAtService,
      notes: form.notes || '',
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    setVehicleServices(prev => [...prev, entry]);
    setForm({ vehicleNumber:vehicle.vehicleNumber, scheduleKey:SERVICE_SCHEDULES[0].key, customServiceName:'', date:new Date().toISOString().slice(0,10), mileageAtService:'', notes:'', issueTitle:'', issuePriority:'Standard', issueStatus:'Open' });
    setSelectedVehicle(vehicle.vehicleNumber);
  };

  const saveIssue = () => {
    const vehicle = vehicleRegistry.find(v => normalizeVehicleNumber(v.vehicleNumber) === normalizeVehicleNumber(form.vehicleNumber));
    if (!vehicle) return alert('Select a vehicle');
    if (!form.date) return alert('Issue date is required');
    if (!String(form.issueTitle || '').trim()) return alert('Issue title is required');
    const entry = {
      id:`iss_${Date.now()}`,
      serviceType:'issue',
      vehicleId: vehicle.id,
      vehicleNumber: vehicle.vehicleNumber,
      vehicleName: vehicle.vehicleNumber,
      vin: vehicle.vin || '',
      type: String(form.issueTitle || '').trim(),
      issueTitle: String(form.issueTitle || '').trim(),
      issuePriority: form.issuePriority || 'Standard',
      issueStatus: form.issueStatus || 'Open',
      date: form.date,
      mileageAtService: form.mileageAtService,
      notes: form.notes || '',
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    setVehicleServices(prev => [...prev, entry]);
    setForm({ vehicleNumber:vehicle.vehicleNumber, scheduleKey:SERVICE_SCHEDULES[0].key, customServiceName:'', date:new Date().toISOString().slice(0,10), mileageAtService:'', notes:'', issueTitle:'', issuePriority:'Standard', issueStatus:'Open' });
    setSelectedVehicle(vehicle.vehicleNumber);
    setEntryMode('issue');
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12, gap:10, flexWrap:'wrap' }}>
        <h3 style={{ color:COLORS.text, margin:0 }}>🛠️ Service Due</h3>
        <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <select value={selectedVehicle} onChange={e=>setSelectedVehicle(e.target.value)} style={{ padding:'9px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:COLORS.bg, color:COLORS.text }}>
            <option value='all'>All vehicles</option>
            {vehicleRegistry.map(vehicle => <option key={vehicle.id} value={vehicle.vehicleNumber}>{vehicle.vehicleNumber} — VIN {vehicle.vin || '—'}</option>)}
          </select>
          <Badge color={COLORS.accent}>{filteredGroups.length} vehicles</Badge>
          {canEdit && (
            <div ref={addMenuRef} style={{ position:'relative' }}>
              <button onClick={() => setShowAddMenu(s => !s)} style={{
                padding:'9px 14px', borderRadius:8, border:'none', background:COLORS.accent, color:'#fff',
                fontWeight:700, cursor:'pointer', fontSize:13, display:'flex', alignItems:'center', gap:6,
              }}>
                + Add
                <span style={{ fontSize:10 }}>▼</span>
              </button>
              {showAddMenu && (
                <div style={{
                  position:'absolute', top:'calc(100% + 6px)', right:0, background:'#fff',
                  border:`1px solid ${COLORS.border}`, borderRadius:8, boxShadow:'0 6px 18px rgba(0,0,0,0.12)',
                  minWidth:220, zIndex:100, overflow:'hidden',
                }}>
                  <button onClick={() => openMode('service')} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 14px', background:'#fff', border:'none', borderBottom:`1px solid ${COLORS.border}`, cursor:'pointer', textAlign:'left', color:COLORS.text, fontSize:13, fontWeight:600 }}
                    onMouseEnter={e => e.currentTarget.style.background = '#f8fafc'}
                    onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                    <span style={{ fontSize:16 }}>🔧</span> Add Service Entry
                  </button>
                  <button onClick={() => openMode('issue')} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 14px', background:'#fff', border:'none', borderBottom:`1px solid ${COLORS.border}`, cursor:'pointer', textAlign:'left', color:COLORS.text, fontSize:13, fontWeight:600 }}
                    onMouseEnter={e => e.currentTarget.style.background = '#f8fafc'}
                    onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                    <span style={{ fontSize:16 }}>⚠️</span> Add Issue
                  </button>
                  <button onClick={() => openMode('warranty')} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 14px', background:'#fff', border:'none', cursor:'pointer', textAlign:'left', color:COLORS.text, fontSize:13, fontWeight:600 }}
                    onMouseEnter={e => e.currentTarget.style.background = '#f8fafc'}
                    onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                    <span style={{ fontSize:16 }}>📄</span> Add Warranty
                  </button>
                </div>
              )}
            </div>

        </div>
      </div>

      <Card style={{ marginBottom:12 }}>

        <p style={{ color:COLORS.textMuted, fontSize:12, margin:'0 0 12px' }}>
          Each vehicle is listed once below. The mileage entered on the service log becomes the new baseline for that service item, and the latest route-based mileage is then used to calculate the remaining miles until the next service.
        </p>
        <div style={{ display:'grid', gap:12 }}>
          {filteredGroups.length === 0 ? (
            <p style={{ color:COLORS.textMuted, fontSize:13, margin:0 }}>✅ All vehicles OK — nothing due within 500 miles or 7 days.</p>
          ) : filteredGroups.map(group => (
            <div key={group.vehicle.id} style={{ border:`1px solid ${COLORS.border}`, borderRadius:12, overflow:'hidden', background:'#fff' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:10, flexWrap:'wrap', padding:'12px 14px', background:'#f8fafc', borderBottom:`1px solid ${COLORS.border}` }}>
                <div>
                  <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                    <span style={{ color:COLORS.text, fontWeight:800, fontSize:18 }}>Vehicle # {group.vehicle.vehicleNumber}</span>
                    <Badge color={group.status === 'Overdue' ? COLORS.red : (group.status === 'Due Soon' ? COLORS.yellow : COLORS.blue)}>{group.status}</Badge>
                  </div>
                  <div style={{ color:COLORS.textMuted, fontSize:12, marginTop:4 }}>

                  </div>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
                  <div style={{ color:COLORS.textMuted, fontSize:12 }}>
                    {group.overdueCount ? `${group.overdueCount} overdue` : ''}{group.overdueCount && group.dueSoonCount ? ' · ' : ''}{group.dueSoonCount ? `${group.dueSoonCount} due soon` : (!group.overdueCount ? 'All other services upcoming' : '')}
                  </div>

                          </td>

            <h3 style={{ color:COLORS.text, margin:'0 0 8px' }}>New Service Type</h3>

            </div>

        </div>
      )}

      <div ref={entryFormRef} style={{ display:'grid', gridTemplateColumns:'minmax(300px, 0.8fr) minmax(420px, 1.2fr)', gap:12 }}>

                  <div>

                    {form.vehicleNumber && (

                    Saving this service log under <strong>Vehicle # {form.vehicleNumber}</strong>{selectedVehicleRecord?.vin ? ` · VIN ${selectedVehicleRecord.vin}` : ''}. After saving, it will appear in that vehicle profile under Service History.

                  <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Notes</label>
                  <textarea value={form.notes} onChange={e=>setForm(p=>({...p, notes:e.target.value}))} rows={3} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:COLORS.bg, color:COLORS.text, resize:'vertical' }} disabled={!canEdit} placeholder='Optional notes' />
                </div>
                {canEdit && (entryMode === 'service' ? <Btn onClick={saveService}>Save Service Entry</Btn> : <Btn onClick={saveIssue}>Save Issue</Btn>)}

        <Card>
          <h4 style={{ color:COLORS.text, margin:'0 0 10px' }}>📋 Service History</h4>
          <div style={{ overflowX:'auto' }}>
            <table style={{ width:'100%', borderCollapse:'collapse' }}>
              <thead>
                <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
                  {selectedVehicle === 'all' && <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Vehicle</th>}
                  <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Completion Date</th>
                  <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Meter</th>
                  <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Service Task</th>
                  <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Notes</th>
                </tr>
              </thead>
              <tbody>
                {filteredHistory.length === 0 ? (
                  <tr><td colSpan={selectedVehicle === 'all' ? 5 : 4} style={{ padding:'12px 8px', color:COLORS.textMuted }}>No service history recorded.</td></tr>

                    <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.date}</td>
                    <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.meterLabel}</td>
                    <td style={{ padding:'10px 8px', color:COLORS.text, fontWeight:700 }}>{item.serviceTask}</td>
                    <td style={{ padding:'10px 8px', color:COLORS.textMuted, fontSize:12 }}>{item.notes || '—'}</td>

          <div style={{ marginTop:14 }}>
            <h4 style={{ color:COLORS.text, margin:'0 0 10px' }}>⚠️ Issue History</h4>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', borderCollapse:'collapse' }}>
                <thead>
                  <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
                    {selectedVehicle === 'all' && <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Vehicle</th>}
                    <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Reported Date</th>
                    <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Meter</th>
                    <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Issue</th>
                    <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Priority</th>
                    <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Status</th>
                    <th style={{ textAlign:'left', padding:'10px 8px', color:COLORS.textDim, fontSize:12 }}>Notes</th>
                    {canEdit && <th style={{ padding:'10px 8px' }}></th>}
                  </tr>
                </thead>
                <tbody>
                  {filteredIssues.length === 0 ? (
                    <tr><td colSpan={selectedVehicle === 'all' ? (canEdit ? 8 : 7) : (canEdit ? 7 : 6)} style={{ padding:'12px 8px', color:COLORS.textMuted }}>No issues recorded.</td></tr>

                        <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.date}</td>
                        <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.meterLabel}</td>
                        <td style={{ padding:'10px 8px', color:COLORS.text, fontWeight:700 }}>{item.issueTitle}</td>
                        <td style={{ padding:'10px 8px', color:COLORS.text }}>{item.issuePriority}</td>
                        <td style={{ padding:'10px 8px' }}>
                          <span style={{ background: item.issueStatus === 'Resolved' ? '#dcfce7' : item.issueStatus === 'Open' ? '#fee2e2' : '#fef9c3',
                            color: item.issueStatus === 'Resolved' ? '#166534' : item.issueStatus === 'Open' ? COLORS.red : '#92400e',
                            fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>

                        </td>
                        <td style={{ padding:'10px 8px', color:COLORS.textMuted, fontSize:12 }}>

                        {canEdit && (
                          <td style={{ padding:'10px 8px' }}>

                      {item.resolveOpen && canEdit && (
                        <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
