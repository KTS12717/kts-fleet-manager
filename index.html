                {/* Wheelchair Van checkbox */}
                <label style={{ display:"flex", flexDirection:"column", alignItems:"center",
                  gap:4, cursor:"pointer", padding:"4px 8px", userSelect:"none" }}>
                  <div onClick={() => toggleWheelchair(route.id)} style={{
                    width:28, height:28, borderRadius:6, border:`2px solid ${isWC ? COLORS.yellow : COLORS.border}`,
                    background: isWC ? "#fef3c7" : "transparent",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    cursor:"pointer", fontSize:16,
                  }}>
                    {isWC ? "♿" : ""}
                  </div>
                  <span style={{ fontSize:9, color: isWC ? "#92400e" : COLORS.textMuted,
                    fontWeight:700, textTransform:"uppercase" }}>WC Van</span>
                </label>
              </div>
            </Card>
          );
        })
      )}

      {/* Priority routes note */}
      {selectedCompany === "priority" && companyRoutes.length === 0 && (
        <div style={{ background:"#f0fdf4", border:`1px solid #86efac`, borderRadius:8,
          padding:"12px", marginTop:8 }}>
          <p style={{ color:"#166534", fontSize:12, fontWeight:700, margin:"0 0 4px" }}>
            Priority Transportation Routes (6770–6774)
          </p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:0 }}>
            Priority Transportation routes are tracked separately under HV0713.
            Add routes via the Routes tab with "Priority" in the name to assign them here.
          </p>
        </div>
      )}
    </div>
  );
}

const DEFAULT_SERVICE_CATALOG = {
  "Oil Change":        ["Conventional","Synthetic","High Mileage","Diesel"],
  "Tire Service":      ["Rotation","Replacement","Patch / Repair","Alignment","Balance"],
  "Brake Service":     ["Front Pads","Rear Pads","Front Rotors","Rear Rotors","Brake Fluid","Caliper"],
  "Air Filter":        ["Engine Air Filter","Cabin Air Filter"],
  "Transmission":      ["Fluid Change","Filter Change","Full Service","Repair"],
  "Cooling System":    ["Coolant Flush","Thermostat","Radiator","Water Pump","Hoses"],
  "Electrical":        ["Battery","Alternator","Starter","Fuses","Lights"],
  "Inspection / Smog": ["Smog Check","Safety Inspection","State Inspection","Pre-Trip"],
  "Suspension":        ["Shocks / Struts","Ball Joints","Tie Rods","Wheel Bearing"],
  "Other":             [],
};

function VehiclesTab({ routes, vehicleServices, setVehicleServices, currentUser }) {
  const isAdmin = currentUser.role === 'admin';

  // Service catalog stored in localStorage via parent, but we manage locally here
  const [catalog, setCatalog] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('kts_service_catalog') || 'null') || DEFAULT_SERVICE_CATALOG; }
    catch(e) { return DEFAULT_SERVICE_CATALOG; }
  });
  const saveCatalog = (c) => { setCatalog(c); localStorage.setItem('kts_service_catalog', JSON.stringify(c)); };

  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [selectedVehicle, setSelectedVehicle] = useState('all');

  // Manage types modal
  const [showManageTypes, setShowManageTypes] = useState(false);
  const [newTypeName, setNewTypeName] = useState('');
  const [newSubType, setNewSubType] = useState({ parentType:'', name:'' });

  const blank = {
    vehicleId:"", vehicleName:"", type:"", subType:"", serviceType:"history",
    date:"", nextDueDate:"", nextDueMiles:"", mileageAtService:"",
    notes:"", urgent:false
  };
  const [form, setForm] = useState(blank);

  const todayStr = new Date().toISOString().slice(0,10);

  // Build unique vehicle list from routes — show by vehicleId number
  const vehicles = [...routes]
    .sort((a,b) => a.vehicleId.localeCompare(b.vehicleId, undefined, { numeric:true }))
    .map(r => ({ id:r.id, vehicleId:r.vehicleId, name:r.name, driver:r.driver }));

  const filtered = selectedVehicle === 'all'
    ? vehicleServices
    : vehicleServices.filter(s => s.vehicleId === selectedVehicle);

  const history = filtered.filter(s => s.serviceType === 'history').sort((a,b) => b.date.localeCompare(a.date));
  const reminders = filtered.filter(s => s.serviceType === 'reminder').sort((a,b) => (a.nextDueDate||'').localeCompare(b.nextDueDate||''));

  const overdueReminders = reminders.filter(r => r.nextDueDate && r.nextDueDate <= todayStr);
  const upcomingReminders = reminders.filter(r => {
    if (!r.nextDueDate) return false;
    const diff = (new Date(r.nextDueDate) - new Date()) / (1000*60*60*24);
    return diff > 0 && diff <= 30;
  });

  const save = () => {
    if (!form.vehicleId) return alert("Select a vehicle");
    if (!form.type) return alert("Service type required");
    if (form.serviceType === 'history' && !form.date) return alert("Service date required");
    if (form.serviceType === 'reminder' && !form.nextDueDate) return alert("Due date required");
    const vehicle = vehicles.find(v => v.id === form.vehicleId);
    const entry = {
      ...form,
      id: editItem?.id || `svc_${Date.now()}`,
      vehicleName: vehicle?.vehicleId || form.vehicleId,
      routeName: vehicle?.name || '',
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    if (editItem) {
      setVehicleServices(prev => prev.map(s => s.id === editItem.id ? entry : s));
    } else {
      setVehicleServices(prev => [...prev, entry]);
    }
    setForm(blank); setEditItem(null); setShowForm(false);
  };

  const del = (id) => { if (confirm("Delete this record?")) setVehicleServices(prev => prev.filter(s => s.id !== id)); };

  const serviceTypeLabel = (s) => s.subType ? `${s.type} — ${s.subType}` : s.type;

  const inputStyle = { width:"100%", padding:"10px 12px", background:COLORS.bg,
    border:`1px solid ${COLORS.border}`, borderRadius:8, color:COLORS.text,
    fontSize:14, boxSizing:"border-box" };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <h3 style={{ color:COLORS.text, margin:0 }}>🔧 Vehicle Service</h3>
        <div style={{ display:"flex", gap:8 }}>
          {isAdmin && (
            <Btn small outline onClick={() => setShowManageTypes(true)}>⚙️ Manage Types</Btn>
          )}
          {isAdmin && (
            <Btn small onClick={() => { setForm(blank); setEditItem(null); setShowForm(true); }}>+ Add Record</Btn>
          )}
        </div>
      </div>

      {/* Vehicle filter — by number */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
        <button onClick={() => setSelectedVehicle('all')} style={{
          padding:"5px 12px", borderRadius:16, fontSize:12, fontWeight:700, cursor:"pointer",
          border:`2px solid ${selectedVehicle==='all'?COLORS.accent:COLORS.border}`,
          background:selectedVehicle==='all'?COLORS.accent:"transparent",
          color:selectedVehicle==='all'?"#fff":COLORS.textMuted }}>All</button>
        {vehicles.map(v => (
          <button key={v.id} onClick={() => setSelectedVehicle(v.id)} style={{
            padding:"5px 12px", borderRadius:16, fontSize:12, fontWeight:700, cursor:"pointer",
            border:`2px solid ${selectedVehicle===v.id?COLORS.accent:COLORS.border}`,
            background:selectedVehicle===v.id?COLORS.accent:"transparent",
            color:selectedVehicle===v.id?"#fff":COLORS.textMuted }}>
            {v.vehicleId}
          </button>
        ))}
      </div>

      {/* Overdue / Upcoming alerts */}
      {overdueReminders.length > 0 && (
        <div style={{ background:"#fef2f2", border:`2px solid ${COLORS.red}`, borderRadius:10, padding:"10px 14px", marginBottom:12 }}>
          <p style={{ color:COLORS.red, fontSize:13, fontWeight:800, margin:"0 0 6px" }}>
            🚨 {overdueReminders.length} Service{overdueReminders.length>1?"s":""} Overdue
          </p>
          {overdueReminders.map(r => (
            <p key={r.id} style={{ color:"#7f1d1d", fontSize:12, margin:"2px 0" }}>
              • {r.vehicleName} — {serviceTypeLabel(r)} was due {r.nextDueDate}
            </p>
          ))}
        </div>
      )}
      {upcomingReminders.length > 0 && (
        <div style={{ background:"#fffbeb", border:`1px solid ${COLORS.yellow}`, borderRadius:10, padding:"10px 14px", marginBottom:12 }}>
          <p style={{ color:"#92400e", fontSize:13, fontWeight:800, margin:"0 0 6px" }}>
            ⚠️ {upcomingReminders.length} Service{upcomingReminders.length>1?"s":""} Due Within 30 Days
          </p>
          {upcomingReminders.map(r => (
            <p key={r.id} style={{ color:"#78350f", fontSize:12, margin:"2px 0" }}>
              • {r.vehicleName} — {serviceTypeLabel(r)} due {r.nextDueDate}{r.nextDueMiles ? ` or ${r.nextDueMiles} mi` : ""}
            </p>
          ))}
        </div>
      )}

      {/* Service Reminders */}
      <h4 style={{ color:COLORS.text, fontSize:14, margin:"0 0 8px" }}>🔔 Service Reminders</h4>
      {reminders.length === 0 ? (
        <Card style={{ marginBottom:12 }}>
          <p style={{ color:COLORS.textMuted, textAlign:"center", fontSize:13, margin:0 }}>No reminders set.</p>
        </Card>
      ) : (
        reminders.map(r => {
          const isOverdue = r.nextDueDate && r.nextDueDate <= todayStr;
          const isDueSoon = !isOverdue && upcomingReminders.includes(r);
          return (
            <Card key={r.id} style={{ marginBottom:8, borderLeft:`3px solid ${isOverdue?COLORS.red:isDueSoon?COLORS.yellow:COLORS.border}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                    <span style={{ color:COLORS.text, fontSize:14, fontWeight:700 }}>{r.vehicleName}</span>
                    <Badge color={isOverdue?COLORS.red:isDueSoon?COLORS.yellow:COLORS.blue}>{serviceTypeLabel(r)}</Badge>
                    {r.urgent && <Badge color={COLORS.red}>URGENT</Badge>}
                  </div>
                  <p style={{ color:COLORS.textMuted, fontSize:12, margin:0 }}>
                    Due: <strong>{r.nextDueDate||"—"}</strong>
                    {r.nextDueMiles ? ` · Or at ${r.nextDueMiles} miles` : ""}
                  </p>
                  {r.notes && <p style={{ color:COLORS.textDim, fontSize:11, margin:"4px 0 0", whiteSpace:"pre-wrap" }}>{r.notes}</p>}
                  <p style={{ color:COLORS.textMuted, fontSize:10, margin:"2px 0 0" }}>{r.routeName} · Added by {r.createdBy}</p>
                </div>
                {isAdmin && (
                  <div style={{ display:"flex", gap:4 }}>
                    <button onClick={() => { setForm({...blank,...r}); setEditItem(r); setShowForm(true); }}
                      style={{ background:"none", border:`1px solid ${COLORS.border}`, borderRadius:6, padding:"4px 8px", cursor:"pointer", color:COLORS.textMuted, fontSize:12 }}>✏️</button>
                    <button onClick={() => del(r.id)}
                      style={{ background:"none", border:"none", color:COLORS.red, cursor:"pointer", fontSize:16, padding:"4px 6px" }}>✕</button>
                  </div>
                )}
              </div>
            </Card>
          );
        })
      )}

      {/* Service History */}
      <h4 style={{ color:COLORS.text, fontSize:14, margin:"16px 0 8px" }}>📋 Service History</h4>
      {history.length === 0 ? (
        <Card>
          <p style={{ color:COLORS.textMuted, textAlign:"center", fontSize:13, margin:0 }}>No service history recorded.</p>
        </Card>
      ) : (
        history.map(h => (
          <Card key={h.id} style={{ marginBottom:8 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                  <span style={{ color:COLORS.text, fontSize:14, fontWeight:700 }}>{h.vehicleName}</span>
                  <Badge color={COLORS.accent}>{serviceTypeLabel(h)}</Badge>
                </div>
                <p style={{ color:COLORS.textMuted, fontSize:12, margin:0 }}>
                  {h.date}{h.mileageAtService ? ` · ${Number(h.mileageAtService).toLocaleString()} mi` : ""}
                </p>
                {h.notes && <p style={{ color:COLORS.textDim, fontSize:11, margin:"4px 0 0", whiteSpace:"pre-wrap" }}>{h.notes}</p>}
                <p style={{ color:COLORS.textMuted, fontSize:10, margin:"2px 0 0" }}>{h.routeName} · Added by {h.createdBy}</p>
              </div>
              {isAdmin && (
                <div style={{ display:"flex", gap:4 }}>
                  <button onClick={() => { setForm({...blank,...h}); setEditItem(h); setShowForm(true); }}
                    style={{ background:"none", border:`1px solid ${COLORS.border}`, borderRadius:6, padding:"4px 8px", cursor:"pointer", color:COLORS.textMuted, fontSize:12 }}>✏️</button>
                  <button onClick={() => del(h.id)}
                    style={{ background:"none", border:"none", color:COLORS.red, cursor:"pointer", fontSize:16, padding:"4px 6px" }}>✕</button>
                </div>
              )}
            </div>
          </Card>
        ))
      )}

      {/* ── Add/Edit Modal ── */}
      {isAdmin && showForm && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:200,
          display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <Card style={{ width:"100%", maxWidth:480, maxHeight:"92vh", overflowY:"auto" }}>
            <h3 style={{ color:COLORS.text, margin:"0 0 14px" }}>
              {editItem ? "✏️ Edit Service Record" : "🔧 Add Service Record"}
            </h3>

            {/* Record type */}
            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
              {[["history","📋 Service Done","#22c55e"],["reminder","🔔 Reminder","#f59e0b"]].map(([val,label,color])=>(
                <button key={val} onClick={()=>setForm(p=>({...p,serviceType:val}))}
                  style={{ flex:1, padding:"10px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer",
                    border:`2px solid ${form.serviceType===val?color:COLORS.border}`,
                    background:form.serviceType===val?color+"22":"transparent",
                    color:form.serviceType===val?color:COLORS.textMuted }}>
                  {label}
                </button>
              ))}
            </div>

            {/* Vehicle — by number */}
            <div style={{ marginBottom:12 }}>
              <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Vehicle # *</label>
              <select value={form.vehicleId} onChange={e=>setForm(p=>({...p,vehicleId:e.target.value}))} style={inputStyle}>
                <option value="">— Select vehicle number —</option>
                {vehicles.map(v => <option key={v.id} value={v.id}>{v.vehicleId} — {v.name}</option>)}
              </select>
            </div>

            {/* Service Type */}
            <div style={{ marginBottom:12 }}>
              <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Service Type *</label>
              <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value,subType:""}))} style={inputStyle}>
                <option value="">— Select type —</option>
                {Object.keys(catalog).map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            {/* Sub Type — only shown if selected type has subtypes */}
            {form.type && catalog[form.type] && catalog[form.type].length > 0 && (
              <div style={{ marginBottom:12 }}>
                <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>
                  Sub Type <span style={{ color:COLORS.textMuted, fontWeight:400 }}>(optional)</span>
                </label>
                <select value={form.subType||""} onChange={e=>setForm(p=>({...p,subType:e.target.value}))} style={inputStyle}>
                  <option value="">— None —</option>
                  {catalog[form.type].map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            )}

            {/* History fields */}
            {form.serviceType === 'history' && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
                <div>
                  <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Date Done *</label>
                  <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}
                    style={{ ...inputStyle, border:`2px solid ${COLORS.accent}` }} />
                </div>
                <div>
                  <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Mileage at Service</label>
                  <input type="number" value={form.mileageAtService} onChange={e=>setForm(p=>({...p,mileageAtService:e.target.value}))}
                    placeholder="e.g. 94754" style={inputStyle} />
                </div>
              </div>
            )}

            {/* Reminder fields */}
            {form.serviceType === 'reminder' && (
              <>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
                  <div>
                    <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Due Date *</label>
                    <input type="date" value={form.nextDueDate} onChange={e=>setForm(p=>({...p,nextDueDate:e.target.value}))}
                      style={{ ...inputStyle, border:`2px solid ${COLORS.yellow}` }} />
                  </div>
                  <div>
                    <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Or At Mileage</label>
                    <input type="number" value={form.nextDueMiles} onChange={e=>setForm(p=>({...p,nextDueMiles:e.target.value}))}
                      placeholder="e.g. 100000" style={inputStyle} />
                  </div>
                </div>
                <div style={{ marginBottom:12, display:"flex", alignItems:"center", gap:8 }}>
                  <input type="checkbox" checked={form.urgent} onChange={e=>setForm(p=>({...p,urgent:e.target.checked}))} style={{ width:16, height:16 }} />
                  <label style={{ color:COLORS.red, fontSize:12, fontWeight:700, cursor:"pointer" }}>
                    Mark as URGENT (shows red alert to drivers and managers)
                  </label>
                </div>
              </>
            )}

            {/* Notes — big textarea */}
            <div style={{ marginBottom:14 }}>
              <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Notes</label>
              <textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}
                placeholder="Additional details, parts used, observations..."
                rows={5}
                style={{ ...inputStyle, resize:"vertical", minHeight:100, fontFamily:"inherit", lineHeight:1.5 }} />
            </div>

            <div style={{ display:"flex", gap:8 }}>
              <Btn onClick={save} style={{ flex:1 }}>{editItem ? "Save Changes" : "Add Record"}</Btn>
              {editItem && <Btn color={COLORS.red} onClick={() => { del(editItem.id); setShowForm(false); }} style={{ flex:1 }}>Delete</Btn>}
              <Btn outline onClick={() => { setShowForm(false); setEditItem(null); }} style={{ flex:1 }}>Cancel</Btn>
            </div>
          </Card>
        </div>
      )}

      {/* ── Manage Service Types Modal ── */}
      {isAdmin && showManageTypes && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:200,
          display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <Card style={{ width:"100%", maxWidth:480, maxHeight:"92vh", overflowY:"auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <h3 style={{ color:COLORS.text, margin:0 }}>⚙️ Manage Service Types</h3>
              <button onClick={() => setShowManageTypes(false)}
                style={{ background:"none", border:"none", color:COLORS.textMuted, fontSize:20, cursor:"pointer", padding:"0 4px" }}>✕</button>
            </div>

            {/* Add new main type */}
            <div style={{ display:"flex", gap:8, marginBottom:16 }}>
              <input value={newTypeName} onChange={e=>setNewTypeName(e.target.value)}
                placeholder="New service type name..."
                style={{ ...inputStyle, flex:1 }} />
              <Btn small onClick={() => {
                if (!newTypeName.trim()) return;
                if (catalog[newTypeName.trim()]) return alert("Type already exists");
                saveCatalog({ ...catalog, [newTypeName.trim()]: [] });
                setNewTypeName('');
              }}>Add Type</Btn>
            </div>

            {/* Existing types */}
            {Object.entries(catalog).map(([type, subs]) => (
              <div key={type} style={{ marginBottom:14, background:COLORS.bg, borderRadius:10, padding:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ color:COLORS.text, fontWeight:700, fontSize:13 }}>{type}</span>
                  <button onClick={() => {
                    if (!confirm(`Delete type "${type}" and all its sub-types?`)) return;
                    const c = {...catalog}; delete c[type]; saveCatalog(c);
                  }} style={{ background:"none", border:"none", color:COLORS.red, cursor:"pointer", fontSize:14 }}>✕</button>
                </div>
                {/* Sub types */}
                <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                  {subs.map(sub => (
                    <span key={sub} style={{ background:"#fff", border:`1px solid ${COLORS.border}`, borderRadius:12,
                      padding:"3px 10px", fontSize:12, display:"flex", alignItems:"center", gap:4 }}>
                      {sub}
                      <button onClick={() => {
                        saveCatalog({ ...catalog, [type]: catalog[type].filter(s => s !== sub) });
                      }} style={{ background:"none", border:"none", color:COLORS.red, cursor:"pointer", fontSize:12, padding:0, lineHeight:1 }}>✕</button>
                    </span>
                  ))}
                  {subs.length === 0 && <span style={{ color:COLORS.textMuted, fontSize:12 }}>No sub-types</span>}
                </div>
                {/* Add sub type */}
                {newSubType.parentType === type ? (
                  <div style={{ display:"flex", gap:6 }}>
                    <input value={newSubType.name} onChange={e=>setNewSubType(p=>({...p,name:e.target.value}))}
                      placeholder="Sub-type name..."
                      style={{ ...inputStyle, flex:1, padding:"6px 10px", fontSize:12 }}
                      onKeyDown={e => {
                        if (e.key==='Enter' && newSubType.name.trim()) {
                          saveCatalog({ ...catalog, [type]: [...catalog[type], newSubType.name.trim()] });
                          setNewSubType({ parentType:'', name:'' });
                        }
                      }} />
                    <Btn small onClick={() => {
                      if (!newSubType.name.trim()) return;
                      saveCatalog({ ...catalog, [type]: [...catalog[type], newSubType.name.trim()] });
                      setNewSubType({ parentType:'', name:'' });
                    }}>Add</Btn>
                    <Btn small outline onClick={() => setNewSubType({ parentType:'', name:'' })}>Cancel</Btn>
                  </div>
                ) : (
                  <button onClick={() => setNewSubType({ parentType:type, name:'' })}
                    style={{ background:"none", border:`1px dashed ${COLORS.border}`, borderRadius:8,
                      padding:"4px 10px", fontSize:12, color:COLORS.textMuted, cursor:"pointer" }}>
                    + Add Sub-Type
                  </button>
                )}
              </div>
            ))}

            <Btn outline onClick={() => setShowManageTypes(false)} style={{ width:"100%" }}>Done</Btn>
          </Card>
        </div>
      )}
    </div>
  );
}

// ============ CALENDAR TAB COMPONENT ============
function CalendarTab({ routes, users, absences, setAbsences, timeOffRequests, setTimeOffRequests, currentUser }) {
  const today = new Date();
  const [viewDate, setViewDate] = useState(today);
  const [showAbsenceModal, setShowAbsenceModal] = useState(false);
  const [showTimeOffModal, setShowTimeOffModal] = useState(false);
  const [editAbsence, setEditAbsence] = useState(null);
  const [viewMode, setViewMode] = useState("month"); // "month" | "list"

  // New absence form
  const blankAbsence = { clientName:"", routeId:"", startDate:"", endDate:"", type:"vacation", reason:"", allDay:true, note:"" };
  const [absForm, setAbsForm] = useState(blankAbsence);

  // New time-off form (manager adding on behalf of driver, or approval)
  const blankTO = { driverName:"", driverId:"", startDate:"", endDate:"", reason:"", status:"pending", note:"" };
  const [toForm, setToForm] = useState(blankTO);

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthName = viewDate.toLocaleString('en-US', { month:'long', year:'numeric' });

  // Build calendar grid
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = today.toISOString().slice(0,10);

  // All participants across all routes (deduplicated)
  const allParticipants = [];
  const seen = new Set();
  routes.forEach(r => (r.clients||[]).forEach(c => {
    if (!seen.has(c.name)) { allParticipants.push({ ...c, routeId: r.id, routeName: r.name }); seen.add(c.name); }
  }));
  const drivers = users.filter(u => u.role === "driver");

  // Get events for a specific date string
  const getEventsForDate = (dateStr) => {
    const abs = absences.filter(a => dateStr >= a.startDate && dateStr <= (a.endDate || a.startDate));
    const tos = timeOffRequests.filter(r => dateStr >= r.startDate && dateStr <= (r.endDate || r.startDate));
    return { absences: abs, timeOff: tos };
  };

  const saveAbsence = () => {
    if (!absForm.clientName || !absForm.startDate) return alert("Client and start date are required");
    const end = absForm.endDate || absForm.startDate;
    const participant = allParticipants.find(p => p.name === absForm.clientName);
    const entry = {
      id: editAbsence?.id || `abs_${Date.now()}`,
      clientName: absForm.clientName,
      routeId: participant?.routeId || absForm.routeId,
      routeName: participant?.routeName || "",
      startDate: absForm.startDate,
      endDate: end,
      type: absForm.type,
      reason: absForm.reason,
      allDay: true,
      note: absForm.note,
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    if (editAbsence) {
      setAbsences(prev => prev.map(a => a.id === editAbsence.id ? entry : a));
    } else {
      setAbsences(prev => [...prev, entry]);
    }
    setAbsForm(blankAbsence);
    setEditAbsence(null);
    setShowAbsenceModal(false);
  };

  const saveTimeOff = () => {
    if (!toForm.driverName || !toForm.startDate) return alert("Driver and start date are required");
    const driver = drivers.find(d => d.name === toForm.driverName);
    const entry = {
      id: `to_${Date.now()}`,
      driverName: toForm.driverName,
      driverId: driver?.id || "",
      startDate: toForm.startDate,
      endDate: toForm.endDate || toForm.startDate,
      reason: toForm.reason,
      status: toForm.status || "approved",
      note: toForm.note,
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    setTimeOffRequests(prev => [...prev, entry]);
    setToForm(blankTO);
    setShowTimeOffModal(false);
  };

  const deleteAbsence = (id) => {
    if (!confirm("Remove this absence?")) return;
    setAbsences(prev => prev.filter(a => a.id !== id));
  };

  const updateTimeOffStatus = (id, status) => {
    setTimeOffRequests(prev => prev.map(r => r.id === id ? { ...r, status } : r));
  };

  const ABSENCE_COLORS = { vacation:"#3b82f6", sick:"#ef4444", appointment:"#f59e0b", other:"#8b5cf6" };
  const TO_COLORS = { pending:"#f59e0b", approved:"#22c55e", denied:"#ef4444" };

  return (
    <div>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <h3 style={{ color: COLORS.text, margin:0 }}>🗓️ Calendar</h3>
        <div style={{ display:"flex", gap:6 }}>
          <Btn small outline onClick={() => setViewMode(viewMode==="month"?"list":"month")}>
            {viewMode==="month" ? "📋 List" : "📅 Month"}
          </Btn>
          <Btn small onClick={() => { setAbsForm(blankAbsence); setEditAbsence(null); setShowAbsenceModal(true); }}>
            + Participant Out
          </Btn>
          <Btn small color={COLORS.blue} onClick={() => { setToForm(blankTO); setShowTimeOffModal(true); }}>
            + Driver Time Off
          </Btn>
        </div>
      </div>

      {/* Month nav */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
        <button onClick={() => setViewDate(new Date(year, month-1, 1))}
          style={{ background:"none", border:`1px solid ${COLORS.border}`, borderRadius:8, padding:"6px 12px",
            cursor:"pointer", color:COLORS.text, fontSize:16 }}>‹</button>
        <div style={{ textAlign:"center" }}>
          <p style={{ color:COLORS.text, fontSize:16, fontWeight:800, margin:0 }}>{monthName}</p>
          {viewDate.getMonth() !== today.getMonth() || viewDate.getFullYear() !== today.getFullYear() ? (
            <button onClick={() => setViewDate(today)} style={{ background:"none", border:"none",

// ============ REPORTS TAB COMPONENT ============
function ReportsTab({ logs, routes, isAdmin, absences = [] }) {
  const now = new Date();
  const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [selectedMonth, setSelectedMonth] = useState(defaultMonth);

  // Build list of months that have log data, plus current month
  const monthsWithData = [...new Set(logs.map(l => l.date ? l.date.slice(0,7) : null).filter(Boolean))];
  if (!monthsWithData.includes(defaultMonth)) monthsWithData.push(defaultMonth);
  monthsWithData.sort().reverse();

  const [year, month] = selectedMonth.split('-').map(Number);
  const monthName = new Date(year, month-1, 1).toLocaleString('en-US', {month:'long', year:'numeric'});
  const bizDays = buildBizDays(year, month);
  const monthLogs = logs.filter(l => l.date && l.date.startsWith(selectedMonth));

  // Summary stats for the selected month
  const routeStats = routes.map(route => {
    const rLogs = monthLogs.filter(l => l.routeId === route.id);
    const amDays = rLogs.filter(l => l.period === 'AM').length;
    const pmDays = rLogs.filter(l => l.period === 'PM').length;
    const totalMiles = rLogs.reduce((s, l) => s + (parseFloat(l.totalMiles) || 0), 0);
    return { route, amDays, pmDays, totalMiles };
  });

  const totalSubmissions = monthLogs.length;
  const totalMilesAll = routeStats.reduce((s, r) => s + r.totalMiles, 0);

  // Client attendance summary for the month
  const allClients = [];
  const seen = new Set();
  routes.forEach(route => {
    (route.clients || []).forEach(cl => {
      if (!seen.has(cl.name)) {
        allClients.push({ ...cl, routeName: route.name, routeId: route.id });
        seen.add(cl.name);
      }
    });
  });
  allClients.sort((a,b) => (a.name.split(', ')[0]||a.name).localeCompare(b.name.split(', ')[0]||b.name));

  const clientAttendance = allClients.map(cl => {
    let trips = 0, noShows = 0, absents = 0;
    bizDays.forEach(day => {
      const dateStr = day.toISOString().slice(0,10);
      const dayLogs = monthLogs.filter(l => l.date === dateStr && l.routeId === cl.routeId);
      dayLogs.forEach(l => {
        const status = l.clientStatuses && l.clientStatuses[cl.name];
        if (status === 'present') trips++;
        else if (status === 'noshow') noShows++;
        else if (status === 'absent') absents++;
      });
    });
    return { ...cl, trips, noShows, absents };
  });

  const handleDownloadKTS = () => {
    const blob = generateKTSTrackerBlob(monthLogs, routes, selectedMonth, isAdmin, absences);
    if (blob) downloadBlob(blob, `KTS_Client_Tracker_${monthName.replace(' ','_')}.xlsx`);
  };

  const handleDownloadPriority = () => {
    const blob = generatePriorityTrackerBlob(monthLogs, selectedMonth, isAdmin, absences);
    if (blob) downloadBlob(blob, `Priority_Transportation_Tracker_${monthName.replace(' ','_')}.xlsx`);
  };

  // ── Backend-powered exact-template Excel exports ───────────────────────────
  // The Python backend loads the real .xlsx template, writes only to yellow
  // input cells, and streams back a finished file that is byte-identical to
  // the original template except for the populated data.
  // Set window.KTS_BACKEND_URL before this app loads (see config block in head).
  const BACKEND_URL = window.KTS_BACKEND_URL || '';

  const [exportingHA0935, setExportingHA0935] = React.useState(false);
  const [exportingHV0713, setExportingHV0713] = React.useState(false);
  const [exportError, setExportError] = React.useState(null);

  // Build the OVO (0/1 per route per day) payload from driver logs
  const buildOvoPayload = (routeNames) => {
    const [yr, mo] = selectedMonth.split('-').map(Number);
    const daysInMonth = new Date(yr, mo, 0).getDate();
    const ovo = {};
    routeNames.forEach(rName => {
      const route = routes.find(r => r.name === rName || r.vehicleId === rName);
      if (!route) return;
      const am = {}, pm = {};
      for (let day = 1; day <= daysInMonth; day++) {
        const d = new Date(yr, mo-1, day);
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        const ds = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const hasAM = monthLogs.some(l => (l.routeId===route.id||l.routeName===route.name) && l.date===ds && l.period==='AM');
        const hasPM = monthLogs.some(l => (l.routeId===route.id||l.routeName===route.name) && l.date===ds && l.period==='PM');
        am[String(day)] = hasAM ? 1 : 0;
        pm[String(day)] = hasPM ? 1 : 0;
      }
      ovo[rName] = { AM: am, PM: pm };
    });
    return ovo;
  };

    const [yr, mo] = selectedMonth.split('-').map(Number);
    const daysInMonth = new Date(yr, mo, 0).getDate();
    const sso = {};
    routeNames.forEach(rName => {
      const route = routes.find(r => r.name === rName || r.vehicleId === rName);
      if (!route) return;
      const dailyMiles = {};
      for (let day = 1; day <= daysInMonth; day++) {
        const d = new Date(yr, mo-1, day);
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        const ds = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayLogs = monthLogs.filter(l => (l.routeId===route.id||l.routeName===route.name) && l.date===ds);
        const total = dayLogs.reduce((s,l) => s + (parseFloat(l.totalMiles)||0), 0);
        if (total > 0) dailyMiles[String(day)] = Math.round(total * 10) / 10;
      }
      sso[rName] = dailyMiles;
    });
    return sso;
  };

    const participants = [];
    const seenNames = new Set();
    routes.forEach(route => {
      (route.clients||[]).forEach(cl => {
        if (!seenNames.has(cl.name)) {
          seenNames.add(cl.name);
          const parts = cl.name.split(', ');
          participants.push({ name: cl.name, lastName: parts[0]||cl.name, routeId: route.id, routeName: route.name });
        }
      });
    });
    participants.sort((a,b) => a.lastName.localeCompare(b.lastName));

    const attendance = {};
    participants.forEach((p, idx) => {
      const rowNum = 13 + idx;
      const dayCodes = {};
      for (let day = 1; day <= daysInMonth; day++) {

        if (d.getDay() === 0 || d.getDay() === 6) continue;
        const ds = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

        const cc = aL?.clientStatuses?.[p.name]==='cancelled'||pL?.clientStatuses?.[p.name]==='cancelled';
        if (aP&&pP) dayCodes[String(day)]=2;
        else if (aP||pP) dayCodes[String(day)]=1;
        else if (ns) dayCodes[String(day)]='NS';
        else if (cc) dayCodes[String(day)]='C';

// ============ EXCEL EXPORT ENGINE ============
// ── Haversine distance between two lat/lng points (returns miles) ──────────

function haversineMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8; // Earth radius in miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Geocode an address using Nominatim (OpenStreetMap, free, no key) ────────
const _geocodeCache = {};
async function geocodeAddress(address) {
  if (!address) return null;
  if (_geocodeCache[address]) return _geocodeCache[address];
  try {
    const q = encodeURIComponent(address + ", California, USA");
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`, {
      headers: { "User-Agent": "KTS-Fleet-Manager/1.0" }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      const result = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
      _geocodeCache[address] = result;
      return result;
    }
  } catch(e) {}
  return null;
}

// ── Calculate route total miles given ordered stop addresses (skipping called-out) ─
async function calcRouteMiles(stops, calledOutNames = []) {
  // Build ordered list of addresses, skipping stops where ALL clients called out
  const addressList = [];
  for (const stop of stops) {
    if (stop.type === "base") {
      addressList.push(stop.address);
      continue;
    }
    const activeClients = (stop.clients || []).filter(cl => !calledOutNames.includes(cl));
    if (stop.dropoff) {
      if (activeClients.length > 0) addressList.push(stop.address);
    } else {
      if (activeClients.length > 0) addressList.push(stop.address);
    }
  }
  // Geocode all addresses
  const coords = await Promise.all(addressList.map(a => geocodeAddress(a)));
  // Sum Haversine distances
  let total = 0;
  for (let i = 0; i < coords.length - 1; i++) {
    if (coords[i] && coords[i+1]) {
      total += haversineMiles(coords[i].lat, coords[i].lon, coords[i+1].lat, coords[i+1].lon);
    }
  }
  return Math.round(total * 10) / 10;
}

function buildBizDays(year, month) {
  const days = [];
  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    if (d.getDay() !== 0 && d.getDay() !== 6) days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

// All calendar days in a month (including weekends)
function getAllDays(year, month) {
  const days = [];
  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }
function dayAbbr(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }

// ── SheetJS cell style helpers ────────────────────────────────────────────────
function makeStyle(fill, fontBold, fontSz, fontColor, halign, numFmt) {
  return {
    fill: fill ? { fgColor: { rgb: fill }, patternType: 'solid' } : { patternType: 'none' },
    font: { name: 'Arial', sz: fontSz || 9, bold: !!fontBold, color: { rgb: fontColor || '000000' } },
    alignment: { horizontal: halign || 'center', vertical: 'center', wrapText: true },
    border: { top:{style:'thin',color:{rgb:'000000'}}, bottom:{style:'thin',color:{rgb:'000000'}},
              left:{style:'thin',color:{rgb:'000000'}}, right:{style:'thin',color:{rgb:'000000'}} },
    numFmt: numFmt || '',
  };
}

// Pre-built styles
const ST = {
  gray:     () => makeStyle('C0C0C0', true,  9,  '000000', 'center'),
  yellow:   () => makeStyle('FFFF99', false, 9,  '000000', 'center'),

};

// Apply style to a SheetJS cell
function sc(cell, style) {
  if (cell) cell.s = style;
}

// Encode column letter safely
function col(n) { return XLSX.utils.encode_col(n); }

// Apply styles to a whole worksheet after building it from AOA
function styleRouteDetail(ws, allDays, numRoutes, year, month) {
  const GRAY = 'C0C0C0', YELLOW = 'FFFF99';
  const dataStartRow = 10; // 1-indexed, row 10 = first route row

  // Header row 9: Route #, Route Segment, day cols, Total
  const hdrStyle = makeStyle(GRAY, true, 9, '000000', 'center');
  for (let c = 0; c < allDays.length + 3; c++) {
    const addr = XLSX.utils.encode_cell({r: 8, c: c}); // row 9 = r:8
    if (ws[addr]) ws[addr].s = hdrStyle;
  }
  // Day abbreviation row 8
  for (let ci = 0; ci < allDays.length; ci++) {
    const d = allDays[ci];
    const addr = XLSX.utils.encode_cell({r: 7, c: 2 + ci}); // row 8 = r:7
    if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : 'D9E1F2', true, 8, '000000', 'center');
  }
  // Data rows
  for (let ri = 0; ri < numRoutes * 2; ri++) {
    const r = dataStartRow - 1 + ri; // 0-indexed
    // Label cols A, B
    const aAddr = XLSX.utils.encode_cell({r, c: 0});
    const bAddr = XLSX.utils.encode_cell({r, c: 1});
    if (ws[aAddr]) ws[aAddr].s = makeStyle(null, true, 9, '000000', 'center');
    if (ws[bAddr]) ws[bAddr].s = makeStyle(null, true, 9, '000000', 'left');
    // Day cols
    for (let ci = 0; ci < allDays.length; ci++) {
      const d = allDays[ci];
      const addr = XLSX.utils.encode_cell({r, c: 2 + ci});
      if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : YELLOW, false, 9, '000000', 'center');
    }
    // Total col
    const totAddr = XLSX.utils.encode_cell({r, c: 2 + allDays.length});
    if (ws[totAddr]) ws[totAddr].s = makeStyle(null, true, 9, '000000', 'center');
  }
  // Daily total row
  const dtR = dataStartRow - 1 + numRoutes * 2;
  for (let c = 0; c <= allDays.length + 2; c++) {
    const addr = XLSX.utils.encode_cell({r: dtR, c});
    if (ws[addr]) ws[addr].s = makeStyle(GRAY, true, 9, '000000', 'center');
  }
  // Summary rows (just style the value cells)
  const sr = dtR + 2;
  const valAddr = XLSX.utils.encode_cell({r: sr+2, c: 1}); // B
  if (ws[valAddr]) ws[valAddr].s = makeStyle(null, true, 9, '000000', 'right', '#,##0.00');
  const rateAddr = XLSX.utils.encode_cell({r: sr+3, c: 1});
  if (ws[rateAddr]) ws[rateAddr].s = makeStyle(YELLOW, true, 9, '000000', 'right', '$#,##0.00');
  const reimAddr = XLSX.utils.encode_cell({r: sr+4, c: 1});
  if (ws[reimAddr]) ws[reimAddr].s = makeStyle(null, true, 9, '000000', 'right', '$#,##0.00');
  const totValCol = 2 + allDays.length;
  const grandAddr = XLSX.utils.encode_cell({r: sr+7, c: totValCol});
  if (ws[grandAddr]) ws[grandAddr].s = makeStyle(YELLOW, true, 9, '000000', 'right', '$#,##0.00');
  const invoiceAddr = XLSX.utils.encode_cell({r: sr+8, c: totValCol});
  if (ws[invoiceAddr]) ws[invoiceAddr].s = makeStyle('F4B942', true, 11, '000000', 'right', '$#,##0.00');
}

function styleAttendance(ws, allDays, numClients) {
  const GRAY = 'C0C0C0', YELLOW = 'FFFF99', BLUE = '00B0F0';
  const HDR_ROW = 11; // 0-indexed row 11 = row 12 in sheet
  // Header row
  for (let c = 0; c < 6 + allDays.length + 4; c++) {
    const addr = XLSX.utils.encode_cell({r: HDR_ROW, c});
    if (ws[addr]) ws[addr].s = makeStyle(BLUE, true, 9, 'FFFFFF', 'center');
  }
  // Title row
  const titleAddr = XLSX.utils.encode_cell({r: 0, c: 0});
  if (ws[titleAddr]) ws[titleAddr].s = makeStyle('1F3864', true, 12, 'FFFFFF', 'center');
  // Data rows
  for (let ri = 0; ri < numClients; ri++) {
    const r = HDR_ROW + 1 + ri;
    // Fixed info cols
    for (let c = 0; c < 6; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (ws[addr]) ws[addr].s = makeStyle(null, c >= 4 ? true : false, 9, '000000', c <= 1 ? 'left' : 'center');
    }
    // Day cols
    for (let ci = 0; ci < allDays.length; ci++) {
      const d = allDays[ci];
      const addr = XLSX.utils.encode_cell({r, c: 6 + ci});
      if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : YELLOW, false, 9, '000000', 'center');
    }
    // Summary cols
    for (let c = 0; c < 4; c++) {
      const addr = XLSX.utils.encode_cell({r, c: 6 + allDays.length + c});
      if (ws[addr]) ws[addr].s = makeStyle(null, false, 9, '000000', 'center');
    }
  }
}

// ── MAIN KTS TRACKER GENERATOR ────────────────────────────────────────────────
function generateKTSTrackerBlob(logs, routes, monthYear, showFinancials = false, absences = []) {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded. Check your internet connection.'); return null; }
  const [year, month] = monthYear.split('-').map(Number);
  const allDays = getAllDays(year, month);
  const bizDays = buildBizDays(year, month);
  const wb = XLSX.utils.book_new();
  const startDate = new Date(year, month-1, 1).toLocaleDateString('en-US', {month:'numeric',day:'numeric',year:'2-digit'});
  const monthLabel = new Date(year, month-1, 1).toLocaleString('en-US',{month:'long',year:'numeric'});

  // ── Absence helpers ───────────────────────────────────────────────────────
  // Returns true if clientName is calendar-absent on dateStr
  const isAbsent = (clientName, dateStr) => absences.some(a =>
    a.clientName === clientName && dateStr >= a.startDate && dateStr <= (a.endDate || a.startDate)
  );
  // Returns true if ALL active clients on a route are absent on dateStr
  const allClientsAbsent = (route, dateStr) => {
    const active = (route.clients||[]).filter(c => c.active);
    return active.length > 0 && active.every(c => isAbsent(c.name, dateStr));
  };
  // Returns the absence type/reason for display
  const getAbsenceCode = (clientName, dateStr) => {
    const a = absences.find(a =>
      a.clientName === clientName && dateStr >= a.startDate && dateStr <= (a.endDate || a.startDate)
    );
    if (!a) return null;
    return a.type === 'sick' ? 'NS' : 'C'; // sick = No Show, others = Cancellation
  };

  // ── SHEET 1: Route Detail ──────────────────────────────────────────────────
  const rdData = [
    ['Khan Transportation - HA0935'],
    [startDate, '', '', 'Enter Format (Month/1/Year) ie: 6/1/12'],
    ['*Please fill in only the cells highlighted in yellow. The non-highlighted cells contain formulas to estimate totals based on contractual rates.'],
    [],
    ['875 Service Code:'],
    ['SS0 Vehicle Service Miles Breakdown (AM&PM)'],
    [],
    [' ', ' ', ...allDays.map(d => dayAbbr(d)), 'Total'],    // day abbr row
    ['Route #', 'Route Segment', ...allDays.map(d => d.getDate()), 'Total'],  // date number row
  ];

  const segRows = [];
  routes.forEach((route, rIdx) => {
    ['AM','PM'].forEach(period => {
      const row = [rIdx === 0 && period === 'AM' ? `Khan${rIdx+1}` : rIdx > 0 && period === 'AM' ? `Khan${rIdx+1}` : '', `${period} Segment`];
      allDays.forEach(day => {
        if (isWeekend(day)) { row.push(''); return; }
        const dateStr = day.toISOString().slice(0,10);
        // If ALL clients on this route are calendar-absent this day → 0 (no service)
        if (allClientsAbsent(route, dateStr)) { row.push(0); return; }
        const submitted = logs.some(l => (l.routeId===route.id||l.routeName===route.name) && l.date===dateStr && l.period===period);
        row.push(submitted ? 1 : '');
      });
      const rowIdx = rdData.length + 1;
      const wdayCols = allDays.map((d,ci) => isWeekend(d) ? null : col(2+ci)).filter(Boolean);
      row.push(wdayCols.length ? {f:`SUM(${wdayCols.map(c=>`${c}${rowIdx}`).join(',')})`} : 0);
      segRows.push(rdData.length + 1);
      rdData.push(row);
    });
  });

  // Daily total row
  const dtRowIdx = rdData.length + 1;
  const dtRow = ['Daily Total', ''];
  allDays.forEach((d, ci) => {
    if (isWeekend(d)) { dtRow.push(''); return; }
    const colL = col(2+ci);
    dtRow.push({f: segRows.map(r=>`${colL}${r}`).join('+')});
  });
  const totalColL = col(2 + allDays.length);
  dtRow.push({f:`SUM(C${dtRowIdx}:${col(1+allDays.length)}${dtRowIdx})`});
  rdData.push(dtRow);

  rdData.push([]);
  rdData.push(['Vehicle Service Miles Summary']);
  rdData.push([]);
  rdData.push(['', {f:`${totalColL}${dtRowIdx}`}, '', 'Total Vehicle Service Miles (total of all routes)']);
  if (showFinancials) {
    // Calculate blended reimbursement — $1.19 for wheelchair vans, $1.08 for standard
    const wcRoutes = routes.filter(r => r.wheelchairVan);
    const stdRoutes = routes.filter(r => !r.wheelchairVan);

    if (wcRoutes.length === 0) {
      // All standard rate
      const rateRow = rdData.length + 1;
      rdData.push(['', 1.08, '', 'Contract Vehicle Service Mile Rate ($1.08/mile)']);
      rdData.push(['', {f:`B${rateRow}*B${rateRow+1}`}, '', 'Total Vehicle Service Mile Reimbursement']);
      rdData.push([]);
      rdData.push(['Total SS0 Vehicle Service Miles Reimbursement', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', {f:`B${rateRow+1}`}]);
      rdData.push(['Invoice Grand Total', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', {f:`B${rateRow+1}`}]);
    } else {
      // Mixed rates — show breakdown
      rdData.push(['Rate Breakdown:']);
      if (stdRoutes.length > 0) rdData.push(['', '', stdRoutes.map(r=>r.name).join(', '), 'Standard Rate @ $1.08/mile']);
      if (wcRoutes.length > 0)  rdData.push(['', '', wcRoutes.map(r=>r.name).join(', '), 'Wheelchair Van Rate @ $1.19/mile']);
      rdData.push([]);
      // Compute blended total
      const blended = routes.reduce((sum, r) => sum + (r.amMiles + r.pmMiles) * (r.wheelchairVan ? 1.19 : 1.08), 0);
      rdData.push(['', blended.toFixed(2), '', 'Total Estimated Reimbursement (blended rate)']);
      rdData.push([]);
      rdData.push(['Total SS0 Vehicle Service Miles Reimbursement', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', blended.toFixed(2)]);
      rdData.push(['Invoice Grand Total', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', blended.toFixed(2)]);
    }
  }

  const wsRD = XLSX.utils.aoa_to_sheet(rdData);
  styleRouteDetail(wsRD, allDays, routes.length, year, month);
  wsRD['!cols'] = [{wch:12},{wch:14},...allDays.map(()=>({wch:5.5})),{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsRD, 'Route Detail');

  // ── SHEET 2: Daily Attendance Report ──────────────────────────────────────
  const allClients = [];
  const seen = new Set();
  routes.forEach(route => {
    (route.clients||[]).forEach(cl => {
      if (!seen.has(cl.name)) {
        const parts = cl.name.split(', ');
        allClients.push({...cl, lastName: parts[0]||cl.name, firstName: parts[1]||'', routeName: route.name, routeId: route.id, vehicleId: route.vehicleId||route.name});
        seen.add(cl.name);
      }
    });
  });
  allClients.sort((a,b)=>a.lastName.localeCompare(b.lastName));

  const arData = [
    ['Khan Transportation - HA0935 - 875'],
    [startDate],
    ['*Purpose: Log daily trips provided to each rider.'],
    ['*Instructions: Track attendance as follows:'],
    ['','','','','','','0 = Absent','','Reported by home'],
    ['','','','','','','1 = One Way'],
    ['','','','','','','2 = Round Trip'],
    ['','','','','','','NS = No Show','','No Contact/Notice'],
    ['','','','','','','C = Cancellation','','Cancelled at the door'],
    ['','','','','','','X = Vendor Cancellation','','Vendor Cancelled'],
    [],
    ['Daily Attendance Report'],
    ['#','First Name','Last Name','UCI','Route / Vehicle ID','Service Days',
     ...allDays.map(d => d.getDate()), 'Total Trips','No Shows','Cancellations','Vendor CXL'],
  ];

  allClients.forEach((cl, idx) => {
    const row = [idx+1, cl.firstName, cl.lastName, cl.uci||'', cl.vehicleId||cl.routeName, ''];
    allDays.forEach(day => {
      if (isWeekend(day)) { row.push(''); return; }
      const dateStr = day.toISOString().slice(0,10);

      // ── Calendar absence takes priority over driver log ──────────────
      const calAbsCode = getAbsenceCode(cl.name, dateStr);
      if (calAbsCode) { row.push(calAbsCode); return; }

      const dayLogs = logs.filter(l=>l.date===dateStr&&(l.routeId===cl.routeId||l.routeName===cl.routeName));
      let code = '';
      if (dayLogs.length > 0) {
        const amLog = dayLogs.find(l=>l.period==='AM');
        const pmLog = dayLogs.find(l=>l.period==='PM');
        const amP = amLog?.clientStatuses?.[cl.name]==='present';
        const pmP = pmLog?.clientStatuses?.[cl.name]==='present';
        const ns = amLog?.clientStatuses?.[cl.name]==='noshow'||pmLog?.clientStatuses?.[cl.name]==='noshow';
        const c2 = amLog?.clientStatuses?.[cl.name]==='cancelled'||pmLog?.clientStatuses?.[cl.name]==='cancelled';
        if (amP&&pmP) code=2; else if (amP||pmP) code=1; else if (ns) code='NS'; else if (c2) code='C'; else code=0;
      }
      row.push(code);
    });
    const r = arData.length + 1;
    const wdCols = allDays.map((d,ci)=>isWeekend(d)?null:col(6+ci)).filter(Boolean);
    const rng = wdCols.length ? `${wdCols[0]}${r}:${wdCols[wdCols.length-1]}${r}` : null;
    row.push(rng ? {f:`SUMPRODUCT((${rng}=2)*2+(${rng}=1)*1)`} : 0);
    row.push(rng ? {f:`COUNTIF(${rng},"NS")`} : 0);
    row.push(rng ? {f:`COUNTIF(${rng},"C")`} : 0);
    row.push(rng ? {f:`COUNTIF(${rng},"X")`} : 0);
    arData.push(row);
  });

  const wsAR = XLSX.utils.aoa_to_sheet(arData);
  styleAttendance(wsAR, allDays, allClients.length);
  wsAR['!cols'] = [{wch:4},{wch:16},{wch:16},{wch:10},{wch:16},{wch:9},...allDays.map(()=>({wch:5.5})),{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsAR, 'Daily Attendance Report');

  // ── SHEET 3: Route Mileage ─────────────────────────────────────────────────
  const rmData = [
    ['Route Mileage Log — ' + monthLabel],
    [],
    ['Route','Driver',...allDays.flatMap(d=>[d.toLocaleDateString('en-US'),'','']),'Monthly Total'],
    [''     ,''      ,...allDays.flatMap(()=>['AM Miles','PM Miles','Day Total']),''],
  ];
  routes.forEach(route => {
    const row = [route.name, route.driver||''];
    allDays.forEach(day => {
      if (isWeekend(day)) { row.push('','',''); return; }
      const dateStr = day.toISOString().slice(0,10);
      // All clients absent on this route today → 0 miles
      if (allClientsAbsent(route, dateStr)) { row.push(0, 0, 0); return; }
      const amLog = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='AM');
      const pmLog = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='PM');
      row.push(amLog?(parseFloat(amLog.totalMiles)||''):'', pmLog?(parseFloat(pmLog.totalMiles)||''):'', '');
    });
    row.push('');
    rmData.push(row);
  });
  const wsRM = XLSX.utils.aoa_to_sheet(rmData);
  // Style Route Mileage
  const rmHdr = makeStyle('C0C0C0', true, 9, '000000', 'center');
  ['A3','B3'].forEach(a => { if(wsRM[a]) wsRM[a].s = rmHdr; });
  allDays.forEach((d,ci) => {
    ['A','B','C'].map((_,j) => {
      const base = 2 + ci*3 + j;
      const addr = XLSX.utils.encode_cell({r:2,c:base+2});
      if(wsRM[addr]) wsRM[addr].s = makeStyle(isWeekend(d)?'C0C0C0':'D9E1F2',true,8,'000000','center');
    });
  });
  wsRM['!cols'] = [{wch:10},{wch:12},...allDays.flatMap(()=>[{wch:9},{wch:9},{wch:9}]),{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsRM, 'Route Mileage');

  // ── SHEET 4: Daily Total ───────────────────────────────────────────────────
  const dtData = [
    ['Daily Total Miles — ' + monthLabel],
    [],
    ['#','Client','Route',...allDays.map(d=>d.toLocaleDateString('en-US')),'Monthly Total'],
  ];
  allClients.forEach((cl,idx) => {
    const row = [idx+1, cl.name, cl.routeName||''];
    allDays.forEach(day => {
      if (isWeekend(day)) { row.push(''); return; }
      const dateStr = day.toISOString().slice(0,10);
      // Calendar absence → 0 miles
      if (isAbsent(cl.name, dateStr)) { row.push(0); return; }
      const dayLogs = logs.filter(l=>l.date===dateStr&&l.routeId===cl.routeId);
      let miles = '';
      dayLogs.forEach(l=>{ if(l.clientMiles?.[cl.name]) miles=(miles||0)+parseFloat(l.clientMiles[cl.name]); });
      row.push(miles);
    });
    row.push('');
    dtData.push(row);
  });
  const wsDT = XLSX.utils.aoa_to_sheet(dtData);
  // Style headers
  for (let c = 0; c < 3 + allDays.length + 1; c++) {
    const addr = XLSX.utils.encode_cell({r:2,c});
    if(wsDT[addr]) wsDT[addr].s = makeStyle('C0C0C0',true,9,'000000','center');
  }
  allClients.forEach((_,ri) => {
    allDays.forEach((d,ci) => {
      const addr = XLSX.utils.encode_cell({r:3+ri,c:3+ci});
      if(wsDT[addr]) wsDT[addr].s = makeStyle(isWeekend(d)?'C0C0C0':'FFFF99',false,9,'000000','center');
    });
  });
  wsDT['!cols'] = [{wch:4},{wch:26},{wch:12},...allDays.map(()=>({wch:7})),{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsDT, 'Daily Total');

  // ── SHEET 5: Client Tracker ────────────────────────────────────────────────
  const ctData = [['Client Tracker — ' + monthLabel],[],];
  routes.forEach(route => {
    ctData.push([route.name + ' — Driver: ' + (route.driver||''), '', '', ...allDays.flatMap(d=>[d.toLocaleDateString('en-US'),'',''])]);
    ctData.push(['#','Client','UCI',...allDays.flatMap(()=>['AM','PM','Total']),'Monthly Total']);
    (route.clients||[]).forEach((cl,ci2) => {
      const row = [ci2+1, cl.name, cl.uci||''];
      allDays.forEach(day => {
        if(isWeekend(day)){row.push('','','');return;}
        const dateStr = day.toISOString().slice(0,10);
        // Calendar absence → blank/0 miles
        if (isAbsent(cl.name, dateStr)) { row.push(0, 0, 0); return; }
        const amL = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='AM');
        const pmL = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='PM');
        row.push(amL?.clientMiles?.[cl.name]||'', pmL?.clientMiles?.[cl.name]||'', '');
      });
      row.push('');
      ctData.push(row);
    });
    ctData.push([]);
  });
  const wsCT = XLSX.utils.aoa_to_sheet(ctData);
  wsCT['!cols'] = [{wch:4},{wch:26},{wch:10},...allDays.flatMap(()=>[{wch:8},{wch:8},{wch:9}]),{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsCT, 'Client Tracker');

  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array', cellStyles:true});
  return new Blob([wbout], {type:'application/octet-stream'});
}

function generatePriorityTrackerBlob(logs, monthYear, showFinancials = false, absences = []) {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded.'); return null; }
  const [year, month] = monthYear.split('-').map(Number);
  const allDays = getAllDays(year, month);
  const wb = XLSX.utils.book_new();
  const startDate = new Date(year,month-1,1).toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'});

  // Absence helpers (same logic as KTS)
  const isAbsent = (clientName, dateStr) => absences.some(a =>
    a.clientName === clientName && dateStr >= a.startDate && dateStr <= (a.endDate || a.startDate)
  );

  // Route Detail
  const rdData = [
    ['Priority Transportation HV0713'],
    [startDate,'','','Enter Format (Month/1/Year) ie: 6/1/12'],
    ['*Please fill in only the cells highlighted in yellow.'],
    [],['875 Service Code:'],['Vehicle Rate: 0V0'],[],
    [' ',' ',...allDays.map(d=>dayAbbr(d)),'Total'],
    ['Route #','Route Segment',...allDays.map(d=>d.getDate()),'Total'],
  ];
  const prRoutes = ['6770','6771','6772','6773','6774'];
  const segRows = [];
  prRoutes.forEach((rId,ri) => {
    ['AM Segment','PM Segment'].forEach((seg,si) => {
      const row = [si===0?rId:'', seg, ...allDays.map(d=>isWeekend(d)?'':''), ''];
      const rowIdx = rdData.length+1;
      const wdCols = allDays.map((d,ci)=>isWeekend(d)?null:col(2+ci)).filter(Boolean);

      rdData.push(row);
    });
  });
  const dtR = rdData.length+1;
  const dtRow = ['Daily Total',''];
  allDays.forEach((d,ci)=>{ if(isWeekend(d)){dtRow.push('');return;} dtRow.push({f:segRows.map(r=>`${col(2+ci)}${r}`).join('+')}); });
  dtRow.push({f:`SUM(C${dtR}:${col(1+allDays.length)}${dtR})`});
  rdData.push(dtRow);
  rdData.push([]);
  rdData.push(['Vehicle Service Miles Summary']);
  rdData.push([]);
  const tl=col(2+allDays.length);
  rdData.push(['',{f:`${tl}${dtR}`},'','Total Vehicle Units']);
  if (showFinancials) {
    rdData.push(['',166.94,'','Vehicle Unit Rate ($166.94)']);
    rdData.push(['',{f:`B${rdData.length}*B${rdData.length+1}`},'','Total Vehicle Reimbursement']);
  }
  const wsRD = XLSX.utils.aoa_to_sheet(rdData);
  styleRouteDetail(wsRD, allDays, prRoutes.length, year, month);
  wsRD['!cols']=[{wch:12},{wch:14},...allDays.map(()=>({wch:5.5})),{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsRD, 'Route Detail');

  // Daily Attendance Report (blank template)
  const arData2=[['Priority Transportation HV0713 - 875'],[startDate],
    ['*Purpose: Log daily trips.'],['*Instructions:'],
    ['','','','','','','0 = Absent','','Reported by home'],
    ['','','','','','','1 = One Way'],['','','','','','','2 = Round Trip'],
    ['','','','','','','NS = No Show','','No Contact/Notice'],
    ['','','','','','','C = Cancellation','','Cancelled at the door'],
    ['','','','','','','X = Vendor Cancellation','','Vendor Cancelled'],
    [],['Daily Attendance Report'],
    ['#','First Name','Last Name','UCI','Route / Vehicle ID','Service Days',
     ...allDays.map(d=>d.getDate()),'Total Trips','No Shows','Cancellations','Vendor CXL'],
  ];
  for(let i=0;i<30;i++){
    const r=arData2.length+1;
    const wdCols=allDays.map((d,ci)=>isWeekend(d)?null:col(6+ci)).filter(Boolean);
    const rng=wdCols.length?`${wdCols[0]}${r}:${wdCols[wdCols.length-1]}${r}`:null;
    arData2.push([i+1,'','','','','',
      ...allDays.map(d=>isWeekend(d)?'':''),
      rng?{f:`SUMPRODUCT((${rng}=2)*2+(${rng}=1)*1)`}:0,
      rng?{f:`COUNTIF(${rng},"NS")`}:0,
      rng?{f:`COUNTIF(${rng},"C")`}:0,
      rng?{f:`COUNTIF(${rng},"X")`}:0,
    ]);
  }
  const wsAR2=XLSX.utils.aoa_to_sheet(arData2);
  styleAttendance(wsAR2, allDays, 30);
  wsAR2['!cols']=[{wch:4},{wch:16},{wch:16},{wch:10},{wch:14},{wch:9},...allDays.map(()=>({wch:5.5})),{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsAR2, 'Daily Attendance Report');

  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});
  return new Blob([wbout],{type:'application/octet-stream'});
}

function generateHA0935Blob(logs, routes, monthYear, showFinancials = false, absences = []) {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded.'); return null; }

  const [year, month] = monthYear.split('-').map(Number);
  const monthDate = new Date(year, month - 1, 1);
  const daysInMonth = new Date(year, month, 0).getDate();

  // ── Exact fills from original (AARRGGBB) ─────────────────────────────────
  const YELLOW = { patternType: "solid", fgColor: { rgb: "FFFFFF99" } };
  const GRAY   = { patternType: "solid", fgColor: { rgb: "FFC0C0C0" } };

  // ── Font presets ──────────────────────────────────────────────────────────
  const F = (sz, bold) => ({ name:"Calibri", sz, bold: bold||false });

  // ── Alignment presets ─────────────────────────────────────────────────────
  const CTR = { horizontal:"center", vertical:"center" };
  const LFT = { horizontal:"left",   vertical:"center" };
  const RGT = { horizontal:"right",  vertical:"center" };

  // ── Number formats ────────────────────────────────────────────────────────
  const FMT_NUM   = '#,##0.00';
  const FMT_CURR  = '"$"#,##0.00_);\\("$"#,##0.00\\)';
  const FMT_CURR2 = '_("$"* #,##0.00_);_("$"* \\(#,##0.00\\);_("$"* "-"??_);_(@_)';
  const FMT_DATE  = 'ddd  d';
  const FMT_DATE2 = 'mmm\\-yyyy';
  const FMT_DMMM  = 'd-mmm';

  // ── Helpers ───────────────────────────────────────────────────────────────
  const colLetter = (n) => { let s=''; let x=n; while(x>0){s=String.fromCharCode(64+(x%26||26))+s;x=Math.floor((x-1)/26);} return s; };
  const E = (r, c) => XLSX.utils.encode_cell({r, c});   // 0-indexed

  const isWE = (day) => { const d = new Date(year, month-1, day); return d.getDay()===0||d.getDay()===6; };
  const isInMonth = (day) => day >= 1 && day <= daysInMonth;

  const isAbsent = (clientName, dateStr) => (absences||[]).some(a =>
    a.clientName === clientName && dateStr >= a.startDate && dateStr <= (a.endDate||a.startDate)
  );
  const allAbsent = (route, dateStr) => {
    const active = (route.clients||[]).filter(c => c.active);
    return active.length > 0 && active.every(c => isAbsent(c.name, dateStr));
  };

  const ws = {};
  const setC = (r, c, v, s) => {
    const a = E(r,c);
    const t = typeof v === 'number' ? 'n' : typeof v === 'boolean' ? 'b' : v instanceof Date ? 'd' : 's';
    ws[a] = { v: v===undefined||v===null ? '' : v, t };
    if (typeof v === 'string' && v.startsWith('=')) { ws[a].f = v.slice(1); ws[a].t = 'n'; ws[a].v = 0; }
    if (s) ws[a].s = s;
  };
  const setF = (r, c, formula, s) => {
    const a = E(r,c); ws[a] = { f: formula, t:'n', v:0 }; if(s) ws[a].s = s;
  };
  const dateCell = (r, c, d, s) => {
    const a = E(r,c); ws[a] = { v: d, t:'d' }; if(s) ws[a].s = s;
  };

  // ─────────────────────────────────────────────────────────────────────────
  // SHEET 1 — Route Detail
  // ─────────────────────────────────────────────────────────────────────────

  // ROW 1 — Title
  setC(0,0,'Khan Transportation - HA0935', {font:F(18)});

  // ROW 2 — Date + instruction (A2:C2 merged, D2 onward gray)
  dateCell(1,0, monthDate, {font:F(16), fill:YELLOW, alignment:CTR, numFmt:FMT_DATE2});
  setC(1,1,'', {fill:GRAY, font:F(10)});
  setC(1,2,'', {fill:GRAY, font:F(10)});
  setC(1,3,'Enter Format (Month/1/Year) ie: 6/1/12', {font:F(14), fill:GRAY});
  for (let c=4; c<=33; c++) setC(1,c,'', {fill:GRAY, font:F(10)});

  // ROW 3 — Note
  setC(2,0,'*Please fill in only the cells highlighted in yellow. The non-highlighted cells contain formulas to estimate totals based on contractual rates.', {font:F(10), alignment:{...LFT, wrapText:true}});

  // ROW 5 — Service code
  setC(4,0,'875 Service Code:', {font:F(12)});

  // ROW 7 — Vehicle Rate header
  setC(6,0,'Vehicle Rate: 0V0', {font:F(14,true)});

  // ROW 8 — Calendar Month Days (C8:AG8 merged)
  setC(7,2,'Calendar Month Days', {font:F(12), alignment:CTR});

  // ROW 9 — OVO header (gray, bold)
  setC(8,0,'Route #',        {font:F(11,true), fill:GRAY, alignment:CTR});
  setC(8,1,'Route Segment',  {font:F(11,true), fill:GRAY, alignment:CTR});
  setF(8,2,'+$A$2',          {font:F(11,true), fill:GRAY, alignment:CTR, numFmt:FMT_DATE});
  for (let i=1; i<=28; i++) { // D9..AE9
    const prev = colLetter(3+i-1);
    setF(8, 2+i, `+${prev}$40+1`, {font:F(11,true), fill:GRAY, alignment:CTR, numFmt:FMT_DATE});
  }
  setF(8,31,'IF(MONTH(+AD$40+1)=MONTH(+$A$2),+AD$40+1,"")', {font:F(11,true), fill:GRAY, alignment:CTR, numFmt:FMT_DATE});
  setF(8,32,'IF(AE$40="","",IF(MONTH(+AE$40+1)=MONTH(+$A$2),+AE$40+1,""))', {font:F(11,true), fill:GRAY, alignment:CTR, numFmt:FMT_DATE});
  setC(8,33,'Total', {font:F(11,true), fill:GRAY, alignment:CTR, numFmt:FMT_DMMM});

  // ROWS 10–29 — OVO data (AM+PM per route)
  const OVO_START = 9; // 0-indexed = Excel row 10
  routes.forEach((route, ri) => {
    ['AM','PM'].forEach((period, pi) => {
      const row = OVO_START + ri*2 + pi;
      if (pi===0) setC(row, 0, route.vehicleId||`Khan${ri+1}`, {font:F(11,true), alignment:CTR});
      setC(row, 1, `${period} Segment`, {font:F(11,true), alignment:CTR});

      for (let day=1; day<=31; day++) {
        const col = 1 + day; // C=col2=day1
        if (!isInMonth(day)) { setC(row, col, '', {fill:YELLOW, font:F(11), alignment:CTR, numFmt:FMT_NUM}); continue; }
        if (isWE(day))       { setC(row, col, '', {fill:YELLOW, font:F(11), alignment:CTR, numFmt:FMT_NUM}); continue; }

        if (allAbsent(route, dateStr)) {
          setC(row, col, 0, {fill:YELLOW, font:F(11), alignment:CTR, numFmt:FMT_NUM}); continue;
        }
        const submitted = logs.some(l =>
          (l.routeId===route.id||l.routeName===route.name) && l.date===dateStr && l.period===period
        );
        setC(row, col, submitted?1:0, {fill:YELLOW, font:F(11), alignment:CTR, numFmt:FMT_NUM});
      }
      const exR = row+1;
      setF(row, 33, `SUM(C${exR}:AG${exR})`, {font:F(11), alignment:CTR, numFmt:FMT_NUM});

  });

  setF(VRE_R,   2, `AH${OVO_END+1}`, {font:F(11), alignment:CTR, numFmt:FMT_NUM}); setC(VRE_R,   4,'Total Vehicle Units',        {font:F(11)});
  setC(VRE_R+1, 2, 166.94,           {font:F(11), alignment:CTR, numFmt:FMT_CURR});setC(VRE_R+1, 4,'Vehicle Unit Rate',           {font:F(11)});
  setF(VRE_R+2, 2, `C${VRE_R+2}*C${VRE_R+1}`, {font:F(11,true), alignment:CTR, numFmt:FMT_CURR}); setC(VRE_R+2,4,'Total Vehicle Reimbursement',{font:F(11,true)});

  // ROW 38 — SS0 header (0-indexed 37)

  setC(39,33,'Total', {font:F(11,true), fill:GRAY, alignment:CTR, numFmt:FMT_DMMM});

      const dayLogs = logs.filter(l=>(l.routeId===route.id||l.routeName===route.name)&&l.date===dateStr);

      setC(row,col, miles!==null ? Math.round(miles*10)/10 : '', {fill:YELLOW,font:F(11),alignment:CTR,numFmt:FMT_NUM});
    }
    const exR = row+1;
    setF(row,33,`SUM(C${exR}:AG${exR})`,{font:F(11),alignment:CTR,numFmt:FMT_NUM});
