                                </div>

                            <p style={{ color:"#92400e", fontSize:11, fontWeight:700, margin:"0 0 2px" }}>

                              <p style={{ color:COLORS.text, fontSize:11, margin:"1px 0" }}>
                                PM: driver should travel ~<strong>{calcMiles[`${route.id}_pm`]} mi</strong>

                              <p style={{ color:COLORS.accent, fontSize:11, fontWeight:700, margin:"3px 0 0" }}>

                                · Odometer end = start + {(calcMiles[`${route.id}_am`] + calcMiles[`${route.id}_pm`]).toFixed(1)}
                              </p>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                  </Card>
                  );
                })
                })()
              ) : (
                (() => {
                  const route = routes.find(r => r.id === selectedRoute);
                  const renderStops = (stops, period, color) => {
                    const pendingKey = `${route.id}_${period}`;
                    const displayStops = pendingStops[pendingKey] || stops;
                    const hasPending = !!pendingStops[pendingKey];

                    <div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", margin:"14px 0 10px" }}>

                        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                          <span style={{ color:COLORS.textMuted, fontSize:11 }}>{displayStops.length} stops</span>
                          <Btn small color={color} onClick={()=>{ setEditPeriod(period); setShowAddStop(true); }}>+ Add Stop</Btn>
                        </div>
                      </div>
                      {displayStops.map((s, i) => {
                        const clientsWithPrograms = (s.clients||[]).map(cName => {
                          const cl = route.clients.find(c=>c.name===cName);
                          return { name:cName, dayProgram:cl?.dayProgram||'', dropoffAddress:cl?.dropoffAddress||'' };
                        });
                        return (
                          <div key={s.id} style={{
                            marginBottom:6, opacity:s.inactive?0.45:1,
                            background:s.inactive?'#fff8f8':s.type==="base"?'#f0fdf4':COLORS.card,
                            borderRadius:10,
                            border:`1px solid ${s.inactive?COLORS.red+'44':s.type==="base"?color+'44':COLORS.border}`,
                            overflow:'hidden',
                          }}>
                            <div style={{ display:"flex", alignItems:"stretch" }}>
                              {/* Sequence Number */}
                              <div style={{ minWidth:48, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                                background:s.type==="base"?color:s.dropoff?'#fef2f2':'#eff6ff', padding:"10px 4px", gap:4 }}>
                                <select value={i+1}
                                  onChange={e=>handleSequenceChange(route.id, period, i, parseInt(e.target.value))}
                                  style={{ width:36, height:36, textAlign:"center", textAlignLast:"center",
                                    fontSize:15, fontWeight:800,
                                    background:s.type==="base"?'rgba(255,255,255,0.3)':'white',
                                    border:`2px solid ${s.type==="base"?'rgba(255,255,255,0.5)':color}`,
                                    borderRadius:8, color:s.type==="base"?'#fff':color,
                                    cursor:"pointer", appearance:"none", WebkitAppearance:"none" }}>
                                  {displayStops.map((_,idx)=><option key={idx} value={idx+1}>{idx+1}</option>)}
                                </select>
                                <span style={{ fontSize:9, color:s.type==="base"?'rgba(255,255,255,0.8)':COLORS.textMuted, textTransform:"uppercase" }}>order</span>
                              </div>
                              {/* Stop Content */}
                              <div style={{ flex:1, padding:"10px 10px 10px 12px", minWidth:0 }}>
                                <div style={{ display:"flex", alignItems:"center", gap:5, flexWrap:"wrap", marginBottom:4 }}>
                                  {s.type==="base" && <Badge color={color}>🏠 Base</Badge>}
                                  {s.dropoff && <Badge color={COLORS.red}>⬇ Drop-off</Badge>}
                                  {!s.dropoff && s.type!=="base" && <Badge color={COLORS.blue}>⬆ Pickup</Badge>}
                                  {s.label && <Badge color={COLORS.yellow}>{s.label}</Badge>}
                                  {s.time && <span style={{ color:COLORS.yellow, fontSize:12, fontWeight:700 }}>🕐 {s.time}</span>}
                                  {s.inactive && <Badge color={COLORS.red}>Inactive</Badge>}
                                  {s.stopReturnDate && <span style={{ color:COLORS.yellow, fontSize:11 }}>📅 Returns {s.stopReturnDate}</span>}
                                </div>
                                <p style={{ color:COLORS.text, fontSize:13, margin:"2px 0", fontWeight:600, lineHeight:1.3 }}>{s.address}</p>
                                {s.clients?.length>0 && (
                                  <div style={{ marginTop:6 }}>
                                    {clientsWithPrograms.map(cp=>(
                                      <div key={cp.name} style={{ marginBottom:4, padding:"5px 8px",
                                        background:s.dropoff?'#fef2f2':'#eff6ff', borderRadius:6,
                                        borderLeft:`3px solid ${s.dropoff?COLORS.red:COLORS.blue}` }}>
                                        <p style={{ color:COLORS.text, fontSize:12, fontWeight:600, margin:0 }}>{s.dropoff?'⬇':'⬆'} {cp.name}</p>
                                        {!s.dropoff && cp.dayProgram && <p style={{ color:COLORS.accent, fontSize:11, margin:"2px 0 0" }}>📍 Drop-off: <strong>{cp.dayProgram}</strong> — {cp.dropoffAddress}</p>}
                                        {s.dropoff && (()=>{ const cl=route.clients.find(c=>c.name===cp.name); return cl?.address?<p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>🏠 Home: {cl.address}</p>:null; })()}
                                      </div>
                                    ))}
                                  </div>
                                )}
                              </div>
                              {/* Toggle */}
                              {s.type!=="base" && (
                                <div style={{ display:"flex", alignItems:"center", padding:"0 10px", flexShrink:0 }}>
                                  <Toggle on={!s.inactive} onChange={()=>handleStopToggle(route.id, period, s)} />
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      {/* Save/Discard bar */}
                      <div style={{ marginTop:10, padding:"10px 0", borderTop:`1px dashed ${COLORS.border}` }}>
                        {hasPending ? (
                          <div style={{ display:"flex", gap:8 }}>
                            <Btn onClick={()=>setSaveConfirm({routeId:route.id, period})}
                              style={{ flex:1, fontWeight:700 }}>💾 Save {period.toUpperCase()} Order</Btn>
                            <Btn outline onClick={()=>handleDiscardPendingStops(route.id, period)} style={{ flex:1 }}>✕ Discard</Btn>
                          </div>
                        ) : (
                          <p style={{ color:COLORS.textMuted, fontSize:11, textAlign:"center", margin:0 }}>
                            ✓ {period.toUpperCase()} order saved — change a number above to reorder
                          </p>
                        )}
                      </div>
                    </div>
                    );
                  };


                  return (
                    <div>
                      <Btn small outline onClick={() => setSelectedRoute(null)} style={{ marginBottom: 12 }}>← Back to Routes</Btn>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                        <h3 style={{ color: COLORS.text, margin: 0 }}>{route.name}</h3>
                        <span style={{ color: COLORS.textMuted }}>—</span>
                        <select value={route.driver} onChange={(e) => handleReassignDriver(route.id, e.target.value)}
                          style={{ padding: "4px 24px 4px 8px", fontSize: 13, fontWeight: 600, borderRadius: 6,
                            border: `1px solid ${COLORS.accent}`, background: COLORS.accent + "15", color: COLORS.accent, cursor: "pointer" }}>
                          {allDriversAndManagers.map(u => (
                            <option key={u.id} value={u.name}>{u.name}</option>
                          ))}
                        </select>
                      </div>
                      <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 8px" }}>Vehicle: {route.vehicleId} · Change a sequence number, then hit Save to apply.</p>

                      {renderStops(route.amStops, "am", COLORS.accent)}
                      {renderStops(route.pmStops, "pm", COLORS.blue)}

                      {/* Save Order Confirmation Modal */}
                      {saveConfirm && saveConfirm.routeId === route.id && (
                        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                          <Card style={{ width:"100%", maxWidth:380 }}>
                            <h3 style={{ color: COLORS.text, margin:"0 0 8px" }}>💾 Confirm Sequence Change</h3>
                            <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 6px" }}>
                              You are updating the <strong>{saveConfirm.period.toUpperCase()} route</strong> stop order for:
                            </p>
                            <p style={{ color: COLORS.accent, fontWeight:700, fontSize:14, margin:"0 0 16px" }}>{route.name}</p>
                            <p style={{ color: COLORS.textMuted, fontSize:12, margin:"0 0 20px" }}>
                              This will permanently change the pickup/drop-off sequence. Drivers will see the new order immediately.
                            </p>
                            <div style={{ display:"flex", gap:8 }}>
                              <Btn onClick={() => handleSavePendingStops(route.id, saveConfirm.period)}
                                style={{ flex:1, background: COLORS.accent, color:'#fff', fontWeight:700 }}>
                                ✓ Proceed
                              </Btn>
                              <Btn outline onClick={() => setSaveConfirm(null)} style={{ flex:1 }}>Cancel</Btn>
                            </div>
                          </Card>
                        </div>
                      )}

                      {/* Add Stop Modal */}
                      {showAddStop && (
                        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                          <Card style={{ width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }}>
                            <h3 style={{ color: COLORS.text, margin:"0 0 12px" }}>Add Stop — {editPeriod.toUpperCase()} Route</h3>

                            {/* Stop type */}
                            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                              <button onClick={() => setNewStop(p=>({...p,type:"pickup",dropoff:false}))}
                                style={{ flex:1, padding:"10px", borderRadius:8, border:`2px solid ${newStop.type==="pickup"?COLORS.blue:COLORS.border}`,
                                  background:newStop.type==="pickup"?"#eff6ff":"transparent", color:newStop.type==="pickup"?COLORS.blue:COLORS.textMuted,
                                  fontWeight:700, fontSize:13, cursor:"pointer" }}>
                                ⬆ Pickup Stop
                              </button>
                              <button onClick={() => setNewStop(p=>({...p,type:"dropoff",dropoff:true}))}
                                style={{ flex:1, padding:"10px", borderRadius:8, border:`2px solid ${newStop.type==="dropoff"?COLORS.red:COLORS.border}`,
                                  background:newStop.type==="dropoff"?"#fef2f2":"transparent", color:newStop.type==="dropoff"?COLORS.red:COLORS.textMuted,
                                  fontWeight:700, fontSize:13, cursor:"pointer" }}>
                                ⬇ Drop-off Stop
                              </button>
                            </div>

                            <Input label="Location / Program Name (e.g. PCS, CVTC, Galt Act)" value={newStop.label}
                              onChange={e=>setNewStop(p=>({...p,label:e.target.value}))} placeholder="e.g. PCS Day Program" />
                            <Input label="Full Address *" value={newStop.address}
                              onChange={e=>setNewStop(p=>({...p,address:e.target.value}))} placeholder="Street address, City, State ZIP" />

                            {/* Time — prominently marked as important */}
                            <div style={{ marginBottom:12 }}>
                              <label style={{ display:"block", color:COLORS.textDim, fontSize:12, marginBottom:4, fontWeight:600 }}>
                                🕐 {newStop.type==="pickup" ? "Pickup Time *" : "Drop-off Time *"}
                                <span style={{ color:COLORS.red, marginLeft:4, fontSize:10 }}>Required — drivers need this</span>
                              </label>
                              <input type="time" value={newStop.time24||""} onChange={e=>{
                                const t = e.target.value;
                                if (!t) { setNewStop(p=>({...p,time:"",time24:""})); return; }
                                const [h,m] = t.split(":").map(Number);
                                const ampm = h>=12?"PM":"AM";
                                const h12 = h%12||12;
                                setNewStop(p=>({...p,time:`${h12}:${String(m).padStart(2,"0")} ${ampm}`,time24:t}));
                              }}
                              style={{ width:"100%", padding:"10px 12px", background:COLORS.bg, border:`2px solid ${COLORS.yellow}`,
                                borderRadius:8, color:COLORS.text, fontSize:15, fontWeight:700, boxSizing:"border-box" }} />
                              {newStop.time && <p style={{ color:COLORS.yellow, fontSize:12, fontWeight:700, margin:"4px 0 0" }}>→ {newStop.time}</p>}
                            </div>

                            {/* Participants */}
                            <div style={{ marginBottom:12 }}>
                              <label style={{ display:"block", color:COLORS.textDim, fontSize:12, marginBottom:6, fontWeight:600 }}>
                                Participants at this stop
                              </label>
                              {route.clients.filter(c=>c.active&&c.status!=="archived").map(cl=>{
                                const checked = (newStop.clients||"").split(",").map(s=>s.trim()).includes(cl.name);
                                return (
                                  <label key={cl.name} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0",
                                    borderBottom:`1px solid ${COLORS.border}`, cursor:"pointer" }}>

                                      onChange={e=>{
                                        const current = (newStop.clients||"").split(",").map(s=>s.trim()).filter(Boolean);

                                      style={{ width:16, height:16, cursor:"pointer" }} />

                                      <span style={{ color:COLORS.text, fontSize:13, fontWeight:600 }}>{cl.name}</span>

                                  </label>
                                );
                              })}
                              {route.clients.filter(c=>c.active&&c.status!=="archived").length===0 && (
                                <p style={{ color:COLORS.textMuted, fontSize:12 }}>No active participants on this route yet</p>
                              )}
                            </div>

              activeCompany={activeCompany}
              auditLog={auditLog} setAuditLog={setAuditLog}
            />
          )}

          {/* FLEET TAB — System Admin only */}
          {tab === "fleet" && isAdmin && (
            <FleetTab routes={companyRoutes} setRoutes={setRoutes} />
          )}

          {/* REPORTS TAB — Admin, Admin Assistant, and Manager */}
          {tab === "reports" && isFullAccess && (
            <ReportsTab logs={logs} routes={companyRoutes} isAdmin={canViewFinancials} absences={absences} attendanceCorrections={attendanceCorrections} activeCompany={activeCompany} />

          {/* COMPANIES TAB — System Admin only */}
          {tab === "companies" && isAdmin && (
            <CompaniesTab companies={companies} setCompanies={setCompanies} users={users} currentUser={user} auditLog={auditLog} setAuditLog={setAuditLog} />
          )}

          {tab === "backup" && isAdmin && (
            <BackupTab
              logs={logs} setLogs={setLogs}
              absences={absences} setAbsences={setAbsences}
              attendanceCorrections={attendanceCorrections} setAttendanceCorrections={setAttendanceCorrections}
              timeOffRequests={timeOffRequests} setTimeOffRequests={setTimeOffRequests}
              vehicleServices={vehicleServices} setVehicleServices={setVehicleServices}
              vehicleWarranties={vehicleWarranties} setVehicleWarranties={setVehicleWarranties}
              vehicleRegistry={vehicleRegistry} setVehicleRegistry={setVehicleRegistry}

              routes={routes} setRoutes={setRoutes}
              users={users} setUsers={setUsers}
            />
          )}
        </div>{/* end right content */}
      </div>{/* end sidebar+content layout */}

      {/* === Global Participant Modals === */}
      {showAddClient && (
        <div style={{ position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }}>
          <Card style={{ width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto" }}>
            <h3 style={{ color:COLORS.text,margin:"0 0 16px" }}>Add New Participant</h3>
            <Input label="Full Name *" value={newClient.name} onChange={e=>setNewClient(p=>({...p,name:e.target.value}))} placeholder="e.g. Smith, John" />
            <Input label="Home Address *" value={newClient.address} onChange={e=>setNewClient(p=>({...p,address:e.target.value}))} />
            <div style={{ background:"#eff6ff",borderRadius:8,padding:"10px 12px",marginBottom:12 }}>
              <p style={{ color:COLORS.blue,fontSize:12,fontWeight:700,margin:"0 0 6px" }}>📍 Day Program</p>
              <Input label="Program Name" value={newClient.dayProgram||""} onChange={e=>setNewClient(p=>({...p,dayProgram:e.target.value}))} />
              <Input label="Program Address" value={newClient.dropoffAddress||""} onChange={e=>setNewClient(p=>({...p,dropoffAddress:e.target.value}))} />
            </div>
            <Input label="UCI Number" value={newClient.uci} onChange={e=>setNewClient(p=>({...p,uci:e.target.value}))} placeholder="Optional" />
            <div style={{ marginBottom:12 }}>
              <label style={{ display:"block",color:COLORS.textDim,fontSize:12,marginBottom:4,fontWeight:600 }}>Assign to Route *</label>
              <select value={newClient.routeId} onChange={e=>setNewClient(p=>({...p,routeId:e.target.value}))} style={{ width:"100%",padding:"10px 12px",background:COLORS.bg,border:`1px solid ${COLORS.border}`,borderRadius:8,color:COLORS.text,fontSize:14 }}>
                <option value="">Select route...</option>
                {routes.map(r=><option key={r.id} value={r.id}>{r.name} — {r.driver}</option>)}
              </select>
            </div>
            <div style={{ display:"flex",gap:8,marginTop:8 }}>
              <Btn onClick={handleAddClient} style={{ flex:1 }}>Add Participant</Btn>
              <Btn outline onClick={()=>setShowAddClient(false)} style={{ flex:1 }}>Cancel</Btn>
            </div>
          </Card>
        </div>
      )}
      </div>{/* end maxWidth container */}
    </div>
  );
};

  nonAmbMile:         1.19,   // small non-ambulatory/mile
};

              cursor:'pointer', border:`2px solid ${tab===t.id?accentColor:COLORS.border}`,
              background:tab===t.id?accentColor:'transparent',
              color:tab===t.id?'#fff':COLORS.textMuted,
            }}>{t.icon} {t.label}</button>
          ))}
        </div>

        {/* FLEET & RATES TAB */}
        {tab === 'fleet' && (
          <div>
            <h3 style={{ color:COLORS.text, margin:'0 0 12px' }}>🏢 Fleet Summary — {contract}</h3>

            {/* Rate card */}
            <Card style={{ marginBottom:12, borderLeft:`4px solid ${accentColor}` }}>
              <p style={{ color:accentColor, fontSize:13, fontWeight:800, margin:'0 0 10px', textTransform:'uppercase', letterSpacing:0.5 }}>
                Transportation Rates — Effective January 1, 2026
              </p>
              {[
                [`Vehicle Rate (0V0)`, `$${rates.vehicleRate.toFixed(2)}/vehicle/day`, '875'],
                [`Standard Vehicle Mile (Small)`, `$${rates.standardMile.toFixed(2)}/mile`, '875 SSO'],
                [`Non-Ambulatory Vehicle Mile (Small)`, `$${rates.nonAmbMile.toFixed(2)}/mile`, '875 SSO'],
              ].map(([label, rate, code]) => (
                <div key={label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                  padding:'6px 0', borderBottom:`1px solid ${COLORS.border}` }}>

                    <p style={{ color:COLORS.text, fontSize:13, fontWeight:600, margin:0 }}>{label}</p>
                    <p style={{ color:COLORS.textMuted, fontSize:10, margin:0 }}>Code: {code}</p>
                  </div>
                  <span style={{ color:accentColor, fontSize:14, fontWeight:800 }}>{rate}</span>

              ))}
            </Card>

            {/* Routes */}
            <h4 style={{ color:COLORS.text, margin:'0 0 8px', fontSize:14 }}>Routes ({routes.length})</h4>
            {routes.map(r => {
              const activeClients = (r.clients||[]).filter(c=>c.active).length;
              const isWC = !!r.wheelchairVan;

                    <div>
                      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <span style={{ color:COLORS.text, fontSize:14, fontWeight:700 }}>{r.name}</span>
                        <span style={{ color:COLORS.textMuted, fontSize:12 }}>{r.vehicleId}</span>

              </p>

                Vehicle Rate (0V0) · SSO Vehicle Service Miles · Daily Attendance — from driver submissions
              </p>
              <button onClick={() => {
                const blob = generateHA0935Blob(monthLogs, routes, selectedMonth, true, absences);
                if (blob) downloadBlob(blob, `${contract}_${monthName.replace(' ','_')}.xlsx`);
              }} style={{ width:'100%', padding:'13px', background:accentColor, color:'#fff',
                border:'none', borderRadius:9, fontSize:13, fontWeight:800, cursor:'pointer' }}>
                📥 Download {contract} Route Detail (.xlsx)

                      </span>
                      <span style={{ background:pmCount>0?'#dcfce7':'#fee2e2', color:pmCount>0?'#166534':COLORS.red,

            {/* Summary */}

              <Card style={{ textAlign:'center', padding:12 }}>
                <p style={{ color:COLORS.accent, fontSize:22, fontWeight:800, margin:0 }}>
                  {inspections.filter(i=>i.date===todayStr||i.submittedAt?.startsWith(todayStr)).length}

              [...inspections].reverse().map((insp, idx) => {
                const route = routes.find(r => r.driver === insp.driver || r.id === insp.routeId);
                const date  = insp.date || insp.submittedAt?.slice(0,10) || 'Unknown';
                const isToday = date === todayStr;
                return (
                  <Card key={idx} style={{ marginBottom:8, borderLeft:`3px solid ${isToday?COLORS.accent:COLORS.border}` }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                      <div>
                        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
                          <span style={{ fontSize:14, fontWeight:700, color:COLORS.text }}>{insp.driver || 'Unknown Driver'}</span>
                          {isToday && <Badge color={COLORS.accent}>Today</Badge>}
                          {insp.override && <Badge color={COLORS.red}>Override Used</Badge>}
                        </div>
                        <p style={{ color:COLORS.textMuted, fontSize:12, margin:0 }}>

                        {insp.override && (
                          <p style={{ color:COLORS.red, fontSize:11, margin:'3px 0 0', fontWeight:700 }}>

                        )}
                        {insp.items && (
                          <div style={{ marginTop:5, display:'flex', flexWrap:'wrap', gap:4 }}>

                              <span key={k} style={{

                                background: v==='pass'?'#dcfce7':v==='fail'?'#fee2e2':'#fef3c7',
                                color: v==='pass'?'#166534':v==='fail'?COLORS.red:'#92400e',
                              }}>{k}: {v}</span>
                            ))}
                          </div>
                        )}
                      </div>
                      <span style={{ color:COLORS.accent, fontSize:18 }}>✅</span>
                    </div>
                  </Card>
                );
              })
            )}
          </div>
        )}
      </div>
    </div>
  );
}

    id: "sst",

    color: "#1d4ed8",
    bg: "#eff6ff",
    border: "#bfdbfe",

    routeIds: ["r1","r2","r3","r4","r5","r6","r7","r8","r9","r10"],

  {
    id: "priority",
    name: "Priority Transportation",
    contract: "HV0713",
    color: "#16a34a",
    bg: "#f0fdf4",
    border: "#bbf7d0",
    routePrefix: "Priority",
    routeIds: ["r11","r12"],  // Priority routes
  },
];

function FleetTab({ routes, setRoutes }) {
  const [selectedCompany, setSelectedCompany] = useState("sst");

  const toggleWheelchair = (routeId) => {
    setRoutes(prev => prev.map(r =>
      r.id === routeId ? { ...r, wheelchairVan: !r.wheelchairVan } : r
    ));
  };

  const sstRoutes = routes.filter(r => FLEET_COMPANIES[0].routeIds.includes(r.id));
  const priorityRoutes = routes.filter(r => !FLEET_COMPANIES[0].routeIds.includes(r.id));

  const company = FLEET_COMPANIES.find(c => c.id === selectedCompany);
  const companyRoutes = selectedCompany === "sst" ? sstRoutes : priorityRoutes;

  const RATE_STANDARD    = 1.08;
  const RATE_WHEELCHAIR  = 1.19;

  const totalMiles = companyRoutes.reduce((s, r) => s + r.amMiles + r.pmMiles, 0);
  const estReimbursement = companyRoutes.reduce((s, r) => {
    const rate = r.wheelchairVan ? RATE_WHEELCHAIR : RATE_STANDARD;
    return s + (r.amMiles + r.pmMiles) * rate;
  }, 0);
  const wcCount = companyRoutes.filter(r => r.wheelchairVan).length;

  return (
    <div>
      <h3 style={{ color: COLORS.text, margin:"0 0 12px" }}>🏢 Fleet Companies</h3>

      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        {FLEET_COMPANIES.map(c => (
          <button key={c.id} onClick={() => setSelectedCompany(c.id)} style={{
            flex:1, padding:"12px 8px", borderRadius:10, cursor:"pointer", textAlign:"center",
            border:`2px solid ${selectedCompany===c.id ? c.color : COLORS.border}`,
            background: selectedCompany===c.id ? c.bg : "transparent",
          }}>
            <p style={{ color: selectedCompany===c.id ? c.color : COLORS.textMuted,
              fontSize:13, fontWeight:800, margin:"0 0 2px" }}>{c.name}</p>
            <p style={{ color: COLORS.textMuted, fontSize:11, margin:0 }}>Contract: {c.contract}</p>
          </button>
        ))}
      </div>

      {/* Summary cards */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
        <Card style={{ textAlign:"center", padding:12 }}>
          <p style={{ color:company.color, fontSize:22, fontWeight:800, margin:0 }}>{companyRoutes.length}</p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>Routes</p>
        </Card>
        <Card style={{ textAlign:"center", padding:12 }}>
          <p style={{ color:COLORS.yellow, fontSize:22, fontWeight:800, margin:0 }}>{wcCount}</p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>♿ WC Vans</p>
        </Card>
        <Card style={{ textAlign:"center", padding:12, background:"#f0fdf4" }}>
          <p style={{ color:"#166534", fontSize:18, fontWeight:800, margin:0 }}>
            ${estReimbursement.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
          </p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>Est. Reimb.</p>
        </Card>
      </div>

      {/* Rate info — ACRC for SST, VMRC for Priority */}
      {(() => {
        const isSST = selectedCompany === "sst";
        const regionName = isSST ? "ACRC" : "VMRC";
        const rates = ACRC_TRANSPORT_RATES; // same as VMRC for these codes
        const accentCol = isSST ? "#1d4ed8" : "#16a34a";
        const bgCol = isSST ? "#eff6ff" : "#f0fdf4";
        const borderCol = isSST ? "#bfdbfe" : "#bbf7d0";
        return (
          <div style={{ background:bgCol, border:`1px solid ${borderCol}`, borderRadius:10,
            padding:"12px 14px", marginBottom:14 }}>
            <p style={{ color:accentCol, fontSize:13, fontWeight:800, margin:"0 0 8px" }}>
              📋 {regionName} Transportation Rates — Effective January 1, 2026
            </p>
            {[
              ["Vehicle Rate (0V0 — per vehicle/day)", `$${rates.vehicleRate.toFixed(2)}/vehicle`, "875"],
              ["Standard Mile (Small Vehicle)", `$${rates.standardMile.toFixed(2)}/mile`, "875 SSO"],
              ["Non-Ambulatory Mile (♿ WC Van)", `$${rates.nonAmbMile.toFixed(2)}/mile`, "875 SSO"],
            ].map(([label, rate, code]) => (
              <div key={label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"5px 0", borderBottom:`1px solid ${borderCol}` }}>
                <div>
                  <span style={{ color:COLORS.text, fontSize:12, fontWeight:600 }}>{label}</span>
                  <span style={{ color:COLORS.textMuted, fontSize:10, marginLeft:6 }}>Code: {code}</span>

                <span style={{ color:accentCol, fontSize:13, fontWeight:800 }}>{rate}</span>
              </div>

            <p style={{ color:COLORS.textMuted, fontSize:10, margin:"6px 0 0" }}>

            </p>
          </div>
        );
      })()}

      {/* Route list with wheelchair toggle */}
      {companyRoutes.length === 0 ? (
        <Card>
          <p style={{ color:COLORS.textMuted, textAlign:"center", fontSize:13 }}>
            No routes assigned to this company yet.
          </p>
        </Card>
      ) : (
        companyRoutes.map(route => {
          const isWC = !!route.wheelchairVan;
          const rate = isWC ? RATE_WHEELCHAIR : RATE_STANDARD;
          const dailyMiles = route.amMiles + route.pmMiles;
          const dailyEst = dailyMiles * rate;
          const activeClients = (route.clients||[]).filter(c => c.active).length;

          return (
            <Card key={route.id} style={{ marginBottom:8,
              borderLeft:`3px solid ${isWC ? COLORS.yellow : company.color}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                    <span style={{ color:COLORS.text, fontSize:14, fontWeight:800 }}>{route.name}</span>
                    <span style={{ color:COLORS.textMuted, fontSize:12 }}>{route.vehicleId}</span>
                    {isWC && (
                      <span style={{ background:"#fef3c7", color:"#92400e", fontSize:11, fontWeight:700,
                        padding:"1px 8px", borderRadius:10 }}>♿ Wheelchair Van</span>
                    )}
                  </div>
                  <p style={{ color:COLORS.textMuted, fontSize:12, margin:0 }}>
                    Driver: {route.driver} · {activeClients} clients
                    · {dailyMiles.toFixed(1)} mi/day

                  <p style={{ color:"#166534", fontSize:11, fontWeight:700, margin:"2px 0 0" }}>
                    Rate: ${rate.toFixed(2)}/mi · Est: ${dailyEst.toFixed(2)}/day
                  </p>
                </div>

                {/* Wheelchair Van checkbox */}
                <label style={{ display:"flex", flexDirection:"column", alignItems:"center",
                  gap:4, cursor:"pointer", padding:"4px 8px", userSelect:"none" }}>

                    width:28, height:28, borderRadius:6, border:`2px solid ${isWC ? COLORS.yellow : COLORS.border}`,
                    background: isWC ? "#fef3c7" : "transparent",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    cursor:"pointer", fontSize:16,
                  }}>
                    {isWC ? "♿" : ""}
                  </div>

                    fontWeight:700, textTransform:"uppercase" }}>WC Van</span>

          );
        })
      )}

      {/* Priority routes note */}
      {selectedCompany === "priority" && companyRoutes.length === 0 && (
        <div style={{ background:"#f0fdf4", border:`1px solid #86efac`, borderRadius:8,
          padding:"12px", marginTop:8 }}>
          <p style={{ color:"#166534", fontSize:12, fontWeight:700, margin:"0 0 4px" }}>
            Priority Transportation Routes (P-1 and related priority units)
          </p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:0 }}>
            Priority Transportation routes are tracked separately under HV0713.
            Add routes via the Routes tab with "Priority" in the name to assign them here.
          </p>
        </div>
      )}
    </div>
  );
}


// ============ VEHICLE REGISTRY + SERVICE COMPONENTS ============
const VEHICLE_NAME_ALIASES = {
  '6670': 'P-1',
  '6770': 'P-1',
  '6771': 'P-19',
  '6772': 'P-19',
};

const normalizeVehicleNumber = (value) => {
  const raw = String(value || '').trim();
  return VEHICLE_NAME_ALIASES[raw] || raw;
};

const normalizeRouteName = (value) => {
  const raw = String(value || '');
  return raw
    .replace(/Route\s+6670\b/g, 'Route P-1')
    .replace(/Route\s+6770\b/g, 'Route P-1')
    .replace(/Route\s+6771\b/g, 'Route P-19')
    .replace(/Route\s+6772\b/g, 'Route P-19');
};

const SERVICE_SCHEDULES = [
  { key:'oil_filter', serviceName:'Engine oil & filter replacement', months:3, miles:4000 },
  { key:'tire_brake', serviceName:'Tire rotation & brake inspection', months:6, miles:8000 },
  { key:'maf_clean', serviceName:'MAF sensor cleaning', months:6, miles:12000 },
  { key:'engine_air', serviceName:'Engine air filter replacement', months:24, miles:30000 },
  { key:'cabin_air', serviceName:'Cabin air filter replacement', months:12, miles:30000 },
  { key:'transmission', serviceName:'Transmission fluid drain & refill', months:90, miles:60000 },
];

// Shared custom service types (persisted in localStorage) — used by ServiceHistoryPanel + VehicleServiceTab
const CUSTOM_SERVICE_TYPES_KEY = 'kts_custom_service_types';
const loadCustomServiceTypes = () => {
  try {
    const s = localStorage.getItem(CUSTOM_SERVICE_TYPES_KEY);
    return s ? JSON.parse(s) : [];
  } catch (e) { return []; }
};
const saveCustomServiceTypes = (list) => {
  try { localStorage.setItem(CUSTOM_SERVICE_TYPES_KEY, JSON.stringify(list)); } catch (e) {}
};

// ── Company partitioning ──
// SST (Khan Transportation Services) owns routes r1–r10; Priority Transport owns r11–r12.
// This is the single source of truth for route→company mapping used across the app.
const SST_ROUTE_IDS = ["r1","r2","r3","r4","r5","r6","r7","r8","r9","r10"];
const PRIORITY_ROUTE_IDS = ["r11","r12"];
const ACTIVE_COMPANY_KEY = 'kts_active_company';
// Given a route (object or id), return 'sst' or 'priority'.
const getCompanyKeyForRoute = (routeOrId) => {
  const id = typeof routeOrId === 'string' ? routeOrId : (routeOrId?.id || '');
  if (SST_ROUTE_IDS.includes(id)) return 'sst';
  if (PRIORITY_ROUTE_IDS.includes(id)) return 'priority';
  return null;
};
// Given a vehicle (from vehicleRegistry), return 'sst' or 'priority'. Falls back to SST.
const getCompanyKeyForVehicle = (vehicle) => {
  if (!vehicle) return 'sst';
  const raw = String(vehicle.company || '').toLowerCase();
  if (raw.includes('priority')) return 'priority';
  return 'sst';
};
// Filter helpers — each returns a new array matching the selected companyKey.
const filterRoutesByCompany = (routes, companyKey) => (routes || []).filter(r => getCompanyKeyForRoute(r) === companyKey);
const filterVehiclesByCompany = (vehicles, companyKey) => (vehicles || []).filter(v => getCompanyKeyForVehicle(v) === companyKey);
// Given a driver name, return 'sst' or 'priority' based on that driver's route assignment.
const getCompanyKeyForDriver = (driverName, routes) => {
  const name = String(driverName || '').trim().toLowerCase();
  if (!name) return null;
  const route = (routes || []).find(r => String(r.driver || '').trim().toLowerCase() === name);
  return route ? getCompanyKeyForRoute(route) : null;
};

// Build a single alphabetized list of {value, label} options from built-in + custom service types.
// Always ends with the "Other / custom…" sentinel.
const buildServiceTypeOptions = (customList) => {
  const built = SERVICE_SCHEDULES.map(s => ({ value: s.key, label: s.serviceName }));
  const customs = (customList || []).map(name => ({ value: `custom:${name}`, label: name }));
  const combined = [...built, ...customs].sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: 'base' }));
  combined.push({ value: '__other__', label: 'Other / custom…' });
  return combined;
};


const addMonthsISO = (dateStr, months) => {
  const base = dateStr ? new Date(`${dateStr}T12:00:00`) : new Date();
  if (Number.isNaN(base.getTime())) return '';
  const next = new Date(base);
  next.setMonth(next.getMonth() + Number(months || 0));
  return next.toISOString().slice(0,10);
};

const daysUntil = (dateStr) => {
  if (!dateStr) return null;
  const today = new Date();
  const due = new Date(`${dateStr}T12:00:00`);
  if (Number.isNaN(due.getTime())) return null;
  return Math.ceil((due - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / (1000*60*60*24));
};

const getVehicleCompany = (route) => {
  const vNum = String(route?.vehicleId || '');
  const rName = String(route?.name || '').toLowerCase();
  if (rName.includes('priority') || /^67\d\d$/.test(vNum) || vNum === 'P-1' || vNum === 'P-19') return 'Priority Transport';
  return 'SST';
};

const buildInitialVehicleRegistry = (routes, users, existing = []) => {
  const existingMap = new Map((existing || []).map(v => [normalizeVehicleNumber(v.vehicleNumber), v]));
  const routeDrivers = {};
  (routes || []).forEach(route => {
    const vehicleNumber = normalizeVehicleNumber(route.vehicleId);
    if (!vehicleNumber) return;
    routeDrivers[vehicleNumber] = route.driver || routeDrivers[vehicleNumber] || '';
  });

  const seeded = Array.from(new Set((routes || []).map(r => normalizeVehicleNumber(r.vehicleId)).filter(Boolean)))
    .sort((a,b) => a.localeCompare(b, undefined, { numeric:true }))
    .map(vehicleNumber => {
      const current = existingMap.get(vehicleNumber);
      const sourceRoute = (routes || []).find(r => normalizeVehicleNumber(r.vehicleId) === vehicleNumber);
      return {
        id: current?.id || `veh_${vehicleNumber.replace(/[^a-zA-Z0-9]/g, '_')}`,
        vehicleNumber,
        vin: current?.vin || '',
        initialMileage: current?.initialMileage ?? '',
        assignedDriver: current?.assignedDriver || routeDrivers[vehicleNumber] || '',
        company: current?.company || getVehicleCompany(sourceRoute),
        startDate: current?.startDate || new Date().toISOString().slice(0,10),
        createdAt: current?.createdAt || new Date().toISOString(),
      };
    });

  existingMap.forEach((value, key) => {
    if (!seeded.find(v => normalizeVehicleNumber(v.vehicleNumber) === key)) {
      seeded.push({
        ...value,
        id: value.id || `veh_${key.replace(/[^a-zA-Z0-9]/g, '_')}`,
        vehicleNumber: key,
        startDate: value.startDate || new Date().toISOString().slice(0,10),
      });
    }
  });

  return seeded.sort((a,b) => String(a.vehicleNumber).localeCompare(String(b.vehicleNumber), undefined, { numeric:true }));
};

const getVehicleRoutes = (routes, vehicleNumber) => (routes || []).filter(r => normalizeVehicleNumber(r.vehicleId) === normalizeVehicleNumber(vehicleNumber));

const getCurrentVehicleMileage = (vehicle, routes, logs) => {
  const baseMileage = Number(vehicle?.initialMileage || 0) || 0;
  const relatedRoutes = getVehicleRoutes(routes, vehicle?.vehicleNumber);
  const routeIds = new Set(relatedRoutes.map(r => r.id));
  let currentMileage = baseMileage;
  (logs || []).forEach(log => {
    const routeMatch = routeIds.has(log.routeId) || relatedRoutes.some(r => r.name === log.routeName || normalizeVehicleNumber(r.vehicleId) === normalizeVehicleNumber(log.vehicleId));
    if (!routeMatch) return;
    const odo = Number(log.endOdo || log.startOdo || 0);
    if (odo > currentMileage) currentMileage = odo;
  });
  return currentMileage;
};

const getServiceHistoryForVehicle = (vehicleServices, vehicleNumber) => {
  return (vehicleServices || [])
    .filter(item => (item.serviceType || 'history') === 'history' && normalizeVehicleNumber(item.vehicleNumber || item.vehicleName || item.vehicleId) === normalizeVehicleNumber(vehicleNumber))
    .sort((a,b) => {
      const dateDiff = String(b.date || '').localeCompare(String(a.date || ''));
      if (dateDiff !== 0) return dateDiff;
      return Number(b.mileageAtService || 0) - Number(a.mileageAtService || 0);
    });
};

const getReminderRows = ({ vehicleRegistry, vehicleServices, routes, logs }) => {
  const todayStr = new Date().toISOString().slice(0,10);
  return (vehicleRegistry || []).flatMap(vehicle => {
    const currentMileage = getCurrentVehicleMileage(vehicle, routes, logs);
    const history = getServiceHistoryForVehicle(vehicleServices, vehicle.vehicleNumber);
    return SERVICE_SCHEDULES.map(schedule => {
      const lastService = history.find(item => item.scheduleKey === schedule.key);
      const baseDate = lastService?.date || vehicle.startDate || todayStr;
      const baseMileage = Number(lastService?.mileageAtService || vehicle.initialMileage || 0) || 0;
      const nextDueDate = addMonthsISO(baseDate, schedule.months);
      const nextDueMileage = baseMileage + schedule.miles;
      const overdue = (nextDueDate && nextDueDate <= todayStr) || currentMileage >= nextDueMileage;
      const dueSoon = !overdue && (((daysUntil(nextDueDate) ?? 9999) <= 30) || (nextDueMileage - currentMileage <= 500));
      return {
        id: `${vehicle.id}_${schedule.key}`,
        vehicleId: vehicle.id,
        vehicleNumber: vehicle.vehicleNumber,
        assignedDriver: vehicle.assignedDriver || '—',
        company: vehicle.company || '—',
        currentMileage,
        serviceName: schedule.serviceName,
        scheduleKey: schedule.key,
        intervalLabel: `${schedule.months} months / ${schedule.miles.toLocaleString()} miles`,
        lastServiceDate: lastService?.date || 'Not logged yet',
        lastServiceMileage: lastService?.mileageAtService ? Number(lastService.mileageAtService).toLocaleString() : 'Starting mileage',
        nextDueDate,
        nextDueMileage,
        status: overdue ? 'Overdue' : (dueSoon ? 'Due Soon' : 'OK'),
        statusColor: overdue ? COLORS.red : (dueSoon ? COLORS.yellow : COLORS.blue),
      };
    });
  }).sort((a,b) => {
    const rank = { 'Overdue':0, 'Due Soon':1, 'OK':2 };
    if (rank[a.status] !== rank[b.status]) return rank[a.status] - rank[b.status];
    return String(a.vehicleNumber).localeCompare(String(b.vehicleNumber), undefined, { numeric:true });
  });
};


const formatDueDistance = (remainingMiles) => {
  const miles = Math.round(Number(remainingMiles || 0));
  if (miles < 0) return `${Math.abs(miles).toLocaleString()} miles overdue`;
  if (miles === 0) return 'Due now';
  return `${miles.toLocaleString()} miles remaining`;
};

const getVehicleReminderGroups = ({ vehicleRegistry, vehicleServices, routes, logs }) => {
  const reminderRows = getReminderRows({ vehicleRegistry, vehicleServices, routes, logs });
  const groups = (vehicleRegistry || []).map(vehicle => {
    const currentMileage = getCurrentVehicleMileage(vehicle, routes, logs);
    const rows = reminderRows
      .filter(r => normalizeVehicleNumber(r.vehicleNumber) === normalizeVehicleNumber(vehicle.vehicleNumber))
      .map(row => ({
        ...row,
        milesRemaining: Number(row.nextDueMileage || 0) - Number(currentMileage || 0),
      }))
      .sort((a,b) => Number(a.nextDueMileage || 0) - Number(b.nextDueMileage || 0));
    const overdueCount = rows.filter(r => r.status === 'Overdue').length;
    const dueSoonCount = rows.filter(r => r.status === 'Due Soon').length;
    return {
      vehicle,
      currentMileage,
      rows,
      overdueCount,
      dueSoonCount,
      status: overdueCount ? 'Overdue' : (dueSoonCount ? 'Due Soon' : 'Upcoming'),
    };
  });
  return groups.sort((a,b) => {
    const rank = { 'Overdue':0, 'Due Soon':1, 'Upcoming':2 };
    if (rank[a.status] !== rank[b.status]) return rank[a.status] - rank[b.status];
    return String(a.vehicle.vehicleNumber).localeCompare(String(b.vehicle.vehicleNumber), undefined, { numeric:true });
  });
};

const getServiceHistoryTableRows = (vehicleServices, vehicleNumber = 'all') => {
  return (vehicleServices || [])
    .filter(item => (item.serviceType || 'history') === 'history')
    .filter(item => vehicleNumber === 'all' || normalizeVehicleNumber(item.vehicleNumber || item.vehicleName || item.vehicleId) === normalizeVehicleNumber(vehicleNumber))
    .sort((a,b) => String(b.date || '').localeCompare(String(a.date || '')) || (Number(b.mileageAtService || 0) - Number(a.mileageAtService || 0)))

const ResolveIssueInline = ({ item, setVehicleServices }) => {

};

function VehicleRegistryTab({ routes, setRoutes = () => {}, logs, users, vehicleRegistry, allVehicleRegistry, setVehicleRegistry, vehicleServices, setVehicleServices, vehicleWarranties = [], setVehicleWarranties = () => {}, inspections = [], setInspections = () => {}, pendingVehicleOpen = null, setPendingVehicleOpen = () => {}, activeCompany = 'sst', currentUser }) {

  const fullVehicleRegistry = allVehicleRegistry || vehicleRegistry;
  // Only system admin and manager can edit vehicles, service history, warranties, inspections, issues.
  // admin_assistant and drivers = read-only.
  const canEdit = ['admin','manager'].includes(currentUser.role);
  const driverUsers = (users || []).filter(u => u.role === 'driver');
  const driverCompanyMap = driverUsers.reduce((acc, user) => {
    const matchedRoute = (routes || []).find(route => String(route.driver || '').trim().toLowerCase() === String(user.name || '').trim().toLowerCase());
    acc[user.name] = matchedRoute ? getVehicleCompany(matchedRoute) : 'SST';
    return acc;
  }, {});
  const groupedDriverOptions = {
    'SST': driverUsers.filter(u => (driverCompanyMap[u.name] || 'SST') === 'SST').map(u => u.name).sort(),
    'Priority Transport': driverUsers.filter(u => (driverCompanyMap[u.name] || 'SST') === 'Priority Transport').map(u => u.name).sort(),
  };
  const blankVehicle = { vehicleNumber:'', vin:'', year:'', make:'', model:'', fuelType:'Gas', initialMileage:'', assignedDriver:'', company:'SST', status:'Active' };

  // View state: 'list' (default) or 'detail' (opened vehicle)

  React.useEffect(() => {
    if (!pendingVehicleOpen) return;

    if (target) {
      setSelectedVehicleId(target.id);
      setSubTab('service');
      setView('detail');
    }
    setPendingVehicleOpen(null);
  }, [pendingVehicleOpen, vehicleRegistry, setPendingVehicleOpen]);

  const openVehicle = (vehicle) => {
    setSelectedVehicleId(vehicle.id);
    setSubTab('service');
    setView('detail');
  };

  const backToList = () => {
    setView('list');
    setSelectedVehicleId(null);
  };

  const saveVehicle = () => {
    const vehicleNumber = normalizeVehicleNumber(vehicleForm.vehicleNumber);
    if (!vehicleNumber) return alert('Vehicle number is required');
    if (!String(vehicleForm.initialMileage).trim()) return alert('Starting mileage is required');
    const payload = {
      id: vehicleEditingId || `veh_${vehicleNumber.replace(/[^a-zA-Z0-9]/g, '_')}_${Date.now()}`,

      vin: String(vehicleForm.vin || '').trim(),
      year: String(vehicleForm.year || '').trim(),
      make: String(vehicleForm.make || '').trim(),
      model: String(vehicleForm.model || '').trim(),
      fuelType: vehicleForm.fuelType || 'Gas',
      initialMileage: String(vehicleForm.initialMileage || '').trim(),
      assignedDriver: vehicleForm.assignedDriver || '',
      company: vehicleForm.company || 'SST',
      status: vehicleForm.status || 'Active',
      startDate: vehicleEditingId ? (vehicleRegistry.find(v => v.id === vehicleEditingId)?.startDate || new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10),
      createdAt: vehicleEditingId ? (vehicleRegistry.find(v => v.id === vehicleEditingId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    };

    // driver's default inspection vehicle and mileage reminders line up with this assignment.
    const assignedDriverName = String(payload.assignedDriver || '').trim();

      setRoutes(prev => prev.map(r => {
        const routeDriver = String(r.driver || '').trim().toLowerCase();
        if (routeDriver === assignedDriverName.toLowerCase()) {
          return { ...r, vehicleId: payload.vehicleNumber };
        }
        return r;
      }));
    }

    setVehicleForm(blankVehicle);
    setVehicleEditingId(null);
    setShowAddVehicle(false);
    if (vehicleEditingId && selectedVehicleId === vehicleEditingId) {
      // stay in detail view for the edited vehicle
    }

  const editVehicle = (vehicle) => {

      vehicleNumber: vehicle.vehicleNumber || '',

      model: vehicle.model || '',

          {canEdit && <Btn small onClick={() => { setVehicleForm(blankVehicle); setVehicleEditingId(null); setShowAddVehicle(true); }}>+ Add Vehicle</Btn>}
        </div>

        {showAddVehicle && canEdit && (
          <Card style={{ marginBottom:12, border:`2px solid ${COLORS.accent}44` }}>
            <h4 style={{ color:COLORS.text, margin:'0 0 10px' }}>{vehicleEditingId ? '✏️ Edit Vehicle' : '+ Add New Vehicle'}</h4>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:10 }}>

              </div>
              <div>
                <label style={{ display:'block', color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>VIN #</label>
                <input value={vehicleForm.vin} onChange={e=>setVehicleForm(p=>({...p, vin:e.target.value}))} style={{ width:'100%', padding:'10px 12px', border:`1px solid ${COLORS.border}`, borderRadius:8, background:COLORS.bg, color:COLORS.text }} placeholder='Enter VIN' />
