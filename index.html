                            })}
                          </div>
                        )}

                        {/* Odometer validation hint */}
                        {(calcMiles[`${route.id}_am`] || calcMiles[`${route.id}_pm`]) && (
                          <div style={{ marginTop:8, padding:"8px 10px", background:"#fffbeb",
                            borderRadius:6, border:`1px solid ${COLORS.yellow}` }}>
                            <p style={{ color:"#92400e", fontSize:11, fontWeight:700, margin:"0 0 2px" }}>
                              📋 Expected Odometer Range
                            </p>
                            {calcMiles[`${route.id}_am`] && (
                              <p style={{ color:COLORS.text, fontSize:11, margin:"1px 0" }}>
                                AM: driver should travel ~<strong>{calcMiles[`${route.id}_am`]} mi</strong>
                              </p>
                            )}
                            {calcMiles[`${route.id}_pm`] && (
                              <p style={{ color:COLORS.text, fontSize:11, margin:"1px 0" }}>
                                PM: driver should travel ~<strong>{calcMiles[`${route.id}_pm`]} mi</strong>
                              </p>
                            )}
                            {calcMiles[`${route.id}_am`] && calcMiles[`${route.id}_pm`] && (
                              <p style={{ color:COLORS.accent, fontSize:11, fontWeight:700, margin:"3px 0 0" }}>
                                Total day: ~{(calcMiles[`${route.id}_am`] + calcMiles[`${route.id}_pm`]).toFixed(1)} mi
                                · Odometer end = start + {(calcMiles[`${route.id}_am`] + calcMiles[`${route.id}_pm`]).toFixed(1)}
                              </p>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                  </Card>
                  );
                })
                })()
              ) : (
                (() => {
                  const route = routes.find(r => r.id === selectedRoute);
                  const renderStops = (stops, period, color) => {
                    const pendingKey = `${route.id}_${period}`;
                    const displayStops = pendingStops[pendingKey] || stops;
                    const hasPending = !!pendingStops[pendingKey];
                    return (
                    <div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", margin:"14px 0 10px" }}>
                        <h4 style={{ color, fontSize:14, margin:0, fontWeight:800 }}>
                          {period==="am" ? "☀️ AM Route" : "🌙 PM Route"}
                          {hasPending && <span style={{ color:COLORS.yellow, fontSize:11, marginLeft:8, fontWeight:600 }}>● Unsaved changes</span>}
                        </h4>
                        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                          <span style={{ color:COLORS.textMuted, fontSize:11 }}>{displayStops.length} stops</span>
                          <Btn small color={color} onClick={()=>{ setEditPeriod(period); setShowAddStop(true); }}>+ Add Stop</Btn>
                        </div>
                      </div>
                      {displayStops.map((s, i) => {
                        const clientsWithPrograms = (s.clients||[]).map(cName => {
                          const cl = route.clients.find(c=>c.name===cName);
                          return { name:cName, dayProgram:cl?.dayProgram||'', dropoffAddress:cl?.dropoffAddress||'' };
                        });
                        return (
                          <div key={s.id} style={{
                            marginBottom:6, opacity:s.inactive?0.45:1,
                            background:s.inactive?'#fff8f8':s.type==="base"?'#f0fdf4':COLORS.card,
                            borderRadius:10,
                            border:`1px solid ${s.inactive?COLORS.red+'44':s.type==="base"?color+'44':COLORS.border}`,
                            overflow:'hidden',
                          }}>
                            <div style={{ display:"flex", alignItems:"stretch" }}>
                              {/* Sequence Number */}
                              <div style={{ minWidth:48, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                                background:s.type==="base"?color:s.dropoff?'#fef2f2':'#eff6ff', padding:"10px 4px", gap:4 }}>
                                <select value={i+1}
                                  onChange={e=>handleSequenceChange(route.id, period, i, parseInt(e.target.value))}
                                  style={{ width:36, height:36, textAlign:"center", textAlignLast:"center",
                                    fontSize:15, fontWeight:800,
                                    background:s.type==="base"?'rgba(255,255,255,0.3)':'white',
                                    border:`2px solid ${s.type==="base"?'rgba(255,255,255,0.5)':color}`,
                                    borderRadius:8, color:s.type==="base"?'#fff':color,
                                    cursor:"pointer", appearance:"none", WebkitAppearance:"none" }}>
                                  {displayStops.map((_,idx)=><option key={idx} value={idx+1}>{idx+1}</option>)}
                                </select>
                                <span style={{ fontSize:9, color:s.type==="base"?'rgba(255,255,255,0.8)':COLORS.textMuted, textTransform:"uppercase" }}>order</span>
                              </div>
                              {/* Stop Content */}
                              <div style={{ flex:1, padding:"10px 10px 10px 12px", minWidth:0 }}>
                                <div style={{ display:"flex", alignItems:"center", gap:5, flexWrap:"wrap", marginBottom:4 }}>
                                  {s.type==="base" && <Badge color={color}>🏠 Base</Badge>}
                                  {s.dropoff && <Badge color={COLORS.red}>⬇ Drop-off</Badge>}
                                  {!s.dropoff && s.type!=="base" && <Badge color={COLORS.blue}>⬆ Pickup</Badge>}
                                  {s.label && <Badge color={COLORS.yellow}>{s.label}</Badge>}
                                  {s.time && <span style={{ color:COLORS.yellow, fontSize:12, fontWeight:700 }}>🕐 {s.time}</span>}
                                  {s.inactive && <Badge color={COLORS.red}>Inactive</Badge>}
                                  {s.stopReturnDate && <span style={{ color:COLORS.yellow, fontSize:11 }}>📅 Returns {s.stopReturnDate}</span>}
                                </div>
                                <p style={{ color:COLORS.text, fontSize:13, margin:"2px 0", fontWeight:600, lineHeight:1.3 }}>{s.address}</p>
                                {s.clients?.length>0 && (
                                  <div style={{ marginTop:6 }}>
                                    {clientsWithPrograms.map(cp=>(
                                      <div key={cp.name} style={{ marginBottom:4, padding:"5px 8px",
                                        background:s.dropoff?'#fef2f2':'#eff6ff', borderRadius:6,
                                        borderLeft:`3px solid ${s.dropoff?COLORS.red:COLORS.blue}` }}>
                                        <p style={{ color:COLORS.text, fontSize:12, fontWeight:600, margin:0 }}>{s.dropoff?'⬇':'⬆'} {cp.name}</p>
                                        {!s.dropoff && cp.dayProgram && <p style={{ color:COLORS.accent, fontSize:11, margin:"2px 0 0" }}>📍 Drop-off: <strong>{cp.dayProgram}</strong> — {cp.dropoffAddress}</p>}
                                        {s.dropoff && (()=>{ const cl=route.clients.find(c=>c.name===cp.name); return cl?.address?<p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>🏠 Home: {cl.address}</p>:null; })()}
                                      </div>
                                    ))}
                                  </div>
                                )}
                              </div>
                              {/* Toggle */}
                              {s.type!=="base" && (
                                <div style={{ display:"flex", alignItems:"center", padding:"0 10px", flexShrink:0 }}>
                                  <Toggle on={!s.inactive} onChange={()=>handleStopToggle(route.id, period, s)} />
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      {/* Save/Discard bar */}
                      <div style={{ marginTop:10, padding:"10px 0", borderTop:`1px dashed ${COLORS.border}` }}>
                        {hasPending ? (
                          <div style={{ display:"flex", gap:8 }}>
                            <Btn onClick={()=>setSaveConfirm({routeId:route.id, period})}
                              style={{ flex:1, fontWeight:700 }}>💾 Save {period.toUpperCase()} Order</Btn>
                            <Btn outline onClick={()=>handleDiscardPendingStops(route.id, period)} style={{ flex:1 }}>✕ Discard</Btn>
                          </div>
                        ) : (
                          <p style={{ color:COLORS.textMuted, fontSize:11, textAlign:"center", margin:0 }}>
                            ✓ {period.toUpperCase()} order saved — change a number above to reorder
                          </p>
                        )}
                      </div>
                    </div>
                    );
                  };


                  return (
                    <div>
                      <Btn small outline onClick={() => setSelectedRoute(null)} style={{ marginBottom: 12 }}>← Back to Routes</Btn>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                        <h3 style={{ color: COLORS.text, margin: 0 }}>{route.name}</h3>
                        <span style={{ color: COLORS.textMuted }}>—</span>
                        <select value={route.driver} onChange={(e) => handleReassignDriver(route.id, e.target.value)}
                          style={{ padding: "4px 24px 4px 8px", fontSize: 13, fontWeight: 600, borderRadius: 6,
                            border: `1px solid ${COLORS.accent}`, background: COLORS.accent + "15", color: COLORS.accent, cursor: "pointer" }}>
                          {allDriversAndManagers.map(u => (
                            <option key={u.id} value={u.name}>{u.name}</option>
                          ))}
                        </select>
                      </div>
                      <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 8px" }}>Vehicle: {route.vehicleId} · Change a sequence number, then hit Save to apply.</p>

                      {renderStops(route.amStops, "am", COLORS.accent)}
                      {renderStops(route.pmStops, "pm", COLORS.blue)}

                      {/* Save Order Confirmation Modal */}
                      {saveConfirm && saveConfirm.routeId === route.id && (
                        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                          <Card style={{ width:"100%", maxWidth:380 }}>
                            <h3 style={{ color: COLORS.text, margin:"0 0 8px" }}>💾 Confirm Sequence Change</h3>
                            <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 6px" }}>
                              You are updating the <strong>{saveConfirm.period.toUpperCase()} route</strong> stop order for:
                            </p>
                            <p style={{ color: COLORS.accent, fontWeight:700, fontSize:14, margin:"0 0 16px" }}>{route.name}</p>
                            <p style={{ color: COLORS.textMuted, fontSize:12, margin:"0 0 20px" }}>
                              This will permanently change the pickup/drop-off sequence. Drivers will see the new order immediately.
                            </p>
                            <div style={{ display:"flex", gap:8 }}>
                              <Btn onClick={() => handleSavePendingStops(route.id, saveConfirm.period)}
                                style={{ flex:1, background: COLORS.accent, color:'#fff', fontWeight:700 }}>
                                ✓ Proceed
                              </Btn>
                              <Btn outline onClick={() => setSaveConfirm(null)} style={{ flex:1 }}>Cancel</Btn>
                            </div>
                          </Card>
                        </div>
                      )}

                      {/* Add Stop Modal */}
                      {showAddStop && (
                        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                          <Card style={{ width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }}>
                            <h3 style={{ color: COLORS.text, margin:"0 0 12px" }}>Add Stop — {editPeriod.toUpperCase()} Route</h3>

                            {/* Stop type */}
                            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                              <button onClick={() => setNewStop(p=>({...p,type:"pickup",dropoff:false}))}
                                style={{ flex:1, padding:"10px", borderRadius:8, border:`2px solid ${newStop.type==="pickup"?COLORS.blue:COLORS.border}`,
                                  background:newStop.type==="pickup"?"#eff6ff":"transparent", color:newStop.type==="pickup"?COLORS.blue:COLORS.textMuted,
                                  fontWeight:700, fontSize:13, cursor:"pointer" }}>
                                ⬆ Pickup Stop
                              </button>
                              <button onClick={() => setNewStop(p=>({...p,type:"dropoff",dropoff:true}))}
                                style={{ flex:1, padding:"10px", borderRadius:8, border:`2px solid ${newStop.type==="dropoff"?COLORS.red:COLORS.border}`,
                                  background:newStop.type==="dropoff"?"#fef2f2":"transparent", color:newStop.type==="dropoff"?COLORS.red:COLORS.textMuted,
                                  fontWeight:700, fontSize:13, cursor:"pointer" }}>
                                ⬇ Drop-off Stop
                              </button>
                            </div>

                            <Input label="Location / Program Name (e.g. PCS, CVTC, Galt Act)" value={newStop.label}
                              onChange={e=>setNewStop(p=>({...p,label:e.target.value}))} placeholder="e.g. PCS Day Program" />
                            <Input label="Full Address *" value={newStop.address}
                              onChange={e=>setNewStop(p=>({...p,address:e.target.value}))} placeholder="Street address, City, State ZIP" />

                            {/* Time — prominently marked as important */}
                            <div style={{ marginBottom:12 }}>
                              <label style={{ display:"block", color:COLORS.textDim, fontSize:12, marginBottom:4, fontWeight:600 }}>
                                🕐 {newStop.type==="pickup" ? "Pickup Time *" : "Drop-off Time *"}
                                <span style={{ color:COLORS.red, marginLeft:4, fontSize:10 }}>Required — drivers need this</span>
                              </label>
                              <input type="time" value={newStop.time24||""} onChange={e=>{
                                const t = e.target.value;
                                if (!t) { setNewStop(p=>({...p,time:"",time24:""})); return; }
                                const [h,m] = t.split(":").map(Number);
                                const ampm = h>=12?"PM":"AM";
                                const h12 = h%12||12;
                                setNewStop(p=>({...p,time:`${h12}:${String(m).padStart(2,"0")} ${ampm}`,time24:t}));
                              }}
                              style={{ width:"100%", padding:"10px 12px", background:COLORS.bg, border:`2px solid ${COLORS.yellow}`,
                                borderRadius:8, color:COLORS.text, fontSize:15, fontWeight:700, boxSizing:"border-box" }} />
                              {newStop.time && <p style={{ color:COLORS.yellow, fontSize:12, fontWeight:700, margin:"4px 0 0" }}>→ {newStop.time}</p>}
                            </div>

                            {/* Participants */}
                            <div style={{ marginBottom:12 }}>
                              <label style={{ display:"block", color:COLORS.textDim, fontSize:12, marginBottom:6, fontWeight:600 }}>
                                Participants at this stop
                              </label>
                              {route.clients.filter(c=>c.active&&c.status!=="archived").map(cl=>{
                                const checked = (newStop.clients||"").split(",").map(s=>s.trim()).includes(cl.name);
                                return (
                                  <label key={cl.name} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0",
                                    borderBottom:`1px solid ${COLORS.border}`, cursor:"pointer" }}>
                                    <input type="checkbox" checked={checked}
                                      onChange={e=>{
                                        const current = (newStop.clients||"").split(",").map(s=>s.trim()).filter(Boolean);
                                        const updated = e.target.checked ? [...current,cl.name] : current.filter(n=>n!==cl.name);
                                        setNewStop(p=>({...p,clients:updated.join(", ")}));
                                      }}
                                      style={{ width:16, height:16, cursor:"pointer" }} />
                                    <div>
                                      <span style={{ color:COLORS.text, fontSize:13, fontWeight:600 }}>{cl.name}</span>
                                      {cl.dayProgram && <span style={{ color:COLORS.accent, fontSize:11, marginLeft:6 }}>→ {cl.dayProgram}</span>}
                                    </div>
                                  </label>
                                );
                              })}
                              {route.clients.filter(c=>c.active&&c.status!=="archived").length===0 && (
                                <p style={{ color:COLORS.textMuted, fontSize:12 }}>No active participants on this route yet</p>
                              )}
                            </div>

                            <div style={{ display:"flex", gap:8, marginTop:8 }}>
                              <Btn onClick={handleAddStop} style={{ flex:1 }}>Add Stop</Btn>
                              <Btn outline onClick={() => setShowAddStop(false)} style={{ flex:1 }}>Cancel</Btn>
                            </div>
                          </Card>
                        </div>
                      )}

                      {/* Stop Status Modal */}
                      {stopModal && stopModal.routeId === route.id && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                          <Card style={{ width: "100%", maxWidth: 420 }}>
                            <h3 style={{ color: COLORS.text, margin: "0 0 6px" }}>Remove Stop from Route</h3>
                            <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 4px" }}>{stopModal.label}</p>
                            {stopModal.clients?.length > 0 && <p style={{ color: COLORS.textMuted, fontSize: 12, margin: "0 0 16px" }}>Clients: {stopModal.clients.join(", ")}</p>}
                            <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 16px" }}>Is there a return date?</p>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.yellow}44`, padding: 14 }}>
                              <p style={{ color: COLORS.yellow, fontSize: 13, fontWeight: 700, margin: "0 0 8px" }}>📅 Yes — Set a return date</p>
                              <input type="date" value={stopReturnDate} onChange={e => setStopReturnDate(e.target.value)}
                                style={{ width: "100%", padding: "10px 12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                                  borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box", marginBottom: 8 }} />
                              <Btn onClick={handleStopInactiveWithDate} color={COLORS.yellow} disabled={!stopReturnDate}
                                style={{ width: "100%" }}>Set Return Date & Deactivate</Btn>
                            </Card>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.blue}44`, padding: 14 }}>
                              <p style={{ color: COLORS.blue, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>⏸ No return date — Temporarily off route</p>
                              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Stop stays on route list but is skipped until reactivated.</p>
                              <Btn onClick={handleStopInactiveNoDate} color={COLORS.blue} style={{ width: "100%" }}>Deactivate Without Date</Btn>
                            </Card>

                            <Card style={{ marginBottom: 10, border: `1px solid ${COLORS.red}44`, padding: 14 }}>
                              <p style={{ color: COLORS.red, fontSize: 13, fontWeight: 700, margin: "0 0 6px" }}>📦 Deactivate & Archive</p>
                              <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 8px" }}>Stop is fully deactivated and archived. Can be reactivated later.</p>
                              <Btn onClick={handleStopArchive} color={COLORS.red} style={{ width: "100%" }}>Archive Stop</Btn>
                            </Card>

                            <Btn outline onClick={() => setStopModal(null)} style={{ width: "100%", marginTop: 4 }}>Cancel</Btn>
                          </Card>
                        </div>
                      )}
                    </div>
                  );
                })()
              )}
            </div>
          )}

          {/* CLIENTS / PARTICIPANTS TAB */}
          {tab === "clients" && (
            <div>
              {/* Route filter */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  <p style={{ color: COLORS.textDim, fontSize:12, margin:0, fontWeight:600 }}>FILTER:</p>
                  {[{id:'all',name:'All Routes'}, ...routes].map(r => (
                    <button key={r.id||'all'} onClick={() => setClientFilterRoute(r.id||'all')}
                      style={{ padding:"4px 10px", borderRadius:20, border:`1px solid ${clientFilterRoute===(r.id||'all') ? COLORS.accent : COLORS.border}`,
                        background: clientFilterRoute===(r.id||'all') ? COLORS.accent : 'transparent',
                        color: clientFilterRoute===(r.id||'all') ? '#fff' : COLORS.textMuted,
                        fontSize:11, cursor:"pointer", fontWeight:600 }}>
                      {r.name}
                    </button>
                  ))}
                </div>
                <Btn small onClick={() => setShowAddClient(true)}>+ Add Participant</Btn>
              </div>

              {/* Stats bar */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:16 }}>
                {[
                  { label:"Total", value: routes.reduce((s,r)=>s+r.clients.length,0), color: COLORS.accent },
                  { label:"Active", value: routes.reduce((s,r)=>s+r.clients.filter(c=>c.active&&c.status!=='archived').length,0), color:"#166534" },
                  { label:"Inactive/Archived", value: routes.reduce((s,r)=>s+r.clients.filter(c=>!c.active||c.status==='archived').length,0), color: COLORS.red },
                ].map(s => (
                  <Card key={s.label} style={{ textAlign:"center", padding:10 }}>
                    <p style={{ color:s.color, fontSize:18, fontWeight:800, margin:0 }}>{s.value}</p>
                    <p style={{ color: COLORS.textMuted, fontSize:10, margin:"2px 0 0" }}>{s.label}</p>
                  </Card>
                ))}
              </div>

              {routes.filter(r => clientFilterRoute === 'all' || r.id === clientFilterRoute).map(route => (
                <Card key={route.id} style={{ marginBottom:14 }}>
                  {/* Route header with driver */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, paddingBottom:8, borderBottom:`2px solid ${COLORS.accent}33` }}>
                    <div>
                      <h3 style={{ color: COLORS.accent, margin:0, fontSize:15, fontWeight:700 }}>{route.name}</h3>
                      <p style={{ color: COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>Driver: {route.driver} · {route.clients.filter(c=>c.active&&c.status!=='archived').length} active participants</p>
                    </div>
                    <Btn small onClick={() => { setNewClient(p=>({...p, routeId:route.id})); setShowAddClient(true); }}>+ Add</Btn>
                  </div>

                  {/* Active participants */}
                  {route.clients.filter(c => c.status !== "archived").length === 0 && (
                    <p style={{ color: COLORS.textMuted, fontSize:12, textAlign:"center", padding:"12px 0" }}>No participants on this route</p>
                  )}
                  {route.clients.filter(c => c.status !== "archived").map(client => (
                    <div key={client.name} style={{
                      display:"flex", alignItems:"center", justifyContent:"space-between",
                      padding:"10px 0", borderBottom:`1px solid ${COLORS.border}`,
                      opacity: client.active ? 1 : 0.55,
                      background: !client.active ? '#fff8f0' : 'transparent',
                      borderRadius: !client.active ? 6 : 0,
                    }}>
                      <div style={{ flex:1, minWidth:0, paddingRight:8 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                          <p style={{ color: COLORS.text, margin:0, fontSize:14, fontWeight:600 }}>{client.name}</p>
                          {client.status === "inactive" && <Badge color={COLORS.yellow}>Inactive</Badge>}
                          {!client.active && client.returnDate && <Badge color={COLORS.yellow}>Returns {client.returnDate}</Badge>}
                        </div>
                        <p style={{ color: COLORS.textMuted, margin:"2px 0 0", fontSize:11 }}>🏠 {client.address}</p>
                        {client.dayProgram ? (
                          <p style={{ color: COLORS.accent, margin:"2px 0 0", fontSize:11, fontWeight:600 }}>
                            📍 {client.dayProgram}{client.dropoffAddress ? ` — ${client.dropoffAddress}` : ''}
                          </p>
                        ) : (
                          <p style={{ color: COLORS.textMuted, margin:"2px 0 0", fontSize:10, fontStyle:"italic" }}>No day program — tap ✏️ to add</p>
                        )}
                        {client.uci && <p style={{ color: COLORS.textDim, margin:0, fontSize:10 }}>UCI: {client.uci}</p>}
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                        <button onClick={() => setEditClientData({ routeId: route.id, client: {...client} })}
                          title="Edit participant"
                          style={{ background:"none", border:`1px solid ${COLORS.border}`, color: COLORS.textMuted, cursor:"pointer", fontSize:12, padding:"4px 8px", borderRadius:6 }}>✏️</button>
                        <Toggle on={client.active && client.status !== 'archived'} onChange={() => handleClientToggle(route.id, client.name)} />
                        <button
                          onClick={() => { if (window.confirm(`Permanently remove ${client.name} from ${route.name}?`)) handleRemoveClient(route.id, client.name); }}
                          title="Remove participant"
                          style={{ background:"none", border:"none", color: COLORS.red, cursor:"pointer", fontSize:16, padding:"4px 6px", borderRadius:6,
                            lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                      </div>
                    </div>
                  ))}

                  {/* Archived section */}
                  {route.clients.filter(c => c.status === "archived").length > 0 && (
                    <details style={{ marginTop:8 }}>
                      <summary style={{ color: COLORS.textMuted, fontSize:12, cursor:"pointer", padding:"6px 0", userSelect:"none" }}>
                        📦 {route.clients.filter(c=>c.status==="archived").length} archived participant{route.clients.filter(c=>c.status==="archived").length>1?"s":""}
                      </summary>
                      {route.clients.filter(c => c.status === "archived").map(client => (
                        <div key={client.name} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${COLORS.border}`, opacity:0.45 }}>
                          <div>
                            <p style={{ color: COLORS.text, margin:0, fontSize:13 }}>{client.name}</p>
                            <Badge color={COLORS.red}>Archived</Badge>
                          </div>
                          <div style={{ display:"flex", gap:8 }}>
                            <Btn small color={COLORS.accent} onClick={() => setRoutes(prev => prev.map(r => r.id!==route.id?r:{...r,clients:r.clients.map(c=>c.name===client.name?{...c,active:true,status:"active",returnDate:""}:c)}))}>
                              Reactivate
                            </Btn>
                            <button onClick={() => { if(window.confirm(`Delete ${client.name}?`)) handleRemoveClient(route.id,client.name); }}
                              style={{ background:"none", border:"none", color:COLORS.red, cursor:"pointer", fontSize:14 }}>✕</button>
                          </div>
                        </div>
                      ))}
                    </details>
                  )}
                </Card>
              ))}

              {/* Client Status Modal */}
              {clientModal && (
                <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                  <Card style={{ width:"100%", maxWidth:420 }}>
                    <h3 style={{ color: COLORS.text, margin:"0 0 4px" }}>Remove from Route</h3>
                    <p style={{ color: COLORS.accent, fontWeight:700, margin:"0 0 4px" }}>{clientModal.clientName}</p>
                    <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 16px" }}>Select why this participant is being removed from the route:</p>
                    <Card style={{ marginBottom:10, border:`1px solid ${COLORS.yellow}55`, padding:14 }}>
                      <p style={{ color: COLORS.yellow, fontSize:13, fontWeight:700, margin:"0 0 8px" }}>📅 Set a Return Date</p>
                      <input type="date" value={returnDate} onChange={e => setReturnDate(e.target.value)}
                        style={{ width:"100%", padding:"10px 12px", background: COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:14, boxSizing:"border-box", marginBottom:8 }} />
                      <Btn onClick={handleClientInactiveWithDate} color={COLORS.yellow} disabled={!returnDate} style={{ width:"100%" }}>Deactivate with Return Date</Btn>
                    </Card>
                    <Card style={{ marginBottom:10, border:`1px solid ${COLORS.blue}55`, padding:14 }}>
                      <p style={{ color: COLORS.blue, fontSize:13, fontWeight:700, margin:"0 0 6px" }}>⏸ Temporarily Off Route</p>
                      <p style={{ color: COLORS.textMuted, fontSize:11, margin:"0 0 8px" }}>Stays on roster, no return date set.</p>
                      <Btn onClick={handleClientInactiveNoDate} color={COLORS.blue} style={{ width:"100%" }}>Deactivate — No Date</Btn>
                    </Card>
                    <Card style={{ marginBottom:10, border:`1px solid ${COLORS.red}55`, padding:14 }}>
                      <p style={{ color: COLORS.red, fontSize:13, fontWeight:700, margin:"0 0 6px" }}>📦 Archive Participant</p>
                      <p style={{ color: COLORS.textMuted, fontSize:11, margin:"0 0 8px" }}>Fully removed from route. Can be reactivated later.</p>
                      <Btn onClick={handleClientArchive} color={COLORS.red} style={{ width:"100%" }}>Archive</Btn>
                    </Card>
                    <Btn outline onClick={() => setClientModal(null)} style={{ width:"100%", marginTop:4 }}>Cancel</Btn>
                  </Card>
                </div>
              )}

              {/* Add Participant Modal */}
              {showAddClient && (
                <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                  <Card style={{ width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }}>
                    <h3 style={{ color: COLORS.text, margin:"0 0 16px" }}>Add New Participant</h3>
                    <Input label="Full Name *" value={newClient.name} onChange={e => setNewClient(p=>({...p,name:e.target.value}))} placeholder="e.g. Smith, John" />
                    <Input label="Home Address *" value={newClient.address} onChange={e => setNewClient(p=>({...p,address:e.target.value}))} placeholder="Participant's home address" />
                    <div style={{ background:"#eff6ff", borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
                      <p style={{ color: COLORS.blue, fontSize:12, fontWeight:700, margin:"0 0 8px" }}>📍 Day Program / Work Site</p>
                      <Input label="Program Name (e.g. PCS, CVTC, Galt Act)" value={newClient.dayProgram||''} onChange={e => setNewClient(p=>({...p,dayProgram:e.target.value}))} placeholder="e.g. PCS" />
                      <Input label="Program Address" value={newClient.dropoffAddress||''} onChange={e => setNewClient(p=>({...p,dropoffAddress:e.target.value}))} placeholder="Drop-off address" />
                    </div>
                    <Input label="UCI Number" value={newClient.uci} onChange={e => setNewClient(p=>({...p,uci:e.target.value}))} placeholder="Optional" />
                    <div style={{ marginBottom:12 }}>
                      <label style={{ display:"block", color: COLORS.textDim, fontSize:12, marginBottom:4, fontWeight:600 }}>Assign to Route *</label>
                      <select value={newClient.routeId} onChange={e => setNewClient(p=>({...p,routeId:e.target.value}))}
                        style={{ width:"100%", padding:"10px 12px", background: COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:14 }}>
                        <option value="">Select route...</option>
                        {routes.map(r => <option key={r.id} value={r.id}>{r.name} — Driver: {r.driver}</option>)}
                      </select>
                    </div>
                    <div style={{ display:"flex", gap:8, marginTop:8 }}>
                      <Btn onClick={handleAddClient} style={{ flex:1 }}>Add Participant</Btn>
                      <Btn outline onClick={() => setShowAddClient(false)} style={{ flex:1 }}>Cancel</Btn>
                    </div>
                  </Card>
                </div>
              )}

              {/* Edit Participant Modal */}
              {editClientData && (
                <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                  <Card style={{ width:"100%", maxWidth:440, maxHeight:"92vh", overflowY:"auto" }}>
                    <h3 style={{ color: COLORS.text, margin:"0 0 14px" }}>✏️ Edit Participant</h3>

                    <Input label="Full Name" value={editClientData.client.name}
                      onChange={e => setEditClientData(p=>({...p, client:{...p.client, name:e.target.value}}))} />
                    <Input label="Home Address" value={editClientData.client.address}
                      onChange={e => setEditClientData(p=>({...p, client:{...p.client, address:e.target.value}}))}
                      placeholder="Street address, City, State ZIP" />

                    {/* ══ SCHEDULE BUILDER ══════════════════════════════════════ */}
                    <div style={{ background:"#f8fafc", borderRadius:10, padding:"12px", marginBottom:12, border:`1px solid ${COLORS.border}` }}>
                      <p style={{ color: COLORS.text, fontSize:13, fontWeight:800, margin:"0 0 10px" }}>📅 Weekly Schedule</p>

                      {/* Same-time toggle */}
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10,
                        background:"#eff6ff", borderRadius:8, padding:"8px 12px" }}>
                        <button onClick={() => setEditClientData(p=>({...p,client:{...p.client,sameTimeAllDays:!p.client.sameTimeAllDays}}))}
                          style={{ width:36, height:20, borderRadius:10, border:"none", cursor:"pointer",
                            background: editClientData.client.sameTimeAllDays ? COLORS.accent : COLORS.border,
                            position:"relative", flexShrink:0, transition:"background 0.2s" }}>
                          <span style={{ position:"absolute", top:2, left: editClientData.client.sameTimeAllDays ? 18 : 2,
                            width:16, height:16, background:"#fff", borderRadius:"50%", transition:"left 0.2s" }} />
                        </button>
                        <div>
                          <p style={{ color:COLORS.text, fontSize:12, fontWeight:700, margin:0 }}>
                            {editClientData.client.sameTimeAllDays ? "Same time all days" : "Different times per day"}
                          </p>
                          <p style={{ color:COLORS.textMuted, fontSize:10, margin:0 }}>
                            {editClientData.client.sameTimeAllDays
                              ? "Set one AM pickup & PM pickup time — applies to all selected days"
                              : "Set individual pickup & PM pickup times for each day"}
                          </p>
                        </div>
                      </div>

                      {/* Day selector buttons */}
                      <div style={{ display:"flex", gap:5, marginBottom:10 }}>
                        {["Mon","Tue","Wed","Thu","Fri"].map(day => {
                          const sched = editClientData.client.daySchedule || {};
                          const on = !!sched[day];
                          return (
                            <button key={day} onClick={() => {
                              const current = editClientData.client.daySchedule || {};
                              const next = on
                                ? Object.fromEntries(Object.entries(current).filter(([k])=>k!==day))
                                : { ...current, [day]: { amPickup:"", pmPickup:"", dropoff:"" } };
                              setEditClientData(p=>({...p,client:{...p.client,daySchedule:next}}));
                            }} style={{
                              flex:1, padding:"7px 4px", borderRadius:8, fontSize:12, fontWeight:800, cursor:"pointer",
                              border:`2px solid ${on ? COLORS.accent : COLORS.border}`,
                              background: on ? COLORS.accent : "transparent",
                              color: on ? "#fff" : COLORS.textMuted,
                            }}>{day}</button>
                          );
                        })}
                      </div>

                      {/* SAME TIME ALL DAYS mode */}
                      {editClientData.client.sameTimeAllDays && Object.keys(editClientData.client.daySchedule||{}).length > 0 && (() => {
                        const fmt24 = (t12) => {
                          if (!t12) return "";
                          const m = t12.match(/(\d+):(\d+)\s*(AM|PM)/i);
                          if (!m) return "";
                          let h = parseInt(m[1]); const min = m[2]; const ap = m[3].toUpperCase();
                          if (ap==="PM" && h!==12) h+=12;
                          if (ap==="AM" && h===12) h=0;
                          return `${String(h).padStart(2,"0")}:${min}`;
                        };
                        const to12 = (t) => {
                          if (!t) return "";
                          const [h,m] = t.split(":").map(Number);
                          const ap = h>=12?"PM":"AM"; const h12=h%12||12;
                          return `${h12}:${String(m).padStart(2,"0")} ${ap}`;
                        };
                        const globalAM = editClientData.client._globalAM || "";
                        const globalPM = editClientData.client._globalPM || "";
                        const globalDrop = editClientData.client._globalDrop || "";
                        const days = Object.keys(editClientData.client.daySchedule||{});

                        const applyGlobal = (field, val24, val12) => {
                          const updated = {};
                          days.forEach(d => { updated[d] = { ...(editClientData.client.daySchedule[d]||{}), [field]: val12 }; });
                          setEditClientData(p=>({...p, client:{...p.client, daySchedule:{...p.client.daySchedule,...updated}}}));
                        };

                        return (
                          <div style={{ background:"#fff", borderRadius:8, padding:"10px 12px", border:`1px solid ${COLORS.border}` }}>
                            <p style={{ color:COLORS.textMuted, fontSize:11, margin:"0 0 8px" }}>
                              Applied to: <strong>{days.join(", ")}</strong>
                            </p>
                            {/* AM Pickup */}
                            <div style={{ marginBottom:8 }}>
                              <label style={{ display:"block", color:COLORS.textDim, fontSize:11, fontWeight:700, marginBottom:3 }}>
                                ☀️ AM Pickup Time
                              </label>
                              <input type="time" value={globalAM}
                                onChange={e => {
                                  setEditClientData(p=>({...p,client:{...p.client,_globalAM:e.target.value}}));
                                  applyGlobal("amPickup", e.target.value, to12(e.target.value));
                                }}
                                style={{ width:"100%", padding:"9px 10px", background:COLORS.bg, border:`2px solid ${COLORS.yellow}`,
                                  borderRadius:7, color:COLORS.text, fontSize:14, fontWeight:700, boxSizing:"border-box" }} />
                              {globalAM && <p style={{ color:"#7c5c00", fontSize:10, margin:"3px 0 0", fontWeight:700 }}>→ {to12(globalAM)}</p>}
                            </div>
                            {/* Drop-off */}
                            <div style={{ marginBottom:8 }}>
                              <label style={{ display:"block", color:COLORS.textDim, fontSize:11, fontWeight:700, marginBottom:3 }}>
                                📍 Program Drop-off Time
                              </label>
                              <input type="time" value={globalDrop}
                                onChange={e => {
                                  setEditClientData(p=>({...p,client:{...p.client,_globalDrop:e.target.value}}));
                                  applyGlobal("dropoff", e.target.value, to12(e.target.value));
                                }}
                                style={{ width:"100%", padding:"9px 10px", background:COLORS.bg, border:`1px solid ${COLORS.border}`,
                                  borderRadius:7, color:COLORS.text, fontSize:14, boxSizing:"border-box" }} />
                              {globalDrop && <p style={{ color:"#7c5c00", fontSize:10, margin:"3px 0 0", fontWeight:700 }}>→ {to12(globalDrop)}</p>}
                            </div>
                            {/* PM Pickup */}
                            <div>
                              <label style={{ display:"block", color:COLORS.textDim, fontSize:11, fontWeight:700, marginBottom:3 }}>
                                🌙 PM Pickup Time (from program)
                              </label>
                              <input type="time" value={globalPM}
                                onChange={e => {
                                  setEditClientData(p=>({...p,client:{...p.client,_globalPM:e.target.value}}));
                                  applyGlobal("pmPickup", e.target.value, to12(e.target.value));
                                }}
                                style={{ width:"100%", padding:"9px 10px", background:COLORS.bg, border:`1px solid ${COLORS.border}`,
                                  borderRadius:7, color:COLORS.text, fontSize:14, boxSizing:"border-box" }} />
                              {globalPM && <p style={{ color:"#7c5c00", fontSize:10, margin:"3px 0 0", fontWeight:700 }}>→ {to12(globalPM)}</p>}
                            </div>
                          </div>
                        );
                      })()}

                      {/* DIFFERENT TIMES PER DAY mode */}
                      {!editClientData.client.sameTimeAllDays && (() => {
                        const sched = editClientData.client.daySchedule || {};
                        const selectedDays = ["Mon","Tue","Wed","Thu","Fri"].filter(d => !!sched[d]);
                        if (selectedDays.length === 0) return (
                          <p style={{ color:COLORS.textMuted, fontSize:12, textAlign:"center", padding:"8px 0" }}>
                            Select days above to set times
                          </p>
                        );
                        const to12 = (t) => {
                          if (!t) return "";
                          const [h,m] = t.split(":").map(Number);
                          const ap = h>=12?"PM":"AM"; const h12=h%12||12;
                          return `${h12}:${String(m).padStart(2,"0")} ${ap}`;
                        };
                        const to24 = (t12) => {
                          if (!t12) return "";
                          const m = t12.match(/(\d+):(\d+)\s*(AM|PM)/i);
                          if (!m) return "";
                          let h = parseInt(m[1]); const min = m[2]; const ap = m[3].toUpperCase();
                          if (ap==="PM" && h!==12) h+=12;
                          if (ap==="AM" && h===12) h=0;
                          return `${String(h).padStart(2,"0")}:${min}`;
                        };
                        const updateDay = (day, field, val12) => {
                          setEditClientData(p=>({...p,client:{...p.client,daySchedule:{...p.client.daySchedule,[day]:{...p.client.daySchedule[day],[field]:val12}}}}));
                        };
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                            {selectedDays.map(day => {
                              const d = sched[day] || {};
                              return (
                                <div key={day} style={{ background:"#fff", borderRadius:8, padding:"10px 12px", border:`1px solid ${COLORS.border}` }}>
                                  <p style={{ color:COLORS.text, fontSize:13, fontWeight:800, margin:"0 0 8px" }}>{day}</p>
                                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
                                    {[
                                      { label:"☀️ AM Pickup", field:"amPickup", border:COLORS.yellow },
                                      { label:"📍 Drop-off",  field:"dropoff",  border:COLORS.border },
                                      { label:"🌙 PM Pickup", field:"pmPickup", border:COLORS.border },
                                    ].map(({label, field, border}) => (
                                      <div key={field}>
                                        <label style={{ display:"block", color:COLORS.textDim, fontSize:9, fontWeight:700, marginBottom:2 }}>{label}</label>
                                        <input type="time" value={to24(d[field]||"")}
                                          onChange={e => updateDay(day, field, to12(e.target.value))}
                                          style={{ width:"100%", padding:"6px 4px", background:COLORS.bg, border:`2px solid ${border}`,
                                            borderRadius:6, color:COLORS.text, fontSize:12, fontWeight:700, boxSizing:"border-box" }} />
                                        {d[field] && <p style={{ color:"#7c5c00", fontSize:9, margin:"2px 0 0", fontWeight:700 }}>{d[field]}</p>}
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}

                      {/* Schedule summary */}
                      {Object.keys(editClientData.client.daySchedule||{}).length > 0 && (() => {
                        const sched = editClientData.client.daySchedule || {};
                        const activeDays = Object.entries(sched).filter(([,v])=>v);
                        return (
                          <div style={{ marginTop:8, padding:"6px 10px", background:"#f0fdf4", borderRadius:6, border:`1px solid #86efac` }}>
                            <p style={{ color:"#166534", fontSize:11, fontWeight:700, margin:0 }}>
                              ✓ Schedule: {activeDays.map(([day,times])=>{
                                const t = times.amPickup ? ` ${times.amPickup}` : "";
                                return day+t;
                              }).join(" · ")}
                            </p>
                          </div>
                        );
                      })()}
                    </div>
                    {/* ══ END SCHEDULE BUILDER ═══════════════════════════════════ */}

                    {/* ── Day Program ── */}
                    <div style={{ background:"#eff6ff", borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
                      <p style={{ color: COLORS.blue, fontSize:12, fontWeight:700, margin:"0 0 8px" }}>📍 Day Program / Work Site</p>
                      <Input label="Program Name (e.g. PCS, CVTC, Galt Act)" value={editClientData.client.dayProgram||''}
                        onChange={e => setEditClientData(p=>({...p, client:{...p.client, dayProgram:e.target.value}}))}
                        placeholder="e.g. PCS" />
                      <Input label="Program Address" value={editClientData.client.dropoffAddress||''}
                        onChange={e => setEditClientData(p=>({...p, client:{...p.client, dropoffAddress:e.target.value}}))}
                        placeholder="Full drop-off address" />
                    </div>

                    {/* ── Notes ── */}
                    <div style={{ marginBottom:12 }}>
                      <label style={{ display:"block", color: COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>
                        Notes / Gate Codes
                      </label>
                      <input value={editClientData.client.notes||""} onChange={e=>setEditClientData(p=>({...p,client:{...p.client,notes:e.target.value}}))}
                        placeholder="e.g. Gate Code: 9162, ring doorbell" style={{ width:"100%", padding:"10px 12px", background:COLORS.bg,
                          border:`1px solid ${COLORS.border}`, borderRadius:8, color:COLORS.text, fontSize:14, boxSizing:"border-box" }} />
                    </div>

                    <Input label="UCI Number" value={editClientData.client.uci||''}
                      onChange={e => setEditClientData(p=>({...p, client:{...p.client, uci:e.target.value}}))}
                      placeholder="Optional" />

                    <div style={{ marginBottom:12 }}>
                      <label style={{ display:"block", color: COLORS.textDim, fontSize:12, marginBottom:4, fontWeight:600 }}>Move to Different Route</label>
                      <select value={editClientData.routeId}
                        onChange={e => setEditClientData(p=>({...p, routeId:e.target.value}))}
                        style={{ width:"100%", padding:"10px 12px", background: COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:14 }}>
                        {routes.map(r => <option key={r.id} value={r.id}>{r.name} — {r.driver}</option>)}
                      </select>
                    </div>

                    <div style={{ display:"flex", gap:8, marginTop:8 }}>
                      <Btn onClick={() => {
                        const { routeId, client } = editClientData;
                        const origRouteId = routes.find(r => r.clients.some(c => c.name === client.name))?.id;
                        setRoutes(prev => prev.map(r => {
                          if (origRouteId && r.id === origRouteId && r.id !== routeId)
                            return { ...r, clients: r.clients.filter(c => c.name !== client.name) };
                          if (r.id === routeId) {
                            const exists = r.clients.some(c => c.name === client.name);
                            if (exists) return { ...r, clients: r.clients.map(c => c.name === client.name ? client : c) };
                            return { ...r, clients: [...r.clients, client] };
                          }
                          return r;
                        }));
                        setEditClientData(null);
                      }} style={{ flex:1 }}>Save Changes</Btn>
                      <Btn outline onClick={() => setEditClientData(null)} style={{ flex:1 }}>Cancel</Btn>
                    </div>
                  </Card>
                </div>
              )}
            </div>
          )}

          {/* MASTER PARTICIPANTS TAB */}
          {tab === "participants" && (() => {
            // Build master list — deduplicated, with all routes they appear on
            const masterMap = {};
            routes.forEach(route => {
              (route.clients || []).forEach(cl => {
                if (!masterMap[cl.name]) {
                  masterMap[cl.name] = { ...cl, routes: [] };
                }
                masterMap[cl.name].routes.push({ id: route.id, name: route.name, driver: route.driver, status: cl.status });
              });
            });
            const masterList = Object.values(masterMap).sort((a,b) => {
              const la = a.name.split(', ')[0] || a.name;
              const lb = b.name.split(', ')[0] || b.name;
              return la.localeCompare(lb);
            });
            const activeList = masterList.filter(p => !p.routes.every(r => r.status === 'archived'));
            const archivedList = masterList.filter(p => p.routes.every(r => r.status === 'archived'));

            return (
              <div>
                {/* Header */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <div>
                    <h3 style={{ color: COLORS.text, margin:0 }}>Master Participant List</h3>
                    <p style={{ color: COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>{activeList.length} active · {archivedList.length} archived</p>
                  </div>
                  <Btn small onClick={() => setShowAddClient(true)}>+ Add Participant</Btn>
                </div>

                <p style={{ color: COLORS.textDim, fontSize:11, margin:"0 0 12px", background:"#fffbeb", padding:"8px 10px", borderRadius:8, borderLeft:`3px solid ${COLORS.yellow}` }}>
                  ⚠️ Archiving a participant here removes them from <strong>all routes</strong>.
                </p>

                {/* Active participants */}
                {activeList.map(p => (
                  <Card key={p.name} style={{ marginBottom:8 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <p style={{ color: COLORS.text, margin:0, fontSize:14, fontWeight:700 }}>{p.name}</p>
                        {/* Address */}
                        {p.address
                          ? <p style={{ color: COLORS.textMuted, margin:"2px 0 0", fontSize:11 }}>🏠 {p.address}</p>
                          : <p style={{ color: COLORS.red, margin:"2px 0 0", fontSize:11, fontStyle:"italic" }}>🏠 No address — tap ✏️ to add</p>
                        }
                        {/* Day program */}
                        {p.dayProgram && <p style={{ color: COLORS.accent, margin:"2px 0 0", fontSize:11 }}>📍 {p.dayProgram}{p.dropoffAddress ? ` — ${p.dropoffAddress}` : ''}</p>}
                        {/* Schedule summary */}
                        {(() => {
                          const sched = p.daySchedule;
                          const svDays = p.serviceDays;
                          const schStr = p.schedule;
                          if (sched && Object.keys(sched).length > 0) {
                            const days = ["Mon","Tue","Wed","Thu","Fri"].filter(d => sched[d]);
                            const times = days.map(d => sched[d]?.amPickup ? `${d} ${sched[d].amPickup}` : d).join(" · ");
                            return <p style={{ color:"#166534", margin:"3px 0 0", fontSize:11, fontWeight:600 }}>📅 {times}</p>;
                          }
                          if (svDays && svDays.length > 0) {
                            return <p style={{ color:"#166534", margin:"3px 0 0", fontSize:11, fontWeight:600 }}>📅 {svDays.join(", ")}</p>;
                          }
                          if (schStr) {
                            return <p style={{ color:"#166534", margin:"3px 0 0", fontSize:11, fontWeight:600 }}>📅 {schStr}</p>;
                          }
                          return <p style={{ color: COLORS.textMuted, margin:"3px 0 0", fontSize:11, fontStyle:"italic" }}>📅 No schedule set — tap ✏️ to add</p>;
                        })()}
                        {p.uci && <p style={{ color: COLORS.textDim, margin:"2px 0 0", fontSize:10 }}>UCI: {p.uci}</p>}
                        {/* Routes */}
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:5 }}>
                          {p.routes.map(r => (
                            <span key={r.id} style={{
                              fontSize:10, padding:"2px 7px", borderRadius:10, fontWeight:600,
                              background: r.status==='archived'?'#fee2e2':r.status==='inactive'?'#fef3c7':'#dcfce7',
                              color: r.status==='archived'?COLORS.red:r.status==='inactive'?'#92400e':'#166534',
                            }}>
                              {r.name} · {r.driver}{r.status!=='active'?` (${r.status})`:''}
                            </span>
                          ))}
                        </div>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
                        {/* Edit button — opens same edit modal as Clients tab */}
                        <button onClick={() => {
                          const routeWithClient = routes.find(r => r.clients.some(c => c.name === p.name));
                          const fullClient = routeWithClient?.clients.find(c => c.name === p.name);
                          if (fullClient && routeWithClient) {
                            setEditClientData({ routeId: routeWithClient.id, client: { ...fullClient } });
                          }
                        }} style={{ background:"none", border:`1px solid ${COLORS.border}`, color: COLORS.textMuted,
                          cursor:"pointer", fontSize:12, padding:"5px 10px", borderRadius:6, fontWeight:600 }}>
                          ✏️ Edit
                        </button>
                        <button onClick={() => {
                          const affectedRoutes = routes.filter(r => r.clients.some(c => c.name === p.name && c.status !== 'archived'));
                          setArchiveConfirm({ participant: p, affectedRoutes });
                        }} style={{ background:"none", border:`1px solid ${COLORS.red}`, color: COLORS.red, cursor:"pointer",
                          fontSize:11, padding:"5px 10px", borderRadius:6, fontWeight:600, whiteSpace:"nowrap" }}>
                          📦 Archive
                        </button>
                      </div>
                    </div>
                  </Card>
                ))}

                {/* Archived participants */}
                {archivedList.length > 0 && (
                  <details style={{ marginTop:16 }}>
                    <summary style={{ color: COLORS.textMuted, fontSize:13, cursor:"pointer", padding:"8px 0", userSelect:"none", fontWeight:600 }}>
                      📦 {archivedList.length} archived participant{archivedList.length>1?'s':''}
                    </summary>
                    {archivedList.map(p => (
                      <Card key={p.name} style={{ marginBottom:8, opacity:0.6, marginTop:6 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div>
                            <p style={{ color: COLORS.text, margin:0, fontSize:13, fontWeight:600 }}>{p.name}</p>
                            <Badge color={COLORS.red}>Archived from all routes</Badge>
                          </div>
                          <Btn small color={COLORS.accent} onClick={() => {
                            setRoutes(prev => prev.map(r => ({
                              ...r,
                              clients: r.clients.map(c => c.name===p.name ? {...c, active:true, status:'active', returnDate:''} : c)
                            })));
                          }}>Reactivate All</Btn>
                        </div>
                      </Card>
                    ))}
                  </details>
                )}

                {/* Archive Confirmation Modal */}
                {archiveConfirm && (
                  <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                    <Card style={{ width:"100%", maxWidth:420 }}>
                      <h3 style={{ color: COLORS.red, margin:"0 0 8px" }}>📦 Archive Participant</h3>
                      <p style={{ color: COLORS.text, fontWeight:700, fontSize:15, margin:"0 0 6px" }}>{archiveConfirm.participant.name}</p>
                      <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 12px" }}>
                        This will remove them from all active routes. You can reactivate them later.
                      </p>
                      <p style={{ color: COLORS.text, fontSize:13, fontWeight:600, margin:"0 0 8px" }}>Routes that will be affected:</p>
                      {archiveConfirm.affectedRoutes.map(r => (
                        <div key={r.id} style={{ padding:"6px 10px", background:"#fef2f2", borderRadius:6, marginBottom:4, borderLeft:`3px solid ${COLORS.red}` }}>
                          <p style={{ margin:0, fontSize:13, fontWeight:600, color: COLORS.text }}>{r.name}</p>
                          <p style={{ margin:0, fontSize:11, color: COLORS.textMuted }}>Driver: {r.driver}</p>
                        </div>
                      ))}
                      <div style={{ display:"flex", gap:8, marginTop:16 }}>
                        <Btn onClick={() => {
                          const name = archiveConfirm.participant.name;
                          const affected = archiveConfirm.affectedRoutes;
                          setRoutes(prev => prev.map(r => ({
                            ...r,
                            clients: r.clients.map(c => c.name===name ? {...c, active:false, status:'archived', returnDate:''} : c)
                          })));
                          setArchiveConfirm(null);
                          setArchiveDone({ name, affectedRoutes: affected });
                        }} color={COLORS.red} style={{ flex:1, fontWeight:700 }}>
                          ✓ Proceed — Archive
                        </Btn>
                        <Btn outline onClick={() => setArchiveConfirm(null)} style={{ flex:1 }}>Cancel</Btn>
                      </div>
                    </Card>
                  </div>
                )}

                {/* Archive Done Modal — shows what was affected */}
                {archiveDone && (
                  <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                    <Card style={{ width:"100%", maxWidth:420 }}>
                      <div style={{ textAlign:"center", marginBottom:12 }}>
                        <p style={{ fontSize:36, margin:"0 0 4px" }}>✅</p>
                        <h3 style={{ color: COLORS.text, margin:0 }}>{archiveDone.name} Archived</h3>
                      </div>
                      <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 10px" }}>Removed from the following routes:</p>
                      {archiveDone.affectedRoutes.map(r => (
                        <div key={r.id} style={{ padding:"6px 10px", background:"#f0fdf4", borderRadius:6, marginBottom:4, borderLeft:`3px solid ${COLORS.accent}` }}>
                          <p style={{ margin:0, fontSize:13, fontWeight:600, color: COLORS.text }}>{r.name} — {r.driver}</p>
                        </div>
                      ))}
                      <Btn onClick={() => setArchiveDone(null)} style={{ width:"100%", marginTop:14 }}>Done</Btn>
                    </Card>
                  </div>
                )}

                {/* Add Participant modal reuse */}
                {showAddClient && (
                  <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                    <Card style={{ width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }}>
                      <h3 style={{ color: COLORS.text, margin:"0 0 16px" }}>Add New Participant</h3>
                      <Input label="Full Name *" value={newClient.name} onChange={e => setNewClient(p=>({...p,name:e.target.value}))} placeholder="e.g. Smith, John" />
                      <Input label="Home Address *" value={newClient.address} onChange={e => setNewClient(p=>({...p,address:e.target.value}))} placeholder="Participant's home address" />
                      <div style={{ background:"#eff6ff", borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
                        <p style={{ color: COLORS.blue, fontSize:12, fontWeight:700, margin:"0 0 8px" }}>📍 Day Program / Work Site</p>
                        <Input label="Program Name" value={newClient.dayProgram||''} onChange={e => setNewClient(p=>({...p,dayProgram:e.target.value}))} placeholder="e.g. PCS" />
                        <Input label="Program Address" value={newClient.dropoffAddress||''} onChange={e => setNewClient(p=>({...p,dropoffAddress:e.target.value}))} placeholder="Drop-off address" />
                      </div>
                      <Input label="UCI Number" value={newClient.uci} onChange={e => setNewClient(p=>({...p,uci:e.target.value}))} placeholder="Optional" />
                      <div style={{ marginBottom:12 }}>
                        <label style={{ display:"block", color: COLORS.textDim, fontSize:12, marginBottom:4, fontWeight:600 }}>Assign to Route *</label>
                        <select value={newClient.routeId} onChange={e => setNewClient(p=>({...p,routeId:e.target.value}))}
                          style={{ width:"100%", padding:"10px 12px", background: COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:14 }}>
                          <option value="">Select route...</option>
                          {routes.map(r => <option key={r.id} value={r.id}>{r.name} — Driver: {r.driver}</option>)}
                        </select>
                      </div>
                      <div style={{ display:"flex", gap:8, marginTop:8 }}>
                        <Btn onClick={handleAddClient} style={{ flex:1 }}>Add Participant</Btn>
                        <Btn outline onClick={() => setShowAddClient(false)} style={{ flex:1 }}>Cancel</Btn>
                      </div>
                    </Card>
                  </div>
                )}
              </div>
            );
          })()}

          {/* SCHEDULE TAB */}
          {tab === "schedule" && (
            <div>
              <h3 style={{ color: COLORS.text, margin: "0 0 12px" }}>Daily Route Schedule</h3>
              {routes.map(route => (
                <Card key={route.id} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <h4 style={{ color: COLORS.accent, margin: 0 }}>{route.name}</h4>
                    <Badge>{route.driver}</Badge>
                  </div>

// ============ VENDOR ACCOUNT (VA) DASHBOARD ============
// Read-only view for ACRC and VMRC vendor accounts
// Shows: Fleet/rate info for their region, HA0935 download, vehicle inspections

// ACRC rates (from ACRC_RatesEffectiveJan2026)
const ACRC_TRANSPORT_RATES = {
  vehicleRate:       166.94,  // per vehicle per day (AM+PM)
  standardMile:       1.08,   // small vehicle/mile
  nonAmbMile:         1.19,   // small non-ambulatory/mile
};
// VMRC rates (identical for these transport codes as of Jan 2026)
const VMRC_TRANSPORT_RATES = { ...ACRC_TRANSPORT_RATES };

function VendorDashboard({ user, routes, logs, inspections, vehicleServices, absences }) {
  const isACRC   = user.vaRegion === 'ACRC';
  const rates    = isACRC ? ACRC_TRANSPORT_RATES : VMRC_TRANSPORT_RATES;
  const contract = isACRC ? 'HA0935' : 'HV0713';
  const regionName = isACRC ? 'ACRC — Sacramento Region' : 'VMRC — Valley Mountain Region';
  const accentColor = isACRC ? '#1d4ed8' : '#16a34a';
  const bgColor     = isACRC ? '#eff6ff' : '#f0fdf4';

  const [tab, setTab] = useState('fleet');
  const todayStr = new Date().toISOString().slice(0,10);
  const currentMonthKey = new Date().toISOString().slice(0,7);

  // Month selection for HA0935 download
  const monthsWithData = (() => {
    const months = new Set(logs.map(l => l.date?.slice(0,7)).filter(Boolean));
    months.add(currentMonthKey);

        </div>

        {/* FLEET & RATES TAB */}

              <p style={{ color:accentColor, fontSize:13, fontWeight:800, margin:'0 0 10px', textTransform:'uppercase', letterSpacing:0.5 }}>
                Transportation Rates — Effective January 1, 2026
              </p>
              {[
                [`Vehicle Rate (0V0)`, `$${rates.vehicleRate.toFixed(2)}/vehicle/day`, '875'],
                [`Standard Vehicle Mile (Small)`, `$${rates.standardMile.toFixed(2)}/mile`, '875 SSO'],
                [`Non-Ambulatory Vehicle Mile (Small)`, `$${rates.nonAmbMile.toFixed(2)}/mile`, '875 SSO'],

                  padding:'6px 0', borderBottom:`1px solid ${COLORS.border}` }}>

                    <p style={{ color:COLORS.textMuted, fontSize:10, margin:0 }}>Code: {code}</p>
                  </div>
                  <span style={{ color:accentColor, fontSize:14, fontWeight:800 }}>{rate}</span>

            {/* Routes */}
            <h4 style={{ color:COLORS.text, margin:'0 0 8px', fontSize:14 }}>Routes ({routes.length})</h4>
            {routes.map(r => {
              const activeClients = (r.clients||[]).filter(c=>c.active).length;
              const isWC = !!r.wheelchairVan;
              const rate = isWC ? rates.nonAmbMile : rates.standardMile;
              const estMiDay = (r.amMiles + r.pmMiles).toFixed(1);

                    <div>

                        <span style={{ color:COLORS.text, fontSize:14, fontWeight:700 }}>{r.name}</span>
                        <span style={{ color:COLORS.textMuted, fontSize:12 }}>{r.vehicleId}</span>

  );
}

function FleetTab({ routes, setRoutes }) {
  const [selectedCompany, setSelectedCompany] = useState("sst");

  // Toggle wheelchair van flag on a route
  const toggleWheelchair = (routeId) => {
    setRoutes(prev => prev.map(r =>
      r.id === routeId ? { ...r, wheelchairVan: !r.wheelchairVan } : r
    ));
  };

  const sstRoutes = routes.filter(r => FLEET_COMPANIES[0].routeIds.includes(r.id));
  const priorityRoutes = routes.filter(r => !FLEET_COMPANIES[0].routeIds.includes(r.id));

  const company = FLEET_COMPANIES.find(c => c.id === selectedCompany);
  const companyRoutes = selectedCompany === "sst" ? sstRoutes : priorityRoutes;

  const RATE_STANDARD    = 1.08;
  const RATE_WHEELCHAIR  = 1.19;

  const totalMiles = companyRoutes.reduce((s, r) => s + r.amMiles + r.pmMiles, 0);
  const estReimbursement = companyRoutes.reduce((s, r) => {
    const rate = r.wheelchairVan ? RATE_WHEELCHAIR : RATE_STANDARD;
    return s + (r.amMiles + r.pmMiles) * rate;
  }, 0);
  const wcCount = companyRoutes.filter(r => r.wheelchairVan).length;

  return (
    <div>
      <h3 style={{ color: COLORS.text, margin:"0 0 12px" }}>🏢 Fleet Companies</h3>

      {/* Company selector */}
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        {FLEET_COMPANIES.map(c => (
          <button key={c.id} onClick={() => setSelectedCompany(c.id)} style={{
            flex:1, padding:"12px 8px", borderRadius:10, cursor:"pointer", textAlign:"center",
            border:`2px solid ${selectedCompany===c.id ? c.color : COLORS.border}`,
            background: selectedCompany===c.id ? c.bg : "transparent",
          }}>
            <p style={{ color: selectedCompany===c.id ? c.color : COLORS.textMuted,
              fontSize:13, fontWeight:800, margin:"0 0 2px" }}>{c.name}</p>
            <p style={{ color: COLORS.textMuted, fontSize:11, margin:0 }}>Contract: {c.contract}</p>
          </button>
        ))}
      </div>

      {/* Summary cards */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
        <Card style={{ textAlign:"center", padding:12 }}>
          <p style={{ color:company.color, fontSize:22, fontWeight:800, margin:0 }}>{companyRoutes.length}</p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>Routes</p>
        </Card>
        <Card style={{ textAlign:"center", padding:12 }}>
          <p style={{ color:COLORS.yellow, fontSize:22, fontWeight:800, margin:0 }}>{wcCount}</p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>♿ WC Vans</p>
        </Card>
        <Card style={{ textAlign:"center", padding:12, background:"#f0fdf4" }}>
          <p style={{ color:"#166534", fontSize:18, fontWeight:800, margin:0 }}>
            ${estReimbursement.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
          </p>
          <p style={{ color:COLORS.textMuted, fontSize:11, margin:"2px 0 0" }}>Est. Reimb.</p>
        </Card>
      </div>

      {/* Rate info — ACRC for SST, VMRC for Priority */}
      {(() => {
        const isSST = selectedCompany === "sst";
        const regionName = isSST ? "ACRC" : "VMRC";
        const rates = ACRC_TRANSPORT_RATES; // same as VMRC for these codes
        const accentCol = isSST ? "#1d4ed8" : "#16a34a";
        const bgCol = isSST ? "#eff6ff" : "#f0fdf4";
        const borderCol = isSST ? "#bfdbfe" : "#bbf7d0";
        return (
          <div style={{ background:bgCol, border:`1px solid ${borderCol}`, borderRadius:10,
            padding:"12px 14px", marginBottom:14 }}>
            <p style={{ color:accentCol, fontSize:13, fontWeight:800, margin:"0 0 8px" }}>
              📋 {regionName} Transportation Rates — Effective January 1, 2026
            </p>
            {[
              ["Vehicle Rate (0V0 — per vehicle/day)", `$${rates.vehicleRate.toFixed(2)}/vehicle`, "875"],
              ["Standard Mile (Small Vehicle)", `$${rates.standardMile.toFixed(2)}/mile`, "875 SSO"],
              ["Non-Ambulatory Mile (♿ WC Van)", `$${rates.nonAmbMile.toFixed(2)}/mile`, "875 SSO"],
            ].map(([label, rate, code]) => (
              <div key={label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"5px 0", borderBottom:`1px solid ${borderCol}` }}>

        companyRoutes.map(route => {

          const rate = isWC ? RATE_WHEELCHAIR : RATE_STANDARD;
          const dailyMiles = route.amMiles + route.pmMiles;
          const dailyEst = dailyMiles * rate;
          const activeClients = (route.clients||[]).filter(c => c.active).length;

          return (
            <Card key={route.id} style={{ marginBottom:8,

                    <span style={{ color:COLORS.textMuted, fontSize:12 }}>{route.vehicleId}</span>
                    {isWC && (
                      <span style={{ background:"#fef3c7", color:"#92400e", fontSize:11, fontWeight:700,
                        padding:"1px 8px", borderRadius:10 }}>♿ Wheelchair Van</span>
                    )}
                  </div>
                  <p style={{ color:COLORS.textMuted, fontSize:12, margin:0 }}>
                    Driver: {route.driver} · {activeClients} clients
                    · {dailyMiles.toFixed(1)} mi/day
                  </p>
                  <p style={{ color:"#166534", fontSize:11, fontWeight:700, margin:"2px 0 0" }}>
                    Rate: ${rate.toFixed(2)}/mi · Est: ${dailyEst.toFixed(2)}/day
