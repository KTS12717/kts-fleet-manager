const LoginScreen = ({ onLogin, users }) => {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const handleLogin = () => {
    const user = users.find(u => u.username.toLowerCase() === username.toLowerCase().trim() && u.password === password);
    if (user) { onLogin(user); setError(""); }
    else setError("Invalid credentials");
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: COLORS.bg, padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 380 }}>

        </div>
        <Card>
          <div style={{ marginBottom: 12 }}>
            <label style={{ display: "block", color: COLORS.textDim, fontSize: 12, marginBottom: 4, fontWeight: 600 }}>Username</label>
            <input value={username} onChange={e => setUsername(e.target.value)} placeholder="Enter username"
              autoCapitalize="none" autoCorrect="off" autoComplete="username" spellCheck="false"
              style={{ width: "100%", padding: "10px 12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                borderRadius: 8, color: COLORS.text, fontSize: 16, outline: "none", boxSizing: "border-box" }} />
          </div>
          <div style={{ marginBottom: 12 }}>
            <label style={{ display: "block", color: COLORS.textDim, fontSize: 12, marginBottom: 4, fontWeight: 600 }}>Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter password"

          {error && <p style={{ color: COLORS.red, fontSize: 12, margin: "0 0 8px" }}>{error}</p>}
          <Btn onClick={handleLogin} style={{ width: "100%", marginTop: 4 }}>Sign In</Btn>

          Add to home screen for app-like experience
        </p>
      </div>
    </div>
  );
};

// ============ LIVE CAMERA COMPONENT ============
const LiveCamera = ({ onCapture, onClose }) => {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [ready, setReady] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    let mounted = true;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } }, audio: false })
      .then(stream => {
        if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play();
        }
        setReady(true);
      })
      .catch(err => {
        if (mounted) setError("Camera access denied. Please allow camera permissions and try again.");
      });
    return () => { mounted = false; if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const takeSnapshot = () => {
    if (!videoRef.current) return;
    const canvas = document.createElement("canvas");
    canvas.width = videoRef.current.videoWidth;
    canvas.height = videoRef.current.videoHeight;
    canvas.getContext("2d").drawImage(videoRef.current, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onCapture(dataUrl);
  };

  const handleClose = () => {
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onClose();
  };

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000", zIndex: 300, display: "flex", flexDirection: "column" }}>
      {error ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 32 }}>
          <div style={{ textAlign: "center" }}>
            <p style={{ color: "#fff", fontSize: 16, marginBottom: 16 }}>{error}</p>
            <Btn onClick={handleClose} color={COLORS.red}>Close</Btn>
          </div>
        </div>
      ) : (
        <>
          <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
            <video ref={videoRef} autoPlay playsInline muted
              style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            {!ready && (
              <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", color: "#fff" }}>
                Loading camera...
              </div>
            )}
          </div>
          <div style={{ padding: 20, display: "flex", justifyContent: "center", gap: 24, background: "#111" }}>
            <button onClick={handleClose}
              style={{ width: 52, height: 52, borderRadius: 26, background: COLORS.red, border: "none", color: "#fff", fontSize: 20, cursor: "pointer" }}>✕</button>
            <button onClick={takeSnapshot} disabled={!ready}
              style={{

const SignaturePad = ({ onSave, label = "Driver Signature" }) => {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasDrawn, setHasDrawn] = useState(false);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  };

  const startDraw = (e) => {
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    setDrawing(true);
    setHasDrawn(true);
  };

  const draw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#111";
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };

  const stopDraw = () => setDrawing(false);

  const clearSig = () => {
    const ctx = canvasRef.current.getContext("2d");
    ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
    setHasDrawn(false);
  };

  const saveSig = () => {
    if (!hasDrawn) return alert("Please sign first");
    onSave(canvasRef.current.toDataURL("image/png"));
  };

  return (
    <Card style={{ marginTop: 12 }}>
      <h4 style={{ color: COLORS.text, fontSize: 14, margin: "0 0 8px", fontWeight: 700 }}>✍️ {label}</h4>
      <p style={{ color: COLORS.textDim, fontSize: 11, margin: "0 0 8px" }}>Sign with your finger below</p>
      <div style={{ border: `2px solid ${COLORS.border}`, borderRadius: 8, overflow: "hidden", touchAction: "none", background: "#fff" }}>
        <canvas ref={canvasRef} width={320} height={120}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          style={{ width: "100%", height: 120, display: "block", cursor: "crosshair" }} />
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <Btn small outline onClick={clearSig} color={COLORS.textMuted}>Clear</Btn>
        <Btn small onClick={saveSig} disabled={!hasDrawn}>Save Signature</Btn>
      </div>
    </Card>
  );
};

// ============ DRIVER DASHBOARD ============
const DriverDashboard = ({ user, routes, onSubmit, onInspectionComplete, absences = [], vehicleServices = [] }) => {
  // Build today's date string for absence checking
  const todayDateStr = new Date().toISOString().slice(0, 10);

  // Returns true if a client is marked absent today via the calendar
  const isCalendarAbsent = (clientName) => {
    return absences.some(a =>
      a.clientName === clientName &&
      todayDateStr >= a.startDate &&
      todayDateStr <= (a.endDate || a.startDate)
    );
  };

  // Returns true if client is scheduled to go today based on their daySchedule
  // If no schedule is set, assume they go every weekday
  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const todayDayName = DAY_NAMES[new Date().getDay()];
  const isScheduledToday = (client) => {
    if (!client) return true;
    // daySchedule: { Mon: {...}, Wed: {...} } — set via per-day schedule builder
    if (client.daySchedule && Object.keys(client.daySchedule).length > 0) {
      return !!client.daySchedule[todayDayName];
    }
    // serviceDays: ["Mon","Wed","Fri"] — legacy simple day picker
    if (client.serviceDays && client.serviceDays.length > 0) {
      return client.serviceDays.includes(todayDayName);
    }
    // schedule string like "M-F", "M-TH", "M,W,F", "W,TH,F" — parse it
    if (client.schedule) {
      const s = client.schedule.toUpperCase().replace(/\s/g,'');
      const dayMap = { MON:"Mon", TUE:"Tue", WED:"Wed", THU:"Thu", FRI:"Fri",
                       M:"Mon", T:"Tue", W:"Wed", TH:"Thu", F:"Fri" };
      // Handle range "M-F", "M-TH"
      if (s.includes('-')) {
        const order = ["Mon","Tue","Wed","Thu","Fri"];
        const parts = s.split('-');
        const start = dayMap[parts[0]] || parts[0];
        const end   = dayMap[parts[1]] || parts[1];
        const si = order.indexOf(start), ei = order.indexOf(end);
        if (si >= 0 && ei >= 0) return order.indexOf(todayDayName) >= si && order.indexOf(todayDayName) <= ei;
      }
      // Handle comma list "W,TH,F" or "M,W,F"
      if (s.includes(',')) {
        const parts = s.split(',');
        return parts.some(p => dayMap[p] === todayDayName);
      }
    }
    // No schedule info — show every weekday
    return todayDayName !== "Sat" && todayDayName !== "Sun";
  };
  const isManager = user.role === "manager";
  const [selectedRouteId, setSelectedRouteId] = useState(null);
  const [overrideName, setOverrideName] = useState("");

  // Determine which route to use
  let driverRoute = null;
  if (isManager) {
    if (selectedRouteId) driverRoute = routes.find(r => r.id === selectedRouteId);
  } else {
    driverRoute = routes.find(r => r.driver === user.name);
  }

  const [period, setPeriod] = useState("am");
  const [startOdo, setStartOdo] = useState("");
  const [endOdo, setEndOdo] = useState("");
  // Default all clients to present (green) — driver flips to red if absent
  const [clientStatus, setClientStatus] = useState(() => {
    const defaults = {};
    // Will be populated once driverRoute is known (see below)
    return defaults;
  });
  const [absentClients, setAbsentClients] = useState({}); // client went to address but wasn't there — mileage counts
  const [calledOut, setCalledOut] = useState({});         // client called before driver left — NO mileage
  const [baseStarted, setBaseStarted] = useState({});
  const [timestamps, setTimestamps] = useState({});
  const [amSubmitted, setAmSubmitted] = useState(false);
  const [pmSubmitted, setPmSubmitted] = useState(false);
  const [showPmSummary, setShowPmSummary] = useState(false);
  const [showCalloutTab, setShowCalloutTab] = useState(false); // callout modal before route
  const [inspectionDone, setInspectionDone] = useState(false);
  const [activeView, setActiveView] = useState("log");
  const [loginTime] = useState(new Date());
  const [flashInspection, setFlashInspection] = useState(false);
  const [amSignature, setAmSignature] = useState(null);
  const [pmSignature, setPmSignature] = useState(null);
  const [showTimeOffForm, setShowTimeOffForm] = useState(false);
  const [driverTOForm, setDriverTOForm] = useState({ startDate:"", endDate:"", reason:"" });
  const [inspectionOverride, setInspectionOverride] = useState(false);
  const [showOverrideModal, setShowOverrideModal] = useState(false); // in-app override confirm

  const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

  // Flash inspection warning after 1 hour if not done
  useEffect(() => {
    const checkFlash = () => {
      if (!inspectionDone) {
        const elapsed = (new Date() - loginTime) / 1000 / 60;
        setFlashInspection(elapsed >= 60);
      } else {
        setFlashInspection(false);
      }
    };
    checkFlash();
    const interval = setInterval(checkFlash, 30000);
    return () => clearInterval(interval);
  }, [inspectionDone, loginTime]);

  // Manager route selection screen
  if (isManager && !selectedRouteId) {
    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }}>
        <div style={{ maxWidth: 500, margin: "0 auto" }}>
          <h2 style={{ color: COLORS.text, margin: "0 0 4px", fontSize: 20 }}>Select Route to Cover</h2>
          <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 16px" }}>
            {user.name} — Manager Override
          </p>
          {routes.map(route => (
            <Card key={route.id} onClick={() => { setSelectedRouteId(route.id); setOverrideName(user.name); }}
              style={{ marginBottom: 8, cursor: "pointer" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <h3 style={{ color: COLORS.text, margin: 0, fontSize: 15 }}>{route.name}</h3>
                  <p style={{ color: COLORS.textDim, fontSize: 12, margin: "2px 0 0" }}>
                    Assigned: {route.driver} · {route.clients.filter(c => c.active).length} clients
                  </p>
                </div>
                <Badge>{route.vehicleId}</Badge>
              </div>
            </Card>
          ))}
        </div>
      </div>
    );
  }

  if (!driverRoute) return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Card><p style={{ color: COLORS.text }}>No route assigned to you today.</p></Card>
    </div>
  );

  const displayDriver = overrideName || driverRoute.driver;
  const stops = period === "am" ? driverRoute.amStops : driverRoute.pmStops;
  const activeStops = stops.filter(s => {
    if (s.type === "base") return true;
    if (s.inactive) return false;
    // A stop is active if at least one client is scheduled today, active, not absent, not called-out
    return s.clients.some(c => {
      const cl = driverRoute.clients.find(x => x.name === c);
      return cl && cl.active && isScheduledToday(cl) && !isCalendarAbsent(c) && !calledOut[c];
    });
  });

  const handleBaseToggle = (stopId) => {
    setBaseStarted(p => ({ ...p, [stopId]: !p[stopId] }));
    if (!timestamps[stopId]) setTimestamps(p => ({ ...p, [stopId]: new Date().toLocaleTimeString() }));
  };

  // Default: client is green (present=true). Driver taps to flip red (absent).
  // If client is calledOut, they are hidden from route entirely (no mileage).
  const handleClientToggle = (clientName) => {
    const key = `${period}_${clientName}`;
    const current = clientStatus[key];
    // true = present (green), false/undefined = absent (red, mileage counted)
    setClientStatus(p => ({ ...p, [key]: current === false ? true : false }));
    if (!timestamps[key]) setTimestamps(p => ({ ...p, [key]: new Date().toLocaleTimeString() }));
  };

  // Initialise all active clients as green (present) for this period
  const initClientStatus = (p) => {
    if (!driverRoute) return;
    setClientStatus(prev => {
      const updated = { ...prev };
      driverRoute.clients.filter(c => c.active).forEach(c => {
        const key = `${p}_${c.name}`;
        if (!(key in updated)) updated[key] = true; // default green
      });
      return updated;
    });
  };

  // Toggle called-out (before driver left — no mileage)
  const handleCalledOutToggle = (clientName) => {
    setCalledOut(p => ({ ...p, [clientName]: !p[clientName] }));
  };

  // Get all unique active clients for the route (exclude called-out)
  // Participants marked absent via calendar today (auto-removed from route)
  const calendarAbsentToday = driverRoute.clients.filter(c => c.active && isCalendarAbsent(c.name));
  const allActiveClients = driverRoute.clients.filter(c => c.active && isScheduledToday(c) && !isCalendarAbsent(c.name));
  const routingClients = allActiveClients.filter(c => !calledOut[c.name]); // on-route clients

  const handleSubmitAM = () => {
    if (!startOdo) return alert("Starting odometer is required");
    if (!amSignature) return alert("Signature is required for AM route");
    setAmSubmitted(true);
    if (onSubmit) onSubmit({
      period: "am", startOdo, endOdo, clientStatus, absentClients, calledOut,
      timestamps, route: driverRoute.name, routeId: driverRoute.id,
      driver: displayDriver, signature: amSignature, date: today
    });
  };

  const handleSubmitPM = () => {
    if (!endOdo) return alert("Ending odometer is required");
    if (!pmSignature) return alert("Signature is required for PM route");
    setShowPmSummary(true);
  };

  const confirmPmSubmit = () => {
    setPmSubmitted(true);
    setShowPmSummary(false);
    if (onSubmit) onSubmit({
      period: "pm", startOdo, endOdo, clientStatus, absentClients, calledOut,
      timestamps, route: driverRoute.name, routeId: driverRoute.id,
      driver: displayDriver, signature: pmSignature, date: today
    });
  };

  const isSubmitted = period === "am" ? amSubmitted : pmSubmitted;

  // Render the route log
  const renderLog = () => (
    <div>
      {/* Vehicle Service Alerts — view only for drivers */}
      {(() => {
        const todayStr = new Date().toISOString().slice(0,10);
        const driverVehicleId = driverRoute?.id;
        const urgentAlerts = vehicleServices.filter(s =>
          s.serviceType === 'reminder' &&
          (s.vehicleId === driverVehicleId) &&
          (s.urgent || (s.nextDueDate && s.nextDueDate <= todayStr))
        );
        const upcomingAlerts = vehicleServices.filter(s => {
          if (s.serviceType !== 'reminder') return false;
          if (s.vehicleId !== driverVehicleId) return false;
          if (!s.nextDueDate) return false;
          const diff = (new Date(s.nextDueDate) - new Date()) / (1000*60*60*24);
          return diff > 0 && diff <= 14 && !s.urgent;
        });
        if (urgentAlerts.length === 0 && upcomingAlerts.length === 0) return null;
        return (
          <>
            {urgentAlerts.map(a => (
              <div key={a.id} style={{ background:a.urgent?"#fef2f2":"#fffbeb",
                border:`2px solid ${a.urgent?COLORS.red:COLORS.yellow}`, borderRadius:10,
                padding:"10px 14px", marginBottom:10 }}>
                <p style={{ color:a.urgent?COLORS.red:"#92400e", fontSize:13, fontWeight:800, margin:"0 0 3px" }}>
                  {a.urgent ? "🚨 URGENT Service Required" : "⚠️ Service Due Soon"}
                </p>
                <p style={{ color:a.urgent?"#7f1d1d":"#78350f", fontSize:12, margin:0 }}>
                  {a.type} — {driverRoute.vehicleId}
                  {a.nextDueDate ? ` · Due: ${a.nextDueDate}` : ""}
                  {a.nextDueMiles ? ` or ${a.nextDueMiles} mi` : ""}
                </p>
                {a.notes && <p style={{ color:COLORS.textMuted, fontSize:11, margin:"3px 0 0", fontStyle:"italic" }}>{a.notes}</p>}
                <p style={{ color:COLORS.textMuted, fontSize:10, margin:"4px 0 0" }}>ℹ️ Contact your manager — view only</p>
              </div>
            ))}
            {upcomingAlerts.map(a => (
              <div key={a.id} style={{ background:"#fffbeb", border:`1px solid ${COLORS.yellow}`,
                borderRadius:8, padding:"8px 12px", marginBottom:8 }}>
                <p style={{ color:"#92400e", fontSize:12, fontWeight:700, margin:"0 0 2px" }}>
                  ⚠️ {a.type} due soon — {driverRoute.vehicleId}
                </p>
                <p style={{ color:"#78350f", fontSize:11, margin:0 }}>
                  Due: {a.nextDueDate}{a.nextDueMiles ? ` or ${a.nextDueMiles} mi` : ""}
                </p>
              </div>
            ))}
          </>
        );
      })()}
      {/* Calendar Absence Banner — auto-removed participants */}
      {calendarAbsentToday.length > 0 && (
        <div style={{ background:"#fffbeb", border:`1px solid ${COLORS.yellow}`, borderRadius:10,
          padding:"10px 14px", marginBottom:12 }}>
          <p style={{ color:"#92400e", fontSize:12, fontWeight:800, margin:"0 0 4px" }}>
            📅 Pre-Scheduled Absence Today
          </p>
          {calendarAbsentToday.map(c => {
            const absence = absences.find(a =>
              a.clientName === c.name &&
              todayDateStr >= a.startDate &&
              todayDateStr <= (a.endDate || a.startDate)
            );
            return (
              <p key={c.name} style={{ color:"#78350f", fontSize:12, margin:"2px 0 0" }}>
                • <strong>{c.name}</strong> — {absence?.type || "out"}{absence?.reason ? `: ${absence.reason}` : ""}
                <span style={{ color:"#92400e", fontSize:11 }}> (removed from route)</span>
              </p>
            );
          })}
        </div>
      )}

      {/* Odometer */}
      <Card style={{ marginBottom: 12, borderLeft: `4px solid ${!startOdo ? COLORS.red : COLORS.accent}` }}>
        <h3 style={{ color: COLORS.text, fontSize: 14, margin: "0 0 8px", fontWeight: 700 }}>Odometer</h3>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}>
            <Input label="Start *" type="number" value={startOdo} onChange={e => setStartOdo(e.target.value)} placeholder="Required" />
          </div>
          <div style={{ flex: 1 }}>
            <Input label="End *" type="number" value={endOdo} onChange={e => setEndOdo(e.target.value)} placeholder="After PM" />
          </div>
        </div>
      </Card>

      {/* AM / PM tabs + Call-Out button */}
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <Btn onClick={() => { setPeriod("am"); initClientStatus("am"); }} color={period === "am" ? COLORS.accent : COLORS.border} style={{ flex: 1 }}>
          ☀️ AM {amSubmitted && "✅"}
        </Btn>
        <Btn onClick={() => { setPeriod("pm"); initClientStatus("pm"); }} color={period === "pm" ? COLORS.blue : COLORS.border} style={{ flex: 1 }}>
          🌙 PM {pmSubmitted && "✅"}
        </Btn>
      </div>

      {/* Call-Out button — logs who called before driver left */}
      <button onClick={() => setShowCalloutTab(true)} style={{
        width: "100%", padding: "10px", marginBottom: 12,
        background: Object.values(calledOut).some(Boolean) ? "#fef2f2" : COLORS.card,
        border: `1px solid ${Object.values(calledOut).some(Boolean) ? COLORS.red : COLORS.border}`,
        borderRadius: 10, color: Object.values(calledOut).some(Boolean) ? COLORS.red : COLORS.textMuted,
        fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
      }}>
        📵 Client Call-Outs
        {Object.values(calledOut).filter(Boolean).length > 0 && (
          <span style={{ background: COLORS.red, color:"#fff", borderRadius:10, padding:"1px 8px", fontSize:11 }}>
            {Object.values(calledOut).filter(Boolean).length} called out
          </span>
        )}
      </button>

      {/* Call-Out Modal */}
      {showCalloutTab && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:200,
          display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ background: COLORS.card, borderRadius:16, width:"100%", maxWidth:440, maxHeight:"80vh", overflow:"auto", padding:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <h3 style={{ color: COLORS.text, margin:0, fontSize:16 }}>📵 Client Call-Outs</h3>
              <button onClick={() => setShowCalloutTab(false)}
                style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color: COLORS.textMuted, lineHeight:1 }}>✕</button>
            </div>
            <p style={{ color: COLORS.textDim, fontSize:12, margin:"0 0 4px" }}>
              Mark clients who called out <strong>before</strong> the driver left base.
            </p>
            <p style={{ color: COLORS.accent, fontSize:11, margin:"0 0 14px", background:"#f0fdf4", padding:"6px 10px", borderRadius:8, borderLeft:`3px solid ${COLORS.accent}` }}>
              ✅ Called-out clients are <strong>removed from the route</strong> — no mileage recorded.
            </p>
            <p style={{ color: COLORS.red, fontSize:11, margin:"0 0 14px", background:"#fef2f2", padding:"6px 10px", borderRadius:8, borderLeft:`3px solid ${COLORS.red}` }}>
              ❌ If driver already headed to the address, use the red toggle on the route instead — mileage will still count.
            </p>

            {allActiveClients.map(cl => (
              <div key={cl.name} style={{
                display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"12px 0", borderBottom:`1px solid ${COLORS.border}`,
              }}>
                <div style={{ flex:1 }}>
                  <p style={{ margin:0, fontSize:14, fontWeight:600,
                    color: calledOut[cl.name] ? COLORS.red : COLORS.text,
                    textDecoration: calledOut[cl.name] ? "line-through" : "none" }}>
                    {cl.name}
                  </p>
                  <p style={{ margin:"2px 0 0", fontSize:11, color: COLORS.textMuted }}>{cl.address}</p>
                  {calledOut[cl.name] && (
                    <Badge color={COLORS.red}>Called Out — No Mileage</Badge>
                  )}
                </div>
                <button onClick={() => handleCalledOutToggle(cl.name)} style={{
                  padding:"8px 14px", borderRadius:8, border:`1px solid ${calledOut[cl.name] ? COLORS.red : COLORS.border}`,
                  background: calledOut[cl.name] ? "#fef2f2" : "transparent",
                  color: calledOut[cl.name] ? COLORS.red : COLORS.textMuted,
                  fontSize:12, fontWeight:700, cursor:"pointer", marginLeft:12,
                }}>
                  {calledOut[cl.name] ? "✕ Undo" : "Mark Called Out"}
                </button>
              </div>
            ))}

            <button onClick={() => setShowCalloutTab(false)} style={{
              width:"100%", marginTop:16, padding:"12px",
              background: COLORS.accent, color:"#fff", border:"none",
              borderRadius:10, fontSize:14, fontWeight:700, cursor:"pointer",
            }}>Done</button>
          </div>
        </div>
      )}

      {isSubmitted ? (
        <Card style={{ textAlign: "center", padding: 24 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
          <h3 style={{ color: COLORS.text, fontSize: 16 }}>{period.toUpperCase()} Route Submitted</h3>
        </Card>
      ) : (
        <>
          {/* ── Route List — exact physical log format ── */}
          <Card style={{ padding: "8px 14px 4px", marginBottom: 8 }}>
            {(() => {
              const currentStops = period === "am" ? driverRoute.amStops : driverRoute.pmStops;

              // Build filtered stop list — skip dropoff if ALL clients are unscheduled or called out
              const filteredStops = activeStops.filter(stop => {
                if (stop.type === "base") return true;
                if (!stop.dropoff) return true;
                // For dropoff stops: only show if at least one scheduled, non-called-out client
                const activeAtStop = (stop.clients || []).filter(cl => {
                  const client = driverRoute.clients.find(c => c.name === cl);
                  return client && client.active && isScheduledToday(client) && !calledOut[cl];
                });
                return activeAtStop.length > 0;
              });

              // Assign sequential numbers
              let seqNum = 0;

              return filteredStops.map(stop => {
                const isBase = stop.type === "base";
                const isDropoff = !!stop.dropoff;

                // Active clients at this stop (scheduled today, not called-out)
                const activeAtStop = (stop.clients || []).filter(cl => {
                  const client = driverRoute.clients.find(c => c.name === cl);
                  return client && client.active && isScheduledToday(client) && !calledOut[cl];
                });

                seqNum++;
                const num = seqNum;

                // ── BASE STOP ──────────────────────────────────────────────
                if (isBase) {
                  return (
                    <div key={stop.id} style={{
                      display: "flex", alignItems: "center", padding: "9px 0",
                      borderBottom: `1px solid ${COLORS.border}`,
                    }}>
                      <span style={{ color: COLORS.textMuted, fontSize: 13, fontWeight: 700, minWidth: 24 }}>{num}.</span>
                      <div style={{ flex: 1, display: "flex", alignItems: "center", flexWrap: "wrap", gap: 5 }}>
                        <span style={{ color: COLORS.text, fontSize: 13, fontWeight: 800 }}>Base:</span>
                        <span style={{ color: COLORS.textMuted, fontSize: 13 }}>{stop.address}</span>
                        <MapsLink address={stop.address} label="🗺" />
                        {stop.time && (
                          <span style={{ background: COLORS.yellow, color: "#5c3d00", fontSize: 12, fontWeight: 800, padding: "1px 8px", borderRadius: 4 }}>
                            {stop.time}
                          </span>
                        )}
                      </div>
                      <Btn small onClick={() => handleBaseToggle(stop.id)}
                        color={baseStarted[stop.id] ? COLORS.accent : COLORS.border}
                        style={{ flexShrink: 0, fontSize: 11, padding: "3px 10px", color: baseStarted[stop.id] ? "#fff" : COLORS.text }}>
                        {baseStarted[stop.id] ? "✓ Done" : "Start"}
                      </Btn>
                    </div>
                  );
                }

                // ── PICKUP STOP — one row per client, each with own toggle ──
                if (!isDropoff) {
                  return activeAtStop.map((cl, ci) => {
                    const client = driverRoute.clients.find(c => c.name === cl);
                    const key = `${period}_${cl}`;
                    const isPresent = clientStatus[key] !== false;
                    const pickupTime = client?.pickupTime || stop.time || "";
                    const schedule = client?.schedule || "";
                    const rowNum = ci === 0 ? num : (seqNum += 0, num); // same stop shares num only on first

                    return (
                      <div key={`${stop.id}_${cl}`} style={{
                        display: "flex", alignItems: "flex-start", padding: "9px 0",
                        borderBottom: `1px dashed ${COLORS.border}`,
                        background: !isPresent ? "#fff0f0" : "transparent",
                      }}>
                        {/* Number — only show on first client of this stop */}
                        <span style={{ color: COLORS.blue, fontSize: 13, fontWeight: 700, minWidth: 24, paddingTop: 1, flexShrink: 0 }}>
                          {ci === 0 ? `${rowNum}.` : ""}
                        </span>

                        <div style={{ flex: 1, minWidth: 0 }}>
                          {/* NAME: address (time) [schedule] */}
                          <div style={{ display: "flex", alignItems: "baseline", flexWrap: "wrap", gap: 4 }}>
                            <span style={{ fontSize: 14, fontWeight: 800, color: !isPresent ? COLORS.red : COLORS.text }}>
                              {cl}:
                            </span>
                            <span style={{ fontSize: 13, color: COLORS.text }}>
                              {client?.address || stop.address}
                            </span>
                            <MapsLink address={client?.address || stop.address} label="🗺" />
                            {pickupTime && (
                              <span style={{ background: COLORS.yellow, color: "#5c3d00", fontSize: 12, fontWeight: 800,
                                padding: "1px 7px", borderRadius: 4, whiteSpace: "nowrap" }}>
                                {pickupTime}
                              </span>
                            )}
                            {schedule && (
                              <span style={{ background: "#dbeafe", color: "#1e40af", fontSize: 11, fontWeight: 700,
                                padding: "1px 7px", borderRadius: 4, whiteSpace: "nowrap" }}>
                                {schedule}
                              </span>
                            )}
                          </div>
                          {/* Gate code / notes */}
                          {client?.notes && (
                            <span style={{ background: "#fef3c7", color: "#92400e", fontSize: 11, fontWeight: 700,
                              padding: "1px 7px", borderRadius: 4, display: "inline-block", marginTop: 3 }}>
                              ⚠️ {client.notes}
                            </span>
                          )}
                          {timestamps[key] && (
                            <span style={{ color: COLORS.textMuted, fontSize: 10, display: "block", marginTop: 2 }}>
                              ⏱ {timestamps[key]}
                            </span>
                          )}
                        </div>

                        {/* Green/Red toggle */}
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flexShrink: 0, marginLeft: 8 }}>
                          <Toggle on={isPresent} onChange={() => handleClientToggle(cl)} />
                          <span style={{ fontSize: 9, fontWeight: 800, color: isPresent ? COLORS.accent : COLORS.red }}>
                            {isPresent ? "✓" : "✗"}
                          </span>
                        </div>
                      </div>
                    );
                  });
                }

                // ── DROPOFF STOP — Program (clients) : address (time) — GREEN toggle only ──
                const programName = stop.label || "Drop-off";
                const clientNames = activeAtStop.map(cl => {
                  // Get first name initials or short name
                  const parts = cl.split(", ");
                  return parts.length > 1 ? parts[1] : cl;
                }).join(", ");

                return (
                  <div key={stop.id} style={{
                    display: "flex", alignItems: "flex-start", padding: "9px 0",
                    borderBottom: `1px solid ${COLORS.border}`,
                  }}>
                    <span style={{ color: COLORS.accent, fontSize: 13, fontWeight: 700, minWidth: 24, paddingTop: 1, flexShrink: 0 }}>
                      {num}.
                    </span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      {/* Program (Client Names): address (time) */}
                      <div style={{ display: "flex", alignItems: "baseline", flexWrap: "wrap", gap: 4 }}>
                        <span style={{ fontSize: 14, fontWeight: 800, color: COLORS.accent }}>
                          {programName}
                        </span>
                        {clientNames && (
                          <span style={{ fontSize: 12, color: COLORS.textMuted, fontStyle: "italic" }}>
                            ({clientNames})
                          </span>
                        )}
                        <span style={{ fontSize: 13, color: COLORS.text }}>
                          {stop.address}
                        </span>
                        <MapsLink address={stop.address} label="🗺" />
                        {stop.time && (
                          <span style={{ background: COLORS.yellow, color: "#5c3d00", fontSize: 12, fontWeight: 800,
                            padding: "1px 7px", borderRadius: 4, whiteSpace: "nowrap" }}>
                            {stop.time}
                          </span>
                        )}
                      </div>
                      {/* Each client at this dropoff gets their own present/dropped-off toggle */}
                      {activeAtStop.length > 0 && (
                        <div style={{ marginTop: 6, display: "flex", flexDirection: "column", gap: 4 }}>
                          {activeAtStop.map(cl => {
                            const key = `${period}_${cl}`;
                            const isPresent = clientStatus[key] !== false;
                            const client = driverRoute.clients.find(c => c.name === cl);
                            return (
                              <div key={cl} style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                                background: isPresent ? "#f0fdf4" : "#fff0f0", borderRadius: 6, padding: "4px 8px" }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                  <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.text }}>{cl}</span>
                                  {client?.address && (
                                    <span style={{ fontSize: 11, color: COLORS.textMuted }}>→ {client.address}</span>
                                  )}
                                  <MapsLink address={client?.address || ""} label="🗺" />
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 1, flexShrink: 0, marginLeft: 8 }}>
                                  <Toggle on={isPresent} onChange={() => handleClientToggle(cl)} />
                                  <span style={{ fontSize: 9, fontWeight: 800, color: isPresent ? COLORS.accent : COLORS.red }}>
                                    {isPresent ? "✓" : "✗"}
                                  </span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                );
              });
            })()}
          </Card>
          <Card style={{ marginTop: 12, background: COLORS.cardHover }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ color: COLORS.textDim, fontSize: 13 }}>Est. Route Miles</span>
              <span style={{ color: COLORS.text, fontSize: 16, fontWeight: 700 }}>
                {period === "am" ? driverRoute.amMiles : driverRoute.pmMiles} mi
              </span>
            </div>
          </Card>

          {/* Signature for current period */}
          {(() => {
            const sig = period === "am" ? amSignature : pmSignature;
            const setSig = period === "am" ? setAmSignature : setPmSignature;
            return sig ? (
              <Card style={{ marginTop: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <h4 style={{ color: COLORS.accent, fontSize: 14, margin: 0 }}>✍️ Signed</h4>
                  <Btn small outline onClick={() => setSig(null)} color={COLORS.textMuted}>Redo</Btn>
                </div>
                <img src={sig} alt="sig" style={{ width: "100%", height: 60, objectFit: "contain", border: `1px solid ${COLORS.border}`, borderRadius: 6 }} />
              </Card>
            ) : (
              <SignaturePad label={`Driver Signature — ${period.toUpperCase()} Route`} onSave={setSig} />
            );
          })()}

          <Btn onClick={period === "am" ? handleSubmitAM : handleSubmitPM}
            disabled={period === "am" ? (!startOdo || !amSignature) : (!endOdo || !pmSignature)}
            color={period === "am" ? COLORS.accent : COLORS.blue}
            style={{ width: "100%", marginTop: 12, padding: "14px 0", fontSize: 16 }}>
            Submit {period.toUpperCase()} Route Log
          </Btn>
        </>
      )}

      {/* PM Summary Modal */}
      {showPmSummary && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16, overflow:"auto" }}>
          <Card style={{ width:"100%", maxWidth:420, maxHeight:"85vh", overflow:"auto" }}>
            <h3 style={{ color: COLORS.text, margin:"0 0 4px", fontSize:16 }}>📋 Daily Summary — {driverRoute.name}</h3>
            <p style={{ color: COLORS.textDim, fontSize:12, margin:"0 0 4px" }}>{today} · Driver: {displayDriver}</p>
            <p style={{ color: COLORS.textDim, fontSize:12, margin:"0 0 16px" }}>Odometer: {startOdo} → {endOdo} ({endOdo && startOdo ? Number(endOdo)-Number(startOdo) : "—"} mi)</p>

            {/* ✅ Present — went and got in */}
            <h4 style={{ color: COLORS.accent, fontSize:13, margin:"0 0 8px", padding:"6px 10px", background:"#f0fdf4", borderRadius:6 }}>
              ✅ Clients Who Went
            </h4>
            {allActiveClients.filter(c => !calledOut[c.name] && clientStatus[`am_${c.name}`] !== false && clientStatus[`pm_${c.name}`] !== false).length === 0 ? (
              <p style={{ color: COLORS.textMuted, fontSize:12, marginBottom:12 }}>No clients marked as picked up.</p>
            ) : (
              allActiveClients.filter(c => !calledOut[c.name] && (clientStatus[`am_${c.name}`] !== false || clientStatus[`pm_${c.name}`] !== false)).map(c => (
                <div key={c.name} style={{ padding:"6px 0", borderBottom:`1px solid ${COLORS.border}` }}>
                  <span style={{ color: COLORS.text, fontSize:13 }}>{c.name}</span>
                  <span style={{ color: COLORS.accent, fontSize:11, marginLeft:8 }}>✓ Present</span>
                </div>
              ))
            )}

            {/* ❌ Absent — driver went to address, client wasn't there (mileage counts) */}
            <h4 style={{ color: COLORS.red, fontSize:13, margin:"16px 0 8px", padding:"6px 10px", background:"#fef2f2", borderRadius:6 }}>
              ❌ Absent — Driver Went to Address (Mileage Counted)
            </h4>
            {allActiveClients.filter(c => !calledOut[c.name] && (clientStatus[`am_${c.name}`] === false || clientStatus[`pm_${c.name}`] === false)).length === 0 ? (
              <p style={{ color: COLORS.textMuted, fontSize:12, marginBottom:12 }}>No absent clients.</p>
            ) : (
              allActiveClients.filter(c => !calledOut[c.name] && (clientStatus[`am_${c.name}`] === false || clientStatus[`pm_${c.name}`] === false)).map(c => (
                <div key={c.name} style={{ padding:"6px 0", borderBottom:`1px solid ${COLORS.border}` }}>
                  <span style={{ color: COLORS.text, fontSize:13 }}>{c.name}</span>
                  <Badge color={COLORS.red}>Absent — Mileage counted</Badge>
                </div>
              ))
            )}

            {/* 📵 Called Out — notified before driver left (no mileage) */}
            {Object.values(calledOut).some(Boolean) && (
              <>
                <h4 style={{ color: COLORS.yellow, fontSize:13, margin:"16px 0 8px", padding:"6px 10px", background:"#fffbeb", borderRadius:6 }}>
                  📵 Called Out Before Departure (No Mileage)
                </h4>
                {allActiveClients.filter(c => calledOut[c.name]).map(c => (
                  <div key={c.name} style={{ padding:"6px 0", borderBottom:`1px solid ${COLORS.border}`, opacity:0.7 }}>
                    <span style={{ color: COLORS.text, fontSize:13 }}>{c.name}</span>
                    <Badge color={COLORS.yellow}>Called Out — No Mileage</Badge>
                  </div>
                ))}
              </>
            )}

            <div style={{ display:"flex", gap:8, marginTop:20 }}>
              <Btn onClick={confirmPmSubmit} color={COLORS.accent} style={{ flex:1 }}>Confirm & Submit</Btn>
              <Btn outline onClick={() => setShowPmSummary(false)} style={{ flex:1 }}>Go Back</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );

  // MAIN DRIVER DASHBOARD
  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }}>
      <div style={{ maxWidth: 500, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
          <h2 style={{ color: COLORS.text, margin: 0, fontSize: 20 }}>📋 {driverRoute.name}</h2>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <Badge>{displayDriver}</Badge>
            <button onClick={() => setShowTimeOffForm(true)}
              style={{ background:COLORS.blue+"15", border:`1px solid ${COLORS.blue}`, borderRadius:8,
                padding:"4px 10px", color:COLORS.blue, fontSize:11, fontWeight:700, cursor:"pointer" }}>
              🏖 Time Off
            </button>
          </div>
        </div>
        <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 12px" }}>
          {today}
          {isManager && <span style={{ color: COLORS.yellow, marginLeft: 8 }}> (Manager Override)</span>}
        </p>

        {/* Driver time-off request modal */}
        {showTimeOffForm && (
          <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:200,
            display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
            <Card style={{ width:"100%", maxWidth:400 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <h3 style={{ color:COLORS.text, margin:0 }}>🏖 Request Time Off</h3>
                <button onClick={() => setShowTimeOffForm(false)}
                  style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:COLORS.textMuted }}>✕</button>
              </div>
              <p style={{ color:COLORS.textDim, fontSize:12, margin:"0 0 14px" }}>
                Submitting as: <strong>{user.name}</strong>
              </p>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
                <div>
                  <label style={{ display:"block", color:COLORS.textDim, fontSize:12, fontWeight:600, marginBottom:4 }}>Start Date *</label>
                  <input type="date" value={driverTOForm.startDate}

              <div style={{ display:"flex", gap:8 }}>

                  if (!driverTOForm.startDate) return alert("Start date required");

                      driverName: user.name,
                      driverId: user.id,
                      startDate: driverTOForm.startDate,
                      endDate: driverTOForm.endDate || driverTOForm.startDate,
                      reason: driverTOForm.reason,
                      status: "pending",
                      createdBy: user.name,
                      createdAt: new Date().toISOString(),

                    localStorage.setItem('kts_timeoff', JSON.stringify([...existing, entry]));

                  setDriverTOForm({startDate:"",endDate:"",reason:""});

            {!inspectionDone && !inspectionOverride && (

            {inspectionOverride && !inspectionDone && (

          </Btn>
          <Btn onClick={() => setActiveView("inspection")}
            color={activeView === "inspection" ? COLORS.yellow : !inspectionDone ? COLORS.accent : COLORS.border}

          </Btn>
        </div>

        {/* ── Override Confirmation Modal ── */}
        {showOverrideModal && (

              </div>
              {/* Buttons */}
              <div style={{ padding:"0 16px 16px", display:"flex", flexDirection:"column", gap:8 }}>
                <button onClick={() => { setInspectionOverride(true); setActiveView("log"); setShowOverrideModal(false); }}

                <button onClick={() => setShowOverrideModal(false)}

                    border:"1px solid #444", borderRadius:9, fontSize:12, cursor:"pointer" }}>
                  Cancel
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Inspection gate — shown when driver tries to access log without completing inspection */}
        {!inspectionDone && !inspectionOverride && activeView === "log" && (
          <div style={{ borderRadius:12, overflow:"hidden", marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.12)" }}>
            {/* Red header bar */}
            <div style={{ background:COLORS.red, padding:"14px 16px", display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:22 }}>🚫</span>
              <div>
                <p style={{ color:"#fff", fontSize:14, fontWeight:800, margin:0, letterSpacing:0.3 }}>
                  PRE-TRIP INSPECTION REQUIRED
                </p>
                <p style={{ color:"rgba(255,255,255,0.85)", fontSize:11, margin:0 }}>
                  Route log access is restricted until inspection is complete
                </p>
              </div>
            </div>

            {/* Body */}
            <div style={{ background:"#fff", padding:"16px", border:`1px solid ${COLORS.red}44`,
              borderTop:"none", borderRadius:"0 0 12px 12px" }}>

              <p style={{ color:"#1a1a1a", fontSize:13, fontWeight:700, margin:"0 0 8px" }}>
                Policy Notice — All Drivers
              </p>
              <p style={{ color:"#444", fontSize:12, lineHeight:1.6, margin:"0 0 12px" }}>
                Per company policy and DOT Federal Motor Carrier Safety Regulations,
                a <strong>pre-trip vehicle inspection must be completed</strong> before operating
                any company vehicle. This applies every day, every route, without exception.
              </p>

              <div style={{ background:"#fff5f5", borderRadius:8, padding:"10px 12px", marginBottom:14,
                borderLeft:`3px solid ${COLORS.red}` }}>
                <p style={{ color:COLORS.red, fontSize:11, fontWeight:800, margin:"0 0 4px", textTransform:"uppercase", letterSpacing:0.5 }}>
                  Why This Matters
                </p>
                <p style={{ color:"#555", fontSize:11, lineHeight:1.6, margin:0 }}>
                  You are responsible for the safety of your passengers — individuals with disabilities
                  who trust this service every day. An uninspected vehicle puts them, you, and
                  the public at risk. It also exposes you and the company to legal liability.
                </p>
              </div>

              <button onClick={() => setActiveView("inspection")}
                style={{ width:"100%", padding:"13px", background:COLORS.red, color:"#fff",
                  border:"none", borderRadius:9, fontSize:14, fontWeight:800, cursor:"pointer",
                  marginBottom:10, letterSpacing:0.3 }}>
                Begin Pre-Trip Inspection
              </button>

              <button onClick={() => setShowOverrideModal(true)}
                style={{ width:"100%", padding:"9px", background:"transparent",
                  border:`1px solid #ccc`, borderRadius:8, fontSize:11, color:"#888",
                  cursor:"pointer", letterSpacing:0.2 }}>
                Emergency Override — I understand this will be reported to management
              </button>
            </div>
          </div>
        )}

        {/* Override active — persistent warning banner */}
        {inspectionOverride && !inspectionDone && (
          <div style={{ background:"#1a1a1a", borderRadius:10, padding:"12px 14px", marginBottom:12 }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
              <span style={{ fontSize:18, flexShrink:0 }}>⚠️</span>
              <div style={{ flex:1 }}>
                <p style={{ color:COLORS.yellow, fontSize:12, fontWeight:800, margin:"0 0 3px", textTransform:"uppercase", letterSpacing:0.3 }}>
                  Inspection Override — Management Notified
                </p>
                <p style={{ color:"#ccc", fontSize:11, margin:"0 0 8px", lineHeight:1.5 }}>
                  You are operating this vehicle without completing a mandatory pre-trip inspection.
                  This incident has been logged and will be reviewed by your supervisor.
                  You must complete the inspection immediately upon return.
                </p>
                <button onClick={() => { setInspectionOverride(false); setActiveView("inspection"); }}
                  style={{ background:COLORS.yellow, border:"none", borderRadius:6, padding:"5px 14px",
                    fontSize:11, fontWeight:800, color:"#1a1a1a", cursor:"pointer", letterSpacing:0.2 }}>
                  Complete Inspection Now
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Flash animation style */}
        {flashInspection && !inspectionDone && (
          <style>{`@keyframes flashRed { 0%,100% { border-color: ${COLORS.red}; background: ${COLORS.red}15; } 50% { border-color: ${COLORS.red}88; background: ${COLORS.red}30; } }`}</style>
        )}

        {(activeView === "log" && (inspectionDone || inspectionOverride)) ? renderLog() :
         activeView === "inspection" ? (
          <VehicleInspection embedded user={user} onComplete={(data) => { setInspectionDone(true); setInspectionOverride(false); setActiveView("log"); if (onInspectionComplete) onInspectionComplete(data); }} />
        ) : null}
      </div>
    </div>
  );
};

// ============ ADMIN / MANAGER DASHBOARD ============
const AdminDashboard = ({ user, routes, setRoutes, users, setUsers, logs, absences, setAbsences, timeOffRequests, setTimeOffRequests, vehicleServices, setVehicleServices }) => {
  const [tab, setTab] = useState("routes");
  const [selectedRoute, setSelectedRoute] = useState(null);
  const [dashCompany, setDashCompany] = useState("sst");
  const [editPeriod, setEditPeriod] = useState("am");

  // Add Client form state
  const [showAddClient, setShowAddClient] = useState(false);
  const [newClient, setNewClient] = useState({ name: "", address: "", uci: "", routeId: "" });

  // Add Driver form state
  const [showAddDriver, setShowAddDriver] = useState(false);
  const [newDriver, setNewDriver] = useState({ name: "", username: "", password: "", role: "driver" });

  // Add Stop form state
  const [showAddStop, setShowAddStop] = useState(false);
  const [newStop, setNewStop] = useState({ type: "pickup", label: "", address: "", time: "", clients: "", dropoff: false });

  // Edit user state
  const [showEditUser, setShowEditUser] = useState(false);
  const [editUser, setEditUser] = useState(null);

  // Edit client/participant state
  const [editClientData, setEditClientData] = useState(null); // { routeId, client }

  // Client filter state
  const [clientFilterRoute, setClientFilterRoute] = useState('all');

  // Client status modal state
  const [clientModal, setClientModal] = useState(null); // { routeId, clientName }
  const [returnDate, setReturnDate] = useState("");

  // Stop status modal state
  const [stopModal, setStopModal] = useState(null); // { routeId, period, stopId, clients }
  const [stopReturnDate, setStopReturnDate] = useState("");

  // Sequence change confirmation (once per AM, once per PM per route)
  const [seqConfirmed, setSeqConfirmed] = useState({}); // { "routeId_am": true, "routeId_pm": true }

  // Pending (unsaved) stop order changes — { "routeId_am": [...stops], "routeId_pm": [...stops] }
  const [pendingStops, setPendingStops] = useState({});
  // Confirm-save modal state
  const [saveConfirm, setSaveConfirm] = useState(null); // { routeId, period }

  // Master participants modal state
  const [archiveConfirm, setArchiveConfirm] = useState(null); // { participant, affectedRoutes }
  const [archiveDone, setArchiveDone] = useState(null);       // { name, affectedRoutes }

  // Manager call-out & mileage adjustment state
  const [mgrCallouts, setMgrCallouts] = useState({});         // { routeId: { clientName: true } }
  const [calcMiles, setCalcMiles] = useState({});             // { "routeId_am": miles, "routeId_pm": miles }
  const [calcLoading, setCalcLoading] = useState({});         // { "routeId_am": true }
  const [odoWarning, setOdoWarning] = useState({});           // { routeId: "warning text" }

  const handleMgrCallout = async (routeId, clientName, period) => {
    setMgrCallouts(prev => {
      const routeMap = prev[routeId] || {};
      const updated = { ...routeMap, [clientName]: !routeMap[clientName] };
      return { ...prev, [routeId]: updated };
    });
  };

  const handleRecalcMiles = async (route, period) => {
    const key = `${route.id}_${period}`;
    setCalcLoading(p => ({ ...p, [key]: true }));
    const calledOutNames = Object.entries(mgrCallouts[route.id] || {})
      .filter(([,v]) => v).map(([k]) => k);
    const stops = period === "am" ? route.amStops : route.pmStops;
    const miles = await calcRouteMiles(stops, calledOutNames);
    setCalcMiles(p => ({ ...p, [key]: miles }));
    setCalcLoading(p => ({ ...p, [key]: false }));
  };

  // Driver reassignment
  const allDriversAndManagers = users.filter(u => ["driver","manager","admin","admin_assistant"].includes(u.role));
  const handleReassignDriver = (routeId, newDriverName) => {
    if (!confirm(`Reassign this route to ${newDriverName}?`)) return;
    setRoutes(prev => prev.map(r => r.id === routeId ? { ...r, driver: newDriverName } : r));
  };

  // Role flags
  const isAdmin     = user.role === 'admin';                                                    // sees $ amounts
  const isAdminAsst = user.role === 'admin_assistant';                                          // full access, no $
  const isManager   = user.role === 'manager';                                                  // reports + routes, no $
  const isFullAccess = isAdmin || isAdminAsst || isManager;                                     // dashboard + reports tab

  const tabs = [
    { id: "routes",       label: "Routes",       icon: "🗺️" },
    { id: "clients",      label: "Clients",       icon: "👥" },
    { id: "participants", label: "Participants",   icon: "📋" },
    { id: "schedule",     label: "Schedule",       icon: "📅" },
    { id: "calendar",     label: "Calendar",       icon: "🗓️" },
    { id: "vehicles",     label: "Vehicles",       icon: "🔧" },
    { id: "mileage",      label: "Mileage",        icon: "📊" },
    { id: "logs",         label: "Logs",           icon: "📋" },
    { id: "inspect",      label: "Inspections",    icon: "🔍" },
    { id: "users",        label: "Users",          icon: "🔑" },
    ...(isAdmin ? [{ id: "fleet", label: "Fleet", icon: "🏢" }] : []),
    ...(isFullAccess ? [{ id: "reports", label: "Reports", icon: "📥" }] : []),
  ];

  // When toggling client OFF → show modal; when toggling ON → just activate
  const handleClientToggle = (routeId, clientName) => {
    const route = routes.find(r => r.id === routeId);
    const client = route?.clients.find(c => c.name === clientName);
    if (!client) return;
    if (!client.active || client.status === "archived" || client.status === "inactive") {
      // Reactivate
      setRoutes(prev => prev.map(r => {
        if (r.id !== routeId) return r;
        return { ...r, clients: r.clients.map(c => c.name === clientName ? { ...c, active: true, status: "active", returnDate: "" } : c) };
      }));
    } else {
      // Show modal for deactivation options
      setClientModal({ routeId, clientName });
      setReturnDate("");
    }
  };

  // Client status actions from modal
  const handleClientInactiveWithDate = () => {
    if (!returnDate) return alert("Please enter a return date");
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "inactive", returnDate } : c) };
    }));
    setClientModal(null);
    setReturnDate("");
  };

  const handleClientInactiveNoDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "inactive", returnDate: "" } : c) };
    }));
    setClientModal(null);
  };

  const handleClientArchive = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== clientModal.routeId) return r;
      return { ...r, clients: r.clients.map(c => c.name === clientModal.clientName ? { ...c, active: false, status: "archived", returnDate: "" } : c) };
    }));
    setClientModal(null);
  };

  // Swap stop positions in LOCAL draft (not saved yet)
  const handleSequenceChange = (routeId, period, fromIndex, newSeqNum) => {
    const toIndex = newSeqNum - 1;
    const key = `${routeId}_${period}`;
    const route = routes.find(r => r.id === routeId);
    if (!route) return;
    const stopsKey = period === "am" ? "amStops" : "pmStops";
    // Use pending draft if exists, otherwise use live stops
    const currentStops = pendingStops[key] ? [...pendingStops[key]] : [...route[stopsKey]];
    if (toIndex < 0 || toIndex >= currentStops.length || toIndex === fromIndex) return;
    const [moved] = currentStops.splice(fromIndex, 1);
    currentStops.splice(toIndex, 0, moved);
    setPendingStops(prev => ({ ...prev, [key]: currentStops }));
  };

  // Save pending sequence changes after confirmation
  const handleSavePendingStops = (routeId, period) => {
    const key = `${routeId}_${period}`;
    if (!pendingStops[key]) return;
    const stopsKey = period === "am" ? "amStops" : "pmStops";
    setRoutes(prev => prev.map(r => r.id !== routeId ? r : { ...r, [stopsKey]: pendingStops[key] }));
    setPendingStops(prev => { const n = {...prev}; delete n[key]; return n; });
    setSaveConfirm(null);
  };

  const handleDiscardPendingStops = (routeId, period) => {
    const key = `${routeId}_${period}`;
    setPendingStops(prev => { const n = {...prev}; delete n[key]; return n; });
    setSaveConfirm(null);
  };

  // Toggle stop active/inactive — show modal when deactivating
  const handleStopToggle = (routeId, period, stop) => {
    if (stop.inactive) {
      // Reactivate
      setRoutes(prev => prev.map(r => {
        if (r.id !== routeId) return r;
        const key = period === "am" ? "amStops" : "pmStops";
        return { ...r, [key]: r[key].map(s => s.id === stop.id ? { ...s, inactive: false, stopStatus: "active", stopReturnDate: "" } : s) };
      }));
    } else {
      // Show modal
      setStopModal({ routeId, period, stopId: stop.id, label: stop.label || stop.address, clients: stop.clients });
      setStopReturnDate("");
    }
  };

  const handleStopInactiveWithDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "inactive", stopReturnDate } : s) };
    }));
    setStopModal(null);
  };

  const handleStopInactiveNoDate = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "inactive", stopReturnDate: "" } : s) };
    }));
    setStopModal(null);
  };

  const handleStopArchive = () => {
    setRoutes(prev => prev.map(r => {
      if (r.id !== stopModal.routeId) return r;
      const key = stopModal.period === "am" ? "amStops" : "pmStops";
      return { ...r, [key]: r[key].map(s => s.id === stopModal.stopId ? { ...s, inactive: true, stopStatus: "archived", stopReturnDate: "" } : s) };
    }));
    setStopModal(null);
  };

  // Add a new client to a route
  const handleAddClient = () => {
    if (!newClient.name || !newClient.address || !newClient.routeId) return alert("Name, address, and route are required");
    setRoutes(prev => prev.map(r => {
      if (r.id !== newClient.routeId) return r;
      return { ...r, clients: [...r.clients, { name: newClient.name, address: newClient.address, uci: newClient.uci, active: true, status: "active" }] };
    }));
    setNewClient({ name: "", address: "", uci: "", routeId: "" });
    setShowAddClient(false);
  };

  // Remove client from route
  const handleRemoveClient = (routeId, clientName) => {
    if (!confirm(`Remove ${clientName} from route? This will also remove them from all stops.`)) return;
    setRoutes(prev => prev.map(r => {
      if (r.id !== routeId) return r;
      return {
        ...r,
        clients: r.clients.filter(c => c.name !== clientName),
        amStops: r.amStops.map(s => ({ ...s, clients: s.clients.filter(c => c !== clientName) })).filter(s => s.type === "base" || s.clients.length > 0),
        pmStops: r.pmStops.map(s => ({ ...s, clients: s.clients.filter(c => c !== clientName) })).filter(s => s.type === "base" || s.clients.length > 0),
      };
    }));
  };

  // Add a new driver
  const handleAddDriver = () => {
    if (!newDriver.name || !newDriver.username || !newDriver.password) return alert("All fields are required");
    if (users.find(u => u.username === newDriver.username)) return alert("Username already exists");
    setUsers(prev => [...prev, { id: `usr_${Date.now()}`, ...newDriver }]);
    setNewDriver({ name: "", username: "", password: "", role: "driver" });
    setShowAddDriver(false);
  };

  // Remove driver
  const handleRemoveUser = (userId) => {
    const u = users.find(x => x.id === userId);
    if (u.role === "admin" && users.filter(x => x.role === "admin").length <= 1) return alert("Cannot remove the last admin");
    if (!confirm(`Remove user ${u.name}?`)) return;
    setUsers(prev => prev.filter(x => x.id !== userId));
  };

  // Add a new stop to route
  const handleAddStop = () => {
    if (!newStop.address) return alert("Address is required");
    const clientList = newStop.clients ? newStop.clients.split(",").map(c => c.trim()).filter(Boolean) : [];
    const stopId = `s_${Date.now()}`;
    const stopObj = {
      id: stopId, type: newStop.type, address: newStop.address, time: newStop.time,
      clients: clientList, label: newStop.label || "", dropoff: newStop.type === "dropoff",
    };
    setRoutes(prev => prev.map(r => {
      if (r.id !== selectedRoute) return r;
      const key = editPeriod === "am" ? "amStops" : "pmStops";
      const stops = [...r[key]];
      // Insert before last base stop
      const lastBaseIdx = stops.length - 1;
      stops.splice(lastBaseIdx, 0, stopObj);
      return { ...r, [key]: stops };
    }));
    setNewStop({ type: "pickup", label: "", address: "", time: "", clients: "", dropoff: false });
    setShowAddStop(false);
  };

  const totalClients = routes.reduce((sum, r) => sum + r.clients.length, 0);
  const activeClients = routes.reduce((sum, r) => sum + r.clients.filter(c => c.active).length, 0);

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, padding: "16px 32px 100px" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", width: "100%" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <h1 style={{ color: COLORS.text, margin: 0, fontSize: 22, fontWeight: 800, display: "flex", alignItems: "center", gap: 8 }}><KTSLogoSmall /> KTS Dashboard</h1>
            <p style={{ color: COLORS.textDim, fontSize: 12, margin: "2px 0 0" }}>
              {user.name} · <Badge color={
                user.role === "admin" ? COLORS.red :
                user.role === "admin_assistant" ? "#7c3aed" :
                COLORS.yellow
              }>{
                user.role === "admin" ? "System Admin" :
                user.role === "admin_assistant" ? "Admin Assistant" :
                "Manager"
              }</Badge>
              {isAdmin      && <span style={{ color: COLORS.accent, fontSize:10, marginLeft:6, fontWeight:600 }}>· Full Access + Financials</span>}
              {isAdminAsst  && <span style={{ color:"#7c3aed", fontSize:10, marginLeft:6, fontWeight:600 }}>· Full Access</span>}
              {isManager    && <span style={{ color: COLORS.textMuted, fontSize:10, marginLeft:6 }}>· Route & Report Management</span>}
              {!isAdmin && !isAdminAsst && !isManager && <span style={{ color: COLORS.textMuted, fontSize:10, marginLeft:6 }}>· Field Access</span>}
            </p>
          </div>
          <div style={{ textAlign: "right" }}>
            <p style={{ color: COLORS.textDim, fontSize: 11, margin: 0 }}>{new Date().toLocaleDateString()}</p>
          </div>
        </div>

        {/* Company Tab Switcher */}
        {(() => {
          const sstIds = ["r1","r2","r3","r4","r5","r6","r7","r8","r9","r10"];
          const prIds  = ["r11","r12"];
          return null;
        })()}
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>
          {[
            { id:"sst",      label:"🚌 SST / Khan Transportation",  color:"#1d4ed8", bg:"#eff6ff", border:"#bfdbfe" },
            { id:"priority", label:"🚐 Priority Transportation",     color:"#16a34a", bg:"#f0fdf4", border:"#bbf7d0" },
          ].map(c => (
            <button key={c.id} onClick={() => setDashCompany(c.id)}
              style={{ flex:1, padding:"8px 12px", borderRadius:10, border:`2px solid ${dashCompany===c.id ? c.color : COLORS.border}`,
                background: dashCompany===c.id ? c.bg : "#fff", color: dashCompany===c.id ? c.color : COLORS.textDim,
                fontWeight: dashCompany===c.id ? 700 : 500, fontSize:13, cursor:"pointer", transition:"all 0.15s" }}>
              {c.label}
            </button>
          ))}
        </div>

        {/* Summary Cards */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 8, marginBottom: 16 }}>
          {(() => {
            const sstIds = ["r1","r2","r3","r4","r5","r6","r7","r8","r9","r10"];
            const prIds  = ["r11","r12"];
            const filteredRoutes = routes.filter(r => dashCompany === "sst" ? sstIds.includes(r.id) : prIds.includes(r.id));
            const filteredClients = filteredRoutes.reduce((sum, r) => sum + r.clients.filter(c => c.active).length, 0);
            const filteredTotal   = filteredRoutes.reduce((sum, r) => sum + r.clients.length, 0);
            const filteredDrivers = [...new Set(filteredRoutes.map(r => r.driver))].length;
            const filteredMiles   = filteredRoutes.reduce((s, r) => s + r.amMiles + r.pmMiles, 0).toFixed(0);
            return [
              { label: "Routes",         value: filteredRoutes.length,              color: COLORS.accent },
              { label: "Active Clients", value: `${filteredClients}/${filteredTotal}`, color: COLORS.blue },
              { label: "Drivers",        value: filteredDrivers,                    color: COLORS.yellow },
              { label: "Today Miles",    value: filteredMiles,                      color: COLORS.accentLight },
            ].map(s => (
              <Card key={s.label} style={{ textAlign: "center", padding: 12 }}>
                <p style={{ color: s.color, fontSize: 22, fontWeight: 800, margin: 0 }}>{s.value}</p>
                <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "2px 0 0" }}>{s.label}</p>
              </Card>
            ));
          })()}
        </div>

      {/* ── Main layout: sidebar + content ── */}
      <div style={{ display:"flex", gap:0, alignItems:"flex-start" }}>

        {/* Left sidebar nav */}
        <div style={{ width:180, flexShrink:0, marginRight:20, position:"sticky", top:16 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              display:"flex", alignItems:"center", gap:10, width:"100%",
              padding:"10px 14px", marginBottom:4, borderRadius:10,
              background: tab === t.id ? COLORS.accent + "18" : "transparent",
              border: tab === t.id ? `2px solid ${COLORS.accent}44` : "2px solid transparent",
              color: tab === t.id ? COLORS.accent : COLORS.textDim,
              fontWeight: tab === t.id ? 700 : 500, fontSize:13,
              cursor:"pointer", textAlign:"left", transition:"all 0.15s",
            }}>
              <span style={{ fontSize:16 }}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>

        {/* Right content area */}
        <div style={{ flex:1, minWidth:0 }}>
          {/* ROUTES TAB */}
          {tab === "routes" && (
            <div>
              {!selectedRoute ? (
                (() => {
                  const sstIds = ["r1","r2","r3","r4","r5","r6","r7","r8","r9","r10"];
                  const prIds  = ["r11","r12"];
                  const visibleRoutes = routes.filter(r => dashCompany === "sst" ? sstIds.includes(r.id) : prIds.includes(r.id));
                  return visibleRoutes.map(route => {
                  const routeCallouts = mgrCallouts[route.id] || {};
                  const calledOutCount = Object.values(routeCallouts).filter(Boolean).length;
                  const activeClients = route.clients.filter(c => c.active);

                  return (
                  <Card key={route.id} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ flex: 1, cursor: "pointer" }} onClick={() => setSelectedRoute(route.id)}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <h3 style={{ color: COLORS.text, margin: 0, fontSize: 16 }}>{route.name}</h3>
                          {calledOutCount > 0 && (
                            <span style={{ background: COLORS.red, color:"#fff", borderRadius:10, padding:"1px 8px", fontSize:11, fontWeight:700 }}>
                              {calledOutCount} called out
                            </span>
                          )}
                        </div>
                        <p style={{ color: COLORS.textDim, fontSize: 12, margin: "4px 0 0" }}>
                          {activeClients.length} active clients · Vehicle: {route.vehicleId}
                        </p>
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                        <select value={route.driver} onChange={(e) => handleReassignDriver(route.id, e.target.value)}
                          onClick={(e) => e.stopPropagation()}
                          style={{ padding: "4px 24px 4px 8px", fontSize: 12, fontWeight: 600, borderRadius: 6,
                            border: `1px solid ${COLORS.accent}`, background: COLORS.accent + "15", color: COLORS.accent,
                            cursor: "pointer", maxWidth: 140 }}>
                          {allDriversAndManagers.map(u => (
                            <option key={u.id} value={u.name}>{u.name}</option>
                          ))}
                        </select>
                        <p style={{ color: COLORS.accent, fontSize: 13, fontWeight: 700, margin: 0 }}>
                          {(route.amMiles + route.pmMiles).toFixed(1)} mi
                        </p>
                      </div>
                    </div>

                    {/* ── Manager Call-Out Panel ── */}
                    {activeClients.length > 0 && (
                      <div style={{ marginTop:10, paddingTop:10, borderTop:`1px solid ${COLORS.border}` }}>
                        <p style={{ color: COLORS.textMuted, fontSize:11, fontWeight:700, margin:"0 0 8px",
                          textTransform:"uppercase", letterSpacing:0.5 }}>
                          📵 Today's Call-Outs — adjust route mileage
                        </p>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                          {activeClients.map(cl => {
                            const isCO = !!routeCallouts[cl.name];
                            return (
                              <button key={cl.name} onClick={async () => {
                                const newCO = !isCO;
                                setMgrCallouts(prev => ({
                                  ...prev,
                                  [route.id]: { ...(prev[route.id]||{}), [cl.name]: newCO }
                                }));
                              }} style={{
                                padding:"5px 10px", borderRadius:16, fontSize:12, fontWeight:700, cursor:"pointer",
                                border:`2px solid ${isCO ? COLORS.red : COLORS.border}`,
                                background: isCO ? "#fef2f2" : "transparent",
                                color: isCO ? COLORS.red : COLORS.textMuted,
                                textDecoration: isCO ? "line-through" : "none",
                              }}>
                                {cl.name.split(", ")[1] || cl.name}
                                {isCO ? " ✕" : ""}
                              </button>
                            );
                          })}
                        </div>

                        {/* Recalculate mileage buttons */}
                        {calledOutCount > 0 && (
                          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                            {["am","pm"].map(period => {
                              const key = `${route.id}_${period}`;
                              const loading = calcLoading[key];
                              const calculated = calcMiles[key];
                              const stops = period==="am" ? route.amStops : route.pmStops;
                              return (
                                <div key={period} style={{ flex:1, minWidth:120 }}>
                                  <button onClick={() => handleRecalcMiles(route, period)}
                                    disabled={loading}
                                    style={{ width:"100%", padding:"7px 10px", borderRadius:8, fontSize:12, fontWeight:700,
                                      background: COLORS.blue, color:"#fff", border:"none", cursor:"pointer",
                                      opacity: loading ? 0.6 : 1 }}>
                                    {loading ? "⏳ Calculating..." : `📍 Recalc ${period.toUpperCase()} Miles`}
                                  </button>
                                  {calculated !== undefined && !loading && (
                                    <div style={{ marginTop:4, padding:"6px 10px", background:"#f0fdf4",
                                      borderRadius:6, border:`1px solid #86efac` }}>
                                      <p style={{ color:"#166534", fontSize:12, fontWeight:800, margin:0 }}>
                                        {period.toUpperCase()} Adjusted: <strong>{calculated} mi</strong>
                                      </p>
                                      <p style={{ color:COLORS.textMuted, fontSize:10, margin:"2px 0 0" }}>
                                        Original: {(period==="am"?route.amMiles:route.pmMiles).toFixed(1)} mi · Saved {((period==="am"?route.amMiles:route.pmMiles) - calculated).toFixed(1)} mi
                                      </p>
                                    </div>
                                  )}
                                </div>
                              );
