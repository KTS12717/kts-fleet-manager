                              background: r.status==='archived'?'#fee2e2':r.status==='inactive'?'#fef3c7':'#dcfce7',
                              color: r.status==='archived'?COLORS.red:r.status==='inactive'?'#92400e':'#166534',
                            }}>
                              {r.name} · {r.driver}{r.status!=='active'?` (${r.status})`:''}
                            </span>
                          ))}
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                        <button onClick={() => {
                          const affectedRoutes = routes.filter(r => r.clients.some(c => c.name === p.name && c.status !== 'archived'));
                          setArchiveConfirm({ participant: p, affectedRoutes });
                        }}
                          style={{ background:"none", border:`1px solid ${COLORS.red}`, color: COLORS.red, cursor:"pointer",
                            fontSize:11, padding:"5px 10px", borderRadius:6, fontWeight:600, whiteSpace:"nowrap" }}>
                          📦 Archive All
                        </button>
                      </div>
                    </div>
                  </Card>
                ))}

                {/* Archived participants */}
                {archivedList.length > 0 && (
                  <details style={{ marginTop:16 }}>
                    <summary style={{ color: COLORS.textMuted, fontSize:13, cursor:"pointer", padding:"8px 0", userSelect:"none", fontWeight:600 }}>
                      📦 {archivedList.length} archived participant{archivedList.length>1?'s':''}
                    </summary>
                    {archivedList.map(p => (
                      <Card key={p.name} style={{ marginBottom:8, opacity:0.6, marginTop:6 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div>
                            <p style={{ color: COLORS.text, margin:0, fontSize:13, fontWeight:600 }}>{p.name}</p>
                            <Badge color={COLORS.red}>Archived from all routes</Badge>
                          </div>
                          <Btn small color={COLORS.accent} onClick={() => {
                            setRoutes(prev => prev.map(r => ({
                              ...r,
                              clients: r.clients.map(c => c.name===p.name ? {...c, active:true, status:'active', returnDate:''} : c)
                            })));
                          }}>Reactivate All</Btn>
                        </div>
                      </Card>
                    ))}
                  </details>
                )}

                {/* Archive Confirmation Modal */}
                {archiveConfirm && (
                  <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                    <Card style={{ width:"100%", maxWidth:420 }}>
                      <h3 style={{ color: COLORS.red, margin:"0 0 8px" }}>📦 Archive Participant</h3>
                      <p style={{ color: COLORS.text, fontWeight:700, fontSize:15, margin:"0 0 6px" }}>{archiveConfirm.participant.name}</p>
                      <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 12px" }}>
                        This will remove them from all active routes. You can reactivate them later.
                      </p>
                      <p style={{ color: COLORS.text, fontSize:13, fontWeight:600, margin:"0 0 8px" }}>Routes that will be affected:</p>
                      {archiveConfirm.affectedRoutes.map(r => (
                        <div key={r.id} style={{ padding:"6px 10px", background:"#fef2f2", borderRadius:6, marginBottom:4, borderLeft:`3px solid ${COLORS.red}` }}>
                          <p style={{ margin:0, fontSize:13, fontWeight:600, color: COLORS.text }}>{r.name}</p>
                          <p style={{ margin:0, fontSize:11, color: COLORS.textMuted }}>Driver: {r.driver}</p>
                        </div>
                      ))}
                      <div style={{ display:"flex", gap:8, marginTop:16 }}>
                        <Btn onClick={() => {
                          const name = archiveConfirm.participant.name;
                          const affected = archiveConfirm.affectedRoutes;
                          setRoutes(prev => prev.map(r => ({
                            ...r,
                            clients: r.clients.map(c => c.name===name ? {...c, active:false, status:'archived', returnDate:''} : c)
                          })));
                          setArchiveConfirm(null);
                          setArchiveDone({ name, affectedRoutes: affected });
                        }} color={COLORS.red} style={{ flex:1, fontWeight:700 }}>
                          ✓ Proceed — Archive
                        </Btn>
                        <Btn outline onClick={() => setArchiveConfirm(null)} style={{ flex:1 }}>Cancel</Btn>
                      </div>
                    </Card>
                  </div>
                )}

                {/* Archive Done Modal — shows what was affected */}
                {archiveDone && (
                  <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                    <Card style={{ width:"100%", maxWidth:420 }}>
                      <div style={{ textAlign:"center", marginBottom:12 }}>
                        <p style={{ fontSize:36, margin:"0 0 4px" }}>✅</p>
                        <h3 style={{ color: COLORS.text, margin:0 }}>{archiveDone.name} Archived</h3>
                      </div>
                      <p style={{ color: COLORS.textDim, fontSize:13, margin:"0 0 10px" }}>Removed from the following routes:</p>
                      {archiveDone.affectedRoutes.map(r => (
                        <div key={r.id} style={{ padding:"6px 10px", background:"#f0fdf4", borderRadius:6, marginBottom:4, borderLeft:`3px solid ${COLORS.accent}` }}>
                          <p style={{ margin:0, fontSize:13, fontWeight:600, color: COLORS.text }}>{r.name} — {r.driver}</p>
                        </div>
                      ))}
                      <Btn onClick={() => setArchiveDone(null)} style={{ width:"100%", marginTop:14 }}>Done</Btn>
                    </Card>
                  </div>
                )}

                {/* Add Participant modal reuse */}
                {showAddClient && (
                  <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.45)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
                    <Card style={{ width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }}>
                      <h3 style={{ color: COLORS.text, margin:"0 0 16px" }}>Add New Participant</h3>
                      <Input label="Full Name *" value={newClient.name} onChange={e => setNewClient(p=>({...p,name:e.target.value}))} placeholder="e.g. Smith, John" />
                      <Input label="Home Address *" value={newClient.address} onChange={e => setNewClient(p=>({...p,address:e.target.value}))} placeholder="Participant's home address" />
                      <div style={{ background:"#eff6ff", borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
                        <p style={{ color: COLORS.blue, fontSize:12, fontWeight:700, margin:"0 0 8px" }}>📍 Day Program / Work Site</p>

// ============ REPORTS TAB COMPONENT ============
function ReportsTab({ logs, routes }) {
  const now = new Date();
  const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [selectedMonth, setSelectedMonth] = useState(defaultMonth);

  // Build list of months that have log data, plus current month
  const monthsWithData = [...new Set(logs.map(l => l.date ? l.date.slice(0,7) : null).filter(Boolean))];
  if (!monthsWithData.includes(defaultMonth)) monthsWithData.push(defaultMonth);
  monthsWithData.sort().reverse();

  const [year, month] = selectedMonth.split('-').map(Number);
  const monthName = new Date(year, month-1, 1).toLocaleString('en-US', {month:'long', year:'numeric'});
  const bizDays = buildBizDays(year, month);
  const monthLogs = logs.filter(l => l.date && l.date.startsWith(selectedMonth));

  // Summary stats for the selected month
  const routeStats = routes.map(route => {
    const rLogs = monthLogs.filter(l => l.routeId === route.id);
    const amDays = rLogs.filter(l => l.period === 'AM').length;
    const pmDays = rLogs.filter(l => l.period === 'PM').length;
    const totalMiles = rLogs.reduce((s, l) => s + (parseFloat(l.totalMiles) || 0), 0);
    return { route, amDays, pmDays, totalMiles };
  });

  const totalSubmissions = monthLogs.length;
  const totalMilesAll = routeStats.reduce((s, r) => s + r.totalMiles, 0);

  // Client attendance summary for the month
  const allClients = [];
  const seen = new Set();
  routes.forEach(route => {
    (route.clients || []).forEach(cl => {
      if (!seen.has(cl.name)) {
        allClients.push({ ...cl, routeName: route.name, routeId: route.id });
        seen.add(cl.name);
      }
    });
  });
  allClients.sort((a,b) => (a.name.split(', ')[0]||a.name).localeCompare(b.name.split(', ')[0]||b.name));

  const clientAttendance = allClients.map(cl => {
    let trips = 0, noShows = 0, absents = 0;
    bizDays.forEach(day => {
      const dateStr = day.toISOString().slice(0,10);
      const dayLogs = monthLogs.filter(l => l.date === dateStr && l.routeId === cl.routeId);
      dayLogs.forEach(l => {
        const status = l.clientStatuses && l.clientStatuses[cl.name];
        if (status === 'present') trips++;
        else if (status === 'noshow') noShows++;
        else if (status === 'absent') absents++;
      });
    });
    return { ...cl, trips, noShows, absents };
  });

  const handleDownloadKTS = () => {
    const blob = generateKTSTrackerBlob(monthLogs, routes, selectedMonth);
    if (blob) downloadBlob(blob, `KTS_Client_Tracker_${monthName.replace(' ','_')}.xlsx`);
  };

  const handleDownloadPriority = () => {
    const blob = generatePriorityTrackerBlob(monthLogs, selectedMonth);
    if (blob) downloadBlob(blob, `Priority_Transportation_Tracker_${monthName.replace(' ','_')}.xlsx`);
  };

  const handleDownloadHA0935 = () => {
    const blob = generateHA0935Blob(monthLogs, routes, selectedMonth);
    if (blob) downloadBlob(blob, `HA0935_Khan_Transportation_${monthName.replace(' ','_')}.xlsx`);
  };

  const handleDownloadHV0713 = () => {
    const blob = generateHV0713Blob(monthLogs, selectedMonth);
    if (blob) downloadBlob(blob, `HV0713_Priority_Transportation_${monthName.replace(' ','_')}.xlsx`);
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
        <h3 style={{ color: COLORS.text, margin: 0 }}>📥 Monthly Reports</h3>
        <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
          style={{ padding:'8px 12px', background: COLORS.card, border:`1px solid ${COLORS.border}`,
            borderRadius:8, color: COLORS.text, fontSize:13 }}>
          {monthsWithData.map(m => {
            const [y,mo] = m.split('-').map(Number);
            const label = new Date(y,mo-1,1).toLocaleString('en-US',{month:'long',year:'numeric'});
            return <option key={m} value={m}>{label}</option>;
          })}
        </select>
      </div>

      {/* Month Summary */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))', gap:8, marginBottom:16 }}>
        {[
          { label:'Submissions', value: totalSubmissions, color: COLORS.accent },
          { label:'Business Days', value: bizDays.length, color: COLORS.blue },
          { label:'Total Miles', value: totalMilesAll.toFixed(0), color: COLORS.yellow },

// ============ EXCEL EXPORT ENGINE ============
function buildBizDays(year, month) {
  const days = [];
  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    if (d.getDay() !== 0 && d.getDay() !== 6) days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

// All calendar days in a month (including weekends)
function getAllDays(year, month) {
  const days = [];
  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }
function dayAbbr(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }

// ── SheetJS cell style helpers ────────────────────────────────────────────────
function makeStyle(fill, fontBold, fontSz, fontColor, halign, numFmt) {
  return {
    fill: fill ? { fgColor: { rgb: fill }, patternType: 'solid' } : { patternType: 'none' },
    font: { name: 'Arial', sz: fontSz || 9, bold: !!fontBold, color: { rgb: fontColor || '000000' } },
    alignment: { horizontal: halign || 'center', vertical: 'center', wrapText: true },
    border: { top:{style:'thin',color:{rgb:'000000'}}, bottom:{style:'thin',color:{rgb:'000000'}},
              left:{style:'thin',color:{rgb:'000000'}}, right:{style:'thin',color:{rgb:'000000'}} },
    numFmt: numFmt || '',
  };
}

// Apply style to a SheetJS cell
function sc(cell, style) {
  if (cell) cell.s = style;
}

// Encode column letter safely
function col(n) { return XLSX.utils.encode_col(n); }

// Apply styles to a whole worksheet after building it from AOA
function styleRouteDetail(ws, allDays, numRoutes, year, month) {
  const GRAY = 'C0C0C0', YELLOW = 'FFFF99';
  const dataStartRow = 10; // 1-indexed, row 10 = first route row

  // Header row 9: Route #, Route Segment, day cols, Total
  const hdrStyle = makeStyle(GRAY, true, 9, '000000', 'center');
  for (let c = 0; c < allDays.length + 3; c++) {
    const addr = XLSX.utils.encode_cell({r: 8, c: c}); // row 9 = r:8
    if (ws[addr]) ws[addr].s = hdrStyle;
  }
  // Day abbreviation row 8
  for (let ci = 0; ci < allDays.length; ci++) {
    const d = allDays[ci];
    const addr = XLSX.utils.encode_cell({r: 7, c: 2 + ci}); // row 8 = r:7
    if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : 'D9E1F2', true, 8, '000000', 'center');
  }
  // Data rows
  for (let ri = 0; ri < numRoutes * 2; ri++) {
    const r = dataStartRow - 1 + ri; // 0-indexed
    // Label cols A, B
    const aAddr = XLSX.utils.encode_cell({r, c: 0});
    const bAddr = XLSX.utils.encode_cell({r, c: 1});
    if (ws[aAddr]) ws[aAddr].s = makeStyle(null, true, 9, '000000', 'center');
    if (ws[bAddr]) ws[bAddr].s = makeStyle(null, true, 9, '000000', 'left');
    // Day cols
    for (let ci = 0; ci < allDays.length; ci++) {
      const d = allDays[ci];
      const addr = XLSX.utils.encode_cell({r, c: 2 + ci});
      if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : YELLOW, false, 9, '000000', 'center');
    }
    // Total col
    const totAddr = XLSX.utils.encode_cell({r, c: 2 + allDays.length});
    if (ws[totAddr]) ws[totAddr].s = makeStyle(null, true, 9, '000000', 'center');
  }
  // Daily total row
  const dtR = dataStartRow - 1 + numRoutes * 2;
  for (let c = 0; c <= allDays.length + 2; c++) {
    const addr = XLSX.utils.encode_cell({r: dtR, c});
    if (ws[addr]) ws[addr].s = makeStyle(GRAY, true, 9, '000000', 'center');
  }
  // Summary rows (just style the value cells)
  const sr = dtR + 2;
  const valAddr = XLSX.utils.encode_cell({r: sr+2, c: 1}); // B
  if (ws[valAddr]) ws[valAddr].s = makeStyle(null, true, 9, '000000', 'right', '#,##0.00');
  const rateAddr = XLSX.utils.encode_cell({r: sr+3, c: 1});
  if (ws[rateAddr]) ws[rateAddr].s = makeStyle(YELLOW, true, 9, '000000', 'right', '$#,##0.00');
  const reimAddr = XLSX.utils.encode_cell({r: sr+4, c: 1});
  if (ws[reimAddr]) ws[reimAddr].s = makeStyle(null, true, 9, '000000', 'right', '$#,##0.00');
  const totValCol = 2 + allDays.length;
  const grandAddr = XLSX.utils.encode_cell({r: sr+7, c: totValCol});
  if (ws[grandAddr]) ws[grandAddr].s = makeStyle(YELLOW, true, 9, '000000', 'right', '$#,##0.00');
  const invoiceAddr = XLSX.utils.encode_cell({r: sr+8, c: totValCol});
  if (ws[invoiceAddr]) ws[invoiceAddr].s = makeStyle('F4B942', true, 11, '000000', 'right', '$#,##0.00');
}

function styleAttendance(ws, allDays, numClients) {
  const GRAY = 'C0C0C0', YELLOW = 'FFFF99', BLUE = '00B0F0';
  const HDR_ROW = 11; // 0-indexed row 11 = row 12 in sheet
  // Header row
  for (let c = 0; c < 6 + allDays.length + 4; c++) {
    const addr = XLSX.utils.encode_cell({r: HDR_ROW, c});
    if (ws[addr]) ws[addr].s = makeStyle(BLUE, true, 9, 'FFFFFF', 'center');
  }
  // Title row
  const titleAddr = XLSX.utils.encode_cell({r: 0, c: 0});
  if (ws[titleAddr]) ws[titleAddr].s = makeStyle('1F3864', true, 12, 'FFFFFF', 'center');
  // Data rows
  for (let ri = 0; ri < numClients; ri++) {
    const r = HDR_ROW + 1 + ri;
    // Fixed info cols
    for (let c = 0; c < 6; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (ws[addr]) ws[addr].s = makeStyle(null, c >= 4 ? true : false, 9, '000000', c <= 1 ? 'left' : 'center');
    }
    // Day cols
    for (let ci = 0; ci < allDays.length; ci++) {
      const d = allDays[ci];
      const addr = XLSX.utils.encode_cell({r, c: 6 + ci});
      if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : YELLOW, false, 9, '000000', 'center');
    }
    // Summary cols
    for (let c = 0; c < 4; c++) {
      const addr = XLSX.utils.encode_cell({r, c: 6 + allDays.length + c});
      if (ws[addr]) ws[addr].s = makeStyle(null, false, 9, '000000', 'center');
    }
  }
}

// ── MAIN KTS TRACKER GENERATOR ────────────────────────────────────────────────
function generateKTSTrackerBlob(logs, routes, monthYear) {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded. Check your internet connection.'); return null; }
  const [year, month] = monthYear.split('-').map(Number);
  const allDays = getAllDays(year, month);
  const bizDays = buildBizDays(year, month);
  const wb = XLSX.utils.book_new();
  const startDate = new Date(year, month-1, 1).toLocaleDateString('en-US', {month:'numeric',day:'numeric',year:'2-digit'});
  const monthLabel = new Date(year, month-1, 1).toLocaleString('en-US',{month:'long',year:'numeric'});

  // ── SHEET 1: Route Detail ──────────────────────────────────────────────────
  const rdData = [
    ['Khan Transportation - HA0935'],
    [startDate, '', '', 'Enter Format (Month/1/Year) ie: 6/1/12'],
    ['*Please fill in only the cells highlighted in yellow. The non-highlighted cells contain formulas to estimate totals based on contractual rates.'],
    [],
    ['875 Service Code:'],
    ['SS0 Vehicle Service Miles Breakdown (AM&PM)'],
    [],
    [' ', ' ', ...allDays.map(d => dayAbbr(d)), 'Total'],    // day abbr row
    ['Route #', 'Route Segment', ...allDays.map(d => d.getDate()), 'Total'],  // date number row
  ];

  const segRows = [];
  routes.forEach((route, rIdx) => {
    ['AM','PM'].forEach(period => {
      const row = [rIdx === 0 && period === 'AM' ? `Khan${rIdx+1}` : rIdx > 0 && period === 'AM' ? `Khan${rIdx+1}` : '', `${period} Segment`];
      allDays.forEach(day => {
        if (isWeekend(day)) { row.push(''); return; }
        const dateStr = day.toISOString().slice(0,10);
        const submitted = logs.some(l => (l.routeId===route.id||l.routeName===route.name) && l.date===dateStr && l.period===period);
        row.push(submitted ? 1 : '');
      });
      const rowIdx = rdData.length + 1;
      const wdayCols = allDays.map((d,ci) => isWeekend(d) ? null : col(2+ci)).filter(Boolean);
      row.push(wdayCols.length ? {f:`SUM(${wdayCols.map(c=>`${c}${rowIdx}`).join(',')})`} : 0);
      segRows.push(rdData.length + 1);
      rdData.push(row);
    });
  });

  // Daily total row
  const dtRowIdx = rdData.length + 1;
  const dtRow = ['Daily Total', ''];
  allDays.forEach((d, ci) => {
    if (isWeekend(d)) { dtRow.push(''); return; }
    const colL = col(2+ci);
    dtRow.push({f: segRows.map(r=>`${colL}${r}`).join('+')});
  });
  const totalColL = col(2 + allDays.length);
  dtRow.push({f:`SUM(C${dtRowIdx}:${col(1+allDays.length)}${dtRowIdx})`});
  rdData.push(dtRow);

  rdData.push([]);
  rdData.push(['Vehicle Service Mile Estimate']);
  rdData.push([]);
  const rateRow = rdData.length + 2;
  rdData.push(['', {f:`${totalColL}${dtRowIdx}`}, '', 'Total Vehicle Service Miles (total of all routes)']);
  rdData.push(['', 3.42, '', 'Contract Vehicle Service Mile Rate ($3.42/mile)']);
  rdData.push(['', {f:`B${rateRow-1}*B${rateRow}`}, '', 'Total Vehicle Service Mile Reimbursement']);
  rdData.push([]);
  rdData.push(['Total SS0 Vehicle Service Miles Reimbursement', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', {f:`B${rateRow+1}`}]);
  rdData.push(['Invoice Grand Total', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', {f:`B${rateRow+1}`}]);

  const wsRD = XLSX.utils.aoa_to_sheet(rdData);
  styleRouteDetail(wsRD, allDays, routes.length, year, month);
  wsRD['!cols'] = [{wch:12},{wch:14},...allDays.map(()=>({wch:5.5})),{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsRD, 'Route Detail');

  // ── SHEET 2: Daily Attendance Report ──────────────────────────────────────
  const allClients = [];
  const seen = new Set();
  routes.forEach(route => {
    (route.clients||[]).forEach(cl => {
      if (!seen.has(cl.name)) {
        const parts = cl.name.split(', ');
        allClients.push({...cl, lastName: parts[0]||cl.name, firstName: parts[1]||'', routeName: route.name, routeId: route.id, vehicleId: route.vehicleId||route.name});
        seen.add(cl.name);
      }
    });
  });
  allClients.sort((a,b)=>a.lastName.localeCompare(b.lastName));

  const arData = [
    ['Khan Transportation - HA0935 - 875'],
    [startDate],
    ['*Purpose: Log daily trips provided to each rider.'],
    ['*Instructions: Track attendance as follows:'],
    ['','','','','','','0 = Absent','','Reported by home'],
    ['','','','','','','1 = One Way'],
    ['','','','','','','2 = Round Trip'],
    ['','','','','','','NS = No Show','','No Contact/Notice'],
    ['','','','','','','C = Cancellation','','Cancelled at the door'],
    ['','','','','','','X = Vendor Cancellation','','Vendor Cancelled'],
    [],
    ['Daily Attendance Report'],
    ['#','First Name','Last Name','UCI','Route / Vehicle ID','Service Days',
     ...allDays.map(d => d.getDate()), 'Total Trips','No Shows','Cancellations','Vendor CXL'],
  ];

  allClients.forEach((cl, idx) => {
    const row = [idx+1, cl.firstName, cl.lastName, cl.uci||'', cl.vehicleId||cl.routeName, ''];
    allDays.forEach(day => {
      if (isWeekend(day)) { row.push(''); return; }
      const dateStr = day.toISOString().slice(0,10);
      const dayLogs = logs.filter(l=>l.date===dateStr&&(l.routeId===cl.routeId||l.routeName===cl.routeName));
      let code = '';
      if (dayLogs.length > 0) {
        const amLog = dayLogs.find(l=>l.period==='AM');
        const pmLog = dayLogs.find(l=>l.period==='PM');
        const amP = amLog?.clientStatuses?.[cl.name]==='present';
        const pmP = pmLog?.clientStatuses?.[cl.name]==='present';
        const ns = amLog?.clientStatuses?.[cl.name]==='noshow'||pmLog?.clientStatuses?.[cl.name]==='noshow';
        const c2 = amLog?.clientStatuses?.[cl.name]==='cancelled'||pmLog?.clientStatuses?.[cl.name]==='cancelled';
        if (amP&&pmP) code=2; else if (amP||pmP) code=1; else if (ns) code='NS'; else if (c2) code='C'; else code=0;
      }
      row.push(code);
    });
    const r = arData.length + 1;
    const wdCols = allDays.map((d,ci)=>isWeekend(d)?null:col(6+ci)).filter(Boolean);
    const rng = wdCols.length ? `${wdCols[0]}${r}:${wdCols[wdCols.length-1]}${r}` : null;
    row.push(rng ? {f:`SUMPRODUCT((${rng}=2)*2+(${rng}=1)*1)`} : 0);
    row.push(rng ? {f:`COUNTIF(${rng},"NS")`} : 0);
    row.push(rng ? {f:`COUNTIF(${rng},"C")`} : 0);
    row.push(rng ? {f:`COUNTIF(${rng},"X")`} : 0);
    arData.push(row);
  });

  const wsAR = XLSX.utils.aoa_to_sheet(arData);
  styleAttendance(wsAR, allDays, allClients.length);
  wsAR['!cols'] = [{wch:4},{wch:16},{wch:16},{wch:10},{wch:16},{wch:9},...allDays.map(()=>({wch:5.5})),{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsAR, 'Daily Attendance Report');

  // ── SHEET 3: Route Mileage ─────────────────────────────────────────────────
  const rmData = [
    ['Route Mileage Log — ' + monthLabel],
    [],
    ['Route','Driver',...allDays.flatMap(d=>[d.toLocaleDateString('en-US'),'','']),'Monthly Total'],
    [''     ,''      ,...allDays.flatMap(()=>['AM Miles','PM Miles','Day Total']),''],
  ];
  routes.forEach(route => {
    const row = [route.name, route.driver||''];
    allDays.forEach(day => {
      if (isWeekend(day)) { row.push('','',''); return; }
      const dateStr = day.toISOString().slice(0,10);
      const amLog = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='AM');
      const pmLog = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='PM');
      row.push(amLog?(parseFloat(amLog.totalMiles)||''):'', pmLog?(parseFloat(pmLog.totalMiles)||''):'', '');
    });
    row.push('');
    rmData.push(row);
  });
  const wsRM = XLSX.utils.aoa_to_sheet(rmData);
  // Style Route Mileage
  const rmHdr = makeStyle('C0C0C0', true, 9, '000000', 'center');
  ['A3','B3'].forEach(a => { if(wsRM[a]) wsRM[a].s = rmHdr; });
  allDays.forEach((d,ci) => {
    ['A','B','C'].map((_,j) => {
      const base = 2 + ci*3 + j;
      const addr = XLSX.utils.encode_cell({r:2,c:base+2});
      if(wsRM[addr]) wsRM[addr].s = makeStyle(isWeekend(d)?'C0C0C0':'D9E1F2',true,8,'000000','center');
    });
  });
  wsRM['!cols'] = [{wch:10},{wch:12},...allDays.flatMap(()=>[{wch:9},{wch:9},{wch:9}]),{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsRM, 'Route Mileage');

  // ── SHEET 4: Daily Total ───────────────────────────────────────────────────
  const dtData = [
    ['Daily Total Miles — ' + monthLabel],
    [],
    ['#','Client','Route',...allDays.map(d=>d.toLocaleDateString('en-US')),'Monthly Total'],
  ];
  allClients.forEach((cl,idx) => {
    const row = [idx+1, cl.name, cl.routeName||''];
    allDays.forEach(day => {
      if (isWeekend(day)) { row.push(''); return; }
      const dateStr = day.toISOString().slice(0,10);
      const dayLogs = logs.filter(l=>l.date===dateStr&&l.routeId===cl.routeId);
      let miles = '';
      dayLogs.forEach(l=>{ if(l.clientMiles?.[cl.name]) miles=(miles||0)+parseFloat(l.clientMiles[cl.name]); });
      row.push(miles);
    });
    row.push('');
    dtData.push(row);
  });
  const wsDT = XLSX.utils.aoa_to_sheet(dtData);
  // Style headers
  for (let c = 0; c < 3 + allDays.length + 1; c++) {
    const addr = XLSX.utils.encode_cell({r:2,c});
    if(wsDT[addr]) wsDT[addr].s = makeStyle('C0C0C0',true,9,'000000','center');
  }
  allClients.forEach((_,ri) => {
    allDays.forEach((d,ci) => {
      const addr = XLSX.utils.encode_cell({r:3+ri,c:3+ci});
      if(wsDT[addr]) wsDT[addr].s = makeStyle(isWeekend(d)?'C0C0C0':'FFFF99',false,9,'000000','center');
    });
  });
  wsDT['!cols'] = [{wch:4},{wch:26},{wch:12},...allDays.map(()=>({wch:7})),{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsDT, 'Daily Total');

  // ── SHEET 5: Client Tracker ────────────────────────────────────────────────
  const ctData = [['Client Tracker — ' + monthLabel],[],];
  routes.forEach(route => {
    ctData.push([route.name + ' — Driver: ' + (route.driver||''), '', '', ...allDays.flatMap(d=>[d.toLocaleDateString('en-US'),'',''])]);
    ctData.push(['#','Client','UCI',...allDays.flatMap(()=>['AM','PM','Total']),'Monthly Total']);
    (route.clients||[]).forEach((cl,ci2) => {
      const row = [ci2+1, cl.name, cl.uci||''];
      allDays.forEach(day => {
        if(isWeekend(day)){row.push('','','');return;}
        const dateStr = day.toISOString().slice(0,10);
        const amL = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='AM');
        const pmL = logs.find(l=>l.date===dateStr&&l.routeId===route.id&&l.period==='PM');
        row.push(amL?.clientMiles?.[cl.name]||'', pmL?.clientMiles?.[cl.name]||'', '');
      });
      row.push('');
      ctData.push(row);
    });
    ctData.push([]);
  });
  const wsCT = XLSX.utils.aoa_to_sheet(ctData);
  wsCT['!cols'] = [{wch:4},{wch:26},{wch:10},...allDays.flatMap(()=>[{wch:8},{wch:8},{wch:9}]),{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsCT, 'Client Tracker');

  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array', cellStyles:true});
  return new Blob([wbout], {type:'application/octet-stream'});
}

function generatePriorityTrackerBlob(logs, monthYear) {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded.'); return null; }
  const [year, month] = monthYear.split('-').map(Number);
  const allDays = getAllDays(year, month);
  const wb = XLSX.utils.book_new();
  const startDate = new Date(year,month-1,1).toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'});

  // Route Detail
  const rdData = [
    ['Priority Transportation HV0713'],
    [startDate,'','','Enter Format (Month/1/Year) ie: 6/1/12'],
    ['*Please fill in only the cells highlighted in yellow.'],
    [],['875 Service Code:'],['Vehicle Rate: 0V0'],[],
    [' ',' ',...allDays.map(d=>dayAbbr(d)),'Total'],
    ['Route #','Route Segment',...allDays.map(d=>d.getDate()),'Total'],
  ];
  const prRoutes = ['6770','6771','6772','6773','6774'];
  const segRows = [];
  prRoutes.forEach((rId,ri) => {
    ['AM Segment','PM Segment'].forEach((seg,si) => {
      const row = [si===0?rId:'', seg, ...allDays.map(d=>isWeekend(d)?'':''), ''];
      const rowIdx = rdData.length+1;
      const wdCols = allDays.map((d,ci)=>isWeekend(d)?null:col(2+ci)).filter(Boolean);
      if(wdCols.length) row[row.length-1] = {f:`SUM(${wdCols.map(c=>`${c}${rowIdx}`).join(',')})`};
      segRows.push(rdData.length+1);
      rdData.push(row);
    });
  });
  const dtR = rdData.length+1;
  const dtRow = ['Daily Total',''];
  allDays.forEach((d,ci)=>{ if(isWeekend(d)){dtRow.push('');return;} dtRow.push({f:segRows.map(r=>`${col(2+ci)}${r}`).join('+')}); });
  dtRow.push({f:`SUM(C${dtR}:${col(1+allDays.length)}${dtR})`});
  rdData.push(dtRow);
  rdData.push([]);rdData.push(['Vehicle Rate Estimate']);rdData.push([]);
  const tl=col(2+allDays.length);
  rdData.push(['',{f:`${tl}${dtR}`},'','Total Vehicle Units']);
  rdData.push(['',166.94,'','Vehicle Unit Rate ($166.94)']);
  rdData.push(['',{f:`B${rdData.length}*B${rdData.length+1}`},'','Total Vehicle Reimbursement']);
  const wsRD = XLSX.utils.aoa_to_sheet(rdData);
  styleRouteDetail(wsRD, allDays, prRoutes.length, year, month);
  wsRD['!cols']=[{wch:12},{wch:14},...allDays.map(()=>({wch:5.5})),{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsRD, 'Route Detail');

  // Daily Attendance Report (blank template)
  const arData2=[['Priority Transportation HV0713 - 875'],[startDate],
    ['*Purpose: Log daily trips.'],['*Instructions:'],
    ['','','','','','','0 = Absent','','Reported by home'],
    ['','','','','','','1 = One Way'],['','','','','','','2 = Round Trip'],
    ['','','','','','','NS = No Show','','No Contact/Notice'],
    ['','','','','','','C = Cancellation','','Cancelled at the door'],
    ['','','','','','','X = Vendor Cancellation','','Vendor Cancelled'],
    [],['Daily Attendance Report'],
    ['#','First Name','Last Name','UCI','Route / Vehicle ID','Service Days',
     ...allDays.map(d=>d.getDate()),'Total Trips','No Shows','Cancellations','Vendor CXL'],
  ];
  for(let i=0;i<30;i++){
    const r=arData2.length+1;
    const wdCols=allDays.map((d,ci)=>isWeekend(d)?null:col(6+ci)).filter(Boolean);
    const rng=wdCols.length?`${wdCols[0]}${r}:${wdCols[wdCols.length-1]}${r}`:null;
    arData2.push([i+1,'','','','','',
      ...allDays.map(d=>isWeekend(d)?'':''),
      rng?{f:`SUMPRODUCT((${rng}=2)*2+(${rng}=1)*1)`}:0,
      rng?{f:`COUNTIF(${rng},"NS")`}:0,
      rng?{f:`COUNTIF(${rng},"C")`}:0,
      rng?{f:`COUNTIF(${rng},"X")`}:0,
    ]);
  }
  const wsAR2=XLSX.utils.aoa_to_sheet(arData2);
  styleAttendance(wsAR2, allDays, 30);
  wsAR2['!cols']=[{wch:4},{wch:16},{wch:16},{wch:10},{wch:14},{wch:9},...allDays.map(()=>({wch:5.5})),{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsAR2, 'Daily Attendance Report');

  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});
  return new Blob([wbout],{type:'application/octet-stream'});
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

// ============ MAIN APP ============
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [routes, setRoutes] = useState(() => {
    try { const s = localStorage.getItem('kts_routes'); return s ? JSON.parse(s) : ROUTES_DEFAULT; } catch(e) { return ROUTES_DEFAULT; }
  });
  const [users, setUsers] = useState(() => {
    try { const s = localStorage.getItem('kts_users'); return s ? JSON.parse(s) : USERS_DEFAULT; } catch(e) { return USERS_DEFAULT; }
  });
  const [logs, setLogs] = useState(() => {
    try { const s = localStorage.getItem('kts_logs'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [inspections, setInspections] = useState(() => {
    try { const s = localStorage.getItem('kts_inspections'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [appMode, setAppMode] = useState("dashboard");

  // Password change state
  const [showChangePw, setShowChangePw] = useState(false);
  const [pwForm, setPwForm] = useState({ current: '', newPw: '', confirm: '' });
  const [pwError, setPwError] = useState('');
  const [pwSuccess, setPwSuccess] = useState(false);

  // Persist to localStorage
  useEffect(() => { try { localStorage.setItem('kts_routes', JSON.stringify(routes)); } catch(e) {} }, [routes]);
  useEffect(() => { try { localStorage.setItem('kts_users', JSON.stringify(users)); } catch(e) {} }, [users]);
  useEffect(() => { try { localStorage.setItem('kts_logs', JSON.stringify(logs)); } catch(e) {} }, [logs]);
  useEffect(() => { try { localStorage.setItem('kts_inspections', JSON.stringify(inspections)); } catch(e) {} }, [inspections]);

  // Auto-download previous month when a new month starts
  useEffect(() => {
    if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'manager')) return;
    const now = new Date();
    const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    try {
      const lastAutoDownload = localStorage.getItem('kts_last_auto_download');
      if (lastAutoDownload && lastAutoDownload !== currentMonthKey) {
        const prevMonthLogs = logs.filter(l => l.date && l.date.startsWith(lastAutoDownload));
        if (prevMonthLogs.length > 0) {
          const [py, pm] = lastAutoDownload.split('-').map(Number);
          const monthName = new Date(py, pm-1, 1).toLocaleString('en-US',{month:'long',year:'numeric'});
          setTimeout(() => {
            if (window.confirm(`📅 New month detected! Auto-download ${monthName} reports now?`)) {
              const ktsBlob = generateKTSTrackerBlob(prevMonthLogs, routes, lastAutoDownload);
              if (ktsBlob) downloadBlob(ktsBlob, `KTS_Client_Tracker_${monthName.replace(' ','_')}.xlsx`);
              const ptBlob = generatePriorityTrackerBlob(prevMonthLogs, lastAutoDownload);
              if (ptBlob) downloadBlob(ptBlob, `Priority_Transportation_${monthName.replace(' ','_')}.xlsx`);
            }
          }, 1500);
        }
      }
      localStorage.setItem('kts_last_auto_download', currentMonthKey);
    } catch(e) {}
  }, [currentUser]);

  const handleLogin = (user) => {
    setCurrentUser(user);
    setAppMode(user.role === "driver" ? "field" : "dashboard");
  };
  const handleLogout = () => { setCurrentUser(null); setAppMode("dashboard"); };
  const handleLogSubmit = (data) => {
    setLogs(prev => [...prev, { ...data, date: data.date || new Date().toISOString().slice(0,10), submittedAt: new Date().toISOString() }]);
  };
  const handleInspectionComplete = (data) => setInspections(prev => [...prev, data]);

  const handleChangePassword = () => {
    setPwError('');
    setPwSuccess(false);
    if (!pwForm.current || !pwForm.newPw || !pwForm.confirm) { setPwError('All fields are required.'); return; }
    const userRecord = users.find(u => u.id === currentUser.id);
    if (!userRecord || userRecord.password !== pwForm.current) { setPwError('Current password is incorrect.'); return; }
    if (pwForm.newPw.length < 6) { setPwError('New password must be at least 6 characters.'); return; }
    if (pwForm.newPw !== pwForm.confirm) { setPwError('New passwords do not match.'); return; }
    setUsers(prev => prev.map(u => u.id === currentUser.id ? { ...u, password: pwForm.newPw } : u));
    setPwSuccess(true);
    setPwForm({ current: '', newPw: '', confirm: '' });
    setTimeout(() => { setShowChangePw(false); setPwSuccess(false); }, 1500);
  };

  if (!currentUser) return <LoginScreen onLogin={handleLogin} users={users} />;

  const isAdminOrMgr = currentUser.role === "admin" || currentUser.role === "manager";

  // Password change modal — available to everyone
  const ChangePasswordModal = () => (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:500,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <Card style={{ width:"100%", maxWidth:380 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <h3 style={{ color: COLORS.text, margin:0 }}>🔑 Change Password</h3>
          <button onClick={() => { setShowChangePw(false); setPwForm({current:'',newPw:'',confirm:''}); setPwError(''); setPwSuccess(false); }}
            style={{ background:"none", border:"none", color: COLORS.textMuted, fontSize:20, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
        <p style={{ color: COLORS.textDim, fontSize:12, margin:"0 0 14px" }}>Logged in as: <strong>{currentUser.name}</strong> (@{currentUser.username})</p>
        {pwSuccess ? (
          <div style={{ textAlign:"center", padding:"20px 0" }}>
            <p style={{ fontSize:32, margin:"0 0 8px" }}>✅</p>
            <p style={{ color:"#166534", fontWeight:700, fontSize:15, margin:0 }}>Password updated!</p>
          </div>
        ) : (
          <>
            <Input label="Current Password *" type="password" value={pwForm.current}
              onChange={e => setPwForm(p=>({...p,current:e.target.value}))} placeholder="Enter current password" />
            <Input label="New Password *" type="password" value={pwForm.newPw}
              onChange={e => setPwForm(p=>({...p,newPw:e.target.value}))} placeholder="At least 6 characters" />
            <Input label="Confirm New Password *" type="password" value={pwForm.confirm}
              onChange={e => setPwForm(p=>({...p,confirm:e.target.value}))} placeholder="Repeat new password" />
            {pwError && <p style={{ color: COLORS.red, fontSize:12, margin:"0 0 10px", background:"#fff0f0", padding:"8px 10px", borderRadius:6 }}>{pwError}</p>}
            <Btn onClick={handleChangePassword} style={{ width:"100%" }}>Update Password</Btn>
          </>
        )}
      </Card>
    </div>
  );

  // Bottom nav
  const BottomNav = () => (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0, background: COLORS.card,
      borderTop: `1px solid ${COLORS.border}`, padding: "6px 12px", display: "flex",
      justifyContent: "space-around", zIndex: 100, boxShadow: "0 -2px 8px rgba(0,0,0,0.06)",
    }}>
      {isAdminOrMgr && (
        <button onClick={() => setAppMode("dashboard")} style={{
          background: "none", border: "none", color: appMode === "dashboard" ? COLORS.accent : COLORS.textMuted,
          fontSize: 11, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          fontWeight: appMode === "dashboard" ? 700 : 400,
        }}>
          <span style={{ fontSize: 18 }}>📊</span>Dashboard
        </button>
      )}
      {isAdminOrMgr && (
        <button onClick={() => setAppMode("field")} style={{
          background: "none", border: "none", color: appMode === "field" ? COLORS.accent : COLORS.textMuted,
          fontSize: 11, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          fontWeight: appMode === "field" ? 700 : 400,
        }}>
          <span style={{ fontSize: 18 }}>🚐</span>Field Mode
        </button>
      )}
      <button onClick={() => { setShowChangePw(true); setPwForm({current:'',newPw:'',confirm:''}); setPwError(''); }} style={{
        background: "none", border: "none", color: COLORS.textMuted, fontSize: 11, cursor: "pointer",
        display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
      }}>
        <span style={{ fontSize: 18 }}>🔑</span>Password
      </button>
      <button onClick={handleLogout} style={{
        background: "none", border: "none", color: COLORS.textMuted, fontSize: 11, cursor: "pointer",
        display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
      }}>
        <span style={{ fontSize: 18 }}>🚪</span>Logout
      </button>
    </div>
  );

  if (currentUser.role === "driver") {
    return (
      <>
        <DriverDashboard user={currentUser} routes={routes} onSubmit={handleLogSubmit} onInspectionComplete={handleInspectionComplete} />
        <BottomNav />
        {showChangePw && <ChangePasswordModal />}
      </>
    );
  }

  return (
    <>
      {appMode === "dashboard" ? (
        <AdminDashboard user={currentUser} routes={routes} setRoutes={setRoutes} users={users} setUsers={setUsers} logs={logs} />
      ) : (
        <DriverDashboard user={currentUser} routes={routes} onSubmit={handleLogSubmit} onInspectionComplete={handleInspectionComplete} />
      )}
      <BottomNav />
      {showChangePw && <ChangePasswordModal />}
    </>
  );
}

    function runApp() {
      try {
        var src = document.getElementById('app-source').textContent;
        var compiled = Babel.transform(src, { presets: ['react'] }).code;
        var script = document.createElement('script');
        script.textContent = compiled;
        document.body.appendChild(script);
      } catch(e) {
        document.getElementById('loading').innerHTML = '<p style="color:red;padding:20px">Compile error: ' + e.message + '</p>';
      }
    }
    function waitForBabel(attempts) {
      if (typeof Babel !== 'undefined' && typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
        runApp();
      } else if (attempts > 0) {
        setTimeout(function() { waitForBabel(attempts - 1); }, 200);
      } else {
        document.getElementById('loading').innerHTML = '<p style="color:red;padding:20px;text-align:center">Failed to load required libraries. Check your internet connection and refresh.</p>';
      }
    }
    waitForBabel(50); // try for up to 10 seconds
  </script>
