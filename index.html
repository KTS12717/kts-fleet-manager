// ============ CALENDAR TAB COMPONENT ============
function CalendarTab({ routes, users, absences, setAbsences, timeOffRequests, setTimeOffRequests, activeCompany = 'sst', currentUser }) {
  const today = new Date();
  const [viewDate, setViewDate] = useState(today);
  const [showAbsenceModal, setShowAbsenceModal] = useState(false);
  const [showTimeOffModal, setShowTimeOffModal] = useState(false);
  const [editAbsence, setEditAbsence] = useState(null);
  const [viewMode, setViewMode] = useState("month"); // "month" | "list"

  // Company-isolation filtering: the `routes` prop is already filtered to the active company.
  // Filter absences, time-off requests, and driver list so only entries tied to this company show up.
  const companyRouteIdsSet = new Set((routes || []).map(r => r.id));
  const companyDriverNames = new Set((routes || []).map(r => String(r.driver || '').trim().toLowerCase()).filter(Boolean));
  const filteredAbsences = (absences || []).filter(a => {
    // Absences tied to a route → include if route is in active company
    if (a.routeId) return companyRouteIdsSet.has(a.routeId);
    // Absences tied to a driver by name → include if driver drives a company route
    if (a.driverName) return companyDriverNames.has(String(a.driverName || '').trim().toLowerCase());
    return false;
  });
  const filteredTimeOffRequests = (timeOffRequests || []).filter(t => {
    if (t.driverId) {
      const u = (users || []).find(u => u.id === t.driverId);
      if (u) return companyDriverNames.has(String(u.name || '').trim().toLowerCase());
    }
    if (t.driverName) return companyDriverNames.has(String(t.driverName || '').trim().toLowerCase());
    return false;
  });
  const companyDrivers = (users || []).filter(u => {
    if (u.role !== 'driver') return true; // show non-driver users in the modal driver-picker too (none exist, but safe)
    return companyDriverNames.has(String(u.name || '').trim().toLowerCase());
  });

  // New absence form
  const blankAbsence = { clientName:"", routeId:"", startDate:"", endDate:"", type:"vacation", reason:"", allDay:true, note:"" };
  const [absForm, setAbsForm] = useState(blankAbsence);

  // New time-off form (manager adding on behalf of driver, or approval)
  const blankTO = { driverName:"", driverId:"", startDate:"", endDate:"", reason:"", status:"pending", note:"" };
  const [toForm, setToForm] = useState(blankTO);

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthName = viewDate.toLocaleString('en-US', { month:'long', year:'numeric' });

  // Build calendar grid
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = today.toISOString().slice(0,10);

  // All participants across all routes (deduplicated)
  const allParticipants = [];
  const seen = new Set();
  routes.forEach(r => (r.clients||[]).forEach(c => {
    if (!seen.has(c.name)) { allParticipants.push({ ...c, routeId: r.id, routeName: r.name }); seen.add(c.name); }
  }));
  const drivers = companyDrivers.filter(u => u.role === "driver");

  // Get events for a specific date string
  const getEventsForDate = (dateStr) => {
    const abs = filteredAbsences.filter(a => dateStr >= a.startDate && dateStr <= (a.endDate || a.startDate));
    const tos = filteredTimeOffRequests.filter(r => dateStr >= r.startDate && dateStr <= (r.endDate || r.startDate));
    return { absences: abs, timeOff: tos };
  };

  const saveAbsence = () => {
    if (!absForm.clientName || !absForm.startDate) return alert("Client and start date are required");
    const end = absForm.endDate || absForm.startDate;
    const participant = allParticipants.find(p => p.name === absForm.clientName);
    const entry = {
      id: editAbsence?.id || `abs_${Date.now()}`,
      clientName: absForm.clientName,
      routeId: participant?.routeId || absForm.routeId,
      routeName: participant?.routeName || "",
      startDate: absForm.startDate,
      endDate: end,
      type: absForm.type,
      reason: absForm.reason,
      allDay: true,
      note: absForm.note,
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    if (editAbsence) {
      setAbsences(prev => prev.map(a => a.id === editAbsence.id ? entry : a));
    } else {
      setAbsences(prev => [...prev, entry]);
    }
    setAbsForm(blankAbsence);
    setEditAbsence(null);
    setShowAbsenceModal(false);
  };

  const saveTimeOff = () => {
    if (!toForm.driverName || !toForm.startDate) return alert("Driver and start date are required");
    const driver = drivers.find(d => d.name === toForm.driverName);
    const entry = {
      id: `to_${Date.now()}`,
      driverName: toForm.driverName,
      driverId: driver?.id || "",
      startDate: toForm.startDate,
      endDate: toForm.endDate || toForm.startDate,
      reason: toForm.reason,
      status: toForm.status || "approved",
      note: toForm.note,
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    setTimeOffRequests(prev => [...prev, entry]);
    setToForm(blankTO);
    setShowTimeOffModal(false);
  };

  const deleteAbsence = (id) => {
    if (!confirm("Remove this absence?")) return;
    setAbsences(prev => prev.filter(a => a.id !== id));
  };

  const updateTimeOffStatus = (id, status) => {
    setTimeOffRequests(prev => prev.map(r => r.id === id ? { ...r, status } : r));
  };

  const ABSENCE_COLORS = { vacation:"#3b82f6", sick:"#ef4444", appointment:"#f59e0b", other:"#8b5cf6" };
  const TO_COLORS = { pending:"#f59e0b", approved:"#22c55e", denied:"#ef4444" };

  return (
    <div>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <h3 style={{ color: COLORS.text, margin:0 }}>🗓️ Calendar</h3>
        <div style={{ display:"flex", gap:6 }}>
          <Btn small outline onClick={() => setViewMode(viewMode==="month"?"list":"month")}>
            {viewMode==="month" ? "📋 List" : "📅 Month"}
          </Btn>
          <Btn small onClick={() => { setAbsForm(blankAbsence); setEditAbsence(null); setShowAbsenceModal(true); }}>
            + Participant Out
          </Btn>
          <Btn small color={COLORS.blue} onClick={() => { setToForm(blankTO); setShowTimeOffModal(true); }}>
            + Driver Time Off
          </Btn>
        </div>
      </div>

      {/* Month nav */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
        <button onClick={() => setViewDate(new Date(year, month-1, 1))}
          style={{ background:"none", border:`1px solid ${COLORS.border}`, borderRadius:8, padding:"6px 12px",
            cursor:"pointer", color:COLORS.text, fontSize:16 }}>‹</button>
        <div style={{ textAlign:"center" }}>
          <p style={{ color:COLORS.text, fontSize:16, fontWeight:800, margin:0 }}>{monthName}</p>
          {viewDate.getMonth() !== today.getMonth() || viewDate.getFullYear() !== today.getFullYear() ? (
            <button onClick={() => setViewDate(today)} style={{ background:"none", border:"none",
              color:COLORS.accent, fontSize:11, cursor:"pointer", padding:0 }}>← Today</button>
          ) : null}
        </div>
        <button onClick={() => setViewDate(new Date(year, month+1, 1))}
          style={{ background:"none", border:`1px solid ${COLORS.border}`, borderRadius:8, padding:"6px 12px",
            cursor:"pointer", color:COLORS.text, fontSize:16 }}>›</button>
      </div>

      {viewMode === "month" ? (
        /* ── MONTH GRID ─────────────────────────────────────────────── */
        <Card style={{ padding:0, overflow:"hidden" }}>
          {/* Day headers */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", background:COLORS.bg }}>
            {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
              <div key={d} style={{ textAlign:"center", padding:"6px 2px", fontSize:11, fontWeight:700,
                color:COLORS.textMuted, borderBottom:`1px solid ${COLORS.border}` }}>{d}</div>
            ))}
          </div>
          {/* Calendar cells */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
            {/* Empty cells before month start */}
            {Array.from({length:firstDay}).map((_,i) => (
              <div key={`e${i}`} style={{ minHeight:72, borderRight:`1px solid ${COLORS.border}`,
                borderBottom:`1px solid ${COLORS.border}`, background:"#fafafa" }} />
            ))}
            {/* Day cells */}
            {Array.from({length:daysInMonth}).map((_,i) => {
              const day = i+1;
              const d = new Date(year, month, day);
              const dateStr = d.toISOString().slice(0,10);
              const isToday = dateStr === todayStr;
              const isWeekendDay = d.getDay()===0||d.getDay()===6;
              const { absences: dayAbs, timeOff: dayTO } = getEventsForDate(dateStr);
              const totalEvents = dayAbs.length + dayTO.length;

              return (
                <div key={day} style={{
                  minHeight:72, borderRight:`1px solid ${COLORS.border}`, borderBottom:`1px solid ${COLORS.border}`,
                  padding:"4px 3px", background: isWeekendDay ? "#fafafa" : "transparent",
                  position:"relative",
                }}>
                  {/* Day number */}
                  <div style={{ display:"flex", justifyContent:"center", marginBottom:3 }}>
                    <span style={{
                      width:22, height:22, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:12, fontWeight: isToday ? 800 : 400,
                      background: isToday ? COLORS.accent : "transparent",
                      color: isToday ? "#fff" : isWeekendDay ? COLORS.textMuted : COLORS.text,
                    }}>{day}</span>
                  </div>

// ============ REPORTS TAB COMPONENT ============

const ATTENDANCE_NOTICE_HOURS = 168; // 1 week (7 days)

function getRouteCompany(route) {
  if (!route) return 'SST';
  if (['r11','r12'].includes(route.id)) return 'Priority';
  const vehicle = normalizeVehicleNumber(route.vehicleId || '');
  if (vehicle === 'P-1' || vehicle === 'P-19') return 'Priority';
  return 'SST';
}
function getLogDateKey(log) {
  if (!log) return '';
  const submitted = log.submittedAt ? String(log.submittedAt).slice(0,10) : '';
  if (submitted && /^\d{4}-\d{2}-\d{2}$/.test(submitted)) return submitted;
  const raw = String(log.date || '').trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0,10);
  const parsed = new Date(raw);
  if (!isNaN(parsed.getTime())) return parsed.toISOString().slice(0,10);
  return '';
}
function getLogDateObject(log) {
  const iso = getLogDateKey(log);
  if (!iso) return null;
  if (log?.submittedAt) {
    const submitted = new Date(log.submittedAt);
    if (!isNaN(submitted.getTime())) return submitted;
  }
  const dt = new Date(`${iso}T12:00:00`);
  return isNaN(dt.getTime()) ? null : dt;
}
function getLogPeriodKey(log) {
  const p = String(log?.period || '').toLowerCase();
  if (p === 'am' || p === 'pm') return p;
  if (p.includes('a')) return 'am';
  if (p.includes('p')) return 'pm';
  return '';
}
function getLogMiles(log) {
  const explicit = parseFloat(log?.totalMiles);
  if (!isNaN(explicit) && explicit > 0) return explicit;
  const start = parseFloat(log?.startOdo);
  const end = parseFloat(log?.endOdo);
  if (!isNaN(start) && !isNaN(end) && end >= start) return end - start;
  return 0;
}
function getClientStatusFromLog(log, clientName) {
  if (!log || !clientName) return '';
  if (log.clientStatuses && log.clientStatuses[clientName]) return String(log.clientStatuses[clientName]).toLowerCase();
  const period = getLogPeriodKey(log) || 'am';
  if (log.clientStatus && Object.prototype.hasOwnProperty.call(log.clientStatus, `${period}_${clientName}`)) {
    const val = log.clientStatus[`${period}_${clientName}`];
    // New 3-state string values
    if (val === 'ns')      return 'noshow';
    if (val === 'absent')  return 'absent';
    if (val === 'present') return 'present';
    // Legacy boolean values
    if (val === false) {
      if (log.calledOut?.[clientName]) {
        // Preserve specific callout type: 'C' = cancellation, '0' = absent
        const coType = log.calledOut[clientName];
        return coType === '0' ? 'absent' : 'cancelled';
      }
      return 'absent';
    }
    if (val === true)  return 'present';
    return 'present';
  }
  if (log.calledOut?.[clientName]) return 'cancelled';
  return '';
}
function getAttendanceCorrectionMap(corrections = []) {
  const map = {};
  (corrections || []).forEach(c => {
    const key = `${c.date}|${c.routeId}|${c.period}|${c.clientName}`;
    map[key] = c;
  });
  return map;
}
function buildAttendanceTrackerRows({ logs, routes, corrections = [] }) {
  const routeMap = Object.fromEntries((routes || []).map(r => [r.id, r]));
  const correctionMap = getAttendanceCorrectionMap(corrections);
  const rows = [];
  (logs || []).forEach(log => {
    const route = routeMap[log.routeId] || (routes || []).find(r => r.name === log.route || r.vehicleId === log.vehicleId);
    if (!route) return;
    const dateKey = getLogDateKey(log);
    const period = getLogPeriodKey(log) || 'am';
    (route.clients || []).forEach(client => {
      const originalStatus = getClientStatusFromLog(log, client.name) || 'present';
      const correctionKey = `${dateKey}|${route.id}|${period}|${client.name}`;
      const correction = correctionMap[correctionKey];
      const finalStatus = correction?.newStatus || originalStatus;
      rows.push({
        date: dateKey,
        period,
        company: getRouteCompany(route),
        routeId: route.id,
        routeName: route.name,
        vehicleNumber: normalizeVehicleNumber(route.vehicleId),
        driver: route.driver,
        clientName: client.name,
        originalStatus,
        finalStatus,
        corrected: !!correction,
        correctedBy: correction?.correctedBy || '',
        correctedAt: correction?.correctedAt || '',
        notes: correction?.notes || '',
      });
    });
  });
  return rows;
}
function buildOngoingAttendanceSummary({ logs, routes, corrections = [] }) {
  const rows = buildAttendanceTrackerRows({ logs, routes, corrections });
  const summary = {};
  rows.forEach(row => {
    const key = `${row.vehicleNumber}|${row.clientName}`;
    if (!summary[key]) {
      summary[key] = {
        company: row.company,
        vehicleNumber: row.vehicleNumber,
        clientName: row.clientName,
        presentTrips: 0,
        notAttended: 0,
        correctedPickups: 0,
        lastActivity: '',
      };
    }
    if (row.finalStatus === 'present') summary[key].presentTrips += 1;
    if (['absent','cancelled','noshow'].includes(row.finalStatus)) summary[key].notAttended += 1;
    if (row.corrected && row.finalStatus === 'present') summary[key].correctedPickups += 1;
    if (row.date && (!summary[key].lastActivity || row.date > summary[key].lastActivity)) summary[key].lastActivity = row.date;
  });
  return Object.values(summary).sort((a,b) => {
    if (a.company !== b.company) return a.company.localeCompare(b.company);
    if (a.vehicleNumber !== b.vehicleNumber) return a.vehicleNumber.localeCompare(b.vehicleNumber, undefined, { numeric:true });
    return a.clientName.localeCompare(b.clientName);
  });
}
function getActiveAbsentNoticeEntries({ logs, routes, vehicleRegistry = [], corrections = [], now = new Date(), hoursWindow = ATTENDANCE_NOTICE_HOURS }) {
  const routeMap = Object.fromEntries((routes || []).map(r => [r.id, r]));
  const vehicleMap = Object.fromEntries((vehicleRegistry || []).map(v => [normalizeVehicleNumber(v.vehicleNumber), v]));
  const correctionMap = getAttendanceCorrectionMap(corrections);
  const notices = [];
  (logs || []).forEach(log => {
    const route = routeMap[log.routeId] || (routes || []).find(r => r.name === log.route || r.vehicleId === log.vehicleId);
    if (!route) return;
    const logDateObj = getLogDateObject(log);
    if (!logDateObj) return;
    const ageHours = (now.getTime() - logDateObj.getTime()) / 36e5;
    if (ageHours < 0 || ageHours > hoursWindow) return;
    const dateKey = getLogDateKey(log);
    const period = getLogPeriodKey(log) || 'am';
    const vehicleNumber = normalizeVehicleNumber(route.vehicleId);
    const vehicle = vehicleMap[vehicleNumber] || {};
    (route.clients || []).forEach(client => {
      const originalStatus = getClientStatusFromLog(log, client.name) || 'present';
      if (!['absent','cancelled','noshow'].includes(originalStatus)) return;
      const correctionKey = `${dateKey}|${route.id}|${period}|${client.name}`;
      const correction = correctionMap[correctionKey];
      const finalStatus = correction?.newStatus || originalStatus;
      if (finalStatus === 'present') return;
      notices.push({
        key: correctionKey,
        date: dateKey,
        routeId: route.id,
        routeName: route.name,
        vehicleNumber,
        vin: vehicle.vin || '',
        driver: route.driver,
        company: getRouteCompany(route),
        clientName: client.name,
        period,
        status: originalStatus,
        ageHours,
      });
    });
  });
  return notices.sort((a,b) => a.date === b.date ? a.clientName.localeCompare(b.clientName) : b.date.localeCompare(a.date));
}

// ─── Excel Helpers ────────────────────────────────────────────────────────────

function buildBizDays(year, month) {
  const days = [];
  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    if (d.getDay() !== 0 && d.getDay() !== 6) days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function getAllDays(year, month) {
  const days = [];
  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }
function dayAbbr(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }

function makeStyle(fill, fontBold, fontSz, fontColor, halign, numFmt) {
  return {
    fill: fill ? { fgColor: { rgb: fill }, patternType: 'solid' } : { patternType: 'none' },
    font: { name: 'Arial', sz: fontSz || 9, bold: !!fontBold, color: { rgb: fontColor || '000000' } },
    alignment: { horizontal: halign || 'center', vertical: 'center', wrapText: true },
    border: { top:{style:'thin',color:{rgb:'000000'}}, bottom:{style:'thin',color:{rgb:'000000'}},
              left:{style:'thin',color:{rgb:'000000'}}, right:{style:'thin',color:{rgb:'000000'}} },
    numFmt: numFmt || '',
  };
}

function sc(cell, style) { if (cell) cell.s = style; }
function col(n) { return XLSX.utils.encode_col(n); }

function styleRouteDetail(ws, allDays, numRoutes, year, month) {
  const GRAY = 'C0C0C0', YELLOW = 'FFFF99';
  const dataStartRow = 10;
  const hdrStyle = makeStyle(GRAY, true, 9, '000000', 'center');
  for (let c = 0; c < allDays.length + 3; c++) {
    const addr = XLSX.utils.encode_cell({r: 8, c: c});
    if (ws[addr]) ws[addr].s = hdrStyle;
  }
  for (let ci = 0; ci < allDays.length; ci++) {
    const d = allDays[ci];
    const addr = XLSX.utils.encode_cell({r: 7, c: 2 + ci});
    if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : 'D9E1F2', true, 8, '000000', 'center');
  }
  for (let ri = 0; ri < numRoutes * 2; ri++) {
    const r = dataStartRow - 1 + ri;
    const aAddr = XLSX.utils.encode_cell({r, c: 0});
    const bAddr = XLSX.utils.encode_cell({r, c: 1});
    if (ws[aAddr]) ws[aAddr].s = makeStyle(null, true, 9, '000000', 'center');
    if (ws[bAddr]) ws[bAddr].s = makeStyle(null, true, 9, '000000', 'left');
    for (let ci = 0; ci < allDays.length; ci++) {
      const d = allDays[ci];
      const addr = XLSX.utils.encode_cell({r, c: 2 + ci});
      if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : YELLOW, false, 9, '000000', 'center');
    }
    const totAddr = XLSX.utils.encode_cell({r, c: 2 + allDays.length});
    if (ws[totAddr]) ws[totAddr].s = makeStyle(null, true, 9, '000000', 'center');
  }
  const dtR = dataStartRow - 1 + numRoutes * 2;
  for (let c = 0; c <= allDays.length + 2; c++) {
    const addr = XLSX.utils.encode_cell({r: dtR, c});
    if (ws[addr]) ws[addr].s = makeStyle(GRAY, true, 9, '000000', 'center');
  }
}

function styleAttendance(ws, allDays, numClients) {
  const GRAY = 'C0C0C0', YELLOW = 'FFFF99', BLUE = '00B0F0';
  const HDR_ROW = 11;
  for (let c = 0; c < 6 + allDays.length + 4; c++) {
    const addr = XLSX.utils.encode_cell({r: HDR_ROW, c});
    if (ws[addr]) ws[addr].s = makeStyle(BLUE, true, 9, 'FFFFFF', 'center');
  }
  const titleAddr = XLSX.utils.encode_cell({r: 0, c: 0});
  if (ws[titleAddr]) ws[titleAddr].s = makeStyle('1F3864', true, 12, 'FFFFFF', 'center');
  for (let ri = 0; ri < numClients; ri++) {
    const r = HDR_ROW + 1 + ri;
    for (let c = 0; c < 6; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (ws[addr]) ws[addr].s = makeStyle(null, c >= 4 ? true : false, 9, '000000', c <= 1 ? 'left' : 'center');
    }
    for (let ci = 0; ci < allDays.length; ci++) {
      const d = allDays[ci];
      const addr = XLSX.utils.encode_cell({r, c: 6 + ci});
      if (ws[addr]) ws[addr].s = makeStyle(isWeekend(d) ? GRAY : YELLOW, false, 9, '000000', 'center');
    }
    for (let c = 0; c < 4; c++) {
      const addr = XLSX.utils.encode_cell({r, c: 6 + allDays.length + c});
      if (ws[addr]) ws[addr].s = makeStyle(null, false, 9, '000000', 'center');
    }
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

function generateKTSTrackerBlob(logs, routes, monthYear, showFinancials = false, absences = []) {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded. Check your internet connection.'); return null; }

  // STRICT SST-ONLY FILTER — never include Priority routes
  const sstRoutes = (routes || []).filter(r => getRouteCompany(r) === 'SST');
  if (sstRoutes.length === 0) { alert('No SST routes found. Cannot generate HA0935 export.'); return null; }

  const [year, month] = monthYear.split('-').map(Number);
  const allDays = getAllDays(year, month);
  const startDate = new Date(year, month-1, 1).toLocaleDateString('en-US', {month:'numeric', day:'numeric', year:'2-digit'});
  const wb = XLSX.utils.book_new();
  const GRAY = 'C0C0C0', YELLOW = 'FFFF99';

  const isAbsent = (cn, ds) => (absences||[]).some(a => a.clientName===cn && ds>=a.startDate && ds<=(a.endDate||a.startDate));
  const allClientsAbsent = (route, ds) => { const ac=(route.clients||[]).filter(c=>c.active!==false); return ac.length>0&&ac.every(c=>isAbsent(c.name,ds)); };
  const getAbsenceCode = (cn, ds) => { const a=(absences||[]).find(a=>a.clientName===cn&&ds>=a.startDate&&ds<=(a.endDate||a.startDate)); return a?(a.type==='sick'?'NS':'C'):null; };
  const dayHdr = (d) => `${dayAbbr(d)} ${d.getDate()}`;

  // Cell helpers
  const ws = {};
  const E = (r,c) => XLSX.utils.encode_cell({r,c});
  const setC = (r,c,v,s) => { const a=E(r,c); if(typeof v==='object'&&v!==null&&v.f){ws[a]={f:v.f,t:'n',v:0};}else{ws[a]={v:(v===null||v===undefined)?'':v,t:typeof v==='number'?'n':'s'};} if(s)ws[a].s=s; };
  const setF = (r,c,f,s) => { const a=E(r,c); ws[a]={f,t:'n',v:0}; if(s)ws[a].s=s; };
  const hdr  = () => makeStyle(GRAY,true,9,'000000','center');
  const dayH = (wk) => makeStyle(wk?GRAY:'D9E1F2',true,9,'000000','center');
  const cell = (wk) => makeStyle(wk?GRAY:YELLOW,false,9,'000000','center');
  const tot  = () => makeStyle(GRAY,true,9,'000000','center');
  const lbl  = () => makeStyle(null,true,9,'000000','left');

  let r=0;
  // Title
  setC(r,0,'Khan Transportation - HA0935',makeStyle(null,true,14,'000000','left')); r++;
  setC(r,0,startDate,makeStyle(YELLOW,false,11,'000000','center'));
  setC(r,3,'Enter Format (Month/1/Year) ie: 6/1/12',makeStyle(null,false,9,'000000','left')); r++;
  setC(r,0,'*Please fill in only the cells highlighted in yellow. The non-highlighted cells contain formulas to estimate totals based on contractual rates.',makeStyle(null,false,9,'000000','left')); r++;
  r++; // blank
  setC(r,0,'875 Service Code:',makeStyle(null,true,10,'000000','left')); r++;
  setC(r,0,'Vehicle Rate: 0V0',makeStyle(null,true,12,'000000','left')); r++;
  r++; // blank
  setC(r,2,'Calendar Month Days',makeStyle(null,true,10,'000000','center'));
  const mergeOVO = r; r++;

  // OVO header row
  setC(r,0,'Route #',hdr()); setC(r,1,'Route Segment',hdr());
  allDays.forEach((d,ci)=>setC(r,2+ci,dayHdr(d),dayH(isWeekend(d))));
  setC(r,2+allDays.length,'Total',hdr()); r++;

  // OVO data: AM/PM per SST route
  const ovoRows=[];
  sstRoutes.forEach((route)=>{
    ['AM','PM'].forEach(period=>{
      if(period==='AM') setC(r,0,route.name,makeStyle(null,true,9,'000000','center'));
      setC(r,1,period+' Segment',makeStyle(null,true,9,'000000','left'));
      const dc=[];
      allDays.forEach((d,ci)=>{
        const wk=isWeekend(d);
        if(wk){setC(r,2+ci,'',cell(true));return;}
        const ds=d.toISOString().slice(0,10);
        const ran=logs.some(l=>(l.routeId===route.id||l.routeName===route.name)&&getLogDateKey(l)===ds&&getLogPeriodKey(l)===period.toLowerCase());
        setC(r,2+ci,allClientsAbsent(route,ds)?0:(ran?1:''),cell(false));
        dc.push(2+ci);
      });
      const er=r+1; const sp=dc.map(c=>`${XLSX.utils.encode_col(c)}${er}`).join(',');
      setF(r,2+allDays.length,sp?`SUM(${sp})`:'0',tot());
      ovoRows.push(r); r++;
    });
  });

  // OVO daily total
  const ovoTotR=r;
  setC(r,0,'Daily Total',makeStyle(GRAY,true,9,'000000','left')); setC(r,1,'',makeStyle(GRAY,false,9,'000000','center'));
  allDays.forEach((d,ci)=>{
    if(isWeekend(d)){setC(r,2+ci,'',makeStyle(GRAY,false,9,'000000','center'));return;}
    const cL=XLSX.utils.encode_col(2+ci);
    setF(r,2+ci,ovoRows.map(r2=>`${cL}${r2+1}`).join('+'),makeStyle(GRAY,true,9,'000000','center'));
  });
  const tcL=XLSX.utils.encode_col(2+allDays.length);
  setF(r,2+allDays.length,`SUM(C${r+1}:${XLSX.utils.encode_col(1+allDays.length)}${r+1})`,tot());
  r++; r++;

  // Vehicle Rate Estimate
  setC(r,0,'Vehicle Rate Estimate',makeStyle(null,true,10,'000000','left')); r++; r++;
  const vreR=r;
  setF(r,2,`${tcL}${ovoTotR+1}`,makeStyle(null,false,9,'000000','center')); setC(r,4,'Total Vehicle Units',lbl()); r++;
  setC(r,2,166.94,makeStyle(null,false,9,'000000','center')); setC(r,4,'Vehicle Unit Rate',lbl()); r++;
  setF(r,2,`C${vreR+1}*C${vreR+2}`,makeStyle(null,true,9,'000000','center')); setC(r,4,'Total Vehicle Reimbursement',makeStyle(null,true,9,'000000','left'));
  const vreReimb=r; r++; r++;

  // SSO Miles section
  setC(r,0,'SS0 Vehicle Service Miles Breakdown (AM&PM)',makeStyle(null,true,12,'000000','left')); r++; r++;
  setC(r,2,'Calendar Month Days',makeStyle(null,true,10,'000000','center'));
  const mergeSSO=r; r++;

  setC(r,0,'Route #',hdr()); setC(r,1,'',hdr());
  allDays.forEach((d,ci)=>setC(r,2+ci,dayHdr(d),dayH(isWeekend(d))));
  setC(r,2+allDays.length,'Total',hdr()); r++;

  const ssoRows=[];
  sstRoutes.forEach((route)=>{
    setC(r,0,route.name,makeStyle(null,true,9,'000000','center')); setC(r,1,'',makeStyle(null,false,9,'000000','center'));
    const dc=[];
    allDays.forEach((d,ci)=>{
      const wk=isWeekend(d);
      if(wk){setC(r,2+ci,'',cell(true));return;}
      const ds=d.toISOString().slice(0,10);
      if(allClientsAbsent(route,ds)){setC(r,2+ci,0,cell(false));dc.push(2+ci);return;}
      const dl=logs.filter(l=>getLogDateKey(l)===ds&&(l.routeId===route.id||l.routeName===route.name));
      let mi=null; dl.forEach(l=>{const m=getLogMiles(l);if(m>0)mi=(mi||0)+m;});
      setC(r,2+ci,mi!==null?Math.round(mi*10)/10:'',cell(false));
      dc.push(2+ci);
    });
    const er=r+1; const sp=dc.map(c=>`${XLSX.utils.encode_col(c)}${er}`).join(',');
    setF(r,2+allDays.length,sp?`SUM(${sp})`:'0',tot());
    ssoRows.push(r); r++;
  });

  // SSO daily total
  const ssoTotR=r;
  setC(r,0,'',makeStyle(GRAY,false,9,'000000','center')); setC(r,1,'',makeStyle(GRAY,false,9,'000000','center'));
  allDays.forEach((d,ci)=>{
    if(isWeekend(d)){setC(r,2+ci,'',makeStyle(GRAY,false,9,'000000','center'));return;}
    const cL=XLSX.utils.encode_col(2+ci);
    setF(r,2+ci,ssoRows.map(r2=>`${cL}${r2+1}`).join('+'),makeStyle(GRAY,true,9,'000000','center'));
  });
  setF(r,2+allDays.length,`SUM(C${r+1}:${XLSX.utils.encode_col(1+allDays.length)}${r+1})`,tot());
  r++; r++;

  // Vehicle Service Mile Estimate
  setC(r,0,'Vehicle Service Mile Estimate',makeStyle(null,true,10,'000000','left')); r++; r++;
  const vseR=r;
  setF(r,2,`${tcL}${ssoTotR+1}`,makeStyle(null,false,9,'000000','center')); setC(r,4,'Total Vehicle Service Miles (total of all routes)',lbl()); r++;
  setC(r,2,1.08,makeStyle(null,false,9,'000000','center')); setC(r,4,'Contract Vehicle Service Mile Rate',lbl()); r++;
  setF(r,2,`C${vseR+1}*C${vseR+2}`,makeStyle(null,true,9,'000000','center')); setC(r,4,'Total Vehicle Service Mile Reimbursement',makeStyle(null,true,9,'000000','left'));
  const vseMileReimb=r; r++;

  if(showFinancials){
    r++; r++;
    const io=20;
    setC(r,io,'Total Invoice Estimate',makeStyle(null,true,12,'000000','center')); r++;
    setC(r,io,'Total Vehicle Reimbursement',makeStyle(null,false,10,'000000','right'));
    setF(r,io+6,`C${vreReimb+1}`,makeStyle(null,false,10,'000000','center')); r++;
    setC(r,io,'Total SS0 Vehicle Service Miles Reimbursement',makeStyle(null,false,10,'000000','right'));
    setF(r,io+6,`C${vseMileReimb+1}`,makeStyle(null,false,10,'000000','center')); r++;
    setC(r,io,'Invoice Grand Total',makeStyle(null,true,12,'000000','right'));
    setF(r,io+6,`U${r-1}+U${r}`,makeStyle(null,true,12,'000000','center')); r++;
  }

  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:r+1,c:2+allDays.length+8}});
  ws['!cols']=[{wch:14},{wch:14},...allDays.map(d=>({wch:isWeekend(d)?4.5:5.8})),{wch:10}];
  ws['!merges']=[{s:{r:mergeOVO,c:2},e:{r:mergeOVO,c:2+allDays.length}},{s:{r:mergeSSO,c:2},e:{r:mergeSSO,c:2+allDays.length}}];
  XLSX.utils.book_append_sheet(wb,ws,'Route Detail');

  // Sheet 2: Daily Attendance — SST clients ONLY
  const allClients=[]; const seen=new Set();
  sstRoutes.forEach(route=>{
    (route.clients||[]).filter(c=>c.active!==false).forEach(cl=>{
      if(!seen.has(cl.name)){
        const pts=cl.name.split(', ');
        allClients.push({...cl,lastName:pts[0]||cl.name,firstName:pts[1]||'',routeName:route.name,routeId:route.id,vehicleId:normalizeVehicleNumber(route.vehicleId||route.name)});
        seen.add(cl.name);
      }
    });
  });
  allClients.sort((a,b)=>a.lastName.localeCompare(b.lastName));

  const arData=[
    ['Khan Transportation - HA0935 - 875'],[startDate],
    ['*Purpose: Log daily trips provided to each rider.'],
    ['*Instructions: Track attendance as follows:'],
    ['','','','','','','0 = Absent','','Reported by home'],
    ['','','','','','','1 = One Way'],
    ['','','','','','','2 = Round Trip'],
    ['','','','','','','NS = No Show','','No Contact/Notice'],
    ['','','','','','','C = Cancellation','','Cancelled at the door'],
    ['','','','','','','X = Vendor Cancellation','','Vendor Cancelled'],
    [],['Daily Attendance Report'],
    ['#','First Name','Last Name','UCI','Route / Vehicle ID','Service Days',...allDays.map(d=>dayHdr(d)),'Total Trips','No Shows','Cancellations','Vendor CXL'],
  ];
  allClients.forEach((cl,idx)=>{
    const row=[idx+1,cl.firstName,cl.lastName,cl.uci||'',cl.vehicleId||cl.routeName,''];
    allDays.forEach(day=>{
      if(isWeekend(day)){row.push('');return;}
      const ds=day.toISOString().slice(0,10);
      const cc=getAbsenceCode(cl.name,ds); if(cc){row.push(cc);return;}
      const dl=logs.filter(l=>getLogDateKey(l)===ds&&(l.routeId===cl.routeId||l.routeName===cl.routeName));
      let code='';
      if(dl.length>0){
        const aL=dl.find(l=>getLogPeriodKey(l)==='am'),pL=dl.find(l=>getLogPeriodKey(l)==='pm');
        const aS=aL?getClientStatusFromLog(aL,cl.name):null,pS=pL?getClientStatusFromLog(pL,cl.name):null;
        const aP=aS==='present',pP=pS==='present',cn=aS==='cancelled'||pS==='cancelled';
        if(aP&&pP)code=2; else if(aP||pP)code=1; else if(cn)code='C'; else code=0;
      }
      row.push(code===''?'':code);
    });
    const rn=arData.length+1;
    const wc=allDays.map((d,ci)=>isWeekend(d)?null:col(6+ci)).filter(Boolean);
    const rng=wc.length?`${wc[0]}${rn}:${wc[wc.length-1]}${rn}`:null;
    row.push(rng?{f:`SUMPRODUCT((${rng}=2)*2+(${rng}=1)*1)`}:0,rng?{f:`COUNTIF(${rng},"NS")`}:0,rng?{f:`COUNTIF(${rng},"C")`}:0,rng?{f:`COUNTIF(${rng},"X")`}:0);
    arData.push(row);
  });
  const wsAR=XLSX.utils.aoa_to_sheet(arData);
  styleAttendance(wsAR,allDays,allClients.length);
  wsAR['!cols']=[{wch:4},{wch:16},{wch:16},{wch:10},{wch:16},{wch:9},...allDays.map(d=>({wch:isWeekend(d)?4:5.5})),{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsAR,'Daily Attendance Report');

  if(wb.SheetNames.length!==2){alert('HA0935 export error: expected 2 sheets, got '+wb.SheetNames.length);return null;}
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});
  return new Blob([wbout],{type:'application/octet-stream'});
}

function generatePriorityTrackerBlob(logs, monthYear, showFinancials, absences, routesArg) {
  if(typeof XLSX==='undefined'){alert('Excel library not loaded.');return null;}
  const [year,month]=monthYear.split('-').map(Number);
  const allDays=getAllDays(year,month);
  const startDate=new Date(year,month-1,1).toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'});
  const wb=XLSX.utils.book_new();
  const GRAY='C0C0C0',YELLOW='FFFF99';
  const dayHdr=(d)=>`${dayAbbr(d)} ${d.getDate()}`;
  const hdr=()=>makeStyle(GRAY,true,9,'000000','center');
  const dayH=(wk)=>makeStyle(wk?GRAY:'D9E1F2',true,9,'000000','center');
  const cell=(wk)=>makeStyle(wk?GRAY:YELLOW,false,9,'000000','center');
  const tot=()=>makeStyle(GRAY,true,9,'000000','center');
  const lbl=()=>makeStyle(null,true,9,'000000','left');
  const isAbs=(cn,ds)=>(absences||[]).some(a=>a.clientName===cn&&ds>=a.startDate&&ds<=(a.endDate||a.startDate));
  const getAbsCode=(cn,ds)=>{const a=(absences||[]).find(a=>a.clientName===cn&&ds>=a.startDate&&ds<=(a.endDate||a.startDate));return a?(a.type==='sick'?'NS':'C'):null;};
  const PRIORITY_NUMS=['6770','6771','6772','6773','6774'];

  const ws={};
  const E=(r,c)=>XLSX.utils.encode_cell({r,c});
  const setC=(r,c,v,s)=>{const a=E(r,c);if(typeof v==='object'&&v!==null&&v.f){ws[a]={f:v.f,t:'n',v:0};}else{ws[a]={v:(v===null||v===undefined)?'':v,t:typeof v==='number'?'n':'s'};}if(s)ws[a].s=s;};
  const setF=(r,c,f,s)=>{const a=E(r,c);ws[a]={f,t:'n',v:0};if(s)ws[a].s=s;};

  let r=0;
  setC(r,0,'Priority Transportation HV0713',makeStyle(null,true,14,'000000','left')); r++;
  setC(r,0,startDate,makeStyle(YELLOW,false,11,'000000','center')); setC(r,3,'Enter Format (Month/1/Year) ie: 6/1/12',makeStyle(null,false,9,'000000','left')); r++;
  setC(r,0,'*Please fill in only the cells highlighted in yellow.',makeStyle(null,false,9,'000000','left')); r++;
  r++; setC(r,0,'875 Service Code:',makeStyle(null,true,10,'000000','left')); r++;
  setC(r,0,'Vehicle Rate: 0V0',makeStyle(null,true,12,'000000','left')); r++; r++;
  setC(r,2,'Calendar Month Days',makeStyle(null,true,10,'000000','center'));
  const mOVO=r; r++;

  setC(r,0,'Route #',hdr()); setC(r,1,'Route Segment',hdr());
  allDays.forEach((d,ci)=>setC(r,2+ci,dayHdr(d),dayH(isWeekend(d))));
  setC(r,2+allDays.length,'Total',hdr()); r++;

  const ovoRows=[];
  PRIORITY_NUMS.forEach(rId=>{
    ['AM','PM'].forEach(period=>{
      if(period==='AM') setC(r,0,rId,makeStyle(null,true,9,'000000','center'));
      setC(r,1,period+' Segment',makeStyle(null,true,9,'000000','left'));
      const dc=[];
      allDays.forEach((d,ci)=>{
        const wk=isWeekend(d); if(wk){setC(r,2+ci,'',cell(true));return;}
        const ds=d.toISOString().slice(0,10);
        const matched=(routesArg||[]).find(rt=>normalizeVehicleNumber(rt.vehicleId||rt.name)===rId||rt.name===rId);
        const ran=matched?logs.some(l=>(l.routeId===matched.id||l.routeName===matched.name)&&getLogDateKey(l)===ds&&getLogPeriodKey(l)===period.toLowerCase()):false;
        setC(r,2+ci,ran?1:'',cell(false)); dc.push(2+ci);
      });
      const er=r+1; const sp=dc.map(c=>`${XLSX.utils.encode_col(c)}${er}`).join(',');
      setF(r,2+allDays.length,sp?`SUM(${sp})`:'0',tot());
      ovoRows.push(r); r++;
    });
  });

  const ovoTR=r;
  setC(r,0,'Daily Total',makeStyle(GRAY,true,9,'000000','left')); setC(r,1,'',makeStyle(GRAY,false,9,'000000','center'));
  allDays.forEach((d,ci)=>{if(isWeekend(d)){setC(r,2+ci,'',makeStyle(GRAY,false,9,'000000','center'));return;}const cL=XLSX.utils.encode_col(2+ci);setF(r,2+ci,ovoRows.map(r2=>`${cL}${r2+1}`).join('+'),makeStyle(GRAY,true,9,'000000','center'));});
  const tcL=XLSX.utils.encode_col(2+allDays.length);
  setF(r,2+allDays.length,`SUM(C${r+1}:${XLSX.utils.encode_col(1+allDays.length)}${r+1})`,tot()); r++; r++;

  setC(r,0,'Vehicle Rate Estimate',makeStyle(null,true,10,'000000','left')); r++; r++;
  const vreR=r;
  setF(r,2,`${tcL}${ovoTR+1}`,makeStyle(null,false,9,'000000','center')); setC(r,4,'Total Vehicle Units',lbl()); r++;
  setC(r,2,166.94,makeStyle(null,false,9,'000000','center')); setC(r,4,'Vehicle Unit Rate',lbl()); r++;
  setF(r,2,`C${vreR+1}*C${vreR+2}`,makeStyle(null,true,9,'000000','center')); setC(r,4,'Total Vehicle Reimbursement',lbl());
  const vreReimb=r; r++;

  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:r+5,c:2+allDays.length+8}});
  ws['!cols']=[{wch:12},{wch:14},...allDays.map(d=>({wch:isWeekend(d)?4.5:5.8})),{wch:10}];
  ws['!merges']=[{s:{r:mOVO,c:2},e:{r:mOVO,c:2+allDays.length}}];
  XLSX.utils.book_append_sheet(wb,ws,'Route Detail');

  // Daily Attendance — blank template for manual entry
  const arData=[['Priority Transportation HV0713 - 875'],[startDate],
    ['*Purpose: Log daily trips provided to each rider.'],['*Instructions: Track attendance as follows:'],
    ['','','','','','','0 = Absent','','Reported by home'],['','','','','','','1 = One Way'],
    ['','','','','','','2 = Round Trip'],['','','','','','','NS = No Show','','No Contact/Notice'],
    ['','','','','','','C = Cancellation','','Cancelled at the door'],
    ['','','','','','','X = Vendor Cancellation','','Vendor Cancelled'],
    [],['Daily Attendance Report'],
    ['#','First Name','Last Name','UCI','Route / Vehicle ID','Service Days',...allDays.map(d=>dayHdr(d)),'Total Trips','No Shows','Cancellations','Vendor CXL'],
  ];
  for(let i=0;i<30;i++){
    const rn=arData.length+1;
    const wc=allDays.map((d,ci)=>isWeekend(d)?null:col(6+ci)).filter(Boolean);
    const rng=wc.length?`${wc[0]}${rn}:${wc[wc.length-1]}${rn}`:null;
    arData.push([i+1,'','','','','',...allDays.map(d=>isWeekend(d)?'':''),rng?{f:`SUMPRODUCT((${rng}=2)*2+(${rng}=1)*1)`}:0,rng?{f:`COUNTIF(${rng},"NS")`}:0,rng?{f:`COUNTIF(${rng},"C")`}:0,rng?{f:`COUNTIF(${rng},"X")`}:0]);
  }
  const wsAR=XLSX.utils.aoa_to_sheet(arData);
  styleAttendance(wsAR,allDays,30);
  wsAR['!cols']=[{wch:4},{wch:16},{wch:16},{wch:10},{wch:14},{wch:9},...allDays.map(d=>({wch:isWeekend(d)?4:5.5})),{wch:12},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsAR,'Daily Attendance Report');

  if(wb.SheetNames.length!==2){alert('HV0713 export error: expected 2 sheets, got '+wb.SheetNames.length);return null;}
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});
  return new Blob([wbout],{type:'application/octet-stream'});
}

function generateHA0935Blob(logs, routes, monthYear, showFinancials, absences) {

function ReportsTab({ logs, routes, isAdmin, absences = [], attendanceCorrections = [], activeCompany = 'sst' }) {
  const now = new Date();
  const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [selectedMonth, setSelectedMonth] = useState(defaultMonth);

  // Filter logs to only include those matching the active company's routes.
  // Logs carry `routeId` which maps to a route; if that route is not in `routes` (which is already company-filtered),
  // the log belongs to the other company and must be excluded.
  const companyRouteIds = new Set((routes || []).map(r => r.id));
  const filteredLogs = (logs || []).filter(l => {
    if (!l.routeId) return false;
    return companyRouteIds.has(l.routeId);
  });

  const monthsWithData = [...new Set(filteredLogs.map(getLogDateKey).filter(Boolean).map(d => d.slice(0,7)))];
  if (!monthsWithData.includes(defaultMonth)) monthsWithData.push(defaultMonth);
  monthsWithData.sort().reverse();

  const [year, month] = selectedMonth.split('-').map(Number);
  const monthName = new Date(year, month-1, 1).toLocaleString('en-US', {month:'long', year:'numeric'});
  const monthLogs = filteredLogs.filter(l => getLogDateKey(l).startsWith(selectedMonth));
  const ongoingAttendance = buildOngoingAttendanceSummary({ logs: filteredLogs, routes, corrections: attendanceCorrections });
  const activeNotices = getActiveAbsentNoticeEntries({ logs: filteredLogs, routes, corrections: attendanceCorrections });

  // Only show the section for the active company (per company-isolation toggle).
  const activeCompanyLabel = activeCompany === 'sst' ? 'SST' : 'Priority';
  const activeCompanyAccent = activeCompany === 'sst' ? '#1d4ed8' : '#16a34a';
  const activeCompanyBg = activeCompany === 'sst' ? '#eff6ff' : '#f0fdf4';

  const routeSections = [
    { label: `${activeCompanyLabel} Routes`, company: activeCompanyLabel, accent: activeCompanyAccent, bg: activeCompanyBg },
  ].map(section => {
    const sectionRoutes = (routes || []).filter(r => getRouteCompany(r) === section.company);
    const rows = sectionRoutes.map(route => {
      const rLogs = monthLogs.filter(l => l.routeId === route.id);
      const submissions = rLogs.length;
      const totalMiles = rLogs.reduce((sum, log) => sum + getLogMiles(log), 0);
      const activeClients = (route.clients || []).filter(c => c.active !== false).length;
      return {
        routeId: route.id,
        routeName: route.name,
        vehicleNumber: normalizeVehicleNumber(route.vehicleId),
        driver: route.driver,
        submissions,
        totalMiles,
        activeClients,
      };
    });
    return { ...section, rows };
  });

  const attendanceSplit = {
    SST: ongoingAttendance.filter(r => r.company === 'SST'),
    Priority: ongoingAttendance.filter(r => r.company === 'Priority'),
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, gap:10, flexWrap:'wrap' }}>
        <div>
          <h3 style={{ color: COLORS.text, margin: 0 }}>📥 Reports</h3>
          <p style={{ color: COLORS.textMuted, fontSize:12, margin:'2px 0 0' }}>
            SST and Priority route reporting are separated. Client attendance summary is stored as an ongoing tracker.
          </p>
        </div>
        <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
          style={{ padding:'8px 12px', background: COLORS.card, border:`1px solid ${COLORS.border}`, borderRadius:8, color: COLORS.text, fontSize:13 }}>
          {monthsWithData.map(m => {
            const [y,mo] = m.split('-').map(Number);
            const label = new Date(y,mo-1,1).toLocaleString('en-US',{month:'long',year:'numeric'});
            return <option key={m} value={m}>{label}</option>;
          })}
        </select>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))', gap:8, marginBottom:16 }}>
        {[
          { label:'Month', value: monthName, color: COLORS.accent },
          { label:'SST Routes', value: routeSections[0].rows.length, color:'#1d4ed8' },
          { label:'Priority Routes', value: routeSections[1].rows.length, color:'#16a34a' },
          { label:'Active 96h Notices', value: activeNotices.length, color: COLORS.red },
        ].map(s => (
          <Card key={s.label} style={{ textAlign:'center', padding:12 }}>
            <p style={{ color:s.color, fontSize:18, fontWeight:800, margin:0 }}>{s.value}</p>
            <p style={{ color:COLORS.textMuted, fontSize:11, margin:'2px 0 0' }}>{s.label}</p>
          </Card>
        ))}
      </div>

      <Card style={{ marginBottom:16, border:`1px solid ${COLORS.border}` }}>
        <h4 style={{ color:COLORS.text, margin:'0 0 8px', fontSize:15 }}>📊 Ongoing Client Attendance Summary</h4>
        <p style={{ color:COLORS.textMuted, fontSize:12, margin:'0 0 10px' }}>
          This tracker keeps cumulative attendance history from saved driver logs, including manager/system-admin corrections.
        </p>
        {['SST','Priority'].map(company => (
          <div key={company} style={{ marginTop: company === 'SST' ? 0 : 14 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
              <p style={{ color:company==='SST' ? '#1d4ed8' : '#16a34a', fontSize:13, fontWeight:800, margin:0 }}>{company} Client Attendance Summary</p>
              <span style={{ color:COLORS.textMuted, fontSize:11 }}>{attendanceSplit[company].length} participants</span>
            </div>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', borderCollapse:'collapse' }}>
                <thead>
                  <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
                    {['Vehicle #','Participant','Present Trips','Did Not Attend','Corrected Pickups','Last Activity'].map(h => (
                      <th key={h} style={{ textAlign:'left', padding:'8px 6px', color:COLORS.textDim, fontSize:12 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {attendanceSplit[company].length === 0 ? (
                    <tr><td colSpan={6} style={{ padding:'10px 6px', color:COLORS.textMuted }}>No attendance records yet.</td></tr>
                  ) : attendanceSplit[company].map((row, idx) => (
                    <tr key={`${company}_${idx}`} style={{ borderBottom:`1px solid ${COLORS.border}55` }}>
                      <td style={{ padding:'8px 6px', color:COLORS.text, fontWeight:700 }}>{row.vehicleNumber}</td>
                      <td style={{ padding:'8px 6px', color:COLORS.text }}>{row.clientName}</td>
                      <td style={{ padding:'8px 6px', color:COLORS.accent }}>{row.presentTrips}</td>
                      <td style={{ padding:'8px 6px', color: row.notAttended > 0 ? COLORS.red : COLORS.textMuted }}>{row.notAttended}</td>
                      <td style={{ padding:'8px 6px', color: row.correctedPickups > 0 ? COLORS.yellow : COLORS.textMuted }}>{row.correctedPickups}</td>
                      <td style={{ padding:'8px 6px', color:COLORS.textDim }}>{row.lastActivity || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ))}
      </Card>

      {routeSections.map(section => (
        <Card key={section.company} style={{ marginBottom:16, border:`1px solid ${section.accent}33` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, gap:8, flexWrap:'wrap' }}>
            <div>
              <h4 style={{ color:COLORS.text, margin:0, fontSize:15 }}>{section.label} — {monthName}</h4>
              <p style={{ color:COLORS.textMuted, fontSize:12, margin:'2px 0 0' }}>Separated route totals for reports and exports.</p>
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
              <div style={{ background:section.bg, color:section.accent, borderRadius:999, padding:'4px 10px', fontSize:12, fontWeight:800 }}>
                {section.rows.reduce((sum, row) => sum + row.totalMiles, 0).toFixed(1)} mi
              </div>
              {isAdmin && (
                <button onClick={() => {
                  const contract = section.company === 'SST' ? 'HA0935' : 'HV0713';
                  const blob = section.company === 'SST'
                    ? generateKTSTrackerBlob(monthLogs, routes, selectedMonth, true, absences)
                    : generatePriorityTrackerBlob(monthLogs, selectedMonth, true, absences, routes);
                  if (blob) downloadBlob(blob, `${contract}_${monthName.replace(/ /g,'_')}.xlsx`);
                }} style={{ padding:'5px 12px', background:section.accent, color:'#fff',
                  border:'none', borderRadius:7, fontSize:12, fontWeight:700, cursor:'pointer' }}>
                  📥 {section.company === 'SST' ? 'HA0935' : 'HV0713'} (.xlsx)
                </button>
              )}
            </div>
          </div>
          <div style={{ overflowX:'auto' }}>
            <table style={{ width:'100%', borderCollapse:'collapse' }}>
              <thead>
                <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>
                  {['Route','Vehicle #','Driver','Submissions','Active Clients','Miles'].map(h => (
                    <th key={h} style={{ textAlign:'left', padding:'8px 6px', color:COLORS.textDim, fontSize:12 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {section.rows.length === 0 ? (
                  <tr><td colSpan={6} style={{ padding:'10px 6px', color:COLORS.textMuted }}>No routes found.</td></tr>
                ) : section.rows.map(row => (
                  <tr key={row.routeId} style={{ borderBottom:`1px solid ${COLORS.border}55` }}>
                    <td style={{ padding:'8px 6px', color:COLORS.text, fontWeight:700 }}>{row.routeName}</td>
                    <td style={{ padding:'8px 6px', color:COLORS.text }}>{row.vehicleNumber}</td>
                    <td style={{ padding:'8px 6px', color:COLORS.text }}>{row.driver}</td>
                    <td style={{ padding:'8px 6px', color:COLORS.text }}>{row.submissions}</td>
                    <td style={{ padding:'8px 6px', color:COLORS.text }}>{row.activeClients}</td>
                    <td style={{ padding:'8px 6px', color:section.accent, fontWeight:700 }}>{row.totalMiles.toFixed(1)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      ))}

      <Card>
        <h4 style={{ color:COLORS.text, margin:'0 0 8px', fontSize:15 }}>📝 7-Day Absent Notice Report</h4>
        <p style={{ color:COLORS.textMuted, fontSize:12, margin:'0 0 10px' }}>
          Open absent notices remain visible for 7 days. Corrections by managers/system admin are retained for reports.
        </p>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ borderBottom:`1px solid ${COLORS.border}` }}>

                  <th key={h} style={{ textAlign:'left', padding:'8px 6px', color:COLORS.textDim, fontSize:12 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {activeNotices.length === 0 ? (
                <tr><td colSpan={6} style={{ padding:'10px 6px', color:COLORS.textMuted }}>No active absent notices.</td></tr>
              ) : activeNotices.map(notice => (
                <tr key={notice.key} style={{ borderBottom:`1px solid ${COLORS.border}55` }}>
                  <td style={{ padding:'8px 6px', color:COLORS.text }}>{notice.date}</td>

                  <td style={{ padding:'8px 6px', color:COLORS.text }}>{notice.clientName}</td>
                  <td style={{ padding:'8px 6px', color:COLORS.red }}>{notice.status}</td>

          </table>
        </div>
      </Card>
    </div>
