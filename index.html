        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        window.db = firebase.firestore();

        window.fsLoad = async function(key, fallback) {
          try {
            if (!window.db) return fallback;
            const doc = await window.db.collection('ktsdata').doc(key).get();
            if (doc.exists && doc.data().data !== undefined) return doc.data().data;
            return fallback;
          } catch(e) { console.warn('Firestore load failed:', key, e); return fallback; }
        };

        window.fsSave = function(key, value) {
          try {
            if (!window.db) return;
            window.db.collection('ktsdata').doc(key).set({ data: value, updatedAt: new Date().toISOString() });
          } catch(e) { console.warn('Firestore save failed:', key, e); }
        };

        window.fsListen = function(key, callback) {
          if (!window.db) return () => {};
          return window.db.collection('ktsdata').doc(key).onSnapshot(doc => {
            if (doc.exists && doc.data().data !== undefined) callback(doc.data().data);
          }, err => console.warn('Firestore listen error:', key, err));
        };

        window.firebaseReady = true;
        console.log('✅ Firebase initialized — fleet-manager-fd854');
      } catch(e) {
        console.warn('Firebase init error — offline mode:', e);
        window.db = null;
        window.firebaseReady = false;
      }
    }
    // Run immediately — Firebase compat scripts are synchronous so should be ready
    initFirebase();

const LiveCamera = ({ onCapture, onClose }) => {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [ready, setReady] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    let mounted = true;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } }, audio: false })
      .then(stream => {
        if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play();
        }
        setReady(true);
      })
      .catch(err => {
        if (mounted) setError("Camera access denied. Please allow camera permissions and try again.");
      });
    return () => { mounted = false; if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const takeSnapshot = () => {
    if (!videoRef.current) return;
    const canvas = document.createElement("canvas");
    canvas.width = videoRef.current.videoWidth;
    canvas.height = videoRef.current.videoHeight;
    canvas.getContext("2d").drawImage(videoRef.current, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onCapture(dataUrl);
  };

  const handleClose = () => {
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onClose();
  };

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000", zIndex: 300, display: "flex", flexDirection: "column" }}>
      {error ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 32 }}>
          <div style={{ textAlign: "center" }}>
            <p style={{ color: "#fff", fontSize: 16, marginBottom: 16 }}>{error}</p>
            <Btn onClick={handleClose} color={COLORS.red}>Close</Btn>
          </div>
        </div>
      ) : (
        <>
          <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
            <video ref={videoRef} autoPlay playsInline muted
              style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            {!ready && (
              <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", color: "#fff" }}>
                Loading camera...
              </div>
            )}
          </div>
          <div style={{ padding: 20, display: "flex", justifyContent: "center", gap: 24, background: "#111" }}>
            <button onClick={handleClose}
              style={{ width: 52, height: 52, borderRadius: 26, background: COLORS.red, border: "none", color: "#fff", fontSize: 20, cursor: "pointer" }}>✕</button>
            <button onClick={takeSnapshot} disabled={!ready}
              style={{
                width: 72, height: 72, borderRadius: 36, background: ready ? "#fff" : "#555",
                border: `4px solid ${ready ? COLORS.accent : "#333"}`, cursor: ready ? "pointer" : "not-allowed",
                boxShadow: ready ? "0 0 0 4px rgba(16,185,129,0.3)" : "none",
              }} />
            <div style={{ width: 52 }} /> {/* spacer */}
          </div>
        </>
      )}
    </div>
  );
};

const SignaturePad = ({ onSave, label = "Driver Signature" }) => {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasDrawn, setHasDrawn] = useState(false);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  };

  const startDraw = (e) => {
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    setDrawing(true);
    setHasDrawn(true);
  };

  const draw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#111";
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };

  const stopDraw = () => setDrawing(false);

  const clearSig = () => {
    const ctx = canvasRef.current.getContext("2d");
    ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
    setHasDrawn(false);
  };

  const saveSig = () => {
    if (!hasDrawn) return alert("Please sign first");
    onSave(canvasRef.current.toDataURL("image/png"));
  };

  return (
    <Card style={{ marginTop: 12 }}>
      <h4 style={{ color: COLORS.text, fontSize: 14, margin: "0 0 8px", fontWeight: 700 }}>✍️ {label}</h4>
      <p style={{ color: COLORS.textDim, fontSize: 11, margin: "0 0 8px" }}>Sign with your finger below</p>
      <div style={{ border: `2px solid ${COLORS.border}`, borderRadius: 8, overflow: "hidden", touchAction: "none", background: "#fff" }}>
        <canvas ref={canvasRef} width={320} height={120}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
          style={{ width: "100%", height: 120, display: "block", cursor: "crosshair" }} />
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <Btn small outline onClick={clearSig} color={COLORS.textMuted}>Clear</Btn>
        <Btn small onClick={saveSig} disabled={!hasDrawn}>Save Signature</Btn>
      </div>
    </Card>
  );
};
const VehicleInspection = ({ user, onComplete, embedded, vehicleRegistry = [], defaultVehicleNumber = '' }) => {
  const [itemData, setItemData] = useState({}); // { itemId: { photo, passfail, dropdown, remark } }
  const [submitted, setSubmitted] = useState(false);
  const [cameraOpen, setCameraOpen] = useState(null); // itemId or null
  const [signature, setSignature] = useState(null);
  // Driver's default vehicle (from route assignment) — can be overridden via dropdown
  const [selectedVehicle, setSelectedVehicle] = useState(defaultVehicleNumber || '');

  const updateItem = (id, field, value) => {
    setItemData(p => ({ ...p, [id]: { ...p[id], [field]: value } }));
  };

  const handleCapture = (dataUrl) => {
    if (cameraOpen) {
      updateItem(cameraOpen, "photo", dataUrl);
      setCameraOpen(null);
    }
  };

  const allComplete = INSPECTION_ITEMS.every(item => {
    const data = itemData[item.id];
    if (!data) return false;
    if (item.type === "photo" && !data.photo) return false;
    if (item.type === "passfail" && !data.passfail) return false;
    if (item.type === "dropdown" && !data.dropdown) return false;
    return true;
  });

  const handleSubmit = () => {
    if (!allComplete) return alert("All inspection items are required");
    if (!signature) return alert("Signature is required");
    if (!selectedVehicle) return alert("Select the vehicle you are inspecting");
    const failedItems = INSPECTION_ITEMS.filter(item => itemData[item.id]?.passfail === "fail");
    if (failedItems.some(item => !itemData[item.id]?.issueNote?.trim())) {
      return alert("Please describe the issue for all failed inspection items before submitting.");
    }
    setSubmitted(true);
    const issues = failedItems.map(item => ({
      id: `insp_issue_${item.id}_${Date.now()}`,
      serviceType: 'issue',
      issueTitle: item.label,
      issuePriority: itemData[item.id]?.issuePriority || 'Standard',
      issueStatus: 'Open',
      notes: itemData[item.id]?.issueNote || '',
      date: new Date().toISOString().slice(0,10),
      reportedBy: user.name,
      source: 'inspection',
    }));
    setTimeout(() => onComplete({
      driver: user.name, items: itemData, signature, date: new Date().toISOString(),
      vehicleNumber: selectedVehicle,
      vehicleId: selectedVehicle,
      issues,
      passed: INSPECTION_ITEMS.every(item => {
        const d = itemData[item.id];
        if (item.type === "passfail") return d?.passfail === "pass";
        return true;
      }),
    }), 1500);
  };

  if (submitted) return (
    <div style={{ ...(embedded ? { padding: 16 } : { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: COLORS.bg }) }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 64, marginBottom: 16 }}>✅</div>
        <h2 style={{ color: COLORS.text }}>Inspection Submitted</h2>
        <p style={{ color: COLORS.textDim }}>All items complete.</p>
      </div>
    </div>
  );

  return (
    <div style={{ ...(embedded ? {} : { minHeight: "100vh", background: COLORS.bg, padding: "16px 16px 100px" }) }}>
      {/* Live Camera Overlay */}
      {cameraOpen && (
        <LiveCamera
          onCapture={handleCapture}
          onClose={() => setCameraOpen(null)}
        />
      )}

      <div style={{ maxWidth: 500, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <h2 style={{ color: COLORS.text, margin: 0, fontSize: 20 }}>🔍 Vehicle Inspection</h2>
          <Badge color={COLORS.yellow}>Pre-Trip</Badge>
        </div>
        <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 8px" }}>
          {new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" })}
          {" · "}{user.name}
        </p>
        {/* Vehicle selector — defaults to the driver's assigned vehicle but lets them pick another */}
        <Card style={{ marginBottom: 12, background: "#fffbeb", border: `1px solid ${COLORS.yellow}66` }}>
          <label style={{ display:"block", color: COLORS.textDim, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>Vehicle being inspected *</label>
          <select
            value={selectedVehicle}
            onChange={e => setSelectedVehicle(e.target.value)}
            style={{ width:"100%", padding:"10px 12px", border:`1px solid ${COLORS.border}`, borderRadius:8, background:"#fff", color:COLORS.text, fontWeight:700 }}>
            <option value="">— Select vehicle —</option>
            {vehicleRegistry.map(v => (
              <option key={v.id} value={v.vehicleNumber}>
                {v.vehicleNumber}{v.vehicleNumber === defaultVehicleNumber ? " (your assigned)" : ""}{v.assignedDriver ? ` — ${v.assignedDriver}` : ""}
              </option>
            ))}
          </select>
          {selectedVehicle && selectedVehicle !== defaultVehicleNumber && (
            <p style={{ color: "#92400e", fontSize: 11, margin: "6px 0 0", fontWeight: 600 }}>
              ⚠️ Inspecting a different vehicle than your usual assignment. This inspection will be filed under {selectedVehicle}.
            </p>
          )}
        </Card>
        <p style={{ color: COLORS.red, fontSize: 12, margin: "0 0 4px", fontWeight: 600 }}>* All items are required</p>
        <p style={{ color: COLORS.textMuted, fontSize: 11, margin: "0 0 16px" }}>📷 Photos are live camera only — no gallery uploads</p>

        {INSPECTION_ITEMS.map((item, idx) => {
          const data = itemData[item.id] || {};
          const isComplete = item.type === "photo" ? !!data.photo
            : item.type === "passfail" ? !!data.passfail
            : item.type === "dropdown" ? !!data.dropdown : false;

          return (
            <Card key={item.id} style={{
              marginBottom: 12,
              borderLeft: `4px solid ${isComplete ? COLORS.accent : COLORS.red}`,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div>
                  <span style={{ color: COLORS.textMuted, fontSize: 11, fontWeight: 700 }}>{idx + 1} of {INSPECTION_ITEMS.length}</span>
                  <h3 style={{ color: COLORS.text, fontSize: 15, margin: "2px 0 0", fontWeight: 700 }}>{item.label} *</h3>
                </div>
                {isComplete && <span style={{ color: COLORS.accent, fontSize: 20 }}>✓</span>}
              </div>
              <p style={{ color: COLORS.textDim, fontSize: 12, margin: "0 0 12px" }}>{item.instruction}</p>

              {/* Photo type — live camera only */}
              {item.type === "photo" && (
                <div>
                  {data.photo ? (
                    <div style={{ position: "relative", marginBottom: 8 }}>
                      <img src={data.photo} alt="" style={{ width: "100%", maxHeight: 200, objectFit: "cover", borderRadius: 8 }} />
                      <div style={{ position: "absolute", top: 6, left: 6, background: "rgba(0,0,0,0.6)", color: "#fff", fontSize: 9, padding: "2px 6px", borderRadius: 4 }}>
                        📷 LIVE
                      </div>
                      <button onClick={() => updateItem(item.id, "photo", null)}
                        style={{ position: "absolute", top: 6, right: 6, background: COLORS.red, color: "#fff", border: "none",
                          borderRadius: 20, width: 28, height: 28, cursor: "pointer", fontSize: 14, fontWeight: 700 }}>✕</button>
                    </div>
                  ) : (
                    <Btn onClick={() => setCameraOpen(item.id)} color={COLORS.blue} style={{ width: "100%" }}>
                      📷 Open Camera
                    </Btn>
                  )}
                </div>
              )}

              {/* Pass/Fail type */}
              {item.type === "passfail" && (
                <div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                    <Btn onClick={() => updateItem(item.id, "passfail", "pass")}
                      color={data.passfail === "pass" ? COLORS.accent : COLORS.border}
                      style={{ flex: 1, border: data.passfail === "pass" ? `2px solid ${COLORS.accent}` : `2px solid ${COLORS.border}` }}>
                      ✓ Pass
                    </Btn>
                    <Btn onClick={() => updateItem(item.id, "passfail", "fail")}
                      color={data.passfail === "fail" ? COLORS.red : COLORS.border}
                      style={{ flex: 1, border: data.passfail === "fail" ? `2px solid ${COLORS.red}` : `2px solid ${COLORS.border}` }}>
                      ✗ Fail
                    </Btn>
                  </div>
                  {data.passfail === "fail" && (
                    <div style={{ background:"#fef2f2", border:`1px solid ${COLORS.red}`, borderRadius:8, padding:"10px 12px", marginTop:4 }}>
                      <p style={{ color:COLORS.red, fontSize:12, fontWeight:700, margin:"0 0 6px" }}>🚨 Issue Detected — Describe the problem</p>
                      <textarea
                        value={data.issueNote || ""}
                        onChange={e => updateItem(item.id, "issueNote", e.target.value)}
                        placeholder="Describe the issue in detail (e.g. brakes grinding on left rear, check engine light on, etc.)"
                        style={{ width:"100%", minHeight:72, background:"#fff", border:`1px solid ${COLORS.red}`,
                          borderRadius:8, color:COLORS.text, padding:10, fontSize:13, resize:"vertical",
                          boxSizing:"border-box" }}
                      />
                      <select
                        value={data.issuePriority || "Standard"}
                        onChange={e => updateItem(item.id, "issuePriority", e.target.value)}
                        style={{ width:"100%", marginTop:6, padding:"8px 10px", background:"#fff", border:`1px solid ${COLORS.red}`,
                          borderRadius:8, color:COLORS.text, fontSize:13 }}>
                        <option value="Low">Priority: Low</option>
                        <option value="Standard">Priority: Standard</option>
                        <option value="High">Priority: High</option>
                        <option value="Critical">Priority: Critical — Do not operate vehicle</option>
                      </select>
                    </div>
                  )}
                </div>
              )}

              {/* Dropdown type */}
              {item.type === "dropdown" && (
                <div style={{ marginBottom: 8 }}>
                  <select value={data.dropdown || ""} onChange={e => updateItem(item.id, "dropdown", e.target.value)}
                    style={{ width: "100%", padding: "12px", background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                      borderRadius: 8, color: COLORS.text, fontSize: 14 }}>
                    <option value="">Select fuel level...</option>
                    {item.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                  </select>
                </div>
              )}

              {/* Remark section for all items */}
              <details style={{ marginTop: 8 }}>
                <summary style={{ color: COLORS.blue, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  {data.remark ? "📝 Remark added" : "+ Add Remark"}
                </summary>
                <textarea value={data.remark || ""} onChange={e => updateItem(item.id, "remark", e.target.value)}
                  placeholder="Enter remark..."
                  style={{ width: "100%", minHeight: 60, background: COLORS.bg, border: `1px solid ${COLORS.border}`,
                    borderRadius: 8, color: COLORS.text, padding: 10, fontSize: 13, resize: "vertical",
                    boxSizing: "border-box", marginTop: 6 }} />
              </details>
            </Card>
          );
        })}

        <Card style={{ marginBottom: 16, background: COLORS.bg, textAlign: "center", padding: 12 }}>
          <p style={{ color: COLORS.textDim, fontSize: 13, margin: 0 }}>
            {INSPECTION_ITEMS.filter(item => {
              const d = itemData[item.id] || {};
              if (item.type === "photo") return !!d.photo;
              if (item.type === "passfail") return !!d.passfail;
              if (item.type === "dropdown") return !!d.dropdown;
              return false;
            }).length} of {INSPECTION_ITEMS.length} items completed
          </p>
        </Card>

        {/* Signature */}
        {signature ? (
          <Card style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <h4 style={{ color: COLORS.accent, fontSize: 14, margin: 0 }}>✍️ Signed</h4>
              <Btn small outline onClick={() => setSignature(null)} color={COLORS.textMuted}>Redo</Btn>
            </div>
            <img src={signature} alt="sig" style={{ width: "100%", height: 60, objectFit: "contain", border: `1px solid ${COLORS.border}`, borderRadius: 6 }} />
          </Card>
        ) : (
          <SignaturePad label="Driver Signature — Inspection" onSave={setSignature} />
        )}

        <Btn onClick={handleSubmit} disabled={!allComplete || !signature}
          style={{ width: "100%", padding: "14px 0", fontSize: 16, marginTop: 12 }}>
          Submit Inspection
        </Btn>
      </div>
    </div>
  );
};
